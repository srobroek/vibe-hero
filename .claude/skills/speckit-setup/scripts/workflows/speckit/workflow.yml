schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Speckit Steering Cycle"
  version: "1.0.0"
  author: "sjors"
  description: "Runs the steering flow through specification, dependency wiring, critique, issue sync, checkpoint, and implementation."

inputs:
  feature_name:
    type: string
    required: true
    prompt: "Feature name"
  integration:
    type: string
    default: "codex"
    prompt: "Integration to use (e.g. codex, claude, copilot, gemini)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before clarification."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-clarify
    type: gate
    message: "Review the clarified spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-checklist
    type: gate
    message: "Resolve the requirements-quality checklist before critique and security review."
    options: [approve, reject]
    on_reject: abort

  # critique + security-review are a parallel pair in the DAG; the workflow
  # schema has no parallel primitive, so they run as adjacent sequential steps.
  - id: critique
    command: speckit.critique.run
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: security-review
    command: speckit.security-review
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: dependencies
    command: speckit.diagram.dependencies
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-ready
    type: gate
    message: "Review critique, security review, dependency outputs, and analysis before issue sync."
    options: [approve, reject]
    on_reject: abort

  - id: taskstoissues
    command: speckit.taskstoissues
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: checkpoint
    command: speckit.checkpoint.commit
    integration: "{{ inputs.integration }}"

  - id: review-implementation-ready
    type: gate
    message: "Review issue sync and checkpoint state before implementation."
    options: [approve, reject]
    on_reject: abort

  # Implementation routes through the agent-assign flow, not the deprecated
  # /speckit.implement (which the speckit-dag-hooks dispatcher hard-blocks).
  - id: assign
    command: speckit.agent-assign.assign
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: validate
    command: speckit.agent-assign.validate
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: execute
    command: speckit.agent-assign.execute
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"
