name: CI

# Continuous integration for vibe-hero (spec 002, US2 / T017).
#
# Runs on every pull request and on push to main (NOT on tags -- the release
# pipeline owns tags). Three guarantees:
#   1. The server package builds.
#   2. The full spec-001 + packaging test suite passes (FR-019 / SC-009).
#   3. The committed, generated distribution artifacts are NOT stale relative to
#      their declared inputs -- the ARTIFACT STALENESS GATE (FR-010/015, SC-008).
#
# Staleness gate mechanics: `apm pack` regenerates the marketplace artifact
# (root .claude-plugin/marketplace.json) IN PLACE at its configured output path
# (apm.yml -> marketplace.outputs.claude.path), and `apm pack --check-versions`
# asserts the plugin version agrees with the configured tag_pattern strategy.
# We then run `git diff --exit-code` over the committed generated artifacts; any
# difference between what is committed and what regenerates fails the job, so a
# hand-edit to a generated manifest (or a stale version-derived field) cannot
# ship. `build/` and `packages/vibe-hero-plugin/build/` are gitignored, so the
# apm pack bundle staging output never dirties the tree -- only the in-tree
# marketplace output is compared.

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the apm-cli version so the regenerated artifacts are reproducible across
  # runs (a generator version bump must be an explicit, reviewed change).
  APM_CLI_VERSION: "0.23.0"

jobs:
  build-test-staleness:
    name: build, test, staleness gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # F6: full history + tags so any tag_pattern/--check-versions logic
          # and apm pack version resolution are reproducible vs local.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @vibe-hero/server
        run: pnpm --filter @vibe-hero/server build

      - name: Test @vibe-hero/server (full suite)
        # The suite includes the packaging, plugin-manifest, and release-workflow
        # integration tests (T020) in addition to the spec-001 behavior tests.
        run: pnpm --filter @vibe-hero/server test

      # ---- Artifact staleness gate (FR-010/015, SC-008) ----
      - name: Set up Python (for apm-cli)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install apm CLI
        # apm-cli is the artifact generator. pipx gives it an isolated env and an
        # entrypoint on PATH; the version is pinned via APM_CLI_VERSION above.
        run: |
          python -m pip install --upgrade pipx
          pipx install "apm-cli==${APM_CLI_VERSION}"
          apm --version

      - name: Regenerate distribution artifacts
        # Regenerate the marketplace artifact in place (writes to the configured
        # output path, root .claude-plugin/marketplace.json). --offline avoids any
        # network resolution; --marketplace claude scopes regeneration to the one
        # configured output so the dependency bundle's transient build/ output is
        # the only thing written outside the tree (and build/ is gitignored).
        run: apm pack --offline --marketplace claude

      - name: Verify version alignment (release gate)
        # Independent of the diff: assert the plugin/marketplace version agrees
        # with the configured tag_pattern strategy. Exits non-zero on misalignment.
        run: apm pack --offline --marketplace claude --check-versions --dry-run

      - name: Fail if generated artifacts are stale
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated distribution artifacts are out of date."
            echo "Run 'apm pack --marketplace claude' locally and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
          echo "Generated artifacts are up to date."
