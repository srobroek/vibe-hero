name: Release Please

# Release-PR gate + npm publish for vibe-hero (spec 002, US2 / T018/T019,
# FR-013/014/016/017, SC-005).
#
# SINGLE-PACKAGE mode: @vibe-hero/server (rooted at packages/server) is the one
# source of version truth. Config lives in release-please-config.json +
# .release-please-manifest.json.
#
# ONE-WORKFLOW design (why publish lives HERE, not in a separate on:release job):
# release-please creates the GitHub release + tag using the default GITHUB_TOKEN.
# GitHub deliberately does NOT trigger further workflow runs from events created
# by GITHUB_TOKEN (recursion guard), so a separate `on: release: [published]`
# workflow would NEVER fire for a bot-created release. The canonical fix
# (release-please-action README) is to run the publish steps in the SAME job,
# gated on the action's `release_created` output. No PAT, no cross-workflow
# trigger; OIDC Trusted Publishing still works.
#
# Behavior: merges to main accumulate Conventional Commits into a bot-maintained
# release PR (updates packages/server/package.json version + CHANGELOG.md +
# extra-files: plugin.json, apm.yml, AND .claude-plugin/marketplace.json — the
# marketplace pointer rides in the release PR itself, so nothing ever pushes to
# main outside a PR and the branch-protection ruleset is naturally satisfied).
# Merging that release PR is the single human approval point: release-please
# then creates the `v{version}` tag + GitHub release AND (in the same run) this
# workflow publishes to npm.
#
# Auth: npm Trusted Publishers (OIDC). The publish steps request `id-token: write`;
# npm is configured once (on npmjs.com) to trust this repo + THIS workflow. There
# is no long-lived npm publish secret: this file references no publish token
# secret and sets no npm auth-token env var (verified by release-workflow.test.ts,
# SC-005). Provenance attestation is emitted by `--provenance`.

on:
  push:
    branches: [main]
  # Allow the `release-please:force-run` recovery label to re-invoke the action
  # on the release PR. The action only runs when the workflow is triggered, so a
  # push-only trigger means labels are never observed; the `labeled`/`reopened`
  # pull_request events give the label a way to fire a run. `workflow_dispatch`
  # allows a manual on-demand run (e.g. to re-attempt a skipped release).
  pull_request:
    types: [labeled, reopened]
  workflow_dispatch:

# contents: write     -> release-please creates the tag/release
# pull-requests: write -> release-please maintains the release PR
# id-token: write     -> OIDC for npm Trusted Publishers + provenance (publish job)
permissions:
  contents: write
  pull-requests: write
  id-token: write

# Avoid overlapping release-PR maintenance runs.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false


jobs:
  release-please:
    name: maintain release PR / cut release / publish
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Default GITHUB_TOKEN is sufficient: the publish steps below run in
          # this same job gated on the path-prefixed release_created output, so we
          # do NOT rely on
          # a separate on:release workflow (which GITHUB_TOKEN cannot trigger).
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # ----------------------------------------------------------------------
      # Publish steps: run ONLY when release-please just created a release.
      # F7: also gate on the canonical repo and skip pre-releases so forks and
      # draft/pre-release tags never trigger a real npm publish.
      # ----------------------------------------------------------------------

      # F3: check out the EXACT release tag so the build is attested to the
      # tagged commit, not whatever HEAD of main happens to be at run time.
      - name: Checkout release tag
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs['packages/server--tag_name'] }}
          fetch-depth: 0

      - name: Set up pnpm
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 20
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # registry-url wires npm to the public registry; combined with
          # id-token: write this enables OIDC Trusted Publisher auth. No npm
          # auth-token env var is set -- there is no token to set.
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Upgrade npm for OIDC Trusted Publishers
        # OIDC Trusted Publisher auth + provenance via the id-token requires a
        # recent npm (>= 11.5.1); Node 20 ships an older npm. pnpm publish shells
        # out to this npm for the registry handshake, so upgrade it here.
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        run: npm install -g npm@latest

      - name: Install dependencies
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        run: pnpm install --frozen-lockfile

      - name: Build @vibe-hero/server
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        run: pnpm --filter @vibe-hero/server build

      # ---- STEP 1: publish to npm FIRST (atomic ordering, FR-016) ----
      # OIDC Trusted Publishers: authentication comes from the id-token, NOT a
      # secret. --provenance emits the npm provenance attestation (SC-005).
      # --no-git-checks because the release tag/ref state is managed by
      # release-please, not the workspace working tree.
      # If this step fails, the job fails BEFORE the marketplace pointer moves.
      - name: Publish @vibe-hero/server to npm (OIDC + provenance)
        if: >-
          steps.release.outputs['packages/server--release_created'] &&
          github.repository == 'srobroek/vibe-hero' &&
          !steps.release.outputs['packages/server--prerelease']
        run: pnpm --filter @vibe-hero/server publish --access public --provenance --no-git-checks
