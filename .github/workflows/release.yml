name: Release

# npm publish + marketplace-pointer workflow for vibe-hero (spec 002, US2 / T019,
# FR-014/016, SC-005).
#
# Trigger: ONLY on an actual GitHub release being published (which release-please
# creates when its release PR is merged). It does NOT run on every push/merge to
# main -- the release PR is the gate, and the published release is the signal.
#
# Auth: npm Trusted Publishers (OIDC). The job requests `id-token: write`; npm is
# configured once (on npmjs.com) to trust this repo + THIS workflow. There is no
# long-lived npm publish secret: this file references no publish token secret and
# sets no npm auth-token env var (verified by release-workflow.test.ts, SC-005).
# Provenance attestation is emitted by `--provenance` (enabled by the OIDC token).
#
# Atomic ordering (FR-016 -- npm is the source of truth, the marketplace is a
# derived pointer):
#   1. build + publish to npm FIRST. If publish fails, the job fails here and the
#      marketplace pointer is NEVER advanced to a version that does not exist.
#   2. ONLY after a successful publish, regenerate the marketplace artifact and
#      commit it back to main. This step is idempotent: regenerating from the
#      already-merged version yields the same pointer, so a re-run (or a failed
#      commit reconciled by the next release) converges to the same state.

on:
  release:
    types: [published]

# id-token: write   -> OIDC for npm Trusted Publishers + provenance
# contents: write   -> commit the regenerated marketplace pointer back to main
permissions:
  id-token: write
  contents: write

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  APM_CLI_VERSION: "0.23.0"

jobs:
  publish:
    name: publish to npm (OIDC) + advance marketplace pointer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history + the default branch ref so we can commit the
          # regenerated marketplace pointer back to main after publish.
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # registry-url wires npm to the public registry; combined with
          # id-token: write this enables OIDC Trusted Publisher auth. No npm
          # auth-token env var is set -- there is no token to set.
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Upgrade npm for OIDC Trusted Publishers
        # OIDC Trusted Publisher auth + provenance via the id-token requires a
        # recent npm (>= 11.5.1); Node 20 ships an older npm. pnpm publish shells
        # out to this npm for the registry handshake, so upgrade it here.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @vibe-hero/server
        run: pnpm --filter @vibe-hero/server build

      # ---- STEP 1: publish to npm FIRST (atomic ordering, FR-016) ----
      # OIDC Trusted Publishers: authentication comes from the id-token, NOT a
      # secret. --provenance emits the npm provenance attestation (SC-005).
      # --no-git-checks because the release tag/ref state is managed by
      # release-please, not the workspace working tree.
      # If this step fails, the job fails BEFORE the marketplace pointer moves;
      # npm stays the source of truth and the marketplace is never advanced to a
      # version that was not actually published.
      - name: Publish @vibe-hero/server to npm (OIDC + provenance)
        run: pnpm --filter @vibe-hero/server publish --access public --provenance --no-git-checks

      # ---- STEP 2: advance the marketplace pointer ONLY after a good publish ----
      - name: Set up Python (for apm-cli)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install apm CLI
        run: |
          python -m pip install --upgrade pipx
          pipx install "apm-cli==${APM_CLI_VERSION}"
          apm --version

      - name: Regenerate marketplace artifact
        # Idempotent: regenerates root .claude-plugin/marketplace.json in place
        # from apm.yml. Runs only because the publish above succeeded.
        run: apm pack --offline --marketplace claude

      - name: Commit and push marketplace pointer (idempotent)
        run: |
          if git diff --quiet -- .claude-plugin/marketplace.json; then
            echo "Marketplace pointer already current; nothing to commit (idempotent no-op)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: advance marketplace pointer for ${{ github.event.release.tag_name }} [skip ci]"
          git push origin HEAD:main
