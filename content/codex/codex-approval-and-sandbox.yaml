    guidance: >-
      A project-scoped .codex/config.toml is honored only when the project is trusted. Untrusted
      projects fall back to safe behavior, which is why the danger setting is ignored.
  - id: cas-400-mc-e
    tier: 400
    bloom: analyze
    difficulty: 444
    type: multiple_choice
    prompt: >-
      Under read-only with on-request, every command Codex tries triggers an approval prompt,
      frustrating the user who expected "automatic safe commands." What is the conceptual mistake?
    choices:
      - id: a
        text: >-
          read-only blocks command execution by design, so escalation is needed for any command;
          "auto-run known-safe commands" is the untrusted policy's behavior, not a property of
          read-only
      - id: b
        text: on-request should never prompt
      - id: c
        text: read-only secretly allows commands but logs them
      - id: d
        text: The user must enable network to run commands
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The user conflated the read-only sandbox with the untrusted approval policy. read-only forbids
      command execution outright, so any command is an escalation under on-request.
  - id: cas-400-mc-f
    tier: 400
    bloom: analyze
    difficulty: 450
    type: multiple_choice
    prompt: >-
      A workspace-write job that calls an external API works on a developer's laptop but fails in a
      hardened CI image. Both use the same config.toml. What is the most likely difference?
    choices:
      - id: a
        text: CI uses a different sandbox mode that the developer cannot see
      - id: b
        text: >-
          network_access is enabled on the laptop's environment/profile but not in the CI run, so
          the API call is blocked there
      - id: c
        text: workspace-write always allows network, so this cannot be a network issue
      - id: d
        text: The API requires danger-full-access to function
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Since network is off by default in workspace-write, the API call only succeeds where
      network_access was explicitly enabled. The discrepancy points to differing network settings,
      not the sandbox mode.
  - id: cas-400-mc-g
    tier: 400
    bloom: analyze
    difficulty: 456
    type: multiple_choice
    prompt: >-
      An audit finds a CI pipeline using `--dangerously-bypass-approvals-and-sandbox` on a shared
      build host with secrets mounted. Why is this the highest-risk configuration?
    choices:
      - id: a
        text: It limits writes to the workspace, which is still bad
      - id: b
        text: It is risky only because approvals are slow
      - id: c
        text: >-
          There is no sandbox and no approvals, so model-generated commands have full system access
          to the host and its secrets
      - id: d
        text: It disables network but allows file writes
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      --yolo removes both guardrails, so any command Codex generates can read mounted secrets or
      alter the shared host. The blast radius is the whole machine, not just the workspace.
  - id: cas-400-mc-h
    tier: 400
    bloom: analyze
    difficulty: 462
    type: multiple_choice
    prompt: >-
      A user sets approval_policy = "never" expecting Codex to do anything autonomously, but it
      still cannot write outside the project. Why?
    choices:
      - id: a
        text: never is not a valid policy
      - id: b
        text: never silently switches the sandbox to read-only
      - id: c
        text: never requires danger-full-access to take effect
      - id: d
        text: >-
          never only suppresses prompts; the sandbox (workspace-write) still bounds what is allowed,
          so out-of-workspace writes are blocked rather than prompted
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Approval policy and sandbox are orthogonal. never removes prompts but the sandbox still
      enforces limits, so disallowed actions are simply blocked (not prompted, not allowed).
  - id: cas-400-mc-i
    tier: 400
    bloom: analyze
    difficulty: 468
    type: multiple_choice
    prompt: >-
      On Linux, Codex commands that need to bind to a privileged port fail even in workspace-write
      with network enabled. Which factor most likely explains the failure?
    choices:
      - id: a
        text: >-
          The Landlock/seccomp sandbox restricts the syscalls/capabilities available, so even with
          network on, certain privileged operations remain blocked
      - id: b
        text: network_access only applies to outbound HTTP, never to sockets
      - id: c
        text: workspace-write disables all networking regardless of config
      - id: d
        text: The failure proves the sandbox is off
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The Linux sandbox (Landlock/seccomp) constrains kernel-level operations beyond mere
      file/network toggles. Enabling network_access does not grant privileged-port binding under the
      sandbox.
  - id: cas-400-mc-j
    tier: 400
    bloom: analyze
    difficulty: 474
    type: multiple_choice
    prompt: >-
      A team wants "autonomous but safe" and reaches for the deprecated `--full-auto`. Beyond
      deprecation, what is the analytical risk of relying on it?
    choices:
      - id: a
        text: It disables the sandbox like --yolo
      - id: b
        text: >-
          Its behavior is opaque and may change or be removed; --sandbox workspace-write makes the
          boundary explicit and composable with an approval policy
      - id: c
        text: It only works on macOS
      - id: d
        text: It forces network access on
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The risk is relying on a deprecated, opaque flag whose meaning may shift. The explicit
      sandbox+approval pair documents intent and is the supported path.
  - id: cas-400-mc-k
    tier: 400
    bloom: analyze
    difficulty: 448
    type: multiple_choice
    prompt: >-
      A developer claims "read-only is safe enough that I can run it with danger-full-access network
      just to be fast." Why is this combination incoherent?
    choices:
      - id: a
        text: danger-full-access is a sub-option of read-only
      - id: b
        text: read-only requires network to be on
      - id: c
        text: >-
          read-only and danger-full-access are mutually exclusive sandbox modes; you cannot be in
          both, so the statement conflates two distinct settings
      - id: d
        text: Both are approval policies that can be combined
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      sandbox_mode takes exactly one value. read-only and danger-full-access are alternatives, not
      composable; the claim mixes incompatible modes.
  - id: cas-400-mc-l
    tier: 400
    bloom: analyze
    difficulty: 458
    type: multiple_choice
    prompt: >-
      After moving from a laptop (macOS) to a Linux server, a Codex run that previously prompted for
      risky shell commands now silently blocks them instead. Most likely cause?
    choices:
      - id: a
        text: The OS change reset config.toml to danger-full-access
      - id: b
        text: Linux sandboxes cannot prompt, so all approvals become denials by design
      - id: c
        text: macOS ignores the sandbox entirely
      - id: d
        text: >-
          The approval policy or sandbox config differs between environments (e.g. never vs
          on-request), so escalations that once prompted are now just denied by the sandbox
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Behavior differences usually trace to differing config (approval policy/sandbox) per
      environment, not the OS sandbox mechanism itself. A never policy turns would-be prompts into
      outright blocks.
  - id: cas-400-mc-m
    tier: 400
    bloom: analyze
    difficulty: 478
    type: multiple_choice
    prompt: >-
      A reviewer sees a config with sandbox_mode = "workspace-write", network_access = true, and
      approval_policy = "never". Which statement most accurately characterizes the residual risk?
    choices:
      - id: a
        text: >-
          Codex can autonomously edit the workspace and reach the network with no prompts, so a bad
          command can exfiltrate or fetch arbitrary data, though it remains bounded to the workspace
          file system
      - id: b
        text: There is no risk because the sandbox is on
      - id: c
        text: The risk is identical to --yolo
      - id: d
        text: network_access has no security implications
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      This is autonomous (never) workspace-write with network. The file system is still bounded, but
      unprompted network access is a real exfiltration/SSRF surface. It is riskier than no-network
      Auto, yet still safer than --yolo, which also frees the file system.
  - id: cas-400-ff-a
    tier: 400
    bloom: analyze
    difficulty: 424
    type: free_form
    prompt: >-
      A user insists their workspace-write session "must be broken" because Codex won't fetch a URL.
      Diagnose the issue and propose the fix.
    rubric:
      criteria:
        - id: c1
          text: Identifies that network is disabled by default in workspace-write (not a bug)
        - id: c2
          text: Proposes enabling sandbox_workspace_write.network_access (or equivalent)
        - id: c3
          text: Notes no change of sandbox mode is required
      referenceAnswer: >-
        It is not broken: workspace-write disables network by default, so the fetch is correctly
        blocked. The fix is to enable network in workspace-write via
        sandbox_workspace_write.network_access = true. There is no need to switch to
        danger-full-access; only the network sub-setting needs enabling.
      passThreshold: 0.6
    guidance: >-
      The misconception is that workspace-write implies network; diagnosing it requires separating
      file-system from network permissions.
  - id: cas-400-ff-b
    tier: 400
    bloom: analyze
    difficulty: 440
    type: free_form
    prompt: >-
      Explain why a CI pipeline that uses `--ask-for-approval on-request` can intermittently hang,
      and how the orthogonality of sandbox and approval informs the fix.
    rubric:
      criteria:
        - id: c1
          text: Explains on-request can emit a prompt that has no human responder in CI, causing a hang
        - id: c2
          text: >-
            Notes the sandbox still bounds behavior, so the fix is to change the approval policy (to
            never), not loosen the sandbox
        - id: c3
          text: >-
            Optionally notes pre-granting needed access (network_access/writable_roots) as an
            alternative
      referenceAnswer: >-
        on-request is interactive: when Codex needs to escalate beyond the sandbox it emits a
        prompt, but CI has no human to answer, so the job blocks. Because approval and sandbox are
        independent, the fix is to set approval_policy to never (suppressing prompts) while keeping
        the workspace-write sandbox as the safety boundary. Alternatively, pre-grant exactly the
        access needed (network_access or writable_roots) so no escalation is requested at all.
      passThreshold: 0.6
    guidance: >-
      The key insight is fixing the right axis: tighten or change approval behavior, not the
      sandbox.
  - id: cas-400-ff-c
    tier: 400
    bloom: analyze
    difficulty: 454
    type: free_form
    prompt: >-
      A teammate believes a project-scoped `.codex/config.toml` always overrides everything.
      Identify the precondition they are missing and the security reason for it.
    rubric:
      criteria:
        - id: c1
          text: States project-scoped config is honored only when the project is trusted
        - id: c2
          text: >-
            Explains the security rationale (untrusted repos could otherwise set danger-full-access
            or other unsafe defaults)
      referenceAnswer: >-
        Project-scoped .codex/config.toml is honored only when the project is trusted. The missing
        precondition is trust: an untrusted repository's config (which could set danger-full-access
        or enable network) is not applied, preventing a malicious or unknown repo from silently
        widening Codex's permissions on checkout.
      passThreshold: 0.6
    guidance: This trust gate is what stops a hostile repo from configuring its own escape hatch.
  - id: cas-400-ff-d
    tier: 400
    bloom: analyze
    difficulty: 466
    type: free_form
    prompt: >-
      Contrast the blast radius of `--sandbox workspace-write --ask-for-approval never` versus
      `--dangerously-bypass-approvals-and-sandbox` on a host with sensitive files outside the
      project.
    rubric:
      criteria:
        - id: c1
          text: Notes workspace-write+never is autonomous but still bounded to the workspace file system
        - id: c2
          text: Notes --yolo removes the sandbox, exposing the whole host including sensitive files
        - id: c3
          text: Concludes --yolo has a far larger blast radius
      referenceAnswer: >-
        With workspace-write and never, Codex acts without prompts but the sandbox still confines
        writes to the workspace (plus any writable_roots), so sensitive files elsewhere are
        protected. With --yolo (--dangerously-bypass-approvals-and-sandbox) there is no sandbox at
        all, so model-generated commands can read or modify anything on the host, including the
        sensitive files. The blast radius of --yolo is the whole machine versus just the workspace.
      passThreshold: 0.6
    guidance: >-
      Both are unprompted, but only --yolo removes the spatial boundary, which is the decisive
      difference.
  - id: cas-400-ff-e
    tier: 400
    bloom: analyze
    difficulty: 472
    type: free_form
    prompt: >-
      A workspace-write run with network enabled still cannot perform a privileged system operation
      on Linux. Explain why enabling network_access does not grant this, in terms of the sandbox
      layers.
    rubric:
      criteria:
        - id: c1
          text: Notes network_access only toggles outbound network, not OS-level capabilities
        - id: c2
          text: >-
            Explains Landlock/seccomp restricts syscalls/file/capabilities independently of the
            network toggle
        - id: c3
          text: Concludes privileged operations remain blocked by the kernel sandbox
      referenceAnswer: >-
        network_access only opens outbound network in workspace-write; it does not lift the
        kernel-level restrictions. On Linux, Landlock and seccomp constrain which syscalls and
        capabilities are available and which paths are writable, independently of the network
        toggle. A privileged system operation requires capabilities the sandbox withholds, so it
        stays blocked even with the network on.
      passThreshold: 0.6
    guidance: >-
      Distinguishing the network sub-setting from kernel-level syscall/capability filtering is the
      crux.
  - id: cas-400-ff-f
    tier: 400
    bloom: analyze
    difficulty: 446
    type: free_form
    prompt: >-
      A user reports that Codex "ignored" their approval policy and ran a command without asking.
      Walk through how you would determine whether this is a bug or expected sandbox behavior.
    rubric:
      criteria:
        - id: c1
          text: >-
            Checks whether the command stayed within the sandbox boundary (in which case no approval
            is expected)
        - id: c2
          text: Checks the active sandbox mode and approval policy (and any preset/overrides)
        - id: c3
          text: >-
            Concludes that in-sandbox actions run without prompts by design, so it is likely
            expected
      referenceAnswer: >-
        First confirm the active sandbox mode and approval policy (including any preset or -c
        overrides). Then check whether the command stayed inside the sandbox boundary: under
        workspace-write, commands within the workspace run without prompting by design, and approval
        is only requested for actions that exceed the boundary. If the command was in-bounds, the
        behavior is expected, not a bug; only an out-of-boundary action that ran without a prompt
        would indicate a real problem.
      passThreshold: 0.6
    guidance: >-
      The diagnostic hinge is "did the action need escalation?" Approvals only fire on boundary
      crossings.
  - id: cas-400-ff-g
    tier: 400
    bloom: analyze
    difficulty: 478
    type: free_form
    prompt: >-
      A security review flags that several repos in an org each ship a `.codex/config.toml` enabling
      network_access and never approvals. Analyze the layered risks and which configuration choices
      amplify them.
    rubric:
      criteria:
        - id: c1
          text: Notes the trust gate means these only apply once the project is trusted
        - id: c2
          text: >-
            Identifies never + network_access as autonomous network access without prompts
            (exfiltration/SSRF surface)
        - id: c3
          text: Notes the sandbox still bounds the file system, distinguishing it from --yolo
      referenceAnswer: >-
        Because project config is honored only for trusted projects, the immediate risk is gated by
        who trusts these repos. Once trusted, the combination of approval_policy = never and
        network_access = true gives Codex unprompted outbound network in those repos, creating an
        exfiltration/SSRF surface where a bad command could send data out without a human gate. The
        workspace-write sandbox still bounds file writes to the workspace, so the blast radius is
        narrower than --yolo, but the unprompted network access is the chief amplifier and should be
        justified per repo.
      passThreshold: 0.6
    guidance: >-
      Layered analysis: trust gate, then the approval+network combination, then the residual
      file-system bound that separates this from full access.
  - id: cas-500-mc-a
    tier: 500
    bloom: evaluate
    difficulty: 482
    type: multiple_choice
    prompt: >-
      A platform team proposes defaulting all developer machines to
      `--dangerously-bypass-approvals-and-sandbox` "to avoid annoying prompts." Which critique is
      most sound?
    choices:
      - id: a
        text: >-
          It trades away both guardrails org-wide; a better default is Auto (workspace-write +
          on-request), reserving --yolo for disposable isolated environments
      - id: b
        text: It is fine because developers can be trusted not to run bad commands
      - id: c
        text: It is fine as long as network_access stays false
      - id: d
        text: It is the recommended default in the docs
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Defaulting to --yolo removes the sandbox and approvals everywhere, maximizing blast radius.
      Auto is the recommended balanced default; --yolo belongs only in throwaway isolated contexts.
  - id: cas-500-mc-b
    tier: 500
    bloom: evaluate
    difficulty: 488
    type: multiple_choice
    prompt: >-
      Which design best embodies least-privilege for a CI pipeline that must edit the repo, run
      tests, and fetch dependencies, with no human present?
    choices:
      - id: a
        text: '--dangerously-bypass-approvals-and-sandbox so nothing can block the pipeline'
      - id: b
        text: >-
          workspace-write with approval_policy never and network_access enabled (plus writable_roots
          only if needed), so it runs unattended yet stays bounded to the workspace
      - id: c
        text: read-only with never, then escalate manually
      - id: d
        text: danger-full-access with on-request
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Least-privilege grants exactly what is needed: workspace edits, network for deps, and never to
      avoid hangs, while the sandbox still bounds everything. --yolo over-grants; read-only
      under-grants.
  - id: cas-500-mc-c
    tier: 500
    bloom: evaluate
    difficulty: 494
    type: multiple_choice
    prompt: >-
      A reviewer argues "approvals are theater; the sandbox alone is sufficient, so always run with
      never." What is the strongest counter-argument?
    choices:
      - id: a
        text: never is an invalid policy
      - id: b
        text: Approvals are required for the sandbox to function at all
      - id: c
        text: >-
          Approvals are the human gate for actions the sandbox intentionally permits to escalate
          (e.g. out-of-workspace writes or network); removing them removes oversight of exactly
          those higher-risk actions
      - id: d
        text: The sandbox cannot restrict the file system, so approvals must compensate
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      The sandbox defines a boundary; approvals govern crossing it. never is fine where no
      escalation should ever be granted, but as a blanket rule it removes human oversight of
      boundary-crossing actions.
  - id: cas-500-mc-d
    tier: 500
    bloom: evaluate
    difficulty: 500
    type: multiple_choice
    prompt: >-
      Two configurations both "work" for a build that needs one extra writable directory. Either (1)
      add it to writable_roots under workspace-write, or (2) switch to danger-full-access. Which is
      the better design and why?
    choices:
      - id: a
        text: Option 2, because writable_roots is deprecated
      - id: b
        text: Option 2, because fewer settings means fewer bugs
      - id: c
        text: They are equivalent in risk
      - id: d
        text: >-
          Option 1, because it grants only the one extra path while preserving every other sandbox
          restriction (least privilege)
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      writable_roots is a surgical grant; danger-full-access removes the entire sandbox for the sake
      of one directory, a gross over-grant. Least privilege favors option 1.
  - id: cas-500-mc-e
    tier: 500
    bloom: evaluate
    difficulty: 506
    type: multiple_choice
    prompt: >-
      An org wants a single global default in config.toml that is safe for unfamiliar repos yet not
      so restrictive that trusted projects can't opt up. What is the soundest design?
    choices:
      - id: a
        text: >-
          Default to a conservative mode (e.g. read-only or Auto) globally and let trusted projects
          raise privileges via their own project-scoped config, relying on the trust gate
      - id: b
        text: Default globally to danger-full-access and tighten per project
      - id: c
        text: Default to --yolo and document the risk
      - id: d
        text: Disable config.toml entirely and pass flags every time
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Safe-by-default globally, opt-up per trusted project leverages the trust gate so unfamiliar
      repos cannot widen permissions. Defaulting wide and tightening later inverts the safety
      posture.
  - id: cas-500-mc-f
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: multiple_choice
    prompt: >-
      A workflow enables network_access in workspace-write with approval_policy never for an agent
      that browses the web and edits code. Which residual-risk judgment is most accurate?
    choices:
      - id: a
        text: There is no meaningful risk because the sandbox is on
      - id: b
        text: >-
          The file system is bounded to the workspace, but unprompted network access is a genuine
          exfiltration/SSRF surface that should be justified and ideally constrained or monitored
      - id: c
        text: It is exactly as dangerous as --yolo
      - id: d
        text: network_access cannot coexist with never
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Sound evaluation acknowledges the file-system bound while naming the real network risk; it is
      neither risk-free nor equivalent to --yolo (which also frees the file system).
  - id: cas-500-mc-g
    tier: 500
    bloom: evaluate
    difficulty: 518
    type: multiple_choice
    prompt: >-
      A team standardizes on the deprecated `--full-auto` across scripts "because it still works."
      From a maintainability and safety standpoint, what is the best recommendation?
    choices:
      - id: a
        text: Replace it with --yolo for simplicity
      - id: b
        text: Keep --full-auto; deprecated flags never change behavior
      - id: c
        text: >-
          Migrate to --sandbox workspace-write with an explicit approval policy, since the
          deprecated flag is opaque and may change or be removed
      - id: d
        text: Wrap --full-auto in a shell alias and move on
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Relying on a deprecated, opaque flag is a maintenance and safety liability. The explicit
      sandbox+approval pair documents intent and is the supported, durable path. --yolo is more
      dangerous, not simpler.
  - id: cas-500-mc-h
    tier: 500
    bloom: evaluate
    difficulty: 524
    type: multiple_choice
    prompt: >-
      A Windows-only team runs Codex natively (no WSL) with the sandbox effectively unenforced,
      arguing "approvals catch everything anyway." Why is this an anti-pattern?
    choices:
      - id: a
        text: The argument is sound; the sandbox is redundant
      - id: b
        text: Approvals cannot run on Windows at all
      - id: c
        text: Native Windows always disables approvals too
      - id: d
        text: >-
          Approvals and the sandbox are complementary layers; relying solely on prompts removes
          defense-in-depth, and an approved-but-misjudged action then has no sandbox to contain it
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Defense-in-depth wants both layers. If the sandbox is unenforced, a single mis-approval has no
      containment. WSL2 restores the sandbox layer on Windows.
  - id: cas-500-mc-i
    tier: 500
    bloom: evaluate
    difficulty: 530
    type: multiple_choice
    prompt: >-
      Evaluate this claim. "Because presets exist, there is no reason to ever set the sandbox and
      approval flags separately." What is the best assessment?
    choices:
      - id: a
        text: >-
          Presets cover common cases, but separate flags are needed for valid combinations presets
          don't name (e.g. workspace-write + never for CI), so independent control still matters
      - id: b
        text: Correct, presets are exhaustive of all useful combinations
      - id: c
        text: Correct, because the flags cannot be combined outside presets
      - id: d
        text: Wrong, because presets do not change the sandbox at all
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Presets are convenient bundles, not a complete enumeration. Cases like unattended
      workspace-write + never require composing the two axes directly, which is precisely why both
      flags exist.
  - id: cas-500-mc-j
    tier: 500
    bloom: evaluate
    difficulty: 536
    type: multiple_choice
    prompt: >-
      An agent design fetches secrets-bearing config from a remote service during a workspace-write
      task. Reviewers must choose between (a) enabling network_access in workspace-write, or (b)
      running the fetch outside Codex and passing results in. Which critique is strongest?
    choices:
      - id: a
        text: Option (a) is strictly safer because the sandbox handles all secrets
      - id: b
        text: >-
          Option (b) keeps the secret-fetch outside the agent's autonomous, sandbox-bounded surface
          and avoids broadening Codex's network permissions, which is generally the safer separation
          of concerns
      - id: c
        text: The two are identical in risk
      - id: d
        text: Option (b) is impossible because Codex must do all I/O itself
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Keeping secret retrieval outside the autonomous agent minimizes Codex's network surface and
      avoids coupling secret access to model-driven actions. Enabling network just for this widens
      the attack surface unnecessarily.
  - id: cas-500-mc-k
    tier: 500
    bloom: evaluate
    difficulty: 498
    type: multiple_choice
    prompt: >-
      A reviewer must pick a default approval policy for an interactive local TUI used by
      mixed-skill engineers. Which choice best balances safety and friction, and why?
    choices:
      - id: a
        text: >-
          untrusted, because prompting before every non-safe-listed command is always best for
          everyone
      - id: b
        text: never, because prompts are friction
      - id: c
        text: >-
          on-request, because the model only escalates when genuinely needed, keeping a human gate
          for risky actions without prompting on every safe in-sandbox command
      - id: d
        text: danger-full-access, because removing the sandbox eliminates prompts entirely
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      on-request is the recommended interactive default: low friction inside the sandbox, human gate
      on escalation. untrusted can be noisy; never removes the gate; danger-full-access removes the
      sandbox boundary altogether, which is unsafe as a default.
  - id: cas-500-mc-l
    tier: 500
    bloom: evaluate
    difficulty: 516
    type: multiple_choice
    prompt: >-
      Critique this CI design. "Use danger-full-access with approval_policy on-request so a human
      can approve anything risky." What is the core flaw?
    choices:
      - id: a
        text: on-request is invalid with any sandbox
      - id: b
        text: It is well designed and safe
      - id: c
        text: danger-full-access forces network off, breaking dependency fetches
      - id: d
        text: >-
          danger-full-access has no sandbox, so there is nothing to escalate against; on-request
          also has no human in CI, making the approval layer both meaningless and blocking
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Two compounding errors: full access removes the boundary approvals exist to guard, and
      on-request needs a human absent in CI. The design is both unsafe and prone to hang.
  - id: cas-500-mc-m
    tier: 500
    bloom: evaluate
    difficulty: 528
    type: multiple_choice
    prompt: >-
      When is choosing `--dangerously-bypass-approvals-and-sandbox` actually the most defensible
      design, rather than an anti-pattern?
    choices:
      - id: a
        text: >-
          In a disposable, already-isolated environment (e.g. an ephemeral container with no secrets
          and no host access) where the environment itself is the security boundary and no human can
          approve
      - id: b
        text: On any developer laptop, to save time
      - id: c
        text: On a shared CI host with mounted secrets, for speed
      - id: d
        text: Whenever network_access would otherwise be needed
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      --yolo is defensible only when an external boundary already contains the blast radius
      (throwaway isolated container). On laptops or shared hosts with secrets it is an anti-pattern.
  - id: cas-500-ff-a
    tier: 500
    bloom: evaluate
    difficulty: 486
    type: free_form
    prompt: >-
      Critique the policy "always run Codex with --yolo to avoid prompts" and recommend a better
      organizational default with justification.
    rubric:
      criteria:
        - id: c1
          text: Identifies that --yolo removes both the sandbox and approvals, maximizing blast radius
        - id: c2
          text: Recommends Auto (workspace-write + on-request) as the balanced default
        - id: c3
          text: Notes --yolo should be reserved for disposable/isolated environments
      referenceAnswer: >-
        "--yolo everywhere" is an anti-pattern: --dangerously-bypass-approvals-and-sandbox removes
        both the sandbox and approvals, so any model-generated command has full host access and
        there is no human gate. A better default is Auto (workspace-write with on-request): Codex
        iterates freely in the workspace while pausing for approval on out-of-workspace writes or
        network. Reserve --yolo strictly for disposable, already-isolated environments where the
        container itself is the boundary.
      passThreshold: 0.6
    guidance: >-
      A strong answer names the removed protections, the recommended default, and the narrow
      legitimate use of --yolo.
  - id: cas-500-ff-b
    tier: 500
    bloom: evaluate
    difficulty: 496
    type: free_form
    prompt: >-
      Evaluate whether enabling network_access in workspace-write is an acceptable trade-off for an
      agent that must install dependencies, and outline the conditions that would make it acceptable
      versus not.
    rubric:
      criteria:
        - id: c1
          text: Acknowledges the file system stays bounded to the workspace under workspace-write
        - id: c2
          text: Identifies unprompted/broad network as an exfiltration or SSRF risk
        - id: c3
          text: >-
            Outlines mitigating conditions (e.g. trusted deps, restricted/monitored network, paired
            with on-request rather than never where feasible)
      referenceAnswer: >-
        Enabling network_access keeps the workspace-write file-system bound but opens an outbound
        network surface. It is acceptable when the network is constrained or monitored, dependencies
        come from trusted registries, and ideally the run uses on-request rather than never so a
        human can gate unexpected destinations. It is not acceptable when the host holds secrets,
        the network is unrestricted, and prompts are disabled, since that combination is a ready
        exfiltration/SSRF path.
      passThreshold: 0.6
    guidance: >-
      The evaluation should weigh the legitimate need (deps) against the network surface and the
      approval/never choice.
  - id: cas-500-ff-c
    tier: 500
    bloom: evaluate
    difficulty: 508
    type: free_form
    prompt: >-
      Two teams must agree on a Codex sandbox/approval standard. One prioritizes developer velocity,
      the other security. Propose a single defensible standard for local development and justify the
      trade-offs.
    rubric:
      criteria:
        - id: c1
          text: Proposes Auto (workspace-write + on-request) as the local standard
        - id: c2
          text: >-
            Explains how it serves velocity (free in-workspace work) and security (human gate on
            escalation)
        - id: c3
          text: Notes network stays off by default and is enabled only when needed
      referenceAnswer: >-
        Standardize local development on Auto: --sandbox workspace-write --ask-for-approval
        on-request. This serves velocity because Codex edits and runs freely inside the workspace
        without constant prompts, and serves security because on-request keeps a human gate for
        out-of-workspace writes and network use, with network off by default and enabled only
        per-task when genuinely required. It is a defensible midpoint that neither over-restricts
        (read-only) nor over-grants (--yolo).
      passThreshold: 0.6
    guidance: The strongest answer ties each axis of the preset to one team's priority.
  - id: cas-500-ff-d
    tier: 500
    bloom: evaluate
    difficulty: 520
    type: free_form
    prompt: >-
      A proposed design pins config.toml globally to danger-full-access "so nothing ever blocks" and
      relies on each repo's project-scoped config to tighten it. Critique this inversion and propose
      the correct ordering.
    rubric:
      criteria:
        - id: c1
          text: >-
            Identifies the inverted safety posture (wide-open default that repos must remember to
            tighten)
        - id: c2
          text: Notes the trust gate is irrelevant here because the global default is already unsafe
        - id: c3
          text: Proposes a conservative global default with per-trusted-project opt-up instead
      referenceAnswer: >-
        The design inverts safe-by-default: a global danger-full-access means any repo that forgets
        to tighten inherits full access, and the project-trust gate offers no protection because the
        unsafe setting is global, not in a repo. The correct ordering is a conservative global
        default (read-only or Auto) with trusted projects opting up via their own project-scoped
        config, so the failure mode is "too restrictive" rather than "fully exposed."
      passThreshold: 0.6
    guidance: >-
      The core critique is fail-safe versus fail-open defaults and where the trust gate actually
      helps.
  - id: cas-500-ff-e
    tier: 500
    bloom: evaluate
    difficulty: 532
    type: free_form
    prompt: >-
      Assess the claim that "the sandbox makes approvals redundant." Use the orthogonality of the
      two axes to argue when each is and is not sufficient on its own.
    rubric:
      criteria:
        - id: c1
          text: >-
            Explains the sandbox alone bounds actions but cannot judge whether a boundary-crossing
            action should be allowed
        - id: c2
          text: >-
            Explains approvals add human judgment exactly for escalations the sandbox permits to be
            requested
        - id: c3
          text: >-
            Concludes neither is universally sufficient; the right mix depends on whether
            escalations should ever be granted and whether a human is present
      referenceAnswer: >-
        The sandbox enforces a boundary but is binary about it: in-bounds actions run, out-of-bounds
        actions are blocked or escalated. It cannot judge whether a particular escalation (a network
        call, an out-of-workspace write) is wise. Approvals add that human judgment for exactly
        those boundary-crossing requests. So the sandbox alone is sufficient only when no escalation
        should ever be granted (e.g. strict read-only or never in CI), and approvals matter whenever
        escalations are legitimately possible and a human can adjudicate. Neither axis is
        universally redundant; the right combination depends on the context.
      passThreshold: 0.6
    guidance: >-
      A top answer ties sufficiency to whether escalations are possible and whether a human is
      available to judge them.
  - id: cas-500-ff-f
    tier: 500
    bloom: evaluate
    difficulty: 502
    type: free_form
    prompt: >-
      Recommend a defensible Codex configuration for an unattended autonomous agent running in an
      ephemeral, network-isolated container with no secrets, and justify why you might even consider
      --yolo here.
    rubric:
      criteria:
        - id: c1
          text: >-
            Considers --yolo (or danger-full-access + never) acceptable specifically because the
            container is the security boundary
        - id: c2
          text: Conditions it on no secrets, ephemeral, and isolated network
        - id: c3
          text: Notes this would be unacceptable on a shared host or one with secrets
      referenceAnswer: >-
        In an ephemeral, network-isolated container with no secrets, the container itself is the
        security boundary, so --yolo (or danger-full-access with never) can be acceptable: the blast
        radius is the throwaway container, and there is no human to answer prompts. This is
        defensible only because of the isolation and absence of secrets; the same configuration on a
        shared host or any environment with mounted secrets or host access would be an anti-pattern.
      passThreshold: 0.6
    guidance: >-
      The justification must rest on an external boundary substituting for the in-process sandbox,
      plus the absence of secrets and a human.
  - id: cas-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 540
    type: free_form
    prompt: >-
      A reviewer must choose between using on-request approvals versus pre-granting exact
      permissions (network_access, writable_roots) with never for a semi-trusted automated workflow.
      Weigh the two approaches and recommend one with conditions.
    rubric:
      criteria:
        - id: c1
          text: Describes on-request as keeping a human gate but unsuitable/hanging when unattended
        - id: c2
          text: >-
            Describes pre-granting + never as deterministic and non-blocking but requiring careful
            least-privilege scoping up front
        - id: c3
          text: >-
            Recommends pre-granting + never for unattended runs (with tight scoping) and on-request
            where a human is present, justifying by presence of a human and predictability
      referenceAnswer: >-
        on-request keeps a human in the loop for escalations, which is ideal when someone is present
        but causes hangs in unattended runs. Pre-granting exactly the needed access (network_access
        and specific writable_roots) with approval_policy never is deterministic and non-blocking,
        but it front-loads the work of scoping permissions tightly so nothing more than necessary is
        granted. For an unattended semi-trusted workflow, prefer the pre-granted least-privilege +
        never approach so the run cannot hang, provided the grants are scoped narrowly and reviewed;
        keep on-request for interactive sessions where a human can adjudicate escalations in real
        time.
      passThreshold: 0.6
    guidance: >-
      The decisive factors are human presence and predictability; the recommendation must be
      conditioned on tight least-privilege scoping when choosing never.
