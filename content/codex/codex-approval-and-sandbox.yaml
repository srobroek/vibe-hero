      - id: b
        text: on-request always disables prompts for file writes
      - id: c
        text: workspace-write implicitly allows full-disk writes
      - id: d
        text: The approval policy was secretly upgraded to untrusted
    answerKey:
      kind: choice
      correctChoiceId: a
