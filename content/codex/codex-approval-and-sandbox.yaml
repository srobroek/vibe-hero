# Topic: codex-approval-and-sandbox (codex)
# Codex approval modes and sandboxing — controlling autonomy, file/network access, and safe command execution.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: codex-approval-and-sandbox
class:
  kind: tool
  tool: codex
title: Codex Approval & Sandbox Modes
summary: >-
  Codex approval modes and sandboxing — controlling autonomy, file/network access, and safe command
  execution.
triggerSignals: []
items:
  - id: cas-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 120
    type: multiple_choice
    prompt: How many sandbox modes does the Codex CLI provide?
    choices:
      - id: a
        text: Three
      - id: b
        text: Two
      - id: c
        text: Four
      - id: d
        text: Five
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Codex has exactly three sandbox modes: read-only, workspace-write, and danger-full-access.
      Three is also the count of the current named approval policies (untrusted, on-request, never),
      a common mix-up.
  - id: cas-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 124
    type: multiple_choice
    prompt: Which value is one of Codex's three sandbox modes?
    choices:
      - id: a
        text: on-request
      - id: b
        text: workspace-write
      - id: c
        text: untrusted
      - id: d
        text: full-auto
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The three sandbox modes are read-only, workspace-write, and danger-full-access. on-request and
      untrusted are approval policies, and --full-auto is a deprecated flag, not a sandbox mode.
  - id: cas-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 128
    type: multiple_choice
    prompt: >-
      How many named approval policies does the current Codex CLI expose (excluding the
      granular/fine-grained option)?
    choices:
      - id: a
        text: Two
      - id: b
        text: Three
      - id: c
        text: Four
      - id: d
        text: Six
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The current named approval policies are untrusted, on-request, and never (a separate granular
      option allows fine-grained control). The older on-failure is now just a deprecated alias of
      on-request.
  - id: cas-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 132
    type: multiple_choice
    prompt: Which of these is a valid Codex approval policy?
    choices:
      - id: a
        text: danger-full-access
      - id: b
        text: workspace-write
      - id: c
        text: read-only
      - id: d
        text: on-request
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      The current approval policies are untrusted, on-request, and never. The other three options
      (danger-full-access, workspace-write, read-only) are sandbox modes, not approval policies.
  - id: cas-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 136
    type: multiple_choice
    prompt: What is the alias for the `--dangerously-bypass-approvals-and-sandbox` flag?
    choices:
      - id: a
        text: '--yolo'
      - id: b
        text: '--full-auto'
      - id: c
        text: '--unsafe'
      - id: d
        text: '--no-sandbox'
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The documented alias is --yolo. --full-auto is a separate, deprecated flag. --unsafe and
      --no-sandbox are not real Codex flags.
  - id: cas-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 140
    type: multiple_choice
    prompt: Which named preset maps to `--sandbox read-only`?
    choices:
      - id: a
        text: Auto
      - id: b
        text: Read Only
      - id: c
        text: Full Access
      - id: d
        text: Safe Mode
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The Read Only preset uses --sandbox read-only. Auto maps to workspace-write with on-request
      approval, and Full Access maps to --dangerously-bypass-approvals-and-sandbox. "Safe Mode" is
      not a Codex preset.
  - id: cas-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 144
    type: multiple_choice
    prompt: What is the short flag for `--sandbox`?
    choices:
      - id: a
        text: '-b'
      - id: b
        text: '-w'
      - id: c
        text: '-s'
      - id: d
        text: '-x'
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      --sandbox has the short form -s. The approval flag --ask-for-approval uses -a. -b, -w, and -x
      are not Codex flags.
  - id: cas-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 148
    type: multiple_choice
    prompt: What is the short flag for `--ask-for-approval`?
    choices:
      - id: a
        text: '-y'
      - id: b
        text: '-k'
      - id: c
        text: '-p'
      - id: d
        text: '-a'
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      --ask-for-approval has the short form -a. -p is --profile. -k and -y are not Codex flags (note
      --yolo is a long alias, not -y).
  - id: cas-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 152
    type: multiple_choice
    prompt: On macOS, which mechanism does Codex use to enforce its sandbox?
    choices:
      - id: a
        text: Apple Seatbelt via `sandbox-exec`
      - id: b
        text: Landlock and seccomp
      - id: c
        text: A Docker container
      - id: d
        text: gVisor
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      macOS uses Apple Seatbelt policies executed via sandbox-exec. Landlock/seccomp is the Linux
      mechanism. Codex does not require Docker or gVisor for its sandbox.
  - id: cas-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 156
    type: multiple_choice
    prompt: On Linux, which mechanisms does Codex use to enforce its sandbox?
    choices:
      - id: a
        text: Apple Seatbelt
      - id: b
        text: Landlock and seccomp
      - id: c
        text: SELinux only
      - id: d
        text: chroot jails
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Linux uses Landlock plus seccomp (with bwrap in some configurations). Seatbelt is macOS-only.
      Codex does not rely on SELinux or chroot for sandboxing.
  - id: cas-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 162
    type: multiple_choice
    prompt: In the workspace-write sandbox mode, what is the default state of network access?
    choices:
      - id: a
        text: Enabled by default
      - id: b
        text: Enabled only for HTTPS
      - id: c
        text: Disabled by default
      - id: d
        text: Prompts the user on first request
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Network access is disabled by default in workspace-write; it must be explicitly enabled via
      sandbox_workspace_write.network_access. A common misconception is that workspace-write allows
      network.
  - id: cas-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 168
    type: multiple_choice
    prompt: Which sandbox mode means "no sandbox and no approvals"?
    choices:
      - id: a
        text: read-only
      - id: b
        text: workspace-write
      - id: c
        text: untrusted
      - id: d
        text: danger-full-access
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      danger-full-access removes the sandbox entirely and runs without approvals (explicitly not
      recommended). untrusted is an approval policy, not a sandbox mode.
  - id: cas-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 174
    type: multiple_choice
    prompt: For native Windows, what does Codex recommend for running with a sandbox?
    choices:
      - id: a
        text: Running via WSL2
      - id: b
        text: Running directly in PowerShell with no extra setup
      - id: c
        text: Disabling the sandbox entirely
      - id: d
        text: Installing Hyper-V isolation manually
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Codex recommends running via WSL2 on Windows so the Linux sandbox mechanisms
      (Landlock/seccomp) apply. It does not advise disabling the sandbox.
  - id: cas-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 130
    type: free_form
    prompt: List the three Codex sandbox modes by their exact names.
    rubric:
      criteria:
        - id: c1
          text: Names read-only
        - id: c2
          text: Names workspace-write
        - id: c3
          text: Names danger-full-access
      referenceAnswer: The three sandbox modes are read-only, workspace-write, and danger-full-access.
      passThreshold: 0.6
    guidance: >-
      These three modes form one of the two orthogonal axes that govern Codex execution; the other
      axis is the set of approval policies.
  - id: cas-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 142
    type: free_form
    prompt: List the three current Codex approval policies by their exact names.
    rubric:
      criteria:
        - id: c1
          text: Names untrusted
        - id: c2
          text: Names on-request
        - id: c3
          text: Names never
      referenceAnswer: >-
        The three current approval policies are untrusted, on-request, and never. (A separate
        granular option allows fine-grained control, and the older on-failure is now a deprecated
        alias of on-request.)
      passThreshold: 0.6
    guidance: >-
      Approval policy is the axis that governs when Codex pauses to ask, independent of the sandbox
      mode that governs what is allowed to run without asking.
  - id: cas-100-ff-c
    tier: 100
    bloom: remember
    difficulty: 150
    type: free_form
    prompt: Name the three named presets that combine a sandbox mode and an approval policy.
    rubric:
      criteria:
        - id: c1
          text: Names Read Only
        - id: c2
          text: Names Auto
        - id: c3
          text: Names Full Access
      referenceAnswer: The three named presets are Read Only, Auto, and Full Access.
      passThreshold: 0.6
    guidance: >-
      Presets are convenience bundles: Read Only = --sandbox read-only, Auto = workspace-write with
      on-request approval, and Full Access = --dangerously-bypass-approvals-and-sandbox.
  - id: cas-100-ff-d
    tier: 100
    bloom: remember
    difficulty: 158
    type: free_form
    prompt: >-
      What flag combination (or single flag) does the Full Access preset use, and what is its short
      alias?
    rubric:
      criteria:
        - id: c1
          text: States the flag is --dangerously-bypass-approvals-and-sandbox
        - id: c2
          text: States the alias is --yolo
      referenceAnswer: Full Access uses --dangerously-bypass-approvals-and-sandbox, whose alias is --yolo.
      passThreshold: 0.6
    guidance: >-
      The long form deliberately spells out the danger. --yolo is the shorthand; both disable the
      sandbox and approvals together.
  - id: cas-100-ff-e
    tier: 100
    bloom: remember
    difficulty: 166
    type: free_form
    prompt: Which `--full-auto` flag is deprecated, and what should you use instead?
    rubric:
      criteria:
        - id: c1
          text: States --full-auto is deprecated
        - id: c2
          text: States to use --sandbox workspace-write instead (optionally with an approval policy)
      referenceAnswer: >-
        The --full-auto flag is deprecated; use --sandbox workspace-write instead (typically paired
        with an approval policy such as on-request).
      passThreshold: 0.6
    guidance: >-
      --full-auto was the old way to run with limited autonomy; the workspace-write sandbox now
      expresses the same intent more explicitly.
  - id: cas-100-ff-f
    tier: 100
    bloom: remember
    difficulty: 172
    type: free_form
    prompt: >-
      Name the two config keys in config.toml that set the default sandbox mode and default approval
      policy.
    rubric:
      criteria:
        - id: c1
          text: Names sandbox_mode
        - id: c2
          text: Names approval_policy
      referenceAnswer: The keys are sandbox_mode (default sandbox) and approval_policy (default approval behavior).
      passThreshold: 0.6
    guidance: >-
      These keys persist defaults in ~/.codex/config.toml so you need not pass -s and -a on every
      invocation.
  - id: cas-100-ff-g
    tier: 100
    bloom: remember
    difficulty: 178
    type: free_form
    prompt: >-
      Which sandbox mode lets Codex read files and answer questions but requires approval to edit,
      run commands, or access the network?
    rubric:
      criteria:
        - id: c1
          text: Names read-only as the mode
        - id: c2
          text: States it can read/answer but needs approval to edit, run commands, or use the network
      referenceAnswer: >-
        The read-only mode: Codex can read files and answer questions, but it must request approval
        to edit files, run commands, or access the network.
      passThreshold: 0.6
    guidance: read-only is the most restrictive mode and is the basis of the Read Only preset.
  - id: cas-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 220
    type: multiple_choice
    prompt: >-
      Why are the sandbox mode and the approval policy described as two orthogonal (independent)
      axes?
    choices:
      - id: a
        text: >-
          The sandbox limits what can run without asking, while the approval policy governs when
          Codex pauses to request escalation; either can be set independently of the other
      - id: b
        text: They are actually the same setting with two different names
      - id: c
        text: The sandbox controls the model and the approval policy controls the network only
      - id: d
        text: Setting one automatically locks the other to a fixed value
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The two axes answer different questions: "what is allowed without asking" (sandbox) versus
      "when do we pause to ask" (approval). Presets simply pair common combinations of the two.
  - id: cas-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 226
    type: multiple_choice
    prompt: How does the `on-request` approval policy behave?
    choices:
      - id: a
        text: It blocks every command outright with no way to escalate
      - id: b
        text: >-
          It lets the model request escalation (approval) when it wants to do something the sandbox
          blocks
      - id: c
        text: It auto-runs only commands on a known-safe list and asks for everything else
      - id: d
        text: It never asks and silently performs all actions
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      on-request lets the model ask for escalation when it needs more than the sandbox allows.
      untrusted gates on a known-safe list, and never disables prompts (failures just return to the
      model).
  - id: cas-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 232
    type: multiple_choice
    prompt: What distinguishes the `untrusted` approval policy from `on-request`?
    choices:
      - id: a
        text: untrusted never asks while on-request always asks
      - id: b
        text: untrusted disables the sandbox while on-request keeps it
      - id: c
        text: >-
          untrusted auto-runs only known-safe commands and asks before anything else, rather than
          waiting for the model to request escalation
      - id: d
        text: They are identical aliases
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      untrusted runs only commands it considers known-safe automatically and prompts for the rest;
      on-request defers to the model to decide when to ask for an escalation.
  - id: cas-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 238
    type: multiple_choice
    prompt: Why does the Auto preset pair `workspace-write` with `on-request` rather than with `never`?
    choices:
      - id: a
        text: Because on-request makes commands run faster
      - id: b
        text: Because workspace-write is incompatible with the never policy
      - id: c
        text: Because never would disable the sandbox
      - id: d
        text: >-
          So Codex can work freely inside the workspace yet still pause to ask before stepping
          outside it or using the network
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Auto balances autonomy and safety: the sandbox grants free rein in the workspace, and
      on-request keeps a human in the loop for out-of-workspace writes or network access.
  - id: cas-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 244
    type: multiple_choice
    prompt: Why is it inaccurate to say "Codex CLI is a Node.js/TypeScript tool"?
    choices:
      - id: a
        text: >-
          It is now a Rust binary (codex-rs); npm is just one install channel that wraps the
          prebuilt binary
      - id: b
        text: It has always been written only in Python
      - id: c
        text: It cannot be installed through npm at all
      - id: d
        text: It runs only inside a browser
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The original TypeScript implementation was rewritten in Rust (codex-rs). The npm package wraps
      the binary; that does not make the tool a Node application.
  - id: cas-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 250
    type: multiple_choice
    prompt: How does an approval escalation typically arise under the workspace-write sandbox?
    choices:
      - id: a
        text: The sandbox randomly pauses to verify the model is still running
      - id: b
        text: >-
          Codex attempts an action outside the sandbox boundary (e.g. writing outside the workspace
          or using the network) and the approval policy makes it pause to ask
      - id: c
        text: Every file edit inside the workspace requires explicit approval
      - id: d
        text: Escalation happens only when the model finishes its task
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Escalation is triggered when the agent needs to cross the sandbox boundary. Inside
      workspace-write, edits within the workspace proceed without asking; reaching outside or onto
      the network prompts.
  - id: cas-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 256
    type: multiple_choice
    prompt: Why does `--yolo` carry a stronger warning than merely "skipping confirmation prompts"?
    choices:
      - id: a
        text: It deletes the config file as a side effect
      - id: b
        text: It only skips prompts but keeps the sandbox fully active
      - id: c
        text: It disables both approvals and the sandbox, giving full unsandboxed system access
      - id: d
        text: It forces read-only mode for safety
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      A common misconception is that --yolo just suppresses prompts. In fact it maps to
      --dangerously-bypass-approvals-and-sandbox, removing the sandbox too.
  - id: cas-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 262
    type: multiple_choice
    prompt: Why does Codex use Seatbelt on macOS but Landlock/seccomp on Linux?
    choices:
      - id: a
        text: Because macOS cannot restrict network access
      - id: b
        text: Because Seatbelt is faster than Landlock on all platforms
      - id: c
        text: Because Linux does not support file-system restrictions
      - id: d
        text: >-
          It relies on each operating system's native kernel sandboxing primitives rather than a
          single cross-platform mechanism
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Codex leans on OS-native mechanisms: Apple Seatbelt (via sandbox-exec) on macOS and
      Landlock+seccomp on Linux. This is why Windows is steered toward WSL2 to reuse the Linux path.
  - id: cas-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 268
    type: multiple_choice
    prompt: How does the `on-request` approval policy differ from `never`?
    choices:
      - id: a
        text: >-
          on-request lets the model pause and ask for approval when it needs to exceed the sandbox,
          whereas never disables prompts and returns failures straight to the model
      - id: b
        text: on-request always disables the sandbox; never always enables it
      - id: c
        text: They both disable the sandbox
      - id: d
        text: on-request only works in CI and never only works interactively
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      on-request keeps a human in the loop for escalations beyond the sandbox; never suppresses
      prompts entirely, so a blocked action simply fails back to the model (typical for unattended
      CI).
  - id: cas-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 274
    type: multiple_choice
    prompt: What does the `sandbox_workspace_write.network_access = true` setting accomplish?
    choices:
      - id: a
        text: It switches Codex into danger-full-access mode
      - id: b
        text: >-
          It enables outbound network access while in workspace-write mode, which is otherwise off
          by default
      - id: c
        text: It disables the sandbox entirely
      - id: d
        text: It grants read-only mode network access only
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Network is disabled by default in workspace-write; this key opts the workspace-write sandbox
      into outbound network without dropping the rest of its restrictions.
  - id: cas-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 252
    type: multiple_choice
    prompt: Why might a team prefer the Read Only preset for a first pass on an unfamiliar repository?
    choices:
      - id: a
        text: It automatically commits any suggested changes
      - id: b
        text: It runs commands faster because nothing is sandboxed
      - id: c
        text: >-
          It lets Codex inspect and reason about code without being able to edit files, run
          commands, or reach the network unless explicitly approved
      - id: d
        text: It is the only mode that can read AGENTS.md
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Read Only (sandbox read-only) is ideal for exploration and review: maximum safety, with any
      mutation requiring an explicit escalation/approval.
  - id: cas-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 240
    type: multiple_choice
    prompt: >-
      How does the sandbox relate to the approval policy when deciding whether a command runs
      automatically?
    choices:
      - id: a
        text: The sandbox overrides the approval policy and disables it
      - id: b
        text: The approval policy defines the file system, and the sandbox only handles the network
      - id: c
        text: The two settings are merged into one value at runtime
      - id: d
        text: >-
          The sandbox defines what may run without asking; if an action falls outside that, the
          approval policy decides whether to pause and ask
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Think of the sandbox as the permitted envelope and the approval policy as the gatekeeper for
      actions that try to leave that envelope.
  - id: cas-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 230
    type: multiple_choice
    prompt: Why is "danger" baked into the name `danger-full-access`?
    choices:
      - id: a
        text: >-
          It removes the sandbox and approvals so Codex has full system access, which is explicitly
          not recommended
      - id: b
        text: It only sounds dangerous but is actually the default mode
      - id: c
        text: It blocks all file writes for safety
      - id: d
        text: It is reserved for read-only audits
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The name signals intent: full system access with no guardrails. It exists for
      hardened/disposable environments, not everyday local use.
  - id: cas-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 224
    type: free_form
    prompt: >-
      Explain in your own words why the sandbox mode and approval policy are two separate settings
      rather than one.
    rubric:
      criteria:
        - id: c1
          text: >-
            States the sandbox governs what is allowed to run without asking (the permitted
            envelope)
        - id: c2
          text: States the approval policy governs when Codex pauses to request escalation
        - id: c3
          text: Notes they are orthogonal and presets pair specific combinations
      referenceAnswer: >-
        The sandbox mode defines the boundary of what Codex may do without asking (read-only,
        workspace-write, or full access), while the approval policy defines when Codex pauses to
        request escalation (untrusted, on-request, never). They are orthogonal axes; presets such as
        Auto simply bundle a specific sandbox with a specific approval policy.
      passThreshold: 0.6
    guidance: >-
      Separating "what is allowed" from "when to ask" lets you, for example, give a wide sandbox but
      still require approval for network use, or a narrow sandbox that never prompts in CI.
  - id: cas-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 236
    type: free_form
    prompt: Compare the `untrusted` and `never` approval policies and when each is appropriate.
    rubric:
      criteria:
        - id: c1
          text: Describes untrusted as auto-running only known-safe commands and prompting for the rest
        - id: c2
          text: Describes never as disabling approval prompts entirely
        - id: c3
          text: Maps never to non-interactive/CI use and untrusted to cautious interactive use
      referenceAnswer: >-
        untrusted auto-runs only commands considered known-safe and prompts before anything else,
        which suits cautious interactive work. never disables approval prompts altogether, which
        suits non-interactive or CI runs where no human is present to answer prompts.
      passThreshold: 0.6
    guidance: >-
      The trade-off is human-in-the-loop safety (untrusted) versus unattended throughput (never);
      the sandbox still constrains what never can do.
  - id: cas-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 248
    type: free_form
    prompt: >-
      Explain why enabling network access does not require switching out of the workspace-write
      sandbox.
    rubric:
      criteria:
        - id: c1
          text: Notes network is off by default in workspace-write but is a separate toggle
        - id: c2
          text: Identifies sandbox_workspace_write.network_access as the opt-in
        - id: c3
          text: Explains this keeps other workspace-write restrictions intact
      referenceAnswer: >-
        Network access is a separate sub-setting of workspace-write, off by default. You opt in with
        sandbox_workspace_write.network_access = true, which grants outbound network while keeping
        the rest of workspace-write's file-system restrictions in place, rather than jumping to
        danger-full-access.
      passThreshold: 0.6
    guidance: >-
      This granularity avoids the all-or-nothing trap of dropping to full access just to make a
      network call.
  - id: cas-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 258
    type: free_form
    prompt: Explain why running Codex on native Windows is steered toward WSL2.
    rubric:
      criteria:
        - id: c1
          text: Notes Codex's sandbox relies on OS-native kernel mechanisms
        - id: c2
          text: States WSL2 provides the Linux path (Landlock/seccomp) Codex can enforce
      referenceAnswer: >-
        Codex's sandbox depends on native kernel primitives (Seatbelt on macOS, Landlock/seccomp on
        Linux). Native Windows lacks the same path, so Codex recommends WSL2 so the Linux sandboxing
        mechanisms can be applied.
      passThreshold: 0.6
    guidance: WSL2 lets Windows users reuse the well-tested Linux sandbox rather than running unsandboxed.
  - id: cas-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 266
    type: free_form
    prompt: Explain why the deprecated `--full-auto` flag is now expressed as `--sandbox workspace-write`.
    rubric:
      criteria:
        - id: c1
          text: States --full-auto is deprecated in favor of --sandbox workspace-write
        - id: c2
          text: >-
            Explains the sandbox flag makes the intended boundary explicit (workspace edits without
            full access)
      referenceAnswer: >-
        --full-auto used to express "work autonomously within limits." That intent is now captured
        explicitly by --sandbox workspace-write (often with an approval policy), which clearly
        states the boundary: Codex may edit and run within the workspace but not roam the whole
        system.
      passThreshold: 0.6
    guidance: >-
      Replacing an opaque flag name with the explicit sandbox makes the autonomy level legible and
      composable with an approval policy.
  - id: cas-200-ff-f
    tier: 200
    bloom: understand
    difficulty: 272
    type: free_form
    prompt: >-
      Describe how an approval escalation works under the Auto preset when Codex needs to write a
      file outside the workspace.
    rubric:
      criteria:
        - id: c1
          text: Notes Auto = workspace-write + on-request
        - id: c2
          text: States in-workspace edits proceed without asking
        - id: c3
          text: States the out-of-workspace write triggers an approval request before proceeding
      referenceAnswer: >-
        Under Auto (workspace-write with on-request), Codex edits and runs inside the workspace
        without prompting. When it needs to write outside the workspace, that action exceeds the
        sandbox boundary, so the on-request policy makes Codex pause and ask for approval before
        proceeding.
      passThreshold: 0.6
    guidance: This illustrates the sandbox-as-boundary, approval-as-gatekeeper model in a concrete flow.
  - id: cas-200-ff-g
    tier: 200
    bloom: understand
    difficulty: 278
    type: free_form
    prompt: >-
      Why is the claim "the sandbox mode and approval policy are the same setting" a misconception?
