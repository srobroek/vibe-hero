    rubric:
      criteria:
        - id: c1
          text: States they are independent axes
        - id: c2
          text: >-
            Gives an example where the same sandbox is paired with different approval policies (or
            vice versa)
      referenceAnswer: >-
        They are independent. For example, workspace-write can be paired with on-request (the Auto
        preset, pausing for out-of-workspace actions) or with never (unattended CI, no prompts).
        Same sandbox, different approval behavior, proving they are distinct settings.
      passThreshold: 0.6
    guidance: >-
      Holding the sandbox fixed while varying the approval policy is the cleanest demonstration that
      the two are orthogonal.
  - id: cas-300-mc-a
