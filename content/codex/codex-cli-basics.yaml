      - id: d
        text: Run Codex in its MCP server mode via codex mcp-server
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      `codex mcp-server` runs Codex itself as an MCP server over stdio, exposing it as a tool other
      MCP clients

      can call. (The `codex mcp` subcommands instead manage MCP servers Codex connects to as a
