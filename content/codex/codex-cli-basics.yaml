      - id: d
        text: codex login <session-id>
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      `codex resume <id>` continues a specific prior session; `codex resume --last` resumes the most
      recent.
  - id: ccb-300-mc-l
    tier: 300
    bloom: apply
    difficulty: 332
