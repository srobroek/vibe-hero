  - id: ccb-500-ff-a
    tier: 500
    bloom: evaluate
    difficulty: 490
    type: free_form
    prompt: >
      Critique a policy of running `codex --yolo` for all developer tasks on the grounds of "speed."
      Give at least two

      concrete risks and a safer default that preserves most of the speed.
    guidance: >
      Should explain --yolo removes both sandbox and approvals (full system access), cite risks
      (accidental destructive

      commands, exfiltration, untrusted-input exposure), and recommend Auto (workspace-write +
      on-request) as a safer default.
    rubric:
      criteria:
        - id: c1
          text: States --yolo disables both the sandbox and approvals (full unsandboxed access)
        - id: c2
          text: >-
            Gives at least two concrete risks (e.g., destructive commands, data exfiltration,
            network/SSRF, untrusted input)
        - id: c3
          text: Recommends a safer default such as Auto (workspace-write + on-request)
      referenceAnswer: >
        --yolo (--dangerously-bypass-approvals-and-sandbox) removes both the sandbox and approval
        prompts, giving full

        unsandboxed system access. Risks include accidental destructive commands (rm, force-push),
        data exfiltration or

        SSRF via unrestricted network, and amplified blast radius when acting on untrusted input. A
        safer default that

        keeps most of the speed is the Auto preset (--sandbox workspace-write --ask-for-approval
