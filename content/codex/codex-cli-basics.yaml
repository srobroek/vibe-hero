  - id: ccb-400-ff-a
    tier: 400
    bloom: analyze
    difficulty: 430
    type: free_form
    prompt: >
      A user sets approval_policy = "never" hoping Codex will start editing files, but it is still
      in read-only mode and

      refuses to write. Diagnose the misunderstanding and state the fix.
    guidance: >
      Should identify that sandbox (read-only) and approval policy are independent; "never" only
      removes prompts, it

      does not grant write capability. Fix: switch sandbox_mode to workspace-write.
    rubric:
      criteria:
        - id: c1
          text: >-
            Identifies that read-only blocks writes at the sandbox layer, independent of approval
            policy
        - id: c2
          text: Explains approval_policy never only suppresses prompts, not capabilities
        - id: c3
          text: States the fix is to set sandbox_mode to workspace-write (or use a preset that does)
      referenceAnswer: >
        The two settings are orthogonal. read-only forbids file edits at the sandbox layer; setting
        approval_policy

        to "never" only stops Codex from prompting, it does not grant write permission. To edit
        files, change

        sandbox_mode to workspace-write (e.g., via the Auto preset), not the approval policy.
      passThreshold: 0.6
  - id: ccb-400-ff-b
    tier: 400
    bloom: analyze
    difficulty: 452
    type: free_form
    prompt: >
      Two AGENTS.md files give conflicting style rules: the repo root says tabs, a subdirectory says
      spaces. Codex in

      the subdirectory follows spaces. Explain the precedence rule that produces this and what would
