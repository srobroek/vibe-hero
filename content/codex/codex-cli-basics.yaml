  - id: ccb-500-ff-b
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: free_form
    prompt: >
      Your org's onboarding doc hard-pins a specific Codex model id. Argue whether this is wise
      given how the tool

      evolves, and propose durable wording.
    guidance: >
      Should note exact recommended model ids change frequently; propose describing the
      GPT-5/GPT-5-Codex family and the

      selection mechanisms (/model, -m, model config key) rather than a brittle pin.
    rubric:
      criteria:
        - id: c1
          text: Argues that hard-pinning a model id is brittle because recommended ids change frequently
        - id: c2
          text: Proposes durable wording referencing the GPT-5/GPT-5-Codex family
        - id: c3
          text: Mentions selection mechanisms (/model, -m/--model, or the model config key)
      referenceAnswer: >
        Hard-pinning is brittle: the recommended Codex model id changes frequently, so the doc will
        drift and may name a

        retired id. Better durable wording: "Codex defaults to a current GPT-5 / GPT-5-Codex-family
        model; pick one via

        /model in the TUI, -m/--model on the CLI, or the `model` key in config.toml." This stays
        correct as versions roll.
      passThreshold: 0.6
  - id: ccb-500-ff-c
    tier: 500
    bloom: evaluate
    difficulty: 528
    type: free_form
    prompt: >
      Evaluate a proposal to expose Codex as an MCP server to many internal agents. What governance
      controls would you

      require before approving, and why?
    guidance: >
      Should recognize Codex-as-MCP-server grants callers a capable agent; require controlling
      sandbox mode, approval

      policy, access scope/credentials, and possibly tool scoping; justify by blast radius.
    rubric:
      criteria:
        - id: c1
          text: >-
            Recognizes exposing Codex as a server hands callers an agent that can run commands/edit
            code
        - id: c2
          text: Requires governing sandbox mode and approval policy for the exposed instance
        - id: c3
          text: >-
            Addresses access scope/credentials and least-privilege (e.g., directory scope, tool
            scoping)
      referenceAnswer: >
        Running Codex in MCP server mode lets any connected client invoke a capable agent that can
        edit code and run

        commands, so the blast radius is large. Before approving I would require: a constrained
        sandbox (read-only or

        workspace-write, never danger-full-access/--yolo), an explicit approval policy, a scoped
        working directory and

        least-privilege credentials, network disabled unless justified, and auditing. These bound
        what callers can make

        Codex do.
      passThreshold: 0.6
  - id: ccb-500-ff-d
    tier: 500
    bloom: evaluate
    difficulty: 502
    type: free_form
    prompt: >
      A platform team wants safe org-wide defaults but lets individual repos opt into more autonomy.
      Recommend a config

      layering design using Codex's mechanisms and justify it.
    guidance: >
      Should propose conservative global ~/.codex/config.toml defaults, named profiles for autonomy
      levels, and trusted

      project-scoped .codex/config.toml for opt-in; justify by control + flexibility.
    rubric:
      criteria:
        - id: c1
          text: Proposes conservative defaults in the global config.toml
        - id: c2
          text: Uses named profiles and/or trusted project-scoped .codex/config.toml for opt-in autonomy
        - id: c3
          text: Justifies the balance of central control with per-repo flexibility
      referenceAnswer: >
        Set conservative defaults in the global ~/.codex/config.toml (e.g., workspace-write +
        on-request, network off).

        Define named profiles for higher-autonomy modes so opting in is explicit and reviewable.
        Allow trusted

        project-scoped .codex/config.toml so individual repos can raise autonomy where justified
        (project trust gates

        this). This keeps safe org defaults while letting teams opt into more autonomy without
        editing everyone's config.
      passThreshold: 0.6
  - id: ccb-500-ff-e
    tier: 500
    bloom: evaluate
    difficulty: 518
    type: free_form
    prompt: >
      A team enables sandbox_workspace_write.network_access globally and adds many writable_roots to
      "stop hitting

      sandbox errors." Critique this and recommend a more disciplined approach.
    guidance: >
      Should explain blanket network access and broad writable_roots erode the sandbox's protection
      (exfiltration, wider

      write blast radius); recommend enabling narrowly per-project/profile only where needed.
    rubric:
      criteria:
        - id: c1
          text: Explains that blanket network access weakens the sandbox (exfiltration/SSRF risk)
        - id: c2
          text: Explains broad writable_roots widen the write blast radius
        - id: c3
          text: Recommends enabling these narrowly per-project/profile only where needed
      referenceAnswer: >
        Defaulting network on and widely expanding writable_roots dismantles the protections
        workspace-write is meant to

        provide: network exposure enables data exfiltration/SSRF, and extra writable roots let
        mistakes or malicious

        steps damage files outside the project. The disciplined approach is to keep these off by
        default and enable them

        narrowly, per-project or per-profile, only for the specific path/host a task needs, ideally
        scoped and reviewed.
      passThreshold: 0.6
  - id: ccb-500-ff-f
    tier: 500
    bloom: evaluate
    difficulty: 538
    type: free_form
    prompt: >
      Assess this CI design: external-contributor PRs trigger a Codex run with
      --dangerously-bypass-approvals-and-sandbox

      so it can "fully fix" things automatically. Judge the design and propose a safer alternative.
    guidance: >
      Should judge it as a serious anti-pattern (untrusted input + no sandbox/approvals = arbitrary
      code execution risk);

      propose a sandboxed read-only or workspace-write run with approvals, no auto-merge, network
      off, and human review.
    rubric:
      criteria:
        - id: c1
          text: >-
            Judges running fully unsandboxed on untrusted external PRs as a serious security
            anti-pattern
        - id: c2
          text: >-
            Explains the risk (arbitrary code execution / exfiltration from prompt-injected or
            malicious PR content)
        - id: c3
          text: >-
            Proposes a safer alternative (sandboxed mode, network off, no auto-apply/merge, human
            review)
      referenceAnswer: >
        This is a serious anti-pattern: external PRs are untrusted input, and
        --dangerously-bypass-approvals-and-sandbox

        removes both the sandbox and approvals, so prompt-injected or malicious PR content could
        trigger arbitrary code

        execution or data exfiltration in CI. A safer alternative: run Codex in a sandboxed mode
        (read-only or

        workspace-write) with network disabled, no auto-apply/auto-merge, gated by an approval
        policy, and require human

        review of any proposed diff before it lands.
      passThreshold: 0.6
  - id: ccb-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 482
    type: free_form
    prompt: >
      A new hire insists Codex CLI is "just the old 2021 Codex code-completion model with a terminal
      wrapper." Evaluate

      this claim and explain the practical consequences of believing it.
    guidance: >
      Should refute: the modern Codex is an agentic Rust CLI (sandbox/approvals/MCP/AGENTS.md); the
      2021 completion model

      API is deprecated and unrelated; consequences include wrong capability assumptions and
      depending on a deprecated API.
    rubric:
      criteria:
        - id: c1
          text: >-
            Refutes the claim and distinguishes the modern agentic CLI from the deprecated 2021
            completion model
        - id: c2
          text: >-
            Notes the modern CLI's agentic capabilities (sandbox/approvals, MCP, AGENTS.md, running
            commands/editing)
        - id: c3
          text: >-
            Explains a practical consequence (wrong capability assumptions or building on a
            deprecated API)
      referenceAnswer: >
        The claim is false. The modern Codex CLI is an agentic Rust tool (codex-rs) that reads/edits
        files, runs commands

        under sandbox and approval controls, speaks MCP, and uses AGENTS.md. The 2021 Codex
        code-completion model API is a

        separate, deprecated product. Believing they are the same leads to wrong capability
        assumptions (treating Codex

        as a stateless completion endpoint) and risks building on a deprecated API instead of the
        supported agent.
      passThreshold: 0.6
