# Topic: codex-cli-basics (codex)
# The OpenAI Codex agentic CLI — the codex command, sessions, model selection, and working in a repo.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: codex-cli-basics
class:
  kind: tool
  tool: codex
title: Codex CLI Basics
summary: >-
  The OpenAI Codex agentic CLI — the codex command, sessions, model selection, and working in a
  repo.
triggerSignals: []
items:
  - id: ccb-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 125
    type: multiple_choice
    prompt: |
      What is the name of the executable installed by the modern OpenAI Codex CLI?
    choices:
      - id: a
        text: codex
      - id: b
        text: openai-code
      - id: c
        text: gpt-cli
      - id: d
        text: oai
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      The modern agentic Codex CLI installs a binary named `codex`.
  - id: ccb-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 135
    type: multiple_choice
    prompt: |
      The modern Codex CLI is implemented predominantly in which programming language?
    choices:
      - id: a
        text: Python
      - id: b
        text: Rust (the codex-rs implementation)
      - id: c
        text: Go
      - id: d
        text: TypeScript only
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Codex ships as a Rust binary; the implementation lives in the `codex-rs` directory.
      An earlier TypeScript implementation was rewritten in Rust.
  - id: ccb-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 145
    type: multiple_choice
    prompt: |
      Which command runs Codex non-interactively for scripting and CI, piping its result to stdout?
    choices:
      - id: a
        text: codex batch "..."
      - id: b
        text: codex run "..."
      - id: c
        text: codex exec "..."
      - id: d
        text: codex --silent "..."
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      `codex exec "..."` is the canonical non-interactive automation entry point.
  - id: ccb-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 150
    type: multiple_choice
    prompt: |
      What happens when you run `codex` with no subcommand and no prompt?
    choices:
      - id: a
        text: It starts an MCP server
      - id: b
        text: It prints the version and exits
      - id: c
        text: It immediately edits files in the current directory
      - id: d
        text: It opens an interactive full-screen TUI
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      Bare `codex` launches the interactive TUI. `codex "prompt"` seeds the TUI with an initial
      prompt.
  - id: ccb-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 160
    type: multiple_choice
    prompt: |
      Which three sandbox modes does Codex CLI support?
    choices:
      - id: a
        text: safe, normal, unsafe
      - id: b
        text: read-only, workspace-write, danger-full-access
      - id: c
        text: locked, open, admin
      - id: d
        text: none, partial, full
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      The three sandbox modes are `read-only`, `workspace-write`, and `danger-full-access`.
  - id: ccb-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 165
    type: multiple_choice
    prompt: |
      What file format and name is used for Codex's main configuration file?
    choices:
      - id: a
        text: YAML, codex.yaml
      - id: b
        text: JSON, config.json
      - id: c
        text: TOML, config.toml
      - id: d
        text: INI, .codexrc
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Codex configuration is TOML at `~/.codex/config.toml`.
  - id: ccb-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 170
    type: multiple_choice
    prompt: |
      Which set lists the current Codex CLI approval policies accepted by `--ask-for-approval`?
    choices:
      - id: a
        text: manual, semi, auto, full
      - id: b
        text: always, sometimes, never, auto
      - id: c
        text: strict, relaxed, off, prompt
      - id: d
        text: untrusted, on-request, never
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      The current approval policies are `untrusted`, `on-request`, and `never`. The older
      `on-failure`

      value is deprecated and now treated as an alias for `on-request`.
  - id: ccb-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 130
    type: multiple_choice
    prompt: |
      Which command continues the most recent prior Codex session?
    choices:
      - id: a
        text: codex resume --last
      - id: b
        text: codex continue
      - id: c
        text: codex --restore
      - id: d
        text: codex session reopen
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      `codex resume --last` resumes the most recent session; `codex resume <id>` resumes a specific
      one.
  - id: ccb-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 140
    type: multiple_choice
    prompt: |
      What is the project instruction/memory file that Codex reads, written in Markdown?
    choices:
      - id: a
        text: INSTRUCTIONS.txt
      - id: b
        text: CODEX.md
      - id: c
        text: AGENTS.md
      - id: d
        text: .codexconfig
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      AGENTS.md is the Markdown project instruction file Codex reads; it is a cross-vendor open
      standard.
  - id: ccb-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 155
    type: multiple_choice
    prompt: |
      Which protocol does Codex use to connect external tools and servers?
    choices:
      - id: a
        text: GraphQL
      - id: b
        text: LSP (Language Server Protocol)
      - id: c
        text: gRPC
      - id: d
        text: MCP (Model Context Protocol)
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Codex supports the Model Context Protocol (MCP) for external tools and servers.
  - id: ccb-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 148
    type: multiple_choice
    prompt: |
      Which flag attaches an image input to a Codex run?
    choices:
      - id: a
        text: '-i / --image'
      - id: b
        text: '-p / --picture'
      - id: c
        text: '--attach-img'
      - id: d
        text: '--vision'
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Image inputs are supplied via `-i` / `--image`.
  - id: ccb-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 158
    type: multiple_choice
    prompt: |
      Which alias and flag disables BOTH approvals and the sandbox at once?
    choices:
      - id: a
        text: '--fast'
      - id: b
        text: '--yolo (--dangerously-bypass-approvals-and-sandbox)'
      - id: c
        text: '--trust-me'
      - id: d
        text: '--no-sandbox-only'
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      `--yolo` is the alias for `--dangerously-bypass-approvals-and-sandbox`, giving full
      unsandboxed access.
  - id: ccb-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 162
    type: multiple_choice
    prompt: |
      Which two commands handle Codex authentication?
    choices:
      - id: a
        text: codex key add and codex key rm
      - id: b
        text: codex auth and codex deauth
      - id: c
        text: codex signin and codex signout
      - id: d
        text: codex login and codex logout
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      Authentication uses `codex login` / `codex logout`. You can sign in with ChatGPT or an OpenAI
      API key.
  - id: ccb-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 152
    type: free_form
    prompt: |
      Name the two primary ways to authenticate the Codex CLI.
    guidance: |
      Expect both: "Sign in with ChatGPT" (a paid ChatGPT plan) and using an OpenAI API key.
    rubric:
      criteria:
        - id: c1
          text: Mentions signing in with a ChatGPT account/plan
        - id: c2
          text: Mentions using an OpenAI API key
      referenceAnswer: >
        You can sign in with a ChatGPT account (Plus/Pro/Business/Edu/Enterprise) or authenticate
        with an OpenAI API key.
      passThreshold: 0.6
  - id: ccb-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 168
    type: free_form
    prompt: |
      Where does Codex store its main configuration file by default, and what format is it in?
    guidance: |
      Expect ~/.codex/config.toml (directory $CODEX_HOME defaults to ~/.codex) and TOML format.
    rubric:
      criteria:
        - id: c1
          text: States the path is ~/.codex/config.toml (or $CODEX_HOME/config.toml)
        - id: c2
          text: States the format is TOML
      referenceAnswer: >
        The config file is TOML at ~/.codex/config.toml; the directory is $CODEX_HOME (default
        ~/.codex).
      passThreshold: 0.6
  - id: ccb-100-ff-c
    tier: 100
    bloom: remember
    difficulty: 172
    type: free_form
    prompt: |
      List the three Codex sandbox modes.
    guidance: |
      Expect read-only, workspace-write, danger-full-access.
    rubric:
      criteria:
        - id: c1
          text: Lists read-only and workspace-write
        - id: c2
          text: Lists danger-full-access
      referenceAnswer: |
        read-only, workspace-write, and danger-full-access.
      passThreshold: 0.6
  - id: ccb-100-ff-d
    tier: 100
    bloom: remember
    difficulty: 138
    type: free_form
    prompt: |
      What is the canonical command for running Codex non-interactively in a script or CI pipeline?
    guidance: |
      Expect `codex exec "..."` (alias codex e).
    rubric:
      criteria:
        - id: c1
          text: Identifies codex exec as the non-interactive command
        - id: c2
          text: Associates it with scripting/CI/stdout
      referenceAnswer: |
        `codex exec "..."` runs non-interactively for scripting and CI, piping results to stdout.
      passThreshold: 0.6
  - id: ccb-100-ff-e
    tier: 100
    bloom: remember
    difficulty: 175
    type: free_form
    prompt: |
      Name the current Codex approval policies accepted by `--ask-for-approval`.
    guidance: >
      Expect untrusted, on-request, never. The legacy on-failure value is deprecated (alias for
      on-request).
    rubric:
      criteria:
        - id: c1
          text: Lists untrusted and never
        - id: c2
          text: Lists on-request
      referenceAnswer: >
        untrusted, on-request, and never. (The older on-failure value is deprecated and now aliases
        on-request.)
      passThreshold: 0.6
  - id: ccb-100-ff-f
    tier: 100
    bloom: remember
    difficulty: 146
    type: free_form
    prompt: |
      What is the name of the cross-vendor Markdown file Codex reads for project instructions?
    guidance: |
      Expect AGENTS.md.
    rubric:
      criteria:
        - id: c1
          text: Names AGENTS.md
      referenceAnswer: |
        AGENTS.md.
      passThreshold: 0.6
  - id: ccb-100-ff-g
    tier: 100
    bloom: remember
    difficulty: 128
    type: free_form
    prompt: |
      Name two install channels for the Codex CLI.
    guidance: >
      Expect any two of: npm (@openai/codex), Homebrew cask, official installer script, GitHub
      Releases binaries.
    rubric:
      criteria:
        - id: c1
          text: Names one valid channel (npm, Homebrew, installer script, or GitHub Releases)
        - id: c2
          text: Names a second distinct valid channel
      referenceAnswer: >
        npm (npm install -g @openai/codex), Homebrew (brew install --cask codex), the official
        installer script, or prebuilt GitHub Release binaries.
      passThreshold: 0.6
  - id: ccb-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 225
    type: multiple_choice
    prompt: |
      Why is it a misconception to call Codex CLI "the 2021 OpenAI code-completion model"?
    choices:
      - id: a
        text: >-
          The modern Codex is an agentic terminal CLI/agent; the old completion model API is
          deprecated
      - id: b
        text: The 2021 model was never released publicly
      - id: c
        text: The modern Codex only does completions, not agentic work
      - id: d
        text: They are the same product, just renamed
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      The deprecated 2021 Codex completion model API is unrelated to the modern agentic Codex CLI.
  - id: ccb-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 235
    type: multiple_choice
    prompt: |
      In workspace-write mode, why can't Codex reach the network by default?
    choices:
      - id: a
        text: workspace-write physically blocks all I/O including disk
      - id: b
        text: Network access is disabled by default and must be explicitly enabled via config
      - id: c
        text: The network only works in read-only mode
      - id: d
        text: Codex never supports network access in any mode
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      workspace-write allows reading/editing files and running commands in the workspace, but
      network

      is disabled by default and enabled via sandbox_workspace_write.network_access.
  - id: ccb-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 245
    type: multiple_choice
    prompt: |
      How do sandbox mode and approval policy relate to each other in Codex?
    choices:
      - id: a
        text: Approval policy overrides and disables the sandbox
      - id: b
        text: They are the same setting under two names
      - id: c
        text: >-
          They are orthogonal axes; sandbox limits what runs without asking, approval governs when
          Codex pauses to escalate
      - id: d
        text: Sandbox mode is only meaningful when approvals are off
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      Sandbox and approvals are independent axes. Presets like Auto combine a specific pair of
      values.
  - id: ccb-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 255
    type: multiple_choice
    prompt: |
      How does Codex merge multiple AGENTS.md files when several exist in a path?
    choices:
      - id: a
        text: All files are merged alphabetically by filename
      - id: b
        text: Only the repo-root AGENTS.md is ever read
      - id: c
        text: Only the cwd AGENTS.md is read; others are ignored
      - id: d
        text: >-
          Global ~/.codex/AGENTS.md first, then repo root down to cwd, with files closer to cwd
          overriding earlier guidance
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      Precedence flows global -> repo root -> cwd, with the nearest file taking precedence. The
      combined

      size is capped by project_doc_max_bytes (default 32 KiB).
  - id: ccb-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 265
    type: multiple_choice
    prompt: |
      Why is `--full-auto` no longer the recommended way to run Codex autonomously?
    choices:
      - id: a
        text: It was renamed to --yolo with identical behavior
      - id: b
        text: >-
          It is deprecated in favor of --sandbox workspace-write (with an approval policy) or the
          Auto preset
      - id: c
        text: It only ever worked on macOS
      - id: d
        text: It disabled the sandbox entirely, which the new flag does not
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      `--full-auto` is deprecated; the recommended approach is `--sandbox workspace-write` with an
      appropriate approval policy, or the named Auto preset.
  - id: ccb-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 272
    type: multiple_choice
    prompt: |
      Why does the "AGENTS.md is OpenAI-proprietary" claim mislead users?
    choices:
      - id: a
        text: AGENTS.md only works inside the Codex IDE extension
      - id: b
        text: AGENTS.md is actually a closed format requiring a license
      - id: c
        text: AGENTS.md is a cross-vendor open standard adopted by many agents, not OpenAI-only
      - id: d
        text: AGENTS.md is generated automatically and cannot be edited
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      AGENTS.md is an open standard used by tools like Cursor, Aider, Jules, and VS Code, stewarded
      under

      the Agentic AI Foundation / Linux Foundation.
  - id: ccb-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 228
    type: multiple_choice
    prompt: |
      What does the `untrusted` approval policy actually do?
    choices:
      - id: a
        text: It treats every command as safe to run silently
      - id: b
        text: It refuses to run any command at all
      - id: c
        text: It runs all commands without ever asking
      - id: d
        text: It auto-runs only known-safe commands and asks for approval on everything else
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      Under `untrusted`, only commands Codex deems known-safe run automatically; the rest require
      approval.
  - id: ccb-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: |
      How does the named "Auto" preset map to underlying flags?
    choices:
      - id: a
        text: '--sandbox workspace-write combined with --ask-for-approval on-request'
      - id: b
        text: '--sandbox read-only with --ask-for-approval never'
      - id: c
        text: '--dangerously-bypass-approvals-and-sandbox'
      - id: d
        text: '--sandbox danger-full-access with --ask-for-approval untrusted'
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Auto = `--sandbox workspace-write --ask-for-approval on-request`. Read Only = `--sandbox
      read-only`.
  - id: ccb-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 258
    type: multiple_choice
    prompt: |
      In what sense can Codex act in BOTH directions with MCP?
    choices:
      - id: a
        text: It only runs as a server and cannot consume other servers
      - id: b
        text: It only consumes MCP servers and can never be one
      - id: c
        text: >-
          It is an MCP client consuming servers and can also run as an MCP server exposing itself as
          a tool
      - id: d
        text: MCP only works between two Codex instances
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      Codex is an MCP client (consuming servers) and can run as an MCP server via `codex
      mcp-server`.
  - id: ccb-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 268
    type: multiple_choice
    prompt: |
      Why does npm being an install channel NOT make Codex a Node.js/TypeScript tool?
    choices:
      - id: a
        text: npm installs a Python shim that calls a server
      - id: b
        text: npm only installs documentation, not the tool
      - id: c
        text: The npm package contains the full TypeScript source that runs at runtime
      - id: d
        text: Codex ships as a Rust binary; npm is just one channel that wraps and delivers that binary
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      The npm package wraps the Rust (codex-rs) binary; the runtime is the compiled Rust executable.
  - id: ccb-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 240
    type: multiple_choice
    prompt: |
      What is the practical difference between `codex "fix the bug"` and `codex exec "fix the bug"`?
    choices:
      - id: a
        text: >-
          The first opens the interactive TUI seeded with that prompt; the second runs
          non-interactively to stdout
      - id: b
        text: Both open the TUI; exec just adds logging
      - id: c
        text: The first runs in CI; the second is interactive
      - id: d
        text: There is no difference
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      `codex "prompt"` seeds the interactive TUI; `codex exec "prompt"` is the non-interactive
      automation path.
  - id: ccb-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 232
    type: multiple_choice
    prompt: |
      Why does read-only mode still let Codex answer questions about your code?
    choices:
      - id: a
        text: read-only blocks all file access, so answers come from the model's memory only
      - id: b
        text: >-
          read-only permits reading files; it only blocks edits, command execution, and network
          without approval
      - id: c
        text: read-only secretly allows writes to temp files
      - id: d
        text: read-only is identical to workspace-write for reads and writes
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      In read-only mode Codex can read files and answer questions but needs approval to edit, run
      commands, or use the network.
  - id: ccb-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 252
    type: multiple_choice
    prompt: |
      What is the role of the `model_provider` config key, and what is its default?
    choices:
      - id: a
        text: It names the MCP server; it has no default
      - id: b
        text: It sets the UI theme; it defaults to "dark"
      - id: c
        text: It chooses the sandbox backend; it defaults to "seatbelt"
      - id: d
        text: It selects the backend provider for model requests; it defaults to "openai"
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      `model_provider` chooses the request backend and defaults to `"openai"`.
  - id: ccb-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 230
    type: free_form
    prompt: >
      Explain why sandbox mode and approval policy are considered two independent settings rather
      than one.
    guidance: >
      Should explain the sandbox constrains what runs without prompting, while the approval policy
      decides

      when Codex pauses to ask for escalation; presets combine a specific pair.
    rubric:
      criteria:
        - id: c1
          text: >-
            States the sandbox limits/constrains what commands can run (and where they can
            write/network)
        - id: c2
          text: States the approval policy governs when Codex pauses to request escalation
        - id: c3
          text: Conveys they are orthogonal and combined by presets
      referenceAnswer: >
        The sandbox sets the technical boundary for what can execute and what files/network are
        reachable without

        asking. The approval policy is a separate axis that decides when Codex pauses to request
        permission to

        escalate (e.g., write outside the workspace or use the network). Because they are
        orthogonal, named

        presets like Auto pick a specific (sandbox, approval) pair.
      passThreshold: 0.6
  - id: ccb-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 262
    type: free_form
    prompt: >
      Describe how Codex merges AGENTS.md files when global, repo-root, and current-directory files
      all exist.
    guidance: >
      Should describe global first, then repo root downward to cwd, with nearest file overriding,
      and a size cap.
    rubric:
      criteria:
        - id: c1
          text: Mentions global ~/.codex/AGENTS.md is read first
        - id: c2
          text: Describes concatenation from repo/Git root down to cwd
        - id: c3
          text: States files closer to cwd override earlier guidance
      referenceAnswer: >
        Codex reads the global ~/.codex/AGENTS.md first, then concatenates files from the repo/Git
        root down to the

        current directory, with files nearer the cwd overriding earlier guidance. The combined
        content is capped by

        project_doc_max_bytes (default 32 KiB).
      passThreshold: 0.6
  - id: ccb-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 246
    type: free_form
    prompt: |
      Explain why calling Codex CLI "a Node.js tool" is inaccurate even though it installs via npm.
    guidance: |
      Should note Codex is a Rust binary (codex-rs); npm just wraps/delivers the binary.
    rubric:
      criteria:
        - id: c1
          text: States Codex ships as a compiled Rust binary (codex-rs)
        - id: c2
          text: Explains npm is just one delivery channel wrapping the binary
      referenceAnswer: >
        Codex is a Rust binary (the codex-rs implementation). npm is only one of several install
        channels that wraps

        and delivers that prebuilt binary, so the runtime is Rust, not Node.js/TypeScript.
      passThreshold: 0.6
  - id: ccb-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 238
    type: free_form
    prompt: >
      Compare the read-only and workspace-write sandbox modes in terms of what Codex may do without
      approval.
    guidance: >
      Should contrast: read-only can read but needs approval to edit/run/network; workspace-write
      can edit and run

      in the workspace, with network off by default.
    rubric:
      criteria:
        - id: c1
          text: >-
            Describes read-only as read/answer only, requiring approval to edit, run commands, or
            use network
        - id: c2
          text: Describes workspace-write as able to edit files and run commands within the workspace
        - id: c3
          text: Notes network is disabled by default in workspace-write
      referenceAnswer: >
        In read-only, Codex can read files and answer questions but needs approval to edit, run
        commands, or access

        the network. In workspace-write, it can read/edit files and run commands within the
        workspace without

        per-action approval, but network access is disabled by default (enabled only via config).
      passThreshold: 0.6
  - id: ccb-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 270
    type: free_form
    prompt: |
      Explain what makes `--yolo` more dangerous than simply turning off approval prompts.
    guidance: >
      Should explain --yolo (--dangerously-bypass-approvals-and-sandbox) disables BOTH approvals and
      the sandbox.
    rubric:
      criteria:
        - id: c1
          text: States --yolo disables approvals AND the sandbox (not just prompts)
        - id: c2
          text: Conveys this grants full unsandboxed system access
      referenceAnswer: >
        `--yolo` is the alias for `--dangerously-bypass-approvals-and-sandbox`. It removes both the
        approval prompts

        and the sandbox boundary, so Codex runs with full unsandboxed system access. Merely
        disabling prompts

        (e.g., approval never with a sandbox) still keeps the sandbox constraints in place.
      passThreshold: 0.6
  - id: ccb-200-ff-f
    tier: 200
    bloom: understand
    difficulty: 256
    type: free_form
    prompt: |
      Explain the two directions in which Codex participates in the Model Context Protocol.
    guidance: >
      Should cover Codex as an MCP client (consuming external servers) and Codex running as an MCP
      server.
    rubric:
      criteria:
        - id: c1
          text: Explains Codex consumes external MCP servers (as a client)
        - id: c2
          text: Explains Codex can run as an MCP server exposing itself to other clients
      referenceAnswer: >
        As an MCP client, Codex connects to external MCP servers to gain extra tools. Conversely,
        via its MCP server

        mode (codex mcp-server), Codex exposes itself as a tool that other MCP clients can call. So
        it works in both directions.
      passThreshold: 0.6
  - id: ccb-200-ff-g
    tier: 200
    bloom: understand
    difficulty: 222
    type: free_form
    prompt: |
      Why does the Read Only named preset still allow Codex to be useful for code questions?
    guidance: >
      Should explain that reading files is permitted, so Codex can analyze and answer even though it
      can't edit/run.
    rubric:
      criteria:
        - id: c1
          text: States Read Only maps to --sandbox read-only
        - id: c2
          text: Explains reading is allowed, so analysis/Q&A works while edits/commands need approval
      referenceAnswer: >
        The Read Only preset uses --sandbox read-only, which lets Codex read your files and reason
        about them. It can

        therefore answer questions and analyze code; it just needs approval before editing, running
        commands, or

        using the network.
      passThreshold: 0.6
  - id: ccb-300-mc-a
    tier: 300
    bloom: apply
    difficulty: 325
    type: multiple_choice
    prompt: >
