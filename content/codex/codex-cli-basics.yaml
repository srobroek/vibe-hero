    guidance: >
      Should combine codex exec with --cd/-C /srv/repo (non-interactive run targeting that directory
      to stdout).
    rubric:
      criteria:
        - id: c1
          text: Uses codex exec for non-interactive/stdout output
        - id: c2
          text: Uses --cd / -C to target /srv/repo
      referenceAnswer: >
        Use a non-interactive run pointed at the repo, e.g. `codex exec -C /srv/repo "..."` (or --cd
        /srv/repo). exec

        gives scriptable stdout output and -C/--cd sets the working directory regardless of where
        the cron shell starts.
      passThreshold: 0.6
  - id: ccb-300-ff-f
    tier: 300
    bloom: apply
    difficulty: 378
    type: free_form
    prompt: >
      You want to add a remote MCP server reachable over Streamable HTTP with a bearer token.
      Describe how you would

