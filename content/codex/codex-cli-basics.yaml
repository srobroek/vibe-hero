  - id: ccb-300-ff-a
    tier: 300
    bloom: apply
    difficulty: 330
    type: free_form
    prompt: >
      Write the exact CLI flags (or named preset) to launch Codex so it can freely edit and run
      commands in the

      current project but must ask before doing anything outside it, and explain your choice in one
      sentence.
    guidance: >
      Should give --sandbox workspace-write --ask-for-approval on-request (the Auto preset) and
      justify briefly.
    rubric:
      criteria:
        - id: c1
          text: >-
            Provides --sandbox workspace-write with --ask-for-approval on-request (or names the Auto
            preset)
        - id: c2
          text: >-
            Explains workspace-write allows in-project edits/commands while on-request escalates for
            outside actions
      referenceAnswer: >
        Use `--sandbox workspace-write --ask-for-approval on-request` (the Auto preset).
        workspace-write lets Codex

        edit files and run commands inside the project without prompting, while on-request makes it
        pause and ask

        before escalating (e.g., writing outside the workspace or using the network).
      passThreshold: 0.6
  - id: ccb-300-ff-b
    tier: 300
    bloom: apply
    difficulty: 350
    type: free_form
    prompt: >
      A teammate's workspace-write Codex run fails because `pip install` cannot reach the network.
      Describe the

      config.toml change that fixes it and where it lives.
    guidance: |
      Should set sandbox_workspace_write.network_access = true in config.toml (or via -c override).
    rubric:
      criteria:
        - id: c1
          text: Identifies that network is disabled by default in workspace-write
        - id: c2
          text: Sets sandbox_workspace_write.network_access = true (in config.toml or via -c)
      referenceAnswer: >
        In workspace-write, outbound network is off by default. Set
        sandbox_workspace_write.network_access = true in

        ~/.codex/config.toml (or pass -c sandbox_workspace_write.network_access=true for a single
        run) to allow the

        install to reach the registry.
      passThreshold: 0.6
  - id: ccb-300-ff-c
    tier: 300
    bloom: apply
    difficulty: 360
    type: free_form
    prompt: >
      Show the command to register a local STDIO MCP server named "github" that launches the
      executable

      `gh-mcp-server`, and explain the role of the `--` in the command.
    guidance: >
      Should give codex mcp add github -- gh-mcp-server and explain -- separates Codex options from
      the server command.
    rubric:
      criteria:
        - id: c1
          text: Provides codex mcp add github -- gh-mcp-server (or equivalent correct form)
        - id: c2
          text: Explains -- separates Codex's own flags from the server command/args
      referenceAnswer: >
        Run `codex mcp add github -- gh-mcp-server`. The `--` marks the end of Codex's own options
        so everything

        after it (the command and any args) is treated as the MCP server's launch command for the
        STDIO transport.
      passThreshold: 0.6
  - id: ccb-300-ff-d
    tier: 300
    bloom: apply
    difficulty: 338
    type: free_form
    prompt: >
      You maintain two Codex setups: a "review" bundle (read-only, careful) and a "build" bundle
