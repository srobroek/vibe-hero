    guidance: >
      Should describe an [mcp_servers.<id>] table using url (HTTP transport) with bearer-token/OAuth
      auth, vs STDIO command/args.
    rubric:
      criteria:
        - id: c1
          text: >-
            Uses an [mcp_servers.<id>] table in config.toml with a url for the Streamable HTTP
            transport
        - id: c2
          text: Mentions configuring bearer-token/OAuth auth for the HTTP server
      referenceAnswer: >
        Add an [mcp_servers.<id>] table in config.toml that sets a url (Streamable HTTP transport)
        instead of a

        command/args (which would be STDIO), and configure its bearer-token/OAuth authentication.
        Per-server enabled

        and enabled_tools/disabled_tools controls can further scope it.
      passThreshold: 0.6
  - id: ccb-300-ff-g
    tier: 300
    bloom: apply
    difficulty: 322
    type: free_form
    prompt: >
      Inside an interactive Codex session you want to change the model and check active MCP servers
      without leaving

      the TUI. Which slash commands do you use?
    guidance: |
      Should name /model (change model) and /mcp (list MCP servers).
    rubric:
      criteria:
        - id: c1
          text: Names /model for changing the model
        - id: c2
          text: Names /mcp for listing MCP servers
      referenceAnswer: >
        Use /model to switch the model and /mcp to list the active MCP servers, both from within the
        TUI.
      passThreshold: 0.6
  - id: ccb-400-mc-a
    tier: 400
    bloom: analyze
    difficulty: 425
    type: multiple_choice
    prompt: >
      A user sets approval_policy = "never" but keeps sandbox_mode = "read-only" and is surprised
      Codex still refuses

      to edit files. What is the correct diagnosis?
    choices:
      - id: a
        text: >-
          read-only blocks edits at the sandbox layer; "never" only removes prompts, it does not
          grant write capability
      - id: b
        text: approval_policy "never" is invalid and is ignored
      - id: c
        text: The two settings conflict, so Codex defaults to danger-full-access
      - id: d
        text: read-only silently upgrades to workspace-write when approvals are never
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Sandbox and approval are independent. Disabling prompts does not expand the sandbox; read-only
      still forbids edits.
  - id: ccb-400-mc-b
    tier: 400
    bloom: analyze
    difficulty: 435
    type: multiple_choice
    prompt: >
      A repo-root AGENTS.md says "use 4-space indent" but a nested package's AGENTS.md says "use
      2-space indent."

      Codex working inside the nested package uses 2-space. Why?
    choices:
      - id: a
        text: AGENTS.md files are merged alphabetically and "2" sorts first
      - id: b
        text: >-
          Files closer to the cwd override earlier ones; the nested AGENTS.md wins over the
          repo-root file
      - id: c
        text: Only the repo-root file is read; the 2-space must come from elsewhere
      - id: d
        text: Codex randomly picks one AGENTS.md per run
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Precedence runs global -> repo root -> cwd, with the nearest file overriding earlier guidance.
  - id: ccb-400-mc-c
    tier: 400
    bloom: analyze
    difficulty: 445
    type: multiple_choice
    prompt: >
      On Linux, a workspace-write Codex run is unexpectedly blocked from a syscall even though the
      path is in the

      workspace. Which underlying mechanism most likely explains the block?
    choices:
      - id: a
        text: Linux has no sandbox, so the block must be a filesystem permission bug
      - id: b
        text: Codex on Linux uses Apple Seatbelt, which is misconfigured
      - id: c
        text: >-
          The Linux sandbox uses Landlock/seccomp (sometimes bwrap), which can restrict
          syscalls/paths beyond file mode
      - id: d
        text: workspace-write disables all syscalls by design
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      Linux sandboxing uses Landlock/seccomp (and bwrap in some setups); macOS uses Apple Seatbelt
      via sandbox-exec.
  - id: ccb-400-mc-d
    tier: 400
    bloom: analyze
    difficulty: 455
    type: multiple_choice
    prompt: >
      A migration guide tells a team to "just keep using --full-auto." A reviewer flags this. What
      is the most

      accurate reason to update the guidance?
    choices:
      - id: a
        text: '--full-auto only works in non-interactive exec mode'
      - id: b
        text: '--full-auto now means full unsandboxed access, which is unsafe'
      - id: c
        text: '--full-auto was renamed to --yolo with identical semantics'
      - id: d
        text: >-
          --full-auto is deprecated; the modern equivalent is --sandbox workspace-write with an
          approval policy (or the Auto preset)
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      `--full-auto` is deprecated in favor of `--sandbox workspace-write` (plus an approval policy)
      / the Auto preset.
  - id: ccb-400-mc-e
    tier: 400
    bloom: analyze
    difficulty: 465
    type: multiple_choice
    prompt: >
      A team ships a config.json file expecting Codex to read it, but their settings are ignored.
      What is the root cause?
    choices:
      - id: a
        text: config.json must be placed in the repo root, not ~/.codex
      - id: b
        text: >-
          Codex config is TOML (config.toml), not JSON; a config.json is not read as Codex
          configuration
      - id: c
        text: JSON is valid but only for MCP servers, not general config
      - id: d
        text: Codex caches the first config and ignores later files
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      Codex configuration is TOML at ~/.codex/config.toml. A JSON/YAML file is not the Codex config
      format.
  - id: ccb-400-mc-f
    tier: 400
    bloom: analyze
    difficulty: 475
    type: multiple_choice
    prompt: >
      A project-scoped .codex/config.toml exists but its settings are not applied. The user runs in
      a directory Codex

      has not been told to trust. What is the most likely explanation?
    choices:
      - id: a
        text: The file must be named config.json to be project-scoped
      - id: b
        text: Project-scoped config files are never supported
      - id: c
        text: Project-scoped .codex/config.toml is honored only when the project is trusted
      - id: d
        text: Project config only applies in danger-full-access mode
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      A project-scoped .codex/config.toml is honored when the project is trusted; otherwise it is
      not applied.
  - id: ccb-400-mc-g
    tier: 400
    bloom: analyze
    difficulty: 428
    type: multiple_choice
    prompt: >
      An older guide sets approval_policy = "on-failure". On a current Codex CLI, how should you
      expect this value to

      behave, and what is the correct guidance?
    choices:
      - id: a
        text: It is rejected as an invalid value and aborts the run
      - id: b
        text: >-
          It is deprecated and now treated as an alias for on-request; update the config to
          on-request explicitly
      - id: c
        text: It silently disables the sandbox after the first command failure
      - id: d
        text: It is identical to never and suppresses all prompts
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      `on-failure` is deprecated. Current Codex accepts it only as a backward-compat alias for
