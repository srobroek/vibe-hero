        text: codex mcp "summarize the failing tests"
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      `codex exec` is the non-interactive path designed for scripting/CI with stdout output.
  - id: ccb-300-mc-b
    tier: 300
    bloom: apply
    difficulty: 335
