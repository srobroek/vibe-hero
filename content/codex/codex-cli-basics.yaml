    guidance: >
      Should explain nearest-to-cwd file overrides earlier ones (global -> root -> cwd), and that
      editing the

      subdirectory file or running from a different directory changes which wins.
    rubric:
      criteria:
        - id: c1
          text: States precedence runs global -> repo root -> cwd with nearest file overriding
        - id: c2
          text: Explains the subdirectory AGENTS.md is nearest to cwd so it wins
        - id: c3
          text: Notes changing cwd or editing the nearer file would change the effective rule
      referenceAnswer: >
        Codex concatenates AGENTS.md from global to repo root down to the cwd, and files closer to
        the cwd override

        earlier guidance. Running inside the subdirectory makes its AGENTS.md the nearest, so its
        "spaces" rule wins

        over the root "tabs" rule. Editing the subdirectory file, or running from a directory above
        it, would change

        which guidance is effective.
      passThreshold: 0.6
  - id: ccb-400-ff-c
    tier: 400
    bloom: analyze
