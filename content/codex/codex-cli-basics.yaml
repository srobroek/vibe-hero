    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      The `/mcp` slash command lists active MCP servers in the TUI.
  - id: ccb-300-mc-h
    tier: 300
    bloom: apply
    difficulty: 348
    type: multiple_choice
    prompt: >
      You want to run Codex against a different directory than the current shell location for one
