      determine whether the platform sandbox mechanism is the cause and how it differs from Linux.
    guidance: >
      Should mention macOS uses Apple Seatbelt via sandbox-exec, Linux uses Landlock/seccomp (and
      bwrap), and that the

      sandbox can deny operations beyond simple file permissions.
    rubric:
      criteria:
        - id: c1
          text: Identifies macOS uses Apple Seatbelt via sandbox-exec
        - id: c2
          text: Contrasts with Linux Landlock/seccomp (possibly bwrap)
        - id: c3
          text: Explains the sandbox can deny operations independent of normal file permissions
      referenceAnswer: >
        On macOS the workspace-write sandbox is enforced by Apple Seatbelt via sandbox-exec, which
        can deny operations

        (paths, network, certain syscalls) beyond normal Unix permissions. To confirm it is the
        sandbox, check whether

        the same operation succeeds in danger-full-access or outside the sandbox. On Linux the
        equivalent layer is

        Landlock/seccomp (sometimes bwrap), so the specific denials and diagnostics differ by
        platform.
      passThreshold: 0.6
  - id: ccb-400-ff-e
    tier: 400
    bloom: analyze
    difficulty: 438
    type: free_form
    prompt: >
