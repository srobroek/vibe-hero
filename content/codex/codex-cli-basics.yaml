    guidance: |
      Should describe defining profiles in config.toml and selecting with --profile / -p.
    rubric:
      criteria:
        - id: c1
          text: Describes defining named profiles in config.toml
        - id: c2
          text: Describes selecting one at launch with --profile / -p
      referenceAnswer: >
        Define two named profiles in config.toml (e.g., [profiles.review] and [profiles.build]) each
        setting the

        relevant sandbox_mode/approval_policy, then launch with `--profile review` or `--profile
        build` (alias -p) to

        pick the bundle for that run.
      passThreshold: 0.6
  - id: ccb-300-ff-e
    tier: 300
    bloom: apply
    difficulty: 370
    type: free_form
    prompt: >
      A nightly job should run Codex over a checked-out repo located at /srv/repo regardless of the
      shell's current

