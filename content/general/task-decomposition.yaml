# Topic: task-decomposition (general)
#
# Tool-agnostic agentic-coding concept: how to break complex work into bounded,
# verifiable units before delegating or implementing. Tiers 100–500.
#
# triggerSignals: no longer purely pull-based — task tool calls and task-file
# edits provide push-based signals in addition to the pull path.

id: task-decomposition
class:
  kind: general
title: Task Decomposition & Planning
summary: >-
  How to break complex agentic work into bounded, sequenced, verifiable units
  before delegating or implementing — and how to recognise when decomposition
  has gone wrong.

triggerSignals:
  # Task creation/update tools signal the user is actively decomposing work.
  - tool: claude-code
    match:
      toolName: TaskCreate
    weight: 0.6
  - tool: claude-code
    match:
      toolName: TaskUpdate
    weight: 0.6
  # TaskCreated event fires at the start of a new task — surface early.
  - tool: claude-code
    match:
      event: TaskCreated
    weight: 0.6
    phase: start
  # Editing a TODO or tasks file signals task decomposition planning.
  - tool: claude-code
    match:
      pathPattern: '(TODO|tasks?)\.md$'
    weight: 0.5

items:
  # ── Tier 100 — Remember ──────────────────────────────────────────────────
  - id: task-decomposition-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 150
    type: multiple_choice
    prompt: >-
      What is the primary goal of task decomposition in agentic coding?
    choices:
      - id: a
        text: To reduce the number of files changed in a single commit
      - id: b
        text: >-
          To break work into units small enough that each can be independently
          implemented, verified, and rolled back
      - id: c
        text: To assign each task to a different AI model
      - id: d
        text: To produce a Gantt chart for project management
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Decomposition serves verifiability and recoverability. When each unit of
      work is bounded, you can confirm it is done (or not done) without reading
      all surrounding code, and you can undo it without unravelling unrelated
      changes. Reducing file count or cross-model assignment are incidental; the
      core purpose is making each piece independently checkable.

  - id: task-decomposition-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 160
    type: multiple_choice
    prompt: >-
      Which of the following is a key property of a well-decomposed task?
    choices:
      - id: a
        text: >-
          It covers the largest coherent user story that fits comfortably in a
          two-week sprint
      - id: b
        text: It has a clear, observable completion criterion
      - id: c
        text: >-
          Its boundaries are drawn so it maps one-to-one with a single pull
          request
      - id: d
        text: >-
          Its scope is determined by the number of distinct files it needs to
          change
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A well-decomposed task has a completion criterion you can actually observe:
      a test passes, a file is present, a command returns a specific output.
      Without that criterion you cannot tell whether the task is done, making it
      impossible to verify, sequence, or hand off reliably. Sprint fit (a) is an
      Agile planning heuristic — a two-week story can still lack any checkable
      outcome. PR scope (c) is a byproduct of good decomposition: the right PR
      size follows from well-bounded tasks, but mapping to a PR does not make a
      task verifiable. File-change count (d) is an informal proxy that some
      developers rely on; a task that touches one file can be just as unverifiable
      as one that touches twenty if no observable criterion is stated.
  - id: task-decomposition-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 110
    type: multiple_choice
    prompt: >-
      According to the 100% Rule for Work Breakdown Structures (WBS), what
      must a compliant WBS capture?
    choices:
      - id: a
        text: >-
          All activities required to complete the project, organized by
          execution order
      - id: b
        text: >-
          Every deliverable and sub-deliverable in scope, with nothing outside
          the WBS and no overlap between branches
      - id: c
        text: >-
          Only the deliverables visible to end users, excluding internal
          technical infrastructure
      - id: d
        text: >-
          At minimum one hundred discrete tasks, one per working day of the
          project
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The 100% Rule means the WBS must account for the entire project scope:
      every deliverable and sub-deliverable, no more and no less. The parent
      node always equals the sum of its children in effort and deliverable
      coverage, leaving no hidden work and no overlap. Organizing by execution
      order is the job of a network diagram or schedule, not the WBS.
  - id: task-decomposition-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 117
    type: multiple_choice
    prompt: >-
      Work Breakdown Structure (WBS) nodes should be expressed as what type
      of element?
    choices:
      - id: a
        text: >-
          Activities (verbs), such as "design the authentication module"
      - id: b
        text: >-
          Resources, such as "backend developer team" or "CI server"
      - id: c
        text: >-
          Deliverables or outcomes (nouns), such as "authentication module
          design document"
      - id: d
        text: >-
          Timeboxes, such as "Sprint 1" or "Week 3 tasks"
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      WBS nodes represent deliverables and outcomes (nouns), not activities
      (verbs). A node like "design the module" describes an action, conflating
      the WBS with an activity list or Gantt chart. The correct form is "module
      design document" — the artifact that will exist when the work is done.
      Resource and timebox organization are concerns of the resource plan and
      schedule, respectively.
  - id: task-decomposition-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 122
    type: multiple_choice
    prompt: >-
      The INVEST acronym defines quality criteria for user stories. Which of
      the following correctly expands it?
    choices:
      - id: a
        text: >-
          Iterative, Nested, Verified, Executable, Scalable, Traceable
      - id: b
        text: >-
          Independent, Negotiable, Valuable, Estimable, Small, Testable
      - id: c
        text: >-
          Independent, Normalized, Versioned, Executable, Scoped, Time-boxed
      - id: d
        text: >-
          Incremental, Negotiable, Validated, Estimable, Specified, Testable
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      INVEST stands for Independent, Negotiable, Valuable, Estimable, Small,
      Testable — a checklist introduced by Bill Wake and popularized by Mike
      Cohn to evaluate the quality of a user story before committing it to a
      sprint. The distractors mix real agile vocabulary (Iterative, Validated,
      Incremental) into plausible-sounding but incorrect expansions.
  - id: task-decomposition-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 128
    type: multiple_choice
    prompt: >-
      In the INVEST model, a user story is "Independent" when which condition
      holds?
    choices:
      - id: a
        text: >-
          It does not share any database tables or file paths with other
          stories
      - id: b
        text: >-
          It can be built by any developer on the team without specialized
          knowledge
      - id: c
        text: >-
          It was written by the product owner without input from the
          development team
      - id: d
        text: >-
          It can be delivered in any order relative to other stories, with no
          hard implementation dependency on them
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Independence in INVEST is about scheduling freedom: a story can be
      pulled into a sprint in any order without requiring another story to
      have been completed first. It is not about technical isolation — stories
      can share schema or infrastructure and still be independently schedulable.
      Dependency chains force sequential delivery and make re-prioritization
      expensive; that is the cost of non-independence.
  - id: task-decomposition-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 133
    type: multiple_choice
    prompt: >-
      The "8/80 rule" is a common guideline for sizing work packages in a
      Work Breakdown Structure. What range does it specify?
    choices:
      - id: a
        text: >-
          A work package should take between 8 and 80 person-hours to complete
      - id: b
        text: >-
          A WBS should contain between 8 and 80 terminal nodes in total
      - id: c
        text: >-
          Each sprint should hold between 8 and 80 story points of planned
          work
      - id: d
        text: >-
          Work packages should be reviewed every 8 days and never exceed 80
          days in duration
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The 8/80 rule sets bounds on the effort of a single work package: no
      less than 8 hours (to avoid micro-management overhead) and no more than
      80 hours (to keep risk and tracking visibility manageable). Below 8h
      produces scheduling noise; above 80h loses meaningful status visibility.
      The rule applies to individual leaf nodes, not to the total WBS node
      count or to sprint capacity.
  - id: task-decomposition-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 138
    type: multiple_choice
    prompt: >-
      What distinguishes a "vertical slice" from a "horizontal slice" when
      decomposing a feature into stories?
    choices:
      - id: a
        text: >-
          A vertical slice is delivered in a single sprint; a horizontal
          slice spans multiple sprints
      - id: b
        text: >-
          A vertical slice is owned by a full-stack team; a horizontal slice
          is owned by a layer-specialist team
      - id: c
        text: >-
          A vertical slice delivers end-to-end functionality through all
          layers for a narrow use case; a horizontal slice delivers one
          complete layer across all use cases
      - id: d
        text: >-
          A vertical slice always contains more story points than a horizontal
          slice because it touches more code
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      A vertical slice cuts through every layer — UI, API, business logic,
      persistence — to deliver one narrow but complete, demoable behavior.
      A horizontal slice delivers one complete layer (e.g. all API endpoints)
      without producing end-to-end user value. Vertical and horizontal slicing
      are story decomposition strategies, not team topology choices; a single
      team can slice either way, and slicing direction is independent of story
      point size.
  - id: task-decomposition-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 143
    type: multiple_choice
    prompt: >-
      In Cockburn's "walking skeleton" pattern, what is the defining
      characteristic of the first deliverable in a new system?
    choices:
      - id: a
        text: >-
          It implements the highest-priority user-facing feature end-to-end
          so stakeholders can review real functionality immediately
      - id: b
        text: >-
          It contains stub or boilerplate files for every planned module,
          giving developers a complete structural scaffold to fill in over time
      - id: c
        text: >-
          It is a UI prototype that demonstrates the product concept to
          stakeholders before any backend work begins
      - id: d
        text: >-
          It exercises all architectural layers end-to-end with minimal stub
          logic, proving the deployment pipeline without real business
          functionality
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      A walking skeleton is intentionally feature-free: it wires every layer
      of the architecture together with just enough stub logic to prove the
      plumbing works, the CI pipeline deploys, and the inter-layer contracts
      are correct. Adding real business logic defeats its purpose. The skeleton
      unblocks parallel development across layers because structural seams are
      established before feature work begins.
  - id: task-decomposition-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 148
    type: multiple_choice
    prompt: >-
      How does a team's "Definition of Done" (DoD) differ from a story's
      "acceptance criteria"?
    choices:
      - id: a
        text: >-
          Acceptance criteria are written by the team; the DoD is written by
          the product owner and revisited each quarter
      - id: b
        text: >-
          The DoD is a universal quality checklist applied to every story;
          acceptance criteria are story-specific functional conditions
      - id: c
        text: >-
          The DoD describes what the user expects; acceptance criteria
          describe what the team commits to delivering
      - id: d
        text: >-
          The DoD applies to bugs and tech-debt tasks; acceptance criteria
          apply only to feature stories
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The Definition of Done is a shared, team-wide checklist of quality gates
      — code reviewed, tests passing, CI green, documentation updated, deployed
      to staging — that every story must clear before being called complete.
      Acceptance criteria are specific to a single story: they describe the
      functional conditions that confirm that particular behavior works.
      The DoD is the universal baseline; acceptance criteria are the story-level
      specification layered on top.
  - id: task-decomposition-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 155
    type: multiple_choice
    prompt: >-
      In Given-When-Then (GWT) format for acceptance criteria, what does the
      "Given" clause specify?
    choices:
      - id: a
        text: >-
          The event or user action that triggers the behavior under test
      - id: b
        text: >-
          The expected outcome the system must produce after the action
      - id: c
        text: >-
          The precondition or initial system state that exists before the
          action
      - id: d
        text: >-
          The developer or team member responsible for implementing the
          behavior
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Given-When-Then maps to precondition, trigger, and outcome: Given
      establishes the initial system state, When describes the event or action,
      and Then states the expected result. Confusing Given with When is the most
      common mistake — both describe conditions before the outcome, but Given is
      static context while When is a dynamic trigger.
  - id: task-decomposition-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 162
    type: multiple_choice
    prompt: >-
      Which of the following stories best satisfies the "Valuable" criterion
      in INVEST?
    choices:
      - id: a
        text: Set up the Redis cache layer for the session store
      - id: b
        text: >-
          A customer can reset their password by entering their registered
          email address
      - id: c
        text: Create the database schema for the orders table
      - id: d
        text: Implement the event sourcing pattern for the order domain
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The Valuable criterion requires each story to deliver standalone value to
      a user or stakeholder, not merely an internal technical milestone that
      enables a later story. A password-reset flow directly serves users.
      Setting up Redis, creating schema, and adopting a design pattern are
      technical prerequisites that — as written — produce no observable user
      value on their own. Technical work can pass Valuable when framed around
      a user or business outcome (e.g. "reduces login failures"), but none of
      the incorrect options contain such a framing.
  - id: task-decomposition-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 168
    type: multiple_choice
    prompt: >-
      A story is considered "Testable" under INVEST when which condition is
      met?
    choices:
      - id: a
        text: >-
          The story has been assigned to a QA engineer who will write tests
          after the developer finishes implementation
      - id: b
        text: >-
          The CI pipeline can run all relevant tests automatically without any
          human intervention
      - id: c
        text: >-
          The story includes at least one passing unit test committed by the
          developer
      - id: d
        text: >-
          Concrete, verifiable conditions exist that confirm the story is
          complete, whether the check is automated or manual
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Testability in INVEST means there is a concrete, observable criterion
      that confirms done-ness — not that tests have been automated or that a
      specific person wrote them. A manual walkthrough with clear pass/fail
      criteria qualifies. Vague stories ("improve performance") fail Testable
      because no verifiable criterion can be written; stories with clear
      conditions pass even if those conditions are checked by hand rather than
      by a test runner.
  - id: task-decomposition-100-mc-n
    tier: 100
    bloom: remember
    difficulty: 175
    type: multiple_choice
    prompt: >-
      In agile planning, when is a "spike" the appropriate response rather
      than simply splitting a large story into smaller stories?
    choices:
      - id: a
        text: >-
          When a story is too large to complete within a single sprint and
          needs to be broken into sequential chunks
      - id: b
        text: >-
          When a story has too many acceptance criteria to implement in the
          time available
      - id: c
        text: >-
          When the story cannot be reliably estimated because the team lacks
          the knowledge needed to size the work
      - id: d
        text: >-
          When the product owner and development team disagree on the story's
          scope and priority
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      A spike is a time-boxed research task whose output is knowledge, not
      production code. It addresses the INVEST Estimable failure mode: when
      a story cannot be sized with reasonable confidence because the team does
      not yet understand the problem. Simply splitting a story does not fix
      unknown complexity — it produces smaller unknowns. A spike resolves the
      knowledge gap first, allowing accurate decomposition and estimation to
      follow.
  - id: task-decomposition-100-mc-o
    tier: 100
    bloom: remember
    difficulty: 183
    type: multiple_choice
    prompt: >-
      Why does trunk-based development (TBD) impose a practical constraint on
      how finely work must be decomposed?
    choices:
      - id: a
        text: >-
          TBD requires two-engineer review for every commit, doubling the
          time each task takes and forcing smaller batch sizes
      - id: b
        text: >-
          TBD requires commits to main at least daily, which means tasks must
          be decomposable into sub-day increments that each produce a passing
          build
      - id: c
        text: >-
          TBD bans feature flags, so each task must be a complete, shippable
          feature before it is committed
      - id: d
        text: >-
          TBD requires tasks to be estimated in hours rather than story points,
          making granular decomposition mandatory
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Trunk-based development makes decomposition a technical requirement, not
      just a planning preference: developers integrate to main at least daily,
      so any task that cannot reach a passing state within a day blocks the
      trunk. This forces tasks down to sub-day granularity. TBD is fully
      compatible with feature flags, which allow large features to be developed
      in small integrated increments without exposing incomplete behavior to
      users.
  - id: task-decomposition-100-sa-a
    tier: 100
    bloom: remember
    difficulty: 113
    type: short_answer
    prompt: >-
      In Work Breakdown Structure terminology, what is the name for the leaf
      node — the smallest terminal element at which work is assigned,
      estimated, and tracked?
    answerKey:
      kind: keyword
      anyOf:
        - work package
        - work packages
      normalize: lower
    guidance: >-
      The leaf nodes of a WBS are called work packages. They are the units at
      which responsibility is assigned, effort is estimated, and status is
      reported. Work packages are the boundary between the WBS (deliverables)
      and the activity list or schedule (tasks and sequences); they are not
      decomposed further within the WBS itself.
  - id: task-decomposition-100-sa-b
    tier: 100
    bloom: remember
    difficulty: 130
    type: short_answer
    prompt: >-
      In Given-When-Then (GWT) format for acceptance criteria, what does the
      "Then" clause specify?
    answerKey:
      kind: keyword
      anyOf:
        - expected outcome
        - expected result
        - outcome
        - assertion
        - expected behavior
        - expected behaviour
      normalize: lower
    guidance: >-
      "Then" specifies the expected outcome: the observable result the system
      must produce after the "When" event fires. It is the assertion that
      confirms whether the behavior is correct. Confusing "Then" with "Given"
      is a common mistake; "Given" is a static precondition while "Then" is the
      post-action verification. Clear "Then" clauses are what make GWT
      scenarios executable as automated tests.
  - id: task-decomposition-100-sa-c
    tier: 100
    bloom: remember
    difficulty: 158
    type: short_answer
    prompt: >-
      What is the name for a time-boxed investigation task in agile planning
      whose output is a written finding or proof-of-concept rather than
      production code, used to resolve technical uncertainty before a story
      can be estimated?
    answerKey:
      kind: keyword
      anyOf:
        - spike
        - spikes
        - time-boxed spike
        - research spike
      normalize: lower
    guidance: >-
      A spike is a fixed-duration research task. Unlike a story, its scope is
      not fixed — the team stops at the timebox regardless of how much was
      learned. Its output is knowledge: a recommendation, a proof-of-concept,
      or a written finding. Spikes address the INVEST Estimable failure mode —
      when a story cannot be sized because the team lacks necessary
      understanding of the problem space.
  - id: task-decomposition-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 145
    type: free_form
    prompt: >-
      Explain the difference between vertical slicing and horizontal slicing
      when breaking a software feature into stories or tasks. Describe one
      concrete advantage of the vertical approach.
    rubric:
      criteria:
        - id: defines-vertical-slice
          text: >-
            Explains that a vertical slice delivers functionality end-to-end
            through all layers (UI, API, business logic, data) for a narrow
            use case.
        - id: defines-horizontal-slice
          text: >-
            Explains that a horizontal slice delivers one complete layer (e.g.
            all API endpoints, or the entire data model) without producing
            end-to-end user value.
        - id: names-advantage
          text: >-
            Names at least one concrete advantage of vertical slicing: early
            integration, each slice is independently demoable, or layer
            mismatches surface immediately rather than at the end.
      referenceAnswer: >-
        Vertical slicing means decomposing a feature so that each story cuts
        through every layer of the system — user interface, API, business logic,
        and persistence — for a narrow use case. The result is a thin but
        complete, end-to-end behavior that can be demonstrated to stakeholders
        after each story. Horizontal slicing delivers one complete layer at a
        time: "build all the API endpoints" or "set up the database schema."
        No horizontal slice is demoable in isolation because none produces
        observable user behavior on its own.

        One concrete advantage of vertical slicing is early integration: because
        every layer is touched in the first story, any mismatch between layers
        (e.g. the API contract does not match what the UI expects) is discovered
        immediately. With horizontal slicing, integration only happens after all
        layers are complete, creating a late-discovery risk cliff where
        everything looks on-track until the layers are assembled for the first
        time.
      passThreshold: 0.6
    guidance: >-
      Strong answers correctly identify the layering dimension (vertical = all
      layers for a narrow case; horizontal = one layer across all cases) and
      name an integration or demoability advantage. A common weak answer
      conflates slicing strategy with team structure (vertical teams vs.
      horizontal teams) or describes slicing only by story size rather than by
      layering.
  - id: task-decomposition-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 188
    type: free_form
    prompt: >-
      What is the Definition of Done (DoD) in a software development workflow,
      and how does it differ from a story's acceptance criteria? Give one
      concrete example of each.
    rubric:
      criteria:
        - id: defines-dod
          text: >-
            Defines the DoD as a team-wide, universal quality checklist that
            every story must satisfy before it can be called complete.
        - id: defines-acceptance-criteria
          text: >-
            Defines acceptance criteria as story-specific conditions that
            confirm the story's functional requirements are met.
        - id: explains-relationship
          text: >-
            Explains that the DoD is a universal baseline applied on top of
            every story's acceptance criteria — not a substitute for them.
        - id: gives-examples
          text: >-
            Provides at least one concrete example for each concept (e.g. DoD:
            "CI must be green"; acceptance criteria: "Given a valid token, When
            GET /profile, Then status 200 is returned").
      referenceAnswer: >-
        The Definition of Done is a team-wide, shared checklist of quality gates
        that every story must pass before it is considered complete — regardless
        of its content. A typical DoD might include: code reviewed by a peer,
        all automated tests passing, CI pipeline green, no new linting errors,
        documentation updated, and the change deployed to the staging
        environment. The DoD is not story-specific; it applies universally to
        every piece of work.

        Acceptance criteria are specific to a single story. They describe the
        functional conditions that confirm that particular behavior works as
        intended. For example, for a "user can reset password" story: "Given a
        registered user's email address, When they submit the reset form, Then
        a reset link is delivered to that address within 60 seconds." These
        criteria vary story by story.

        The relationship: a story is done only when it satisfies both its own
        acceptance criteria AND the universal DoD. The DoD is the floor of
        quality; acceptance criteria are the ceiling of correctness for that
        specific story.
      passThreshold: 0.6
    guidance: >-
      Strong answers distinguish the universal (DoD) from the story-specific
      (acceptance criteria) and give a concrete example of each. A common weak
      answer conflates the two, treating acceptance criteria as "the DoD for
      that story." The key insight is that the DoD is a quality baseline applied
      on top of every story, not a per-story checklist.

  # ── Tier 200 — Understand ───────────────────────────────────────────────
  - id: task-decomposition-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 250
    type: multiple_choice
    prompt: >-
      You have a feature request: "Add user authentication with OAuth, a profile
      page, and email notifications." Why is this a poor unit of work for a
      single agentic task?
    choices:
      - id: a
        text: >-
          It spans multiple concerns, making it impossible to verify any one
          piece without finishing all of them
      - id: b
        text: It involves OAuth, which agents cannot implement
      - id: c
        text: Profile pages require UI work that agents should never do
      - id: d
        text: Email notifications always introduce external API complexity
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The problem is scope and verifiability, not the technologies involved.
      When a task bundles three distinct concerns — authentication, profile
      rendering, and notification delivery — there is no single observable signal
      that marks any one concern as done. If authentication fails mid-way, the
      entire task is unverifiable. Decomposing into three sequential tasks gives
      you checkpoints: OAuth done (tests pass), profile done (page renders), and
      notifications done (email sent in test).

  - id: task-decomposition-200-sa-a
    tier: 200
    bloom: understand
    difficulty: 240
    type: short_answer
    prompt: >-
      Task B has a sequential dependency on Task A. In one or two sentences,
      explain what this means for scheduling and name one practical consequence
      for how you plan or sequence the work.
    answerKey:
      kind: keyword
      anyOf:
        - cannot start until
        - cannot run in parallel
        - must complete first
        - depends on output
        - sequential
        - blocking dependency
      normalize: lower
    guidance: >-
      A sequential dependency means Task B cannot start until Task A's output is
      available — the two cannot run in parallel. One practical consequence: Task
      B's prompt or specification cannot be fully written until Task A finishes,
      because the spec for B depends on knowing Task A's result. Recognising this
      dependency is what separates tasks that must be sequenced from tasks that
      can be safely parallelised.
  - id: task-decomposition-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 215
    type: multiple_choice
    prompt: >-
      A work package is estimated at 160 hours. According to the 8/80 heuristic
      for WBS granularity, what is the recommended response?
    choices:
      - id: a
        text: >-
          Keep it as-is; the threshold is 100 hours, and 160 hours is within an
          acceptable range
      - id: b
        text: >-
          Assign additional team members so the elapsed calendar time falls
          under 80 hours
      - id: c
        text: >-
          Decompose it further into sub-packages each requiring no more than 80
          hours, restoring status visibility and estimation accuracy
      - id: d
        text: >-
          Convert it to a spike because work exceeding 80 hours always signals
          unresolved technical uncertainty
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      The 8/80 heuristic places the sweet spot for a terminal work package
      between 8 hours (below which management overhead exceeds value) and 80
      hours (above which risk is masked and status becomes opaque). At 160 hours
      the package is over the ceiling and should be decomposed into smaller,
      trackable sub-packages. Adding people compresses duration but does not
      change the effort or restore decomposition visibility; spikes address
      knowledge gaps, not size.
  - id: task-decomposition-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 220
    type: multiple_choice
    prompt: >-
      A story "Add shipping address to checkout" cannot be started until the
      "User registration" story has been deployed. Which INVEST criterion does
      this violate, and why?
    choices:
      - id: a
        text: >-
          Testable — without registered users in the environment, no acceptance
          test for shipping address can be executed
      - id: b
        text: >-
          Small — stories that depend on each other are by definition covering
          too large a combined scope
      - id: c
        text: >-
          Independent — the story cannot be scheduled, estimated, or delivered
          in arbitrary order because it requires another story's output
      - id: d
        text: >-
          Estimable — the implementation dependency introduces uncertainty that
          prevents the team from sizing the story accurately
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Independence in INVEST means scheduling freedom: a story can be picked up
      in any order relative to other stories without being blocked. When Story B
      requires Story A to be deployed first, B loses that freedom and must
      always follow A, reducing team flexibility and making re-prioritisation
      expensive. Testability and estimability are separate concerns; testers can
      write criteria and teams can estimate even when execution order is
      constrained.
  - id: task-decomposition-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 225
    type: multiple_choice
    prompt: >-
      The "Negotiable" property of a well-formed user story means:
    choices:
      - id: a
        text: >-
          The story's acceptance criteria can be dropped during the sprint if
          the team runs out of time
      - id: b
        text: >-
          The implementation approach and solution details remain open for
          collaborative discussion between the team and product owner until the
          story enters a sprint
      - id: c
        text: >-
          Any team member can change the story's priority ranking during sprint
          planning
      - id: d
        text: >-
          The estimate in story points can be revised downward once
          implementation has already started
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Negotiable means the story captures a desired outcome, not a fixed
      implementation contract. The how — the solution design, the technical
      approach — is deferred and decided collaboratively just before work
      begins, when context is richest. Acceptance criteria are what is verified,
      and once a sprint has started they become commitments, not open
      negotiations. Priority and estimation revisions are separate governance
      decisions, not the INVEST property.
  - id: task-decomposition-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 230
    type: multiple_choice
    prompt: >-
      A story is written as: "Set up the database schema for the product
      catalogue." Under INVEST's Valuable criterion, what is the primary
      problem?
    choices:
      - id: a
        text: >-
          Database stories are technical tasks, not user stories, and should
          be tracked in a separate project management system
      - id: b
        text: >-
          The story delivers only an internal technical milestone; the schema
          alone cannot be demoed to a stakeholder or shipped as standalone value
      - id: c
        text: >-
          It is too small; schema changes should always be bundled into the
          feature story that depends on them
      - id: d
        text: >-
          Database setup is a quality gate and belongs in the Definition of Done,
          not as a stand-alone story
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A Valuable story delivers a meaningful outcome a user or stakeholder can
      experience, even if the feature is narrow. A schema that exists but powers
      nothing a user can see or touch fails this test — it is an enabler, not a
      deliverable. The correct fix is usually to reframe the story as a thin
      vertical slice that includes just enough logic to make the schema
      observable: "Given a product name, When I add it, Then it appears in the
      catalogue listing."
  - id: task-decomposition-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 240
    type: multiple_choice
    prompt: >-
      A team cannot estimate a story because no one on the team has ever
      integrated with a particular payments API and the API's error-handling
      behaviour is unknown. According to INVEST, what is the correct response?
    choices:
      - id: a
        text: >-
          Assign it the team's largest standard size (e.g. 13 story points) to
          absorb the uncertainty, then pull it into the next sprint
      - id: b
        text: >-
          Split the story into smaller sub-stories until each sub-story becomes
          individually estimable
      - id: c
        text: >-
          Create a time-boxed spike to investigate the API, then re-estimate the
          original story with the findings in hand
      - id: d
        text: >-
          Accept the story into the sprint anyway and agree on an estimate once
          implementation has started
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      When a story fails Estimable, the cause is a knowledge gap, not a size
      problem. Splitting does not resolve unknown complexity — the sub-stories
      inherit the same ignorance. Inflating the estimate papers over the risk.
      The correct remedy is a spike: a time-boxed investigation whose output is
      knowledge (a proof-of-concept, a written finding, a sample integration),
      not production code. After the spike the team re-estimates with real
      information.
  - id: task-decomposition-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: >-
      A team defines the INVEST "Small" criterion as "no story may exceed 8
      story points." What problem does this rule introduce?
    choices:
      - id: a
        text: >-
          Story points are a ratio scale and cannot be compared across teams,
          making the rule effectively unmeasurable
      - id: b
        text: >-
          Points are team-relative velocity units; the meaningful constraint is
          whether the story can be completed within the sprint timebox, not
          whether it meets an absolute point threshold
      - id: c
        text: >-
          8 points is far too generous; well-formed stories should never exceed
          3 points under any circumstances
      - id: d
        text: >-
          Velocity-based sizing only produces reliable results after a team has
          completed at least ten sprints of calibration data
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Story points are a relative measure calibrated per team; a story worth 8
      points to one team might represent two days or two weeks depending on
      capacity and conventions. The intent of Small is that the story fits
      comfortably within a single sprint so it can be finished, reviewed, and
      shipped in one cycle. Anchoring to an absolute point threshold
      misidentifies the unit of concern — the sprint timebox — for a
      team-specific proxy number.
  - id: task-decomposition-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 253
    type: multiple_choice
    prompt: >-
      A story's acceptance criterion reads: "The search results should load
      quickly." Why does this story fail INVEST's Testable criterion?
    choices:
      - id: a
        text: >-
          Search functionality requires integration with an external index,
          making automated unit testing technically impossible
      - id: b
        text: >-
          Performance testing requires specialised load-testing tooling that
          most teams do not have available
      - id: c
        text: >-
          "Load quickly" provides no measurable pass/fail threshold; a tester
          cannot write a concrete acceptance test with this criterion
      - id: d
        text: >-
          Response-time constraints belong in the Definition of Done and should
          be removed from individual story criteria
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Testable means a concrete, confirmable pass/fail condition exists.
      "Quickly" is subjective and has no threshold a tester can check: does 300
      ms pass? Does 2 seconds fail? The fix is to specify the measurable
      condition: "Given a keyword search, When the user submits, Then results
      appear within 200 ms for inputs under 1 MB." Tooling availability and
      structural placement are separate concerns; the core failure is ambiguity,
      not tooling or location.
  - id: task-decomposition-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 258
    type: multiple_choice
    prompt: >-
      A team decomposes a login feature into three stories: "Build the login
      form UI", "Implement the authentication API endpoint", and "Add the
      session-storage layer." This decomposition is an example of:
    choices:
      - id: a
        text: >-
          Vertical slicing — each story covers a distinct user-facing
          interaction within the feature
      - id: b
        text: >-
          Horizontal slicing — each story covers a single architectural layer
          without delivering end-to-end functionality on its own
      - id: c
        text: >-
          Dependency mapping — the stories form a documented causal chain that
          enforces correct implementation order
      - id: d
        text: >-
          Feature-flag decomposition — each layer can be independently toggled
          for progressive rollout
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Horizontal slicing produces stories that each cover one architectural
      layer (UI, API, storage) without any story delivering a runnable
      end-to-end behaviour. No individual story can be demoed or verified as
      working until all three are integrated, which defers integration risk to
      the end. Vertical slicing instead cuts across all layers for a narrow use
      case — for example, "Given valid credentials, When I log in, Then I am
      redirected to the dashboard" — which exercises every layer in one story
      and makes the risk visible immediately.
  - id: task-decomposition-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 265
    type: multiple_choice
    prompt: >-
      What distinguishes a "walking skeleton" from the first vertical slice of a
      feature?
    choices:
      - id: a
        text: >-
          A walking skeleton includes working business logic for the primary use
          case; a vertical slice is intentionally feature-free
      - id: b
        text: >-
          A walking skeleton is feature-free end-to-end scaffolding that proves
          all architectural layers connect; a vertical slice delivers a narrow
          but real user-visible behaviour on top of that structure
      - id: c
        text: >-
          A walking skeleton is deployed to production on day one; a vertical
          slice is kept in the development environment until sign-off
      - id: d
        text: >-
          A walking skeleton is built by the platform team to establish
          infrastructure; vertical slices are built by feature teams afterwards
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Cockburn's walking skeleton is the thinnest possible end-to-end slice: it
      exercises every architectural layer (UI to API to persistence to deployment
      pipeline) with stub or placeholder logic, but no real features. Its
      purpose is to prove the plumbing works and unblock parallel feature work.
      Vertical slices then add real user-facing behaviour on top of the
      established skeleton. Including real business logic in the skeleton defeats
      its purpose and introduces feature-delivery risk before the architecture is
      confirmed.
  - id: task-decomposition-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 272
    type: multiple_choice
    prompt: >-
      A developer marks a story done because the feature works and all three
      acceptance criteria pass. The tech lead says the story is not done because
      no code review has been completed. What concept does this illustrate?
    choices:
      - id: a
        text: >-
          The acceptance criteria were written incorrectly and need to be
          revised to include code review as an item
      - id: b
        text: >-
          A mismatch between story-specific acceptance criteria (what this
          feature must do) and the team's Definition of Done (the universal
          quality gates every story must pass)
      - id: c
        text: >-
          The tech lead is applying a personal code-quality standard not
          endorsed by the broader team
      - id: d
        text: >-
          The story was under-decomposed; code review should be modelled as its
          own separate story in the backlog
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Acceptance criteria are story-specific: they describe the observable
      functional conditions that confirm this particular behaviour is correct.
      The Definition of Done is a team-wide quality checklist — code reviewed,
      tests passing, CI green, deployed to staging — applied on top of every
      story's acceptance criteria before anything is declared shippable. When
      these are conflated, stories that mention nothing about code review are
      treated as exempt, and technical debt accumulates invisibly. The fix is a
      shared DoD, not adding process steps to individual stories.
  - id: task-decomposition-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 285
    type: multiple_choice
    prompt: >-
      An acceptance criterion reads: "Given a registered user, When they submit
      an empty password field, Then the system returns HTTP 400 with the message
      'Password is required'." What is the primary benefit of the
      Given-When-Then format over free-form prose?
    choices:
      - id: a
        text: >-
          It ensures the criterion can only be verified manually, keeping
          automated testing optional rather than required
      - id: b
        text: >-
          It forces the criterion to specify a precondition, a triggering event,
          and a precise expected outcome, eliminating ambiguous "the system
          should..." phrasing
      - id: c
        text: >-
          Compliant BDD tools automatically generate executable test code
          directly from the natural-language criterion text
      - id: d
        text: >-
          It replaces the need for a Definition of Done by embedding all
          necessary quality gates into the story itself
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The Given-When-Then structure forces three specific elements: the starting
      state (Given), the action under test (When), and the verifiable result
      (Then). This eliminates vague formulations like "the system should respond
      appropriately" that cannot be turned into a pass/fail test. BDD tools such
      as Cucumber can map GWT steps to code, but that is a tooling capability,
      not the core benefit of the format — the format works with any test runner
      or even manual verification. GWT criteria complement the DoD rather than
      replacing it.
  - id: task-decomposition-200-mc-n
    tier: 200
    bloom: understand
    difficulty: 292
    type: multiple_choice
    prompt: >-
      In agile planning, what is the primary output of a time-boxed spike?
    choices:
      - id: a
        text: >-
          A working feature implementation that can be reviewed by the product
          owner at the end of the timebox
      - id: b
        text: >-
          A written finding, recommendation, or proof-of-concept that gives the
          team enough knowledge to estimate and decompose the original story
      - id: c
        text: >-
          A revised sprint backlog with the unestimable story replaced by smaller
          sub-stories
      - id: d
        text: >-
          A risk register entry that documents the uncertainty for future reference
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A spike's deliverable is knowledge, not production code. The timebox is
      strictly enforced so the team exits with some documented artifact — a
      recommendation, a proof-of-concept, or written findings — even if the
      technical question remains partially open. That artifact enables
      re-estimation: the team now has real information to anchor their estimate
      rather than guessing. Committing production-quality code during a spike
      conflates exploration with delivery and defeats the purpose of the
      time-boxed investigation.
  - id: task-decomposition-200-sa-b
    tier: 200
    bloom: understand
    difficulty: 228
    type: short_answer
    prompt: >-
      A time-boxed spike concludes after three days. Regardless of whether the
      technical question was fully resolved, what is the primary deliverable the
      team should have in hand before they attempt to re-estimate the original
      story?
    answerKey:
      kind: keyword
      anyOf:
        - findings
        - written findings
        - documented findings
        - findings document
        - recommendation
        - written recommendation
        - knowledge
        - documented knowledge
        - proof of concept
        - investigation findings
        - investigation report
        - finding
      normalize: lower
    guidance: >-
      A spike's deliverable is knowledge — written findings, a proof-of-concept,
      or a recommendation — not production code. The timebox is strictly
      enforced so the team always exits with some documented artifact, even if
      the question remains partially open. That artifact is what makes
      re-estimation possible: the team now has real information to anchor their
      estimate rather than assumption. An unrecorded mental note is not an
      acceptable output because it cannot be reviewed, challenged, or handed off
      to another team member.
  - id: task-decomposition-200-sa-c
    tier: 200
    bloom: understand
    difficulty: 243
    type: short_answer
    prompt: >-
      A WBS contains a node labeled "Conduct user interviews." A senior project
      manager says the node is incorrectly formed. What single word best
      describes the structural type this label incorrectly uses — the type that
      WBS nodes should never be expressed as?
    answerKey:
      kind: keyword
      anyOf:
        - activity
        - action
        - verb
        - task
        - process
        - step
        - execution step
        - activities
        - actions
      normalize: lower
    guidance: >-
      WBS nodes must be expressed as deliverables (nouns — things produced),
      not as activities (verbs — things done). "Conduct user interviews"
      describes an execution step; a correctly formed node would name what the
      activity produces, such as "User interview findings report."
      Deliverable-based nodes have clear completion signals — the report either
      exists or it does not — whereas activity-based nodes create ambiguity
      about what "done" means.
  - id: task-decomposition-200-sa-d
    tier: 200
    bloom: understand
    difficulty: 255
    type: short_answer
    prompt: >-
      According to Amdahl's Law, regardless of how many parallel workers are
      added, what single factor imposes a hard ceiling on the maximum speedup
      achievable for any workload?
    answerKey:
      kind: keyword
      anyOf:
        - sequential fraction
        - sequential portion
        - sequential part
        - the sequential fraction
        - the sequential portion
        - inherently sequential work
        - sequential work
        - serial fraction
        - serial portion
        - serial part
        - non-parallelisable fraction
        - non-parallelizable fraction
        - sequential component
      normalize: lower
    guidance: >-
      Amdahl's Law states that maximum speedup = 1 / (sequential fraction). Any
      work that cannot be parallelised — because each step depends on the
      previous one's output — is the binding constraint. No matter how many
      workers you add, the sequential portion must still execute in series. This
      is the practical implication for task decomposition: reducing the
      sequential fraction of work (through better decomposition) yields more
      speedup benefit than adding more parallel agents ever can.
  - id: task-decomposition-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 235
    type: free_form
    prompt: >-
      A team is about to build a new "expense reports" feature: users can
      submit, approve or reject, and export reports as CSV. Describe how you
      would design the first user story as a vertical slice — what would be
      included, what would be deliberately excluded, and what acceptance
      criterion would confirm the slice is complete.
    rubric:
      criteria:
        - id: single-end-to-end-path
          text: >-
            Scopes the first story to one narrow end-to-end path (e.g. submit
            and view a single expense report) that touches all layers: UI, API,
            and persistence.
        - id: explicit-exclusions
          text: >-
            Names at least two things deliberately excluded (e.g. approve/reject
            workflow, CSV export, multi-currency, file attachments) and gives a
            reason related to deferring complexity, not skipping work.
        - id: concrete-acceptance-criterion
          text: >-
            Provides a concrete, observable pass/fail acceptance criterion — e.g.
            in Given-When-Then form or an equivalent measurable condition.
        - id: integration-risk-rationale
          text: >-
            Explains that the slice's value is proving all layers are connected
            and deployable (integration risk reduction), not feature completeness.
      referenceAnswer: >-
        First story: "As a logged-in user, I can submit a minimal expense report
        (title and amount only) and see it listed on my submissions page."

        Included: a single form that POSTs to an API endpoint, which writes to
        the database and returns the saved record, with a read-back page that
        lists the user's submitted reports — spanning UI, API, and persistence
        in one story.

        Deliberately excluded: the approve/reject workflow (a separate slice
        for the approver persona), CSV export (another slice for the exporter
        persona), multi-currency conversion, file attachments, and input
        validation beyond presence checks. These are excluded because they add
        complexity without changing the architectural integration point being
        validated.

        Acceptance criterion: "Given I am logged in, When I submit a report
        titled 'Lunch' for $12.00, Then the report appears in my submissions
        list with the status 'Pending' and the correct title and amount."

        Value: This slice proves the full stack is wired together and deployable
        before complex business logic is added. Discovering a schema mismatch or
        deployment pipeline issue at this point costs an hour; discovering it
        after building approve/reject/export costs days.
      passThreshold: 0.6
    guidance: >-
      Strong answers name a single path through the system that exercises all
      layers, list specific exclusions with reasons rooted in the slice strategy
      (not just "we ran out of time"), and include a concrete acceptance
      criterion. The key insight is that the slice's value is architectural
      confirmation, not user-visible feature completeness. Weak answers either
      start with the data model (horizontal slicing) or bundle all three
      personas into the first story.
  - id: task-decomposition-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 278
    type: free_form
    prompt: >-
      Explain the difference between a story's acceptance criteria and a team's
      Definition of Done. Give one concrete example of each, and describe what
      goes wrong when a team conflates the two.
    rubric:
      criteria:
        - id: distinguishes-concepts
          text: >-
            Correctly identifies acceptance criteria as story-specific functional
            conditions and the Definition of Done as a universal quality baseline
            applied to every story regardless of its content.
        - id: concrete-acceptance-example
          text: >-
            Gives a concrete, observable example of an acceptance criterion
            (e.g. a Given-When-Then statement or specific behaviour assertion).
        - id: concrete-dod-example
          text: >-
            Gives a concrete example of a Definition of Done gate (e.g. code
            reviewed, CI pipeline green, unit tests passing, deployed to
            staging, documentation updated).
        - id: failure-mode
          text: >-
            Describes at least one realistic failure mode when the two are
            conflated — e.g. stories without explicit quality criteria skip
            review, or quality gates crowd out functional verification.
      referenceAnswer: >-
        Acceptance criteria are story-specific: they describe the observable,
        testable conditions that confirm this particular feature behaves
        correctly. They vary story by story and are agreed between the product
        owner and the team before the sprint. Example: "Given a guest user, When
        they attempt checkout, Then they see a prompt to log in or register
        before proceeding."

        The Definition of Done is a universal quality checklist applied on top
        of every story before it is called shippable: code reviewed by a peer,
        all automated tests passing, CI pipeline green, feature deployed to the
        staging environment, and relevant documentation updated. It does not
        vary per story.

        Conflation failure modes: If acceptance criteria are treated as the
        entire definition of done, any story that does not mention code review
        or CI will be declared done without those gates — technical debt and
        defects accumulate silently. Conversely, if the DoD is used as a
        substitute for acceptance criteria, stories have quality gates but no
        verifiable functional outcome, making it impossible to confirm that the
        correct behaviour was built.
      passThreshold: 0.6
    guidance: >-
      The key distinction is scope and variability: acceptance criteria change
      per story, the DoD is constant across all stories. Strong answers
      demonstrate this with concrete examples and identify a specific failure
      mode rather than saying vaguely "things will go wrong." A common weak
      answer treats acceptance criteria and DoD as different names for the same
      checklist, missing that they serve different verification purposes.
  - id: task-decomposition-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 285
    type: free_form
    prompt: >-
      Two tasks are planned to run in parallel: Task A reads the current
      feature-flag configuration file and adds a new flag entry; Task B also
      reads the same configuration file and removes a deprecated flag entry. A
      team lead says running both tasks simultaneously is unsafe. Explain why,
      and propose one concrete restructuring that preserves as much parallelism
      as possible.
    rubric:
      criteria:
        - id: shared-mutable-state
          text: >-
            Identifies that both tasks write to the same file, creating a
            write-conflict hazard where one task's changes can be silently
            overwritten by the other.
        - id: specific-failure-mode
          text: >-
            Names the specific failure mode — e.g. last-writer-wins overwrites
            the other task's change, or the file ends up with either the new
            flag missing or the deprecated flag still present.
        - id: concrete-restructuring
          text: >-
            Proposes a concrete restructuring — e.g. serialise A then B, or
            split into a parallel read/analysis phase followed by a single
            sequential write/merge phase.
        - id: parallelism-preservation
          text: >-
            Correctly identifies which part of the work can remain parallel
            (reading and analysis) and which part must be serialised (the write
            to the shared file), explaining why that boundary is safe.
      referenceAnswer: >-
        The hazard is shared mutable state: both tasks write to the same
        configuration file. If they run concurrently, the second task to write
        will overwrite the first task's version of the file, which still
        contains the deprecated flag Task B should have removed, or lacks the
        new flag Task A should have added. This is a last-writer-wins race
        condition that produces a silently incorrect configuration with no error
        signal.

        Concrete restructuring that preserves parallelism: split each task into
        two phases. Phase 1 (parallel-safe): Task A reads the config and
        prepares the new flag definition; Task B reads the config and identifies
        the deprecated flag to remove. Both are reading a shared file, so no
        write conflict exists. Phase 2 (serialised): a single merge step applies
        both changes to the file atomically — adding the new flag and removing
        the deprecated one — so neither change overwrites the other.

        Simpler alternative: serialise A then B. This eliminates the conflict
        but foregoes any parallel benefit. The two-phase approach is preferable
        when the read and analysis work is substantial enough to be worth
        parallelising.
      passThreshold: 0.6
    guidance: >-
      Strong answers identify the specific write-conflict hazard (not just "they
      conflict"), name the failure mode (overwrite, lost update, silent
      corruption), and propose a restructuring that preserves at least partial
      parallelism with a clear rationale for where the safety boundary lies.
      Weak answers say only "they can't run at the same time" without explaining
      why or how to restructure. The two-phase read-parallel/write-sequential
      pattern is the canonical answer; serialisation alone is accepted as valid
      but suboptimal.

  # ── Tier 300 — Apply ────────────────────────────────────────────────────
  - id: task-decomposition-300-mc-a
    tier: 300
    bloom: apply
    difficulty: 350
    type: multiple_choice
    prompt: >-
      You need to: (1) research the existing API contract, (2) write a migration
      script, and (3) write tests for the migration. Which sequencing is correct
      and why?
    choices:
      - id: a
        text: >-
          All three in parallel — they are independent enough to run concurrently
      - id: b
        text: >-
          Research first (must finish before writing), then migration and tests
          in parallel — both use the research findings but do not depend on each
          other
      - id: c
        text: >-
          Migration first, then research, then tests — implementation defines
          what needs researching
      - id: d
        text: >-
          Tests first (TDD), then research, then migration
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Research is a prerequisite for both the migration script and the tests:
      you cannot write either accurately without knowing the API contract. Once
      research is complete, the migration and tests have independent inputs and
      no shared mutable state, so they can run in parallel. Running research in
      parallel with the others would produce an under-specified migration
      (missing contract knowledge) and useless tests (validating against assumed
      rather than real behaviour).

  - id: task-decomposition-300-mc-b
    tier: 300
    bloom: apply
    difficulty: 360
    type: multiple_choice
    prompt: >-
      A task is described as "refactor the data layer and fix the three open
      bugs while you're in there." What is the main decomposition problem with
      this description?
    choices:
      - id: a
        text: Refactoring and bug-fixing are the same activity; no decomposition is needed
      - id: b
        text: >-
          Combining refactoring (behaviour-preserving) with bug fixes
          (behaviour-changing) in one task makes it impossible to isolate which
          change caused any regression
      - id: c
        text: Bugs should always be fixed before any refactoring occurs
      - id: d
        text: The data layer is too large a scope for any single task
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Refactoring means changing structure without changing observable behaviour;
      bug-fixing deliberately changes observable behaviour. Mixing them in a
      single task destroys the ability to diff-bisect a regression: if something
      breaks, you cannot tell whether the refactor or the bug fix caused it.
      Correct decomposition: refactor first (verify all tests still pass), then
      apply each bug fix as a separate task. This gives you a clean causal chain.

  # ── Tier 400 — Analyze ──────────────────────────────────────────────────
  - id: task-decomposition-300-mc-c
    tier: 300
    bloom: apply
    difficulty: 305
    type: multiple_choice
    prompt: >-
      A developer decomposes "Add CSV export feature" into three work packages:
      (1) write the export function, (2) add a UI button, (3) write unit tests.
      The product manager later discovers that performance testing is entirely
      absent from the plan. Which WBS principle does this decomposition violate?
    choices:
      - id: a
        text: >-
          The 100% rule — the WBS omits performance testing, so the structure
          does not capture all work in scope
      - id: b
        text: >-
          The 8/80 heuristic — each work package is too small to track
          meaningfully at this granularity
      - id: c
        text: >-
          The dependency ordering rule — unit tests must precede implementation
          in a correctly sequenced WBS
      - id: d
        text: >-
          The INVEST Valuable criterion — a unit-test work package delivers no
          user-visible value on its own
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The WBS 100% rule requires that every deliverable and work package in
      scope appear somewhere in the WBS; nothing outside is funded or scheduled.
      When performance testing is required but absent, it will not be estimated,
      staffed, or tracked — invisible until discovered late. The 8/80 heuristic
      governs individual package size, not completeness; it is the wrong tool
      for diagnosing missing work.
  - id: task-decomposition-300-mc-d
    tier: 300
    bloom: apply
    difficulty: 315
    type: multiple_choice
    prompt: >-
      A work package is estimated at 120 hours. According to the 8/80 heuristic,
      what is the correct response?
    choices:
      - id: a
        text: >-
          Decompose it further — 120 hours exceeds the 80-hour upper bound and
          hides risk inside one unmonitored unit
      - id: b
        text: >-
          Accept it — 120 hours is within one standard deviation of the 80-hour
          guideline and close enough for planning purposes
      - id: c
        text: >-
          Assign it to a more senior engineer who can complete it within 80 hours,
          bringing it within the heuristic's bounds
      - id: d
        text: >-
          Move it to the next sprint where it can be re-estimated with more
          context and better information
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The 8/80 heuristic sets an upper bound of 80 hours for a terminal work
      package. Above this threshold, problems can emerge at hour 100 with little
      warning — the long window masks risk and obscures status. The remedy is
      further decomposition into child work packages each within the 8-80 range,
      restoring tracking granularity. Assigning a faster engineer does not change
      the structural invisibility problem; the package remains one unmonitored unit.
  - id: task-decomposition-300-sa-a
    tier: 300
    bloom: apply
    difficulty: 320
    type: short_answer
    prompt: >-
      A Scrum team's retrospectives consistently surface the same problem: stories
      that enter the sprint turn out to lack acceptance criteria, have unresolved
      dependencies, or require investigation work that was never done. The team
      must stop mid-sprint to fill these gaps, which destroys velocity
      predictability. The Scrum Master proposes a structured team agreement — a
      checklist that every backlog item must satisfy before it is eligible to
      be pulled into a sprint. What is the standard name for this artifact?
    answerKey:
      kind: keyword
      anyOf:
        - definition of ready
        - dor
        - readiness checklist
        - ready criteria
        - definition of readiness
        - ready definition
      normalize: lower
    guidance: >-
      The Definition of Ready (DoR) is a team's pre-condition for sprint entry,
      structurally distinct from the Definition of Done. DoR asks "can we start?"
      while DoD asks "is it shippable?" Pulling stories that fail DoR creates
      mid-sprint uncertainty and forces ad hoc replanning. A well-formed DoR
      prevents under-specified work from entering a sprint and degrading velocity
      predictability.
  - id: task-decomposition-300-mc-e
    tier: 300
    bloom: apply
    difficulty: 325
    type: multiple_choice
    prompt: >-
      Two stories are on the backlog. Story A: "As a user, I can log in with
      email and password." Story B: "As a user, I can view my profile page."
      The team discovers that Story B requires the user session model introduced
      in Story A. Which INVEST criterion does Story B fail?
    choices:
      - id: a
        text: >-
          Negotiable — the session model implementation has been locked before
          Story B entered the sprint
      - id: b
        text: >-
          Independent — Story B cannot be delivered in an arbitrary order
          relative to Story A
      - id: c
        text: >-
          Valuable — a profile page has no standalone value without
          authentication in place
      - id: d
        text: >-
          Testable — acceptance criteria for Story B cannot be written until
          Story A is fully complete
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      INVEST's Independent criterion requires that a story can be delivered in
      any order without a hard implementation dependency on another story. Story B
      has a data dependency on Story A's session model and cannot be implemented
      first. The fix is either to extract the session model into a foundational
      task or to merge the two stories. Testability is not the core issue: Story B's
      acceptance criteria can be written against a stubbed session; the constraint
      is about scheduling freedom, not specification completeness.
  - id: task-decomposition-300-ff-a
    tier: 300
    bloom: apply
    difficulty: 328
    type: free_form
    prompt: >-
      You are planning the "User can create a playlist" feature for a music app
      with a React frontend, a REST API, a PostgreSQL database, and a Redis
      cache. Describe how you would decompose this feature using vertical slicing.
      Identify what the first slice would contain, what subsequent slices would
      add, and explicitly explain why a database-first horizontal approach would
      be worse.
    rubric:
      criteria:
        - id: defines-vertical-slice
          text: >-
            Correctly defines a vertical slice as an end-to-end path through all
            layers (frontend, API, DB, cache) for a narrow use case, producing
            a demoable increment.
        - id: first-slice-is-skeleton
          text: >-
            The first slice is a thin walking-skeleton-style path that exercises
            the full stack end-to-end even if functionality is minimal or stubbed.
        - id: subsequent-slices-add-within-structure
          text: >-
            Subsequent slices add features (validation, error handling, caching,
            etc.) within the established structure rather than completing
            additional layers.
        - id: explains-horizontal-risk
          text: >-
            Explains that a database-first approach delays integration risk
            discovery and produces no demoable increment until all layers are
            complete.
        - id: each-slice-independently-demoable
          text: >-
            Each proposed slice is independently demoable or deployable without
            requiring subsequent slices to be complete.
      referenceAnswer: >-
        Vertical slicing means each story cuts through all four layers for a
        narrow use case. Rather than building schema first, then API, then UI
        (horizontal), you deliver thin end-to-end paths.

        Slice 1 (walking skeleton): POST /playlists creates a row in PostgreSQL
        with a hardcoded name; the React form submits and shows "Playlist
        created." No validation, no Redis, no song management. This proves the
        full request path works and unblocks parallel development on each layer.

        Slice 2: The form captures a real playlist name; the API validates
        non-empty input; the DB stores it; the UI shows the name back. Error
        state: form shows "Name is required" for empty input.

        Slice 3: A user can add a song to a playlist via the API; the UI lists
        songs in the playlist.

        Slice 4: Playlist retrieval is cached in Redis; subsequent GET
        /playlists/:id reads from cache; cache is invalidated on update.

        Why not database-first? Building the schema alone produces no runnable
        increment — it cannot be demoed, and integration errors in the API or UI
        layer are discovered only after all layers are built. Vertical slicing
        surfaces integration issues on the first slice and produces deliverable
        value at each step.
      passThreshold: 0.6
    guidance: >-
      Strong answers identify the first slice as intentionally thin and explain
      that each subsequent slice adds within the established structure rather than
      completing a new layer. The key differentiator is the explicit contrast with
      horizontal slicing: the candidate should explain what risk the horizontal
      approach defers and why surfacing it early matters.
  - id: task-decomposition-300-mc-f
    tier: 300
    bloom: apply
    difficulty: 333
    type: multiple_choice
    prompt: >-
      A team tries to estimate "Integrate real-time notifications via WebSocket."
      No team member has used WebSockets in this stack before. Estimates range
      from 2 to 20 story points. According to INVEST, what is the correct
      decomposition response?
    choices:
      - id: a
        text: >-
          Average the estimates and proceed — wide variance is normal in
          planning poker and self-corrects over time
      - id: b
        text: >-
          Split the story into smaller parts until each part receives a
          consistent estimate from the whole team
      - id: c
        text: >-
          Create a time-boxed spike to resolve the technical uncertainty before
          the story enters a sprint
      - id: d
        text: >-
          Mark the story as blocked and wait for a team member who already has
          WebSocket experience to join
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      High estimate variance signals that the story fails INVEST's Estimable
      criterion due to knowledge gaps, not size. Splitting an inestimable story
      produces smaller but still inestimable pieces; averaging the estimates
      creates a false sense of precision without resolving the underlying risk.
      A spike — a time-boxed investigation whose output is knowledge (a written
      finding or proof-of-concept), not production code — resolves the uncertainty
      and makes subsequent estimation reliable.
  - id: task-decomposition-300-mc-g
    tier: 300
    bloom: apply
    difficulty: 342
    type: multiple_choice
    prompt: >-
      A team decomposes "User can create an account" into:
      (1) Create the accounts database table,
      (2) Build the account creation REST endpoint,
      (3) Build the sign-up UI form,
      (4) Write integration tests.
      Which statement best characterises this decomposition?
    choices:
      - id: a
        text: >-
          Vertical slicing — each story delivers one layer and the layers
          are independently deployable
      - id: b
        text: >-
          Horizontal slicing — stories are divided by technical layer rather
          than by end-to-end user value
      - id: c
        text: >-
          Correct decomposition — building schema before API before UI is the
          established best practice for minimising rework
      - id: d
        text: >-
          Vertical slicing — the database table story can be demoed to a
          stakeholder as a standalone deliverable
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      These four stories each represent a horizontal layer — data, API, UI,
      and tests — rather than a narrow end-to-end path through all layers.
      None of the first three can be demoed independently, and integration
      risk accumulates until all four are complete. A vertical slice would
      deliver a thin, demoable path through all layers at once (submit form to
      API to DB to confirmation shown), with subsequent slices adding validation,
      error handling, and edge cases.
  - id: task-decomposition-300-ff-b
    tier: 300
    bloom: apply
    difficulty: 348
    type: free_form
    prompt: >-
      You are reviewing a sprint backlog with these three stories:
      (1) "Build the database schema for orders."
      (2) "As a user, I can check out my cart, but only after the payment
      and inventory subsystems are complete."
      (3) "Make the checkout flow faster."
      For each story, identify which INVEST criteria it fails and why.
      Then propose a concrete corrected version of each story.
    rubric:
      criteria:
        - id: story-1-fails-valuable
          text: >-
            Identifies that story 1 fails Valuable (it is an internal technical
            milestone with no standalone user-visible benefit) and notes the
            risk of prematurely locking schema before consuming stories are
            specified.
        - id: story-2-fails-independent
          text: >-
            Identifies that story 2 fails Independent because it names a hard
            dependency on two other subsystems, preventing arbitrary ordering.
        - id: story-3-fails-testable
          text: >-
            Identifies that story 3 fails Testable (and Estimable) because
            "faster" is not a measurable, verifiable criterion.
        - id: corrections-are-concrete
          text: >-
            Proposed corrections are specific: story 1 is reframed around a
            verified deliverable or user value; story 2's dependency is dissolved
            via stubs or an extracted foundational task; story 3 gains a
            quantitative acceptance criterion.
        - id: corrections-pass-invest
          text: >-
            Each corrected story could plausibly pass all six INVEST criteria
            as written.
      referenceAnswer: >-
        Story 1 — "Build the database schema for orders":
        Fails Valuable (a schema cannot be demoed and delivers no user benefit
        in isolation) and risks premature lock-in (defining schema before the
        consuming stories are fully specified may require rework).
        Correction: "As an order system, I can persist a new order with
        customer ID, line items, and total, verified by a passing integration
        test, so that checkout and reporting stories have a stable data
        contract." This frames the deliverable as a verified interface, not
        just a table.

        Story 2 — "As a user, I can check out my cart, but only after the
        payment and inventory subsystems are complete":
        Fails Independent — the story explicitly names a hard dependency on
        two other subsystems, preventing it from being scheduled before them.
        Correction: Extract two foundational tasks — "Payment service stub
        available at /api/payments with mock success/fail responses" and
        "Inventory service stub at /api/inventory." The checkout story then
        becomes independent: "As a user, I can submit my cart and receive an
        order confirmation (uses payment and inventory stubs in test)."

        Story 3 — "Make the checkout flow faster":
        Fails Testable (no measurable criterion — there is no way to confirm
        done-ness) and Estimable (without a target, scope is unbounded).
        Correction: "Given a cart with 5 items, when the user submits
        checkout, then the p95 response time is under 300 ms in the staging
        environment." Now there is a concrete, automatable acceptance criterion.
      passThreshold: 0.6
    guidance: >-
      Strong answers name the specific failing criterion for each story and
      explain the mechanism of failure, not just that the story "isn't good."
      The correction for story 2 is the most nuanced: the candidate should
      recognise that the dependency can be dissolved via stubs or an extracted
      foundational task, rather than simply merging the stories together.
  - id: task-decomposition-300-mc-h
    tier: 300
    bloom: apply
    difficulty: 351
    type: multiple_choice
    prompt: >-
      You are starting a greenfield service that needs user authentication, a
      recommendation engine, and a payment processor. You decide to build a
      walking skeleton first. What should the walking skeleton contain?
    choices:
      - id: a
        text: >-
          A fully working authentication flow — authentication is the most
          foundational subsystem and must be complete before any other
          subsystem is built
      - id: b
        text: >-
          Stubs for all three subsystems wired end-to-end so that the
          deployment pipeline and inter-component contracts are exercised
          before feature development begins
      - id: c
        text: >-
          The recommendation engine only, as it carries the highest technical
          risk and should be validated earliest
      - id: d
        text: >-
          Complete unit test suites for all three subsystems before any
          integration work begins
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A walking skeleton is intentionally feature-free: it wires every
      architectural layer together with stub or trivial implementations to prove
      that the deployment pipeline, inter-layer contracts, and toolchain work.
      Building full authentication first is horizontal work that produces no
      deployable end-to-end increment. The skeleton must be thin and vertical —
      even if it does nothing useful yet — because its purpose is to establish
      structural plumbing that unblocks parallel feature development across all
      three subsystems.
  - id: task-decomposition-300-mc-i
    tier: 300
    bloom: apply
    difficulty: 358
    type: multiple_choice
    prompt: >-
      You are decomposing a logging subsystem. Option A: one module that hides
      the storage backend (file, database, or cloud) behind a single interface.
      Option B: three modules, each implementing the full logging pipeline for
      one storage backend. Which option better follows Parnas's
      information-hiding principle?
    choices:
      - id: a
        text: >-
          Option B — three modules reduce the blast radius when a single
          backend fails or needs replacement
      - id: b
        text: >-
          Option A — the storage decision is a "design decision likely to
          change" and should be hidden behind a single stable interface
      - id: c
        text: >-
          Option B — each backend is easier to test in isolation when
          implemented in its own module
      - id: d
        text: >-
          Option A — combining all backends in one module reduces total file
          count and simplifies repository navigation
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Parnas (1972) argued that modules should be decomposed along design
      decisions that are likely to change, with each module hiding one such
      decision. The storage backend is exactly that kind of volatile decision.
      Hiding it behind a single interface means callers depend only on the
      interface and are unaffected by backend substitutions. Option B embeds
      the same pipeline logic in each backend module, duplicates code, and
      forces callers to know which backend they are targeting — violating the
      principle that interfaces should reveal only what must be shared.
  - id: task-decomposition-300-sa-b
    tier: 300
    bloom: apply
    difficulty: 360
    type: short_answer
    prompt: >-
      A developer adds two engineers to Task G, reducing its duration from
      8 days to 4 days. The overall feature delivery date does not change.
      All other tasks in the network remain at their original durations.
      What is the name for the sequence of tasks that explains why this
      resource addition had no effect on delivery time?
    answerKey:
      kind: keyword
      anyOf:
        - critical path
        - longest path
        - critical path method
        - cpm
      normalize: lower
    guidance: >-
      The critical path is the longest dependency chain in a task network; it
      sets a hard floor on project duration regardless of how many resources
      are added elsewhere. If Task G is not on the critical path, compressing
      it leaves the longest chain — and therefore the delivery date — unchanged.
      Identifying the critical path tells you where to focus unblocking and
      resource investment: acceleration on non-critical tasks wastes effort
      while the real bottleneck remains untouched.
  - id: task-decomposition-300-mc-j
    tier: 300
    bloom: apply
    difficulty: 365
    type: multiple_choice
    prompt: >-
      A user story has a single acceptance criterion: "Given a valid email and
      password, when the user submits the login form, then they are redirected
      to the dashboard." What is the most significant gap according to
      acceptance-criteria completeness best practices?
    choices:
      - id: a
        text: >-
          It does not specify the exact URL of the dashboard that the redirect
          should target
      - id: b
        text: >-
          It covers only the happy path; error paths such as invalid
          credentials, a locked account, and rate limiting are unspecified
      - id: c
        text: >-
          It does not specify how long the authenticated session remains valid
          or when it expires, leaving a security-sensitive detail untested
      - id: d
        text: >-
          It should enumerate the browsers and devices on which the criterion
          must pass
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Well-formed acceptance criteria must cover the happy path, error paths,
      and boundary conditions. A criterion set that addresses only the success
      case leaves the team free to handle error states however they choose —
      or to skip them — and provides no regression guard for those paths. Error
      and boundary conditions account for the majority of production defects;
      omitting them leaves the story substantially underspecified even though
      it passes in the green-path scenario. Session expiry (choice c) is a
      real concern but is a narrower, secondary gap compared to the complete
      absence of any error-path coverage.
  - id: task-decomposition-300-mc-k
    tier: 300
    bloom: apply
    difficulty: 372
    type: multiple_choice
    prompt: >-
      A user story reads: "As a user, I can search for products by name, by
      category, by price range, by rating, and by availability." The story
      is too large to complete in one sprint. Which SPIDR pattern produces
      the most natural split into independently valuable child stories?
    choices:
      - id: a
        text: >-
          Spike — create an investigation task to determine the best search
          implementation approach before committing to a split
      - id: b
        text: >-
          Path — split by workflow step: search entry, results display, then
          applying a filter
      - id: c
        text: >-
          Rules — split by each independent business rule variant (search by
          name, by category, by price range, etc.)
      - id: d
        text: >-
          Data — split by database entity (products table, inventory table,
          ratings table)
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      SPIDR's Rules pattern applies when a story enumerates multiple distinct
      business rule variants that can each be delivered independently. Each
      filter type (name, category, price range, rating, availability) is an
      independently valuable condition; delivering search-by-name first produces
      a working, demoable feature even without the others. The Path pattern
      applies when workflow steps are large enough; the Data pattern applies
      when the same operation spans distinct data entities, not when business
      rules vary within one entity.
  - id: task-decomposition-300-mc-l
    tier: 300
    bloom: apply
    difficulty: 380
    type: multiple_choice
    prompt: >-
      An orchestrator fans out 8 independent subtasks to 8 parallel agents.
      Completion times are: 2, 2, 2, 2, 2, 2, 2, and 14 minutes. What is
      the minimum wall-clock time before the fan-in step can begin?
    choices:
      - id: a
        text: 3.5 minutes — the average across all eight branches
      - id: b
        text: >-
          2 minutes — the first branch to finish signals that processing is
          essentially complete
      - id: c
        text: >-
          14 minutes — the fan-in synchronisation barrier cannot proceed until
          every branch completes, so the slowest branch determines the wait
      - id: d
        text: >-
          28 minutes — each branch result must be validated serially before it
          can be merged into the fan-in output
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      In a fan-out/fan-in (scatter-gather) pattern, the fan-in synchronisation
      barrier cannot proceed until every fan-out branch completes. Wall-clock
      time therefore equals the slowest branch, not the average or fastest.
      A single slow agent delays the entire downstream chain regardless of how
      quickly the other seven finish. This is a critical design consideration:
      parallelising tasks with highly unequal durations may produce less
      wall-clock benefit than a back-of-envelope average suggests.
  - id: task-decomposition-300-mc-m
    tier: 300
    bloom: apply
    difficulty: 387
    type: multiple_choice
    prompt: >-
      A code-review task breaks into two parts: 60% of the effort is reviewing
      each file independently (parallelizable), and 40% is synthesising
      cross-file findings into a report (sequential). Applying Amdahl's Law,
      what is the theoretical maximum speedup achievable by adding unlimited
      parallel agents?
    choices:
      - id: a
        text: >-
          Unlimited — as more agents handle file reviews, the sequential
          synthesis phase becomes negligible compared to total agent capacity
      - id: b
        text: >-
          1.67x — the ceiling is set by the parallelizable fraction, not
          the sequential fraction
      - id: c
        text: >-
          2.5x — the 40% sequential synthesis phase cannot be parallelised,
          setting the ceiling at 1 divided by 0.4
      - id: d
        text: >-
          60% faster — a single parallel agent handles all file reviews,
          directly freeing 60% of the original time
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Amdahl's Law: as parallel workers approach infinity, maximum speedup
      approaches 1 divided by (sequential fraction). With 40% sequential, the ceiling
      is 1 / 0.4 = 2.5x regardless of how many agents review files. Option b
      (1.67x) is a common error — it results from plugging the sequential
      fraction into the formula as if it were the parallelizable fraction.
      Understanding this ceiling prevents over-investing in parallelisation
      when the sequential bottleneck is the binding constraint.
  - id: task-decomposition-300-mc-n
    tier: 300
    bloom: apply
    difficulty: 393
    type: multiple_choice
    prompt: >-
      Two tasks — writing a data export function and writing a data import
      function — are scheduled sequentially because both must modify the same
      shared utility module. Neither task's output is required as input to the
      other. What type of dependency is this?
    choices:
      - id: a
        text: >-
          Causal — the export function's output is implicitly required as input
          to the import function at runtime
      - id: b
        text: >-
          Discretionary — the team prefers sequential order by convention but
          could safely run the tasks in parallel with care
      - id: c
        text: >-
          Resource — both tasks would write to the same shared module,
          creating a conflict if run concurrently
      - id: d
        text: >-
          Control — the import task's execution path depends on a decision
          produced by the export task
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      A resource dependency arises when two tasks could logically proceed in
      parallel — they produce different outputs and neither needs the other's
      result — but share a constrained resource (here, the same shared utility
      module). Causal dependencies transfer an output artifact as input; control
      dependencies transfer a decision; neither applies here. Resource
      dependencies can sometimes be dissolved by refactoring the shared resource
      or serialising writes, unlike causal dependencies which are structurally
      immovable.
  - id: task-decomposition-300-ff-c
    tier: 300
    bloom: apply
    difficulty: 375
    type: free_form
    prompt: >-
      You are decomposing a complex feature for an AI coding agent. The feature
      touches 8 interconnected files and has several acceptance criteria of
      varying complexity. The agent has a limited context window. Describe how
      you would determine the right task granularity. What factors would you
      weigh, what signals would tell you a task is too large, and what signals
      would tell you it is too small?
    rubric:
      criteria:
        - id: context-window-as-constraint
          text: >-
            Identifies the context window as a practical upper bound on task
            size: all relevant files, criteria, and prior decisions must fit
            within one invocation for the agent to avoid hallucinating missing
            details.
        - id: too-large-signals
          text: >-
            Names at least two "too large" signals: requiring more files than
            fit in context, multiple unrelated acceptance criteria, inability
            to write a single checkable done condition, or spanning disjoint
            concerns.
        - id: too-small-signals
          text: >-
            Names at least two "too small" signals: no independently observable
            outcome, handoff or context-reload overhead exceeds the work value,
            or completion cannot be verified without the adjacent task's output.
        - id: sizing-heuristic
          text: >-
            Proposes a concrete sizing test or heuristic (e.g. "can I write a
            single acceptance criterion that confirms this task is done?",
            "does the task require more than N files to read?", or the 8/80
            analogue for agent invocations).
        - id: independent-verifiability
          text: >-
            States that the right granularity is one coherent, independently
            verifiable behaviour change — not the smallest possible unit and
            not the largest context-window-fitting unit.
      referenceAnswer: >-
        The primary practical constraint for agentic tasks is context budget:
        every file the agent must read, all acceptance criteria, and any prior
        decisions it must honour must fit within one invocation's working
        window. A task that requires more context than fits will produce
        hallucinated details, inconsistent code, or silently omitted criteria.

        Factors to weigh:
        1. File count and size — how many files must be read to understand and
        implement the task? If it exceeds a comfortable fraction of the context
        window (leaving room for generated code), the task is too large.
        2. Acceptance criteria count and independence — can you write a single,
        checkable done condition? Multiple unrelated criteria signal mixed
        concerns that should be separate tasks.
        3. Dependency surface — how many tasks depend on this one's output?
        High fan-out increases the cost of an error.

        Too large signals:
        - The task touches more than 4-5 interconnected files with no natural
        split point.
        - The acceptance criteria cover two or more distinct user-facing
        behaviours.
        - Completing the task requires holding the state of multiple subsystems
        simultaneously.

        Too small signals:
        - The task changes a single line with no independently observable
        intermediate state (no test passes differently, no command returns
        differently).
        - Context-reload overhead for a new task invocation exceeds the
        implementation time.
        - Completion cannot be verified without seeing an adjacent task's output
        — the task isn't self-contained.

        Right size: one coherent, independently testable behaviour change that
        produces a passing test or an observable change in system state. The
        spirit of the 8/80 heuristic applies: below the lower bound, overhead
        dominates; above the upper bound, visibility is lost.
      passThreshold: 0.6
    guidance: >-
      Strong answers distinguish the context-budget constraint from general
      decomposition concerns, and give concrete signals for both extremes rather
      than only naming the principle. The key insight is that the right
      granularity is one independently verifiable behaviour change — not the
      smallest achievable unit, and not the largest unit that fits in context.
  - id: task-decomposition-300-ff-d
    tier: 300
    bloom: apply
    difficulty: 395
    type: free_form
    prompt: >-
      A team is asked to add streaming response support to a REST API. No
      team member has used server-sent events or streaming in this stack
      before. The feature also requires frontend changes and new performance
      acceptance criteria. Walk through the complete task decomposition
      process from initial request to a sprint-ready set of stories, including
      how you handle the technical uncertainty.
    rubric:
      criteria:
        - id: spike-triggered-correctly
          text: >-
            Recognises that unfamiliarity with streaming makes the main story
            fail INVEST Estimable, and schedules a spike before decomposing or
            estimating the feature.
        - id: spike-designed-correctly
          text: >-
            Designs the spike correctly: time-boxed with a fixed duration (not
            fixed scope), output is written knowledge or a throwaway
            proof-of-concept, not production code.
        - id: post-spike-decomposition
          text: >-
            After the spike, decomposes the feature into INVEST-satisfying
            stories that separate at minimum: backend streaming, frontend
            consumption, and performance verification.
        - id: acceptance-criteria-coverage
          text: >-
            Each story's acceptance criteria cover the happy path, at least one
            error path (e.g. connection drop), and at least one boundary
            condition (e.g. payload size or concurrency level).
        - id: dependency-ordering
          text: >-
            Correctly sequences dependencies: spike before estimation, backend
            streaming before or parallel with frontend (via stub), and
            performance verification after implementation is stable.
      referenceAnswer: >-
        Step 1 — Identify the uncertainty. The team has no streaming experience
        in this stack. The feature story fails INVEST Estimable: estimates will
        be noise. Do not decompose or size the feature yet.

        Step 2 — Schedule a spike. Time-box: 4 hours. Goal: answer three
        questions — (a) which mechanism fits the stack (SSE vs WebSocket vs
        chunked transfer)?; (b) what client library handles it in the frontend?;
        (c) what is a realistic latency floor for a simple echo test? Output: a
        written one-page recommendation and a throwaway proof-of-concept. The
        spike produces no production code; its output is knowledge.

        Step 3 — Post-spike decomposition. With the spike output, decompose
        into three stories:

        Story 1 (backend streaming): "Given a POST /chat request, when the
        model generates tokens, then each token is streamed via SSE to the
        client within 50 ms of generation. Error path: if the connection drops,
        the server closes the SSE stream gracefully within 5 s."

        Story 2 (frontend consumption): "Given an active SSE connection, when
        tokens arrive, the UI renders them incrementally. Error path: if the
        stream errors, the UI shows a reconnect prompt." (Can be developed
        against a stubbed SSE endpoint in parallel with Story 1.)

        Story 3 (performance): "Given 10 concurrent streaming sessions, when
        each generates 500 tokens, then p95 first-token latency is under 200 ms
        and no session drops." (Depends on Story 1 being production-ready.)

        Step 4 — Verify INVEST on each story. Story 1 and Story 2 are
        independent (Story 2 can develop against a stub). Each is estimable now
        that the spike resolved the technical unknowns. Each has testable
        acceptance criteria covering happy and error paths.

        Step 5 — Order dependencies: Spike to Story 1 and Story 2 in parallel
        (Story 2 against stub) to Story 3 (requires real backend).
      passThreshold: 0.6
    guidance: >-
      The key differentiator is handling upstream uncertainty correctly:
      candidates who decompose without first scheduling a spike produce
      poorly estimated stories. Strong answers design the spike as time-boxed
      with a knowledge output, not as an implementation task, and produce
      post-spike stories with acceptance criteria covering both happy and error
      paths rather than only the success scenario.

  # ── Tier 400 — Analyze ──────────────────────────────────────────────────
  - id: task-decomposition-400-mc-a
    tier: 400
    bloom: analyze
    difficulty: 430
    type: multiple_choice
    prompt: >-
      A tasks.md file has 20 items all marked [X] (complete). Before reporting
      the feature as done, what is the most important verification step and why?
    choices:
      - id: a
        text: >-
          Count that all 20 items exist — if the list is intact, the work is done
      - id: b
        text: >-
          Re-run the full test suite; if it passes, the checkboxes can be trusted
      - id: c
        text: >-
          Spot-check 3–4 completed tasks against actual code evidence, because
          checkboxes reflect intent, not implementation
      - id: d
        text: >-
          Ask the implementing agent to confirm — it has the best context about
          what it did
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Checkboxes in a task list are claimed completions, not verified ones.
      An agent may mark a task done optimistically, or it may have completed a
      subtly different scope than intended. The ground truth is the code.
      Spot-checking means finding the function, file, or test that the task
      said would exist and confirming it is actually there and does what the
      task specified. Asking the implementing agent reintroduces confirmation
      bias; it will tend to endorse its own claimed work. Tests help but may not
      cover every task's success criterion.

  - id: task-decomposition-400-sa-a
    tier: 400
    bloom: analyze
    difficulty: 440
    type: multiple_choice
    prompt: >-
      An agent reports completing a refactoring task across four modules. The
      code compiles and all existing tests pass. Two weeks later a reviewer
      finds that three of the four modules still use the deprecated pattern;
      only the module the agent touched last was actually updated. Which
      failure mode best explains this outcome?
    choices:
      - id: a
        text: >-
          Phantom completion — the agent marked the task done after partially
          executing it, without verifying all four modules were updated
      - id: b
        text: >-
          Granularity collapse — the four modules should have been decomposed
          into separate tasks so each had its own verifiable acceptance criterion
      - id: c
        text: >-
          Scope creep — the task grew beyond its original boundary after the
          agent started work
      - id: d
        text: >-
          Dependency misordering — the review ran before the refactoring
          propagated to downstream modules
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Phantom completion is when a task is marked done but the backing work is
      incomplete or missing. Here the agent executed partially (one module) and
      claimed completion without verifying all four. Granularity collapse (b) is
      plausible — finer decomposition would also have surfaced the gap — but it
      describes a structural prevention rather than the failure mode that actually
      occurred. The symptom is a claimed completion without actual completion,
      which is the defining signature of phantom completion.
  - id: task-decomposition-400-mc-c
    tier: 400
    bloom: analyze
    difficulty: 405
    type: multiple_choice
    prompt: >-
      A feature is decomposed so that 60% of the work can be executed by
      parallel subagents and 40% must remain sequential. An orchestrator
      dispatches ten parallel subagents for the parallelizable portion.
      Applying Amdahl's Law, what is the approximate ceiling on total
      speedup regardless of how many additional agents are added?
    choices:
      - id: a
        text: >-
          10x — ten agents produce proportional speedup for the parallel
          fraction
      - id: b
        text: >-
          6x — sixty percent of work parallelizes, so at most six agents
          contribute useful throughput
      - id: c
        text: >-
          2.5x — the 40% sequential fraction caps maximum speedup at
          1/(1-0.6) regardless of agent count
      - id: d
        text: >-
          1x — sequential tasks must fully complete before parallel tasks
          start, so no net speedup is achievable
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Amdahl's Law states that the maximum speedup is 1/(1-P) where P is
      the parallelizable fraction. With P=0.6, the ceiling is 1/0.4 = 2.5x,
      regardless of how many agents handle the parallel portion. Investing
      in more subagents past the point of diminishing returns yields
      near-zero benefit; reducing the sequential fraction has far greater
      impact. The common errors are treating speedup as proportional to
      agent count (choice a) or to the parallelizable fraction directly
      (choice b).
  - id: task-decomposition-400-ff-a
    tier: 400
    bloom: analyze
    difficulty: 408
    type: free_form
    prompt: >-
      Five tasks are planned for a feature: (1) write the database schema
      migration, (2) implement the domain model class, (3) write the
      repository layer that uses the domain model, (4) write the API
      handler that calls the repository, (5) write integration tests that
      call the API end-to-end and verify data is persisted. A colleague
      proposes running tasks 1, 2, and 5 in parallel while scheduling 3
      and 4 sequentially afterward. Analyze whether this dependency
      ordering is correct, identify any errors, and state the correct
      execution graph with reasoning for each edge.
    rubric:
      criteria:
        - id: identifies-1-2-parallelizable
          text: >-
            Correctly identifies that tasks 1 and 2 can run in parallel
            because the schema migration and domain model have no dependency
            on each other.
        - id: flags-task-5-error
          text: >-
            Identifies that task 5 (integration tests) cannot run in
            parallel with tasks 1 and 2 because it depends on all of tasks
            1-4 being complete — the full API and persistence stack must
            exist before end-to-end tests can execute.
        - id: identifies-task-3-dependencies
          text: >-
            Notes that task 3 (repository) depends on both the domain model
            (task 2) and the schema migration (task 1) and must follow both.
        - id: identifies-task-4-dependency
          text: >-
            Notes that task 4 (API handler) depends on task 3 (repository);
            the sequential 3 to 4 ordering in the proposal is correct.
        - id: proposes-correct-graph
          text: >-
            States the correct execution graph: tasks 1 and 2 in parallel,
            then task 3, then task 4, then task 5, with causal reasoning for
            each ordering constraint.
      referenceAnswer: >-
        The proposal contains one critical error: task 5 (integration tests)
        is incorrectly placed in parallel with tasks 1 and 2.

        Tasks 1 and 2 are genuinely independent of each other — the schema
        migration does not require the domain model and vice versa — so they
        can run in parallel. The proposal is correct on this point.

        Task 3 (repository) has data dependencies on both task 1 (it must
        know the schema to write correct queries) and task 2 (it uses the
        domain model as its return type). Task 3 cannot start until both
        1 and 2 are complete.

        Task 4 (API handler) calls the repository and cannot be written or
        tested without task 3. The sequential 3 to 4 ordering is correct.

        Task 5 (integration tests) calls the full stack — HTTP handler to
        repository to database. It requires all of tasks 1, 2, 3, and 4
        to be complete and integrated. Running it in parallel with tasks 1
        and 2 means testing against a non-existent API and an unpopulated
        schema; the tests would fail or be untestable.

        Correct execution graph: [1, 2] in parallel then 3 then 4 then 5.

        The error is treating integration tests as having no upstream
        dependencies because they are "just tests." Integration tests are
        the most downstream artifact in the dependency chain and inherit
        all prior dependencies.
      passThreshold: 0.6
    guidance: >-
      This item tests causal dependency reasoning, not just topological
      awareness. Strong answers identify both the correct parallelism
      (tasks 1 and 2) and the mis-placed integration test (task 5) with
      explicit reasoning for each edge. Candidates who correct the task-5
      placement without explaining the dependency chain satisfy the minimum
      threshold but miss the deeper analysis expected at tier 400.
  - id: task-decomposition-400-mc-d
    tier: 400
    bloom: analyze
    difficulty: 411
    type: multiple_choice
    prompt: >-
      A project lead reviews a Work Breakdown Structure whose leaf nodes
      include "Write unit tests for the auth module" and "Review the auth
      module code." A PMI-certified colleague flags these as incorrectly
      structured. What is the most precise reason?
    choices:
      - id: a
        text: >-
          The nodes are too small — WBS work packages should represent at
          least eight hours of effort
      - id: b
        text: >-
          WBS nodes represent deliverables (nouns — outcomes that can be
          inspected and handed over), not activities (verbs). "Unit test
          suite" and "Code review report" are correct deliverable forms;
          "Write" and "Review" describe activities that belong in a schedule
          or Gantt chart
      - id: c
        text: >-
          Testing and review work must appear in a separate
          quality-assurance branch of the WBS, never under the same parent
          as development work
      - id: d
        text: >-
          The leaf nodes violate the 100% rule because reviewing code
          conceptually duplicates scope already present in the development
          node above them
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A WBS decomposes scope into deliverables — things that can be
      verified as complete independent of who performed the work. When
      nodes are phrased as activities (verbs), the WBS has drifted into an
      activity list or Gantt chart, which is a separate planning artifact.
      The 100% rule (choice d) concerns whether the sum of child nodes
      covers all parent scope — a correct but distinct principle that does
      not address the noun/verb framing issue here.
  - id: task-decomposition-400-mc-e
    tier: 400
    bloom: analyze
    difficulty: 416
    type: multiple_choice
    prompt: >-
      An orchestrator fans out five parallel subagents and then blocks on a
      fan-in step before continuing. Estimated completion times are 2, 3,
      2, 5, and 2 minutes. A planner uses the average (2.8 minutes) to
      estimate when the fan-in will unblock. Why is this estimate wrong?
    choices:
      - id: a
        text: >-
          The average is only wrong if one agent is a known outlier; with
          uniform task types the average is a sound estimate
      - id: b
        text: >-
          The sum (14 minutes) is correct because the orchestrator processes
          each result sequentially before merging
      - id: c
        text: >-
          The slowest branch (5 minutes) governs the fan-in; the
          synchronization barrier cannot release until every branch
          completes, so average duration systematically underestimates
          latency
      - id: d
        text: >-
          The fastest branch (2 minutes) determines when partial merge can
          begin, making 2 minutes a defensible lower-bound estimate for when
          useful downstream work resumes
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      A fan-in barrier is a synchronization point: no downstream task
      proceeds until the last branch reports complete. Wall-clock time is
      therefore bounded by the slowest branch, not the average or the
      fastest. Planning with average duration systematically underestimates
      latency because it ignores the tail — a single slow subagent holds
      the entire downstream chain. This is why production fan-out patterns
      include explicit timeout and partial-result policies.
  - id: task-decomposition-400-mc-f
    tier: 400
    bloom: analyze
    difficulty: 422
    type: multiple_choice
    prompt: >-
      A team creates two stories: "Persist user preferences to the
      database" and "Render user preferences on the profile page." They
      claim these are Independent per INVEST because one writes and the
      other only reads — no concurrent writes exist. Identify the flaw.
    choices:
      - id: a
        text: >-
          Read-only stories are always independent of their data source by
          definition, so the reasoning is sound
      - id: b
        text: >-
          Independence in INVEST means the stories can be scheduled and
          delivered in any order; the render story cannot be meaningfully
          implemented or tested without the storage story's schema and
          data, making them sequentially dependent despite the read/write
          split
      - id: c
        text: >-
          The stories violate Valuable rather than Independent because the
          render story has no user value until storage is live
      - id: d
        text: >-
          They are independent provided feature flags are used to hide the
          render story until storage ships; independence is a deployment
          concern, not a development concern
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      INVEST's Independent criterion is about scheduling freedom — either
      story can be delivered first with no logical gap — not about database
      access patterns. A display story that requires a schema and data
      contract that does not yet exist has a hard data dependency on the
      storage story. The read/write distinction describes access type;
      it does not establish scheduling independence. True independence
      requires each story to be demonstrably completable in either order.
  - id: task-decomposition-400-mc-g
    tier: 400
    bloom: analyze
    difficulty: 427
    type: multiple_choice
    prompt: >-
      A new service project's first task reads: "Build a walking skeleton:
      wire HTTP handler, service layer, and database, return a hard-coded
      200 OK, and deploy to staging." A developer proposes adding the first
      real validation rule to this task to avoid "a trivial, value-free
      commit." Why should this proposal be rejected?
    choices:
      - id: a
        text: >-
          Walking skeletons must use real test data rather than hard-coded
          responses; the developer's concern is valid and the logic addition
          is appropriate
      - id: b
        text: >-
          Adding business logic conflates architectural scaffolding with
          feature delivery, destroying the skeleton's purpose: proving
          end-to-end plumbing and the deployment pipeline before any feature
          is introduced. A deployment failure in the combined task is
          ambiguous — plumbing or logic?
      - id: c
        text: >-
          Walking skeletons are only necessary for distributed systems;
          a single-service deployment has defined layer boundaries and does
          not benefit from the pattern
      - id: d
        text: >-
          The task is already over-scoped — a walking skeleton should prove
          one layer at a time, starting with the database connection alone
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Cockburn's walking skeleton is intentionally feature-free. Its value
      is confirming that the full architectural path — from network ingress
      through all intermediate layers to persistence — can be assembled,
      deployed, and invoked without errors. Adding a real validation rule
      before that proof exists couples two concerns in one task: if
      deployment fails, you cannot determine whether the failure is in the
      plumbing or the new logic. The skeleton is committed clean; features
      are built only on a confirmed foundation.
  - id: task-decomposition-400-mc-h
    tier: 400
    bloom: analyze
    difficulty: 433
    type: multiple_choice
    prompt: >-
      A team's Definition of Done requires: code reviewed, CI passing,
      deployed to staging, documentation updated. A story's acceptance
      criteria specify: "Given an admin user, when they visit /reports,
      then a CSV export button is visible." An auditor calls these two
      artifacts redundant because both describe conditions the story must
      satisfy. Identify the analytical error in this claim.
    choices:
      - id: a
        text: >-
          The auditor is correct; both artifacts serve the same quality-gate
          function and should be consolidated to reduce process overhead
      - id: b
        text: >-
          Acceptance criteria are story-specific functional contracts that
          change every sprint; the DoD is a stable team-wide quality baseline
          applied universally on top of every story's criteria. They govern
          different concerns and cannot be merged without destroying one
      - id: c
        text: >-
          The DoD covers technical requirements while acceptance criteria
          cover business requirements; they overlap only when both reference
          the same layer, which is not the case here
      - id: d
        text: >-
          Acceptance criteria should be promoted into the DoD as features
          stabilize, so the auditor is correct about long-term redundancy
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The DoD is a persistent, team-wide contract that defines "shippable"
      regardless of what a given story does — it is the universal quality
      floor. Acceptance criteria are the per-story behavioral contract
      specifying which specific outcomes must be true. Every story must
      satisfy both: its own acceptance criteria AND the DoD. Merging them
      would either make the DoD story-variable (eliminating its function as
      a shared standard) or strip stories of their testable behavioral
      contracts.
  - id: task-decomposition-400-sa-b
    tier: 400
    bloom: analyze
    difficulty: 436
    type: short_answer
    prompt: >-
      A team starting a new service writes no feature code in their first
      commit. Instead they wire up an HTTP handler, a service layer stub,
      and a database connection — each returning hard-coded placeholder
      values — and deploy the whole stack to staging to confirm that all
      three layers communicate end-to-end. Only after this commit passes CI
      and deploys cleanly do they begin writing real feature logic. What
      planning technique or pattern does this first commit exemplify?
    answerKey:
      kind: keyword
      anyOf:
        - walking skeleton
        - walking-skeleton
        - thin skeleton
      normalize: lower
    guidance: >-
      Coined by Alistair Cockburn, the walking skeleton is intentionally
      devoid of business logic; its sole purpose is confirming that each
      architectural layer can communicate end-to-end and that the deployment
      pipeline can promote a passing build. Architectural surprises
      discovered at skeleton stage cost a fraction of what they cost once
      feature work has been built on a flawed foundation. The skeleton
      should be deployed and verified clean before any feature logic is
      introduced.
  - id: task-decomposition-400-mc-i
    tier: 400
    bloom: analyze
    difficulty: 438
    type: multiple_choice
    prompt: >-
      A team estimates "Integrate with the vendor's event-streaming API."
      Estimates diverge: 2 to 20 story points. No team member has used this
      API before. The team lead proposes splitting the story into smaller
      stories as the remedy. Analyze why splitting is the wrong first
      response here.
    choices:
      - id: a
        text: >-
          Splitting is inappropriate when estimates vary widely; the team
          should accept the highest estimate to ensure safety
      - id: b
        text: >-
          Splitting produces smaller stories that remain equally unestimable,
          because the problem is a knowledge gap, not story size. A
          time-boxed spike to investigate the API is the correct first
          response — its output is knowledge, not production code, and it
          unblocks accurate estimation
      - id: c
        text: >-
          A 2-20 point range is acceptable variability; the story meets
          INVEST Estimable at the median and can proceed to sprint planning
      - id: d
        text: >-
          The story should be escalated to the product owner rather than
          estimated, because estimation is only valid when the product owner
          has fully specified requirements
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      INVEST's Estimable criterion fails due to missing knowledge, not
      excessive size. Splitting an unestimable story produces child stories
      that inherit the same knowledge gap — the 2-to-20-point range
      persists across the children. A spike is a time-boxed investigation
      whose sole deliverable is the information needed to decompose and
      estimate accurately: API capabilities, authentication complexity, rate
      limits, and error semantics. Splitting instead of spiking amounts to
      decomposing uncertainty into smaller portions of uncertainty.
  - id: task-decomposition-400-mc-j
    tier: 400
    bloom: analyze
    difficulty: 444
    type: multiple_choice
    prompt: >-
      A developer decomposes a data access layer into four modules following
      execution order: open-connection, build-query, execute-query,
      parse-result. A senior engineer argues this violates Parnas's
      decomposition principle. What is the engineer's most precise
      argument?
    choices:
      - id: a
        text: >-
          The modules are too fine-grained; Parnas requires each module to
          span a complete functional capability, not a single execution step
      - id: b
        text: >-
          Parnas argued modules should each hide one design decision likely
          to change. Decomposing by execution step exposes the internal
          sequence across all module interfaces, so changing any step —
          for example switching query builders — ripples across multiple
          modules instead of being contained within one
      - id: c
        text: >-
          Parnas's principle applies only at the hardware-software boundary;
          a pure-software persistence layer should use functional
          decomposition by execution step
      - id: d
        text: >-
          The modules violate information hiding because the caller must
          invoke them in a fixed sequence, which is an unavoidable property
          of sequential pipeline architectures
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Parnas (1972) explicitly rejected decomposing modules by execution
      step because it exposes internal sequence transitions across module
      boundaries, making each boundary a dependency on implementation order.
      Instead, each module should own one volatile design decision: how
      connections are managed, how queries are represented, how rows map to
      domain objects. When that decision changes, only one module changes
      and the interface absorbs the variation — the blast radius of the
      change is bounded to a single module.
  - id: task-decomposition-400-mc-k
    tier: 400
    bloom: analyze
    difficulty: 450
    type: multiple_choice
    prompt: >-
      A team adopts trunk-based development. Their current sprint stories
      average four days of development before they can be merged. A
      consultant says the decomposition is incompatible with TBD. What is
      the root cause and the appropriate remedy?
    choices:
      - id: a
        text: >-
          TBD requires abandoning sprint planning; the sprint structure,
          not the story size, is what is incompatible
      - id: b
        text: >-
          TBD requires at least daily integration to main, so tasks must
          produce a passing build within a day. Four-day stories must be
          split into sub-day increments; large features are still deliverable
          using branch-by-abstraction or feature flags to integrate
          incomplete code safely
      - id: c
        text: >-
          TBD is inherently incompatible with features spanning more than
          a single function change; large features must wait for a long-lived
          branching strategy
      - id: d
        text: >-
          The remedy is to merge to main at sprint boundaries (every two
          weeks), treating the sprint as the integration cadence
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Trunk-based development makes integration frequency a technical
      constraint: every commit to main must produce a passing, releasable
      build. Stories requiring four-day isolated branches are structurally
      incompatible with this cadence. The solution is not to abandon TBD
      but to decompose stories into sub-day increments, each producing a
      green build. Branch-by-abstraction and feature flags allow incomplete
      features to integrate safely without violating the green-main
      invariant — TBD raises the bar on decomposition quality, not the
      ceiling on feature scope.
  - id: task-decomposition-400-sa-c
    tier: 400
    bloom: analyze
    difficulty: 455
    type: short_answer
    prompt: >-
      A team has a large story: "As a buyer, I can search for products by
      keyword, apply category and price-range filters, sort by relevance or
      recency, and view paginated results." Rather than splitting by
      technical layer, they deliver a first story that covers only the
      happy-path keyword search with no filters, sorting, or pagination.
      Subsequent stories add each of those capabilities independently.
      Which single letter of the SPIDR acronym names the splitting pattern
      this team applied?
    answerKey:
      kind: keyword
      anyOf:
        - p
        - path
        - spidr path
        - spidr-path
      normalize: lower
    guidance: >-
      SPIDR gives teams a structured vocabulary for story splits that
      maintain INVEST's Valuable criterion. The Path pattern splits a story
      by delivering the simplest workflow path first (keyword search only)
      and adding each additional path (filters, sort, pagination) as
      independent follow-on stories. Without a named pattern, teams default
      to horizontal layer splits — database, API, UI — which produce stories
      that individually deliver no user-visible value.
  - id: task-decomposition-400-mc-l
    tier: 400
    bloom: analyze
    difficulty: 459
    type: multiple_choice
    prompt: >-
      An orchestrator plans to run two subagents concurrently: Agent A
      rewrites the parseUser function in auth/user.ts and Agent B adds a
      normalizeEmail helper to the same file. The orchestrator argues they
      are safe to parallelize because the two functions are logically
      unrelated. Identify the flaw in this reasoning.
    choices:
      - id: a
        text: >-
          The reasoning is sound; logically unrelated functions in the same
          file do not create a dependency and concurrent edits are safe
      - id: b
        text: >-
          A file is a shared mutable resource at the OS level; concurrent
          writes to the same file from two agents produce non-deterministic
          or conflicting output regardless of which lines each agent targets.
          Logical independence between functions does not create file-level
          isolation
      - id: c
        text: >-
          The risk is limited to module-level declarations and imports at
          the top of the file; edits to separate function bodies are safe
          to parallelize
      - id: d
        text: >-
          Most file systems serialize concurrent writes via advisory locking,
          so the concern is theoretical rather than practically harmful
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      File-level ownership is the minimum isolation boundary for concurrent
      agent writes. Two agents writing to the same file race at the OS or
      version-control layer, producing conflicting or corrupted output
      regardless of how unrelated the targeted functions are. Logical
      independence is a story-level concept; physical independence —
      writing to disjoint files — is the constraint that makes
      parallelization safe. The correct decomposition assigns each agent
      to its own file or sequences the edits serially.
  - id: task-decomposition-400-ff-b
    tier: 400
    bloom: analyze
    difficulty: 462
    type: free_form
    prompt: >-
      A team's story reads: "As a seller, I can create a product listing
      with name, description, up to 10 photos, price, inventory count, and
      variant configuration (size, color, material)." Estimates range from
      21 to 34 story points. Analyze which SPIDR splitting patterns apply,
      explain why horizontal layer splits would be wrong here, and propose
      a concrete splitting plan producing independently valuable child
      stories.
    rubric:
      criteria:
        - id: identifies-spidr-patterns
          text: >-
            Names at least two applicable SPIDR patterns (Path, Data, Rules,
            or Interface) and explains why each applies to the specific
            complexity axes of this story.
        - id: rejects-horizontal-splits
          text: >-
            Explicitly rejects or avoids layer splits (e.g. database story,
            API story, UI story) and explains that horizontal slices fail
            INVEST Valuable because no layer alone is user-demonstrable.
        - id: produces-independent-slices
          text: >-
            Proposed child stories are each independently deliverable and
            demonstrable without requiring the others to be complete first.
        - id: correct-story-count
          text: >-
            Produces at least three and no more than six child stories, each
            small enough to estimate within a sprint.
        - id: preserves-testability
          text: >-
            Each proposed child story has an implied or explicit acceptance
            criterion that can be verified end-to-end by a user or
            stakeholder.
      referenceAnswer: >-
        This story bundles complexity across multiple SPIDR axes:

        Path (workflow): The simplest listing path is text-only — name,
        description, price, inventory. Everything else enriches this core.

        Data complexity: Photos (up to 10) and variant configuration
        (size, color, material combinations) are significantly more complex
        data paths than simple scalar fields and can be split as later
        slices.

        Rules: Variant configuration introduces combinatorial business rules
        — which size+color+material combinations are valid, how inventory
        maps per variant — that represent a distinct rules slice.

        Why horizontal splits are wrong: A "build the product schema" or
        "build the listing API endpoints" story delivers no user-visible
        value and cannot be demoed to a seller. Horizontal slices integrate
        only at the end, creating a late-discovery risk cliff and producing
        nothing shippable at intermediate points.

        Proposed split plan using Path, Data, and Rules patterns:

        Slice 1 (Path — core): A seller can create a text-only listing with
        name, description, price, and inventory count. Acceptance: listing
        appears in search results; a buyer can view it. This is the walking
        skeleton of the listing feature.

        Slice 2 (Data — photos): A seller can attach up to 10 photos to an
        existing listing. Depends on Slice 1. Acceptance: photos are visible
        on the listing page.

        Slice 3 (Rules — variants): A seller can define variant options
        (size, color, material) on an existing listing with per-variant
        inventory. Depends on Slice 1. Acceptance: a buyer sees a variant
        selector and each variant reports correct inventory.

        Each slice is end-to-end and demonstrable: Slice 1 alone supports a
        limited but real listing; Slices 2 and 3 can be prioritized
        independently of each other after Slice 1 ships.
      passThreshold: 0.6
    guidance: >-
      Strong answers name specific SPIDR patterns and map them to the
      story's concrete complexity axes, not just to abstract definitions.
      They also articulate why horizontal splits fail Valuable — a schema
      or API story alone cannot be demoed — not merely that "vertical is
      better." The quality signal is whether each proposed child story
      could be shown to a real seller or buyer and judged useful in
      isolation.
  - id: task-decomposition-400-mc-m
    tier: 400
    bloom: analyze
    difficulty: 465
    type: multiple_choice
    prompt: >-
      A pipeline has three tasks: Task A runs the test suite; Task B
      decides which task to run next based on whether Task A passed or
      failed; Task C generates a full coverage report from Task A's
      detailed output. How should the A-to-B and A-to-C dependencies be
      classified?
    choices:
      - id: a
        text: >-
          Both are data dependencies because both tasks consume an output
          produced by Task A
      - id: b
        text: >-
          A-to-B is a control dependency (B branches on A's pass/fail
          decision, not on content artifacts); A-to-C is a data dependency
          (C transforms A's detailed output into a report)
      - id: c
        text: >-
          A-to-B is a data dependency because pass/fail is a data value;
          A-to-C is a control dependency because C runs only after A
          completes
      - id: d
        text: >-
          Both are control dependencies because both B and C are conditioned
          on A finishing before they can start
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      A control dependency governs execution routing: which branch to take
      or which task to invoke next, based on a categorical decision result.
      Task B needs only the pass/fail flag — it does not consume A's
      content artifacts. A data dependency governs content transformation:
      the downstream task reads, extends, or reformats the upstream task's
      output. Task C requires A's full detailed output to produce the
      coverage report. Distinguishing the two guides interface design:
      control handoffs need only a status signal; data handoffs require
      artifact transfer.
  - id: task-decomposition-400-ff-c
    tier: 400
    bloom: analyze
    difficulty: 447
    type: free_form
    prompt: >-
      Agentic coding tools often separate a "plan mode" (read-only
      exploration and decomposition, no file modifications) from an
      "execute mode" (file edits and command execution). Analyze why this
      two-phase structure reduces error rates compared to interleaving
      planning and execution freely. Identify the specific categories of
      errors each phase boundary prevents.
    rubric:
      criteria:
        - id: identifies-stale-read-risk
          text: >-
            Explains that interleaved planning and execution risks the agent
            acting on a stale read — file state read during planning may
            have been modified by earlier execution steps, producing
            decisions based on outdated information.
        - id: identifies-correction-cost-asymmetry
          text: >-
            Notes that a written plan can be reviewed and corrected before
            any irreversible changes occur; correcting a plan costs minutes
            whereas correcting incorrect file edits or executed commands
            can cost hours. The phase boundary creates a low-cost review
            checkpoint.
        - id: identifies-scope-drift-risk
          text: >-
            Recognizes that interleaving allows scope to expand mid-execution
            as the agent discovers new work and immediately acts on it,
            without the original decomposition being validated against
            requirements.
        - id: identifies-context-structuring-benefit
          text: >-
            Notes that writing the plan structures the agent's own working
            context, reducing the probability of hallucinated steps or
            silently omitted acceptance criteria during execution.
      referenceAnswer: >-
        The two-phase structure prevents three distinct categories of error:

        1. Stale-read errors. If an agent reads a file to form a plan,
        then modifies a different file (which changes another file's imports
        or type signatures), then acts on its original read of the first
        file, it is operating on state that no longer reflects the codebase.
        Completing all reads before any writes eliminates this intra-session
        race condition entirely.

        2. Premature and costly action. A plan is a lightweight text
        artifact that can be reviewed, critiqued, and rewritten at near-zero
        cost. File modifications, executed commands, and migrations are
        harder or impossible to reverse. The phase boundary creates an
        explicit review checkpoint: a human or automated validator can
        approve or reject the decomposition before any irreversible action
        is taken. This asymmetry in correction cost is the strongest
        argument for the two-phase structure.

        3. Scope drift. When planning and execution interleave, the agent
        may discover additional work mid-execution and act on it immediately,
        expanding scope without validating the expansion against the original
        requirements. Separating the phases forces all scope to be declared
        in the plan before execution begins; any newly discovered work must
        be added to the plan and reviewed before being executed.

        A further benefit is context structuring: writing the plan
        externalizes the decomposition, making it less likely the agent will
        hallucinate steps, repeat completed work, or silently omit acceptance
        criteria during the execution phase. The plan acts as a persistent
        working memory that remains accurate throughout execution.
      passThreshold: 0.6
    guidance: >-
      Strong answers engage with multiple lenses — stale-read prevention,
      the cost asymmetry between plan and execution correction, and scope
      control — rather than only saying "you can review the plan." The
      strongest answers also address the context-structuring benefit of
      externalizing the decomposition as written text.
  - id: task-decomposition-400-ff-d
    tier: 400
    bloom: analyze
    difficulty: 462
    type: free_form
    prompt: >-
      A team committed to trunk-based development (daily integration to
      main, CI runs on every merge) has planned eight stories for a pricing
      engine release. Estimates range from 5 to 13 days per story. Analyze
      whether this plan is compatible with trunk-based development and
      continuous delivery, identify the specific incompatibilities, and
      describe what decomposition changes are required — including how
      incomplete features can be integrated safely.
    rubric:
      criteria:
        - id: identifies-size-incompatibility
          text: >-
            Identifies that stories taking 5-13 days cannot be integrated
            daily to main; this is structurally incompatible with the
            trunk-based development integration constraint.
        - id: explains-tbd-constraint
          text: >-
            Explains that TBD requires every commit to main to produce a
            passing build, constraining task size to sub-day increments,
            not sprint-length stories.
        - id: identifies-cd-feedback-loss
          text: >-
            Notes that infrequent merges (every 5-13 days) negate the
            fast-feedback value of the CD pipeline; defects introduced
            early in the story are not discovered until merge time.
        - id: proposes-decomposition-fix
          text: >-
            Proposes splitting stories into sub-day increments, each
            producing a passing build when merged.
        - id: addresses-incomplete-feature-strategy
          text: >-
            Names a concrete strategy (branch-by-abstraction, feature flags,
            or equivalent) for integrating incomplete features daily without
            violating the green-main invariant.
      referenceAnswer: >-
        The plan is incompatible with trunk-based development and continuous
        delivery on two dimensions:

        Incompatibility 1: Integration cadence vs. story size. TBD requires
        commits to main at least daily, each producing a green build. A
        5-day story means five days of divergence from main before the first
        integration — five days of potential conflicts, regressions, and
        undetected breakage accumulating in an isolated branch. A 13-day
        story is worse by a factor of 2.6.

        Incompatibility 2: CD pipeline feedback latency. The pipeline runs
        on every merge to main. If merges happen every 5-13 days, the
        pipeline becomes an expensive batch test run rather than a
        fast-feedback loop. Defects introduced on day 2 of a 10-day story
        are not caught until day 10, by which time additional work has
        been built on top of the defect.

        Required decomposition changes: Each story must be split into
        increments that can be completed within a working day and each
        produce a passing build when merged. For a 10-day story this
        implies approximately 8-10 micro-increments.

        Integrating incomplete features safely: Two strategies preserve
        the green-main invariant while large features are built
        incrementally. Branch-by-abstraction introduces an abstraction
        layer over the existing implementation, adds the new behavior behind
        it, and switches the caller atomically once the new implementation
        is complete — each daily commit extends the implementation behind
        the abstraction without exposing incomplete behavior. Feature flags
        gate new pricing logic behind a configuration toggle that is off by
        default in production; each daily commit advances the implementation
        and the flag is enabled only when all increments pass acceptance
        criteria.
      passThreshold: 0.6
    guidance: >-
      Strong answers frame the incompatibility across both dimensions:
      integration cadence and CD feedback latency. They also name a
      concrete safe-integration strategy for incomplete features rather
      than only "break the stories down."
  - id: task-decomposition-400-ff-e
    tier: 400
    bloom: analyze
    difficulty: 472
    type: free_form
    prompt: >-
      A team consistently finishes sprints with 2-3 stories partially
      complete. Investigation reveals two recurring patterns: (a) stories
      enter sprint planning with vague or missing acceptance criteria,
      requiring mid-sprint clarification that delays implementation; (b)
      some stories whose code passes all acceptance criteria are not
      deployed because documentation was never written. Analyze which
      planning artifact is missing or broken for each pattern, explain
      the structural distinction between those two artifacts, and propose
      a concrete, enforceable remedy for each.
    rubric:
      criteria:
        - id: pattern-a-diagnosis
          text: >-
            Correctly diagnoses pattern (a) as a Definition of Ready
            failure: stories entering sprint planning without written
            acceptance criteria have not satisfied the pre-conditions for
            sprint entry.
        - id: pattern-b-diagnosis
          text: >-
            Correctly diagnoses pattern (b) as a Definition of Done
            failure: stories whose documentation is not written cannot
            satisfy the team's universal quality baseline for a shippable
            increment.
        - id: structural-distinction
          text: >-
            Explains the structural distinction: DoR is a pre-condition
            for sprint entry (input readiness — can the team start?); DoD
            is a post-condition for done-ness (output quality — is it
            shippable?). They govern different lifecycle phases and cannot
            be substituted for each other.
        - id: remedy-a
          text: >-
            Proposes a concrete DoR checklist item that would block
            pattern (a) — e.g. "acceptance criteria written and reviewed"
            must be satisfied before a story enters sprint planning.
        - id: remedy-b
          text: >-
            Proposes a concrete DoD addition that would block pattern (b)
            — e.g. "documentation updated" added as an enforced hard gate
            before a story is declared complete.
      referenceAnswer: >-
        Pattern (a) is a Definition of Ready failure. The DoR is the
        pre-condition checklist a story must satisfy before the team pulls
        it into sprint planning. A story with missing acceptance criteria
        fails DoR because the team cannot estimate, implement, or verify
        a story whose success conditions are undefined. The mid-sprint
        clarification requirement is a symptom of having accepted an unready
        story into the sprint — the clarification work should have happened
        in backlog refinement before sprint entry.

        Remedy for (a): Add "acceptance criteria written, reviewed with the
        product owner, and agreed by at least two team members" to the DoR
        checklist. Enforce this as a hard gate: stories that do not pass
        DoR are returned to the backlog and are not carried into sprint
        planning.

        Pattern (b) is a Definition of Done failure. The DoD is the
        post-condition checklist that every story must satisfy before being
        declared complete and shippable. Documentation is a standard DoD
        item; its absence means either the DoD does not include it or the
        item is present but unenforced.

        Remedy for (b): Add "user-facing and API documentation updated to
        reflect the story's changes" to the DoD checklist as a hard gate.
        A story whose documentation is not written is not done, regardless
        of whether its code passes acceptance criteria. The DoD is
        non-negotiable once a sprint starts.

        Structural distinction: DoR asks "can we start?" and is evaluated
        before sprint entry. DoD asks "is it shippable?" and is evaluated
        before marking a story complete. They are not the same concept
        applied at different times — they govern different quality concerns
        at different lifecycle phases. DoR prevents commitment to
        under-specified work; DoD prevents shipping under-quality work.
      passThreshold: 0.6
    guidance: >-
      Strong answers correctly name both artifacts, map each to the right
      pattern with clear causal reasoning, explain their structural
      distinction as input versus output quality gates, and propose
      concrete enforceable checklist items for each.

  # ── Tier 500 — Evaluate ─────────────────────────────────────────────────
  - id: task-decomposition-500-mc-a
    tier: 500
    bloom: evaluate
    difficulty: 480
    type: multiple_choice
    prompt: >-
      A plan has 40 tasks, each scoped to a single function change, with
      explicit sequential dependencies between every pair of consecutive tasks.
      An experienced engineer flags this plan as over-decomposed. What is the
      most likely cost of this granularity?
    choices:
      - id: a
        text: >-
          It is impossible to over-decompose; finer granularity always improves
          verifiability
      - id: b
        text: >-
          At this granularity, the overhead of task handoffs, context
          re-establishment, and sequential blocking exceeds the value of
          independent verifiability for each unit
      - id: c
        text: >-
          40 tasks is too many for any AI to reason about, so it will refuse to
          execute the plan
      - id: d
        text: >-
          Single-function tasks are never the right decomposition because
          functions are too small to test in isolation
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Decomposition has diminishing returns. Each task boundary introduces
      context-switching cost: the implementing agent (or human) must reload
      intent, re-read the relevant code, and establish local context before
      making a one-line change. When every pair is sequentially dependent there
      is no parallelism benefit either. The right granularity is the smallest
      unit that has a meaningful, independently observable outcome — typically a
      coherent behaviour change, not a single function edit. The goal is
      verifiability per unit of work, not maximising unit count.

  - id: task-decomposition-500-ff-a
    tier: 500
    bloom: evaluate
    difficulty: 485
    type: free_form
    prompt: >-
      You are handed a tasks.md with 15 tasks for a new feature. Describe the
      process you would use to evaluate whether the decomposition is correct
      before any implementation begins. What signals would tell you the plan
      needs to be revised, and what specific revisions would you make?
    rubric:
      criteria:
        - id: checks-completion-criteria
          text: >-
            Checks that each task has an observable completion criterion (a test,
            a command output, a file's existence) rather than describing only
            activity ("write the function").
        - id: identifies-dependency-ordering
          text: >-
            Verifies that sequentially dependent tasks are ordered correctly and
            that tasks claimed to be parallelisable do not share mutable state
            (files, schema, in-memory objects).
        - id: flags-mixed-concerns
          text: >-
            Identifies tasks that bundle behaviour-preserving changes with
            behaviour-changing changes (e.g. refactor + bug fix) and recommends
            splitting them.
        - id: flags-granularity-extremes
          text: >-
            Flags both under-decomposition (tasks too large to verify
            independently) and over-decomposition (tasks so small that handoff
            overhead exceeds verifiability benefit), and explains the appropriate
            scope.
        - id: revision-specificity
          text: >-
            Proposes concrete revisions — not just "fix the dependencies" but
            specific re-orderings, splits, or merges with reasoning tied to the
            signals found.
      referenceAnswer: >-
        Before implementation begins, review each of the 15 tasks against five
        criteria:

        1. Observable completion criterion. Each task should state what you can
        check when it is done: a test name that passes, a route that returns a
        specific status code, a file at a given path. A task that says "implement
        the service layer" with no checkable outcome is under-specified. Revision:
        rewrite the task with an explicit acceptance criterion.

        2. Correct dependency ordering. For each pair of tasks, ask: "Could Task B
        be fully specified today, without Task A's output?" If no, they are
        sequentially dependent and must be ordered accordingly. If yes, check
        whether they write to any shared resource (the same file, the same
        database table, the same in-memory structure). Shared mutable state makes
        parallel execution unsafe. Revision: re-order sequential dependencies;
        split tasks that share state into a shared-state task followed by
        independent tasks.

        3. No mixed concerns. Flag any task that combines a behaviour-preserving
        change (refactor, rename, move) with a behaviour-changing change (new
        feature, bug fix). These cannot be safely merged: a regression from one
        cannot be attributed to a cause. Revision: split into a refactoring task
        (verified by no test failures) followed by a feature/fix task.

        4. Granularity check. Flag tasks covering multiple subsystems or requiring
        changes to more than 3–4 files as candidates for splitting. Equally, flag
        runs of tasks that each change a single line in a single file with no
        observable intermediate outcome — these are candidates for merging. The
        right granularity is one coherent, testable behaviour change per task.

        5. Completeness of coverage. Read the feature's acceptance criteria and
        confirm every criterion maps to at least one task. Gaps mean the plan will
        produce code that passes its tasks but misses user-visible requirements.
        Revision: add tasks for uncovered criteria.
      passThreshold: 0.6
    guidance: >-
      Strong answers engage with all five signals: missing completion criteria,
      dependency misordering, mixed concerns, granularity extremes, and coverage
      gaps. Weak answers describe only one or two of these and offer vague
      revisions ("make tasks smaller"). The key differentiator is specificity:
      the candidate should name what to look for AND what to do when they find it.
  - id: task-decomposition-500-mc-b
    tier: 500
    bloom: evaluate
    difficulty: 483
    type: multiple_choice
    prompt: >-
      A project manager builds a WBS whose three top-level deliverables cover an
      estimated 85% of scope, leaving 15% as an unlabeled "management reserve."
      A senior engineer argues this violates the foundational WBS rule. Which
      evaluation is most defensible?
    choices:
      - id: a
        text: >-
          The PM is correct; management reserve is standard PMI practice and
          does not violate WBS principles as long as the core deliverables are
          fully decomposed.
      - id: b
        text: >-
          The engineer is correct; the 100% rule requires the WBS to capture all
          scope — nothing outside it is scheduled or funded, and every parent
          node must equal the sum of its children. An unallocated 15% is
          invisible to scheduling and estimation.
      - id: c
        text: >-
          Both are partially right; management reserve is acceptable as an
          unlisted buffer provided the named deliverables are fully decomposed
          internally.
      - id: d
        text: >-
          The engineer is right but for the wrong reason; the problem is too few
          top-level nodes (three), not the missing scope.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The 100% rule is the foundational constraint of a WBS: the structure must
      capture 100% of work in scope so that nothing is funded or scheduled
      outside it. An unlabeled reserve means that work exists but is not
      tracked, estimated, or assigned — exactly the hidden-work problem the rule
      prevents. Management reserve is a legitimate budget concept but belongs in
      the project budget, not as omitted WBS scope. The number of top-level
      nodes (choice d) is a style concern orthogonal to the 100% rule.
  - id: task-decomposition-500-mc-c
    tier: 500
    bloom: evaluate
    difficulty: 490
    type: multiple_choice
    prompt: >-
      Three engineers debate work-package granularity for a 3-week feature.
      Engineer A insists every package should complete in about 1 hour to
      maximize verifiability. Engineer B argues for the 8-80-hour range.
      Engineer C says the right range is determined solely by sprint length.
      Which position is most defensible?
    choices:
      - id: a
        text: >-
          Engineer A; 1-hour tasks maximize verifiability and make it
          impossible for any single package to slip.
      - id: b
        text: >-
          Engineer B; the 8/80 heuristic balances tracking overhead against
          visibility — sub-8-hour packages produce coordination noise without
          proportional control benefit, while packages above 80 hours mask risk
          until it is too late.
      - id: c
        text: >-
          Engineer C; sprint length is the binding constraint, so any package
          that fits in a sprint is acceptable regardless of hours.
      - id: d
        text: >-
          All three are equally defensible; work-package granularity is purely a
          team preference with no principled bounds.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The 8/80 heuristic is principled: below 8 hours the overhead of creating,
      tracking, and handing off a work package exceeds the visibility it
      provides; above 80 hours status becomes opaque and risk hides inside the
      package until it is already late. Sprint length constrains total sprint
      load but does not determine individual work-package granularity — a
      1-week sprint can contain a 20-hour package without issue. Sub-1-hour
      tasks produce scheduling noise, excessive context-switching, and
      coordination overhead that erode the parallelism benefit they are meant
      to enable.
  - id: task-decomposition-500-mc-d
    tier: 500
    bloom: evaluate
    difficulty: 495
    type: multiple_choice
    prompt: >-
      Two stories exist: Story A "Set up the database schema" and Story B
      "Build the user registration API." A product owner argues they are
      independent because Story B can be unit-tested with a mock database. A
      tech lead argues they are sequentially dependent. Which evaluation is most
      defensible?
    choices:
      - id: a
        text: >-
          The product owner is correct; if Story B can be fully unit-tested with
          mocks it is independent for scheduling purposes.
      - id: b
        text: >-
          The tech lead is correct; any technical connection between two stories
          makes them dependent regardless of testing strategy.
      - id: c
        text: >-
          The product owner is partially right — the stories can be developed in
          parallel, but Story B cannot be integrated, deployed, or demoed
          without Story A's output, so they are not truly independent for
          delivery purposes.
      - id: d
        text: >-
          Both are wrong; INVEST independence requires no shared code, and
          shared schema disqualifies independence entirely.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      INVEST "Independent" means each story can be delivered in any order and
      produces a shippable increment on its own. A story that can be
      unit-tested in isolation but cannot be integrated or deployed without
      another story fails Independence for delivery scheduling purposes. The
      mock-testing workaround is a development convenience, not evidence of
      delivery independence. Choice b is too absolute — technical connection
      alone does not force sequential scheduling if both stories can independently
      produce deployed, demo-able value.
  - id: task-decomposition-500-mc-e
    tier: 500
    bloom: evaluate
    difficulty: 500
    type: multiple_choice
    prompt: >-
      A story reads "migrate 10 years of legacy data to the new schema." The
      team cannot size it — they do not know how dirty the data is or what edge
      cases exist. A junior developer suggests splitting it into 5 smaller
      stories. A senior engineer recommends a spike. Which evaluation is
      correct?
    choices:
      - id: a
        text: >-
          The junior is right; any story that cannot be estimated should be
          split until the parts can be estimated individually.
      - id: b
        text: >-
          The senior is right; the problem is missing knowledge, not story size.
          Splitting produces 5 equally unestimable stories. A time-boxed spike
          produces the missing knowledge and enables accurate estimation of the
          resulting implementation tasks.
      - id: c
        text: >-
          Both approaches are equivalent; either splitting or spiking will
          eventually surface the unknown complexity.
      - id: d
        text: >-
          The senior is right, but a spike is not the correct tool; a
          proof-of-concept branch that partially implements the migration is
          the appropriate remedy.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      INVEST's Estimable criterion fails when knowledge is missing, not when a
      story is large. Splitting a story distributes the ignorance into smaller
      units but does not resolve it — each child story is still unestimable for
      the same reason. A spike is the canonical fix: it is time-boxed, produces
      knowledge as its output, and requires no production code. A spike differs
      from a proof-of-concept (choice d) in that it is explicitly disposable;
      the POC framing conflates exploration with committed implementation and
      introduces the same estimation-before-knowledge problem the spike is meant
      to avoid.
  - id: task-decomposition-500-mc-f
    tier: 500
    bloom: evaluate
    difficulty: 505
    type: multiple_choice
    prompt: >-
      A team's search-feature plan has three stories: Story 1 "Build the
      inverted index data model," Story 2 "Implement the search API endpoints,"
      Story 3 "Build the search results UI." A QA sprint integrates all three.
      An architect flags a fundamental risk. What is it?
    choices:
      - id: a
        text: >-
          The plan has too few stories; a feature of this complexity requires at
          least ten independently verifiable tasks.
      - id: b
        text: >-
          The plan is horizontally sliced — no story delivers end-to-end value,
          all integration happens at the end, and any layer-to-layer contract
          mismatch is discovered only in the QA sprint, creating a late-
          integration risk cliff.
      - id: c
        text: >-
          Story 3 should come before Story 2 because UI requirements drive the
          API contract; the current ordering is backwards.
      - id: d
        text: >-
          The plan is acceptable; three stories is small enough that a QA
          integration sprint adds negligible risk.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Horizontal slicing decomposes by technical layer rather than by user-
      facing behavior. No single story produces a runnable, demo-able increment
      — all inter-layer integration risk accumulates in the final QA sprint. If
      the API and data model have a contract mismatch, the team learns this only
      after all three stories are marked done. Vertical slicing would produce a
      first story such as "Given a user types a query, one hardcoded result
      returns from a real index via the real API in the real UI" — thin but
      end-to-end — so integration problems surface immediately and are cheap to
      fix.
  - id: task-decomposition-500-mc-g
    tier: 500
    bloom: evaluate
    difficulty: 508
    type: multiple_choice
    prompt: >-
      A team starting a new microservice debates whether to build a walking
      skeleton first or implement the first real business feature immediately. A
      manager asks for the strongest justification for the skeleton approach.
      Which answer is most defensible?
    choices:
      - id: a
        text: >-
          A walking skeleton delays value delivery; the first real feature is
          always the better choice because it proves the architecture by
          delivering something users care about.
      - id: b
        text: >-
          The skeleton proves the deployment pipeline, inter-service contracts,
          and toolchain before feature work begins, unblocking parallel feature
          development and surfacing infrastructure failures while they are still
          cheap to fix.
      - id: c
        text: >-
          A walking skeleton is only necessary for greenfield systems; for
          microservices carved from an existing monolith it is never needed.
      - id: d
        text: >-
          The skeleton should include the first real feature to maximise the
          value of the architectural investment.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The walking skeleton's value is precisely that it contains no business
      logic — it is pure architectural scaffolding. By proving all layers
      communicate end-to-end with stubs, it unblocks parallel feature
      development and surfaces pipeline and contract issues before feature work
      creates dependencies on broken infrastructure. Choice d contradicts the
      skeleton's purpose: including a real feature couples business logic to the
      scaffolding, obscuring whether failures are architectural or domain-
      specific. The skeleton is an investment in discovering integration problems
      at the cheapest possible moment.
  - id: task-decomposition-500-mc-h
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: multiple_choice
    prompt: >-
      A senior engineer claims that switching from 5 to 10 parallel subagents
      will roughly halve completion time for a workload that is 60%
      parallelizable. A colleague cites Amdahl's Law in disagreement. Which
      evaluation is correct?
    choices:
      - id: a
        text: >-
          The senior is right; doubling agents doubles parallelizable throughput,
          so a 60%-parallelizable workload benefits proportionally.
      - id: b
        text: >-
          The colleague is right. With 60% parallelizable work, maximum speedup
          is capped at 1/(1-0.6) = 2.5x regardless of agent count. Going from
          5 to 10 agents approaches that ceiling but does not halve time; the
          40% sequential fraction is the true bottleneck.
      - id: c
        text: >-
          Amdahl's Law applies only to CPU threads and cannot be used to reason
          about agentic task parallelism.
      - id: d
        text: >-
          The colleague is right, but Amdahl's Law is not the relevant
          principle; the correct explanation is Brooks' Law coordination
          overhead.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Amdahl's Law is a general parallel-speedup formula applicable to any
      decomposable workload, not just CPU threads: max speedup = 1/((1-P) +
      P/N), where P is the parallelizable fraction and N is the number of
      workers. With P=0.6, the ceiling as N approaches infinity is 2.5x; going from
      5 to 10 agents approaches but does not double throughput. The 40% sequential
      fraction is the real bottleneck, and no amount of agent scaling removes
      it. Brooks' Law (choice d) describes coordination overhead from adding
      workers mid-project — a real concern but a different principle from
      Amdahl's hard ceiling on maximum speedup.
  - id: task-decomposition-500-mc-i
    tier: 500
    bloom: evaluate
    difficulty: 516
    type: multiple_choice
    prompt: >-
      An orchestrator fans out 8 subagents in parallel. Seven complete in
      2 minutes; the eighth takes 14 minutes. The orchestrator then performs a
      fan-in to merge results. A developer claims total elapsed time is roughly
      the average of all 8 branches — about 3.5 minutes. What is wrong with
      this reasoning?
    choices:
      - id: a
        text: >-
          The developer is wrong because fan-in itself adds roughly 50%
          overhead to the average, pushing the total to about 5 minutes.
      - id: b
        text: >-
          The developer is wrong because fan-out latency must be added; total
          time equals the sum of all branch durations, not the average.
      - id: c
        text: >-
          The developer is wrong because the fan-in step is a synchronization
          barrier: total elapsed time equals the slowest branch (14 minutes),
          not the average (3.5 minutes). The seven fast agents provide no
          wall-clock benefit while the eighth is still running.
      - id: d
        text: >-
          The developer is correct; when all branches start simultaneously the
          wall-clock time is the average of branch durations.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Fan-in is a synchronization barrier: no downstream work can proceed until
      every fan-out branch delivers its result. Wall-clock time for the scatter-
      gather pattern equals max(branch durations), not mean(branch durations).
      Seven fast agents produce no end-to-end speedup while the eighth is still
      running. This is a critical planning error: optimizing average task time
      in a fan-out scenario without addressing the slowest branch produces no
      improvement in delivery time. The remedy is to identify the likely long-
      tail branch before fan-out and either split it or accept the schedule
      constraint.
  - id: task-decomposition-500-mc-j
    tier: 500
    bloom: evaluate
    difficulty: 520
    type: multiple_choice
    prompt: >-
      After dependency-mapping a 12-task agentic plan, an analyst notes that
      Task 7 consumes 80% of the total token budget. She declares Task 7 is "on
      the critical path" and must be unblocked first. A colleague challenges
      this. Who is right?
    choices:
      - id: a
        text: >-
          The analyst is right; the most resource-intensive task will take the
          longest and is therefore always on the critical path.
      - id: b
        text: >-
          The colleague is right; the critical path is the longest chain of
          sequentially dependent tasks, not the most resource-intensive task.
          Task 7 could be a leaf node with substantial float that does not
          affect project completion at all.
      - id: c
        text: >-
          Both are partially right; token budget and critical path are
          correlated, so Task 7 is probably on the critical path but this
          should be confirmed.
      - id: d
        text: >-
          The analyst is right if Task 7 is also the longest-running task, which
          is generally true for high-token tasks.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Critical path is a sequencing concept, not a resource concept. A task
      that consumes 80% of tokens but sits on a branch with abundant float can
      be delayed without affecting overall completion. The critical path is
      defined by dependency structure and cumulative duration along the longest
      chain, not by resource intensity. Confusing resource consumption with
      scheduling criticality leads to optimizing the wrong bottleneck — the
      team accelerates an expensive leaf task while the true critical-path chain
      (which may involve short, cheap, but sequential tasks) remains unchanged.
  - id: task-decomposition-500-mc-k
    tier: 500
    bloom: evaluate
    difficulty: 525
    type: multiple_choice
    prompt: >-
      A team adopts trunk-based development with a goal of daily commits to
      main. A developer argues that a story requiring a new subsystem estimated
      at 5 days is incompatible with TBD. A tech lead disagrees. Which position
      is most defensible?
    choices:
      - id: a
        text: >-
          The developer is right; TBD strictly requires every story to complete
          within one day, so any multi-day feature must be rejected or
          parallelized across agents.
      - id: b
        text: >-
          The tech lead is right; TBD requires daily integration of passing
          commits, not daily feature completion. Branch-by-abstraction and
          feature flags allow multi-day features to be integrated
          incrementally, with each day's work leaving the build green.
      - id: c
        text: >-
          The developer is right, but the solution is to parallelize the
          subsystem across 5 agents so it completes in one day.
      - id: d
        text: >-
          The tech lead is right; TBD places no constraints on story size, so
          the 5-day estimate is irrelevant to the development workflow.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      TBD's constraint is on integration frequency — every commit must reach
      main in a passing state at least daily — not on feature scope. Large
      features are decomposed into daily-committable micro-tasks using branch-
      by-abstraction (replace the integration seam with an abstraction, build
      the new behavior behind it) or feature flags (new code path deployed but
      disabled until complete). Neither technique requires the feature to finish
      in one day; they require each day's commit to leave the trunk green.
      Choice d is too permissive: TBD does constrain how tasks are decomposed —
      into increments that integrate cleanly every day — even if it does not cap
      overall feature scope.
  - id: task-decomposition-500-mc-l
    tier: 500
    bloom: evaluate
    difficulty: 530
    type: multiple_choice
    prompt: >-
      A team debates task-file length for an agentic coding workflow. One
      engineer argues that the most detailed, comprehensive spec always produces
      the best agent output. A critic argues that spec length has an optimal
      range. Which evaluation is most defensible?
    choices:
      - id: a
        text: >-
          The first engineer is right; LLMs benefit from more context, so a
          maximally detailed spec always improves output quality.
      - id: b
        text: >-
          The critic is right; an overly long spec can exhaust the usable
          context budget, introduce conflicting details, and bury critical
          acceptance criteria in noise. The optimal spec is minimal but
          sufficient — enough for the agent to execute without mid-task
          clarification.
      - id: c
        text: >-
          The critic is right, but only because of context-window size
          constraints; once context windows are large enough the first
          engineer's position holds.
      - id: d
        text: >-
          The optimal spec length is bounded only by the context window; within
          that limit, comprehensive detail is always preferable to minimal
          sufficiency because the agent can discard what it does not need.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Spec optimization is a genuine tradeoff. Too little context causes the
      agent to hallucinate missing details or make decisions that contradict
      earlier choices; too much creates context pollution — later instructions
      can overwrite earlier ones, critical acceptance criteria get buried, and
      conflicting details produce inconsistent output. These problems scale with
      spec length independently of context-window size (choices c and d),
      because coherence degradation and contradiction probability grow with
      document length regardless of whether the window can hold it all. The
      goal is a spec that is complete enough to execute and no longer.
  - id: task-decomposition-500-sa-a
    tier: 500
    bloom: evaluate
    difficulty: 488
    type: short_answer
    prompt: >-
      A team has a Definition of Ready with two criteria: (1) acceptance
      criteria are written, and (2) a spike is completed if the story involves
      significant unknowns. Sprint velocity is stable and stories ship on time,
      but retrospectives consistently flag integration bugs that trace back to
      stories that satisfied both DoR criteria. Which category of DoR criterion
      is specifically absent — the one that guards against the cross-story
      failure pattern this evidence describes?
    answerKey:
      kind: keyword
      anyOf:
        - integration test
        - integration tests
        - integration criteria
        - cross-story integration
        - integration coverage
        - deployed integration
        - end-to-end test
        - end-to-end tests
        - interface contract
        - api contract
        - component integration
        - integration gate
        - integration check
      normalize: lower
    guidance: >-
      The two existing DoR criteria are inward-facing quality gates: acceptance
      criteria validate the story's own behavior in isolation, and spikes resolve
      unknowns internal to the story. Neither criterion verifies that the story's
      outputs integrate correctly with the components it depends on or that other
      components can depend on it. The failure pattern — bugs that trace back to
      stories that passed both gates — is a cross-story integration failure. An
      integration criterion such as requiring that the story's interaction points
      with other components are covered by integration tests, or that the story
      has been deployed to a staging environment and smoke-tested alongside its
      dependencies, guards specifically against this pattern.
  - id: task-decomposition-500-ff-b
    tier: 500
    bloom: evaluate
    difficulty: 485
    type: free_form
    prompt: >-
      You are reviewing 6 agentic tasks for a new payments module: (1)
      "Implement the payments module." (2) "Write unit tests for the checkout
      flow" — the checkout flow story is not yet designed. (3) "Refactor the
      legacy billing code and fix bug #4471 at the same time." (4) "Add
      currency conversion support if the product manager decides to go
      international." (5) "Implement Stripe webhook handling — the endpoint
      must respond within 200ms to a live Stripe test event." (6) "Set up the
      database tables that payments will need." Apply the INVEST criteria to
      each task, identify which criteria are violated, and propose specific
      revisions.
    rubric:
      criteria:
        - id: correct-invest-violations
          text: >-
            Correctly identifies the right INVEST criteria each task violates:
            task 1 fails Small/Estimable/Testable; task 2 fails Estimable (not
            merely Small); task 3 fails Independent and Testable; task 4 fails
            Negotiable/Estimable; task 5 passes INVEST and the response
            recognizes this rather than inventing violations; task 6 fails
            Valuable.
        - id: revision-specificity
          text: >-
            Proposes concrete, task-specific revisions — not generic advice like
            "make it smaller" but actual rewrites, splits, or spikes tied to
            each task's particular violation.
        - id: mixed-concerns-causal
          text: >-
            Explains that task 3's combined refactor-and-bugfix destroys causal
            attribution for regressions, not merely that the task is too large.
        - id: horizontal-slicing-task-6
          text: >-
            Identifies task 6 as a horizontal slice that fails Valuable because
            database tables alone deliver no user-facing or deployable increment.
        - id: agentic-context
          text: >-
            Situates at least one revision in an agentic context — for example,
            task 2 blocks safe agent fan-out because the agent cannot write
            tests against an unspecified behavior contract.
      referenceAnswer: >-
        Task 1 fails Small, Estimable, and Testable. "Implement the payments
        module" has no size, no acceptance criterion, and no observable done
        state. Revision: decompose into narrow vertical slices with explicit
        acceptance criteria, e.g. "Given a valid card number, a charge is
        created via the payment provider and a receipt is emailed to the user."

        Task 2 fails Estimable. The checkout flow has not been designed, so
        there is no behavior contract to test against. Splitting the task does
        not fix this — each split would test an imagined rather than specified
        behavior. Revision: complete a spike or the checkout flow design first;
        in an agentic context, dispatching this task to a subagent concurrently
        with checkout design will produce tests against hallucinated behavior.

        Task 3 fails Independent and Testable. Refactoring is
        behavior-preserving; bug fixing is behavior-changing. Combining them
        means a regression cannot be causally attributed: if tests break after
        the commit, you cannot tell whether the refactor or the bug fix caused
        it. Revision: split into two sequential tasks — a refactoring task
        verified by no test failures, then a bug-fix task verified by a new
        regression test.

        Task 4 fails Negotiable and Estimable. It is contingent on a future
        business decision, making it unplannable and potentially wasted work.
        Revision: defer until the international decision is made, or rewrite as
        a spike: "Evaluate effort required for currency conversion; produce a
        written recommendation."

        Task 5 passes INVEST well: it is independent, negotiable on
        implementation, valuable (webhook reliability), estimable (concrete
        performance criterion), small (one endpoint), and testable (measurable
        response-time threshold with a real test event). No revision needed.

        Task 6 fails Valuable. Database tables alone are a horizontal slice —
        no user or stakeholder receives standalone value from tables without an
        API or UI using them. Revision: absorb the table creation into the first
        vertical slice that requires it, so both the schema and the behavior
        using it ship together as a single deployable increment.
      passThreshold: 0.6
    guidance: >-
      Strong answers apply each INVEST letter with precision, not as a
      checklist but as a diagnostic. The key differentiators are: recognizing
      task 5 as well-formed (avoiding false violations), identifying task 2's
      failure as an Estimable problem rooted in missing knowledge, and
      explaining task 3's causal-attribution problem rather than merely noting
      it is large. Horizontal-slicing recognition on task 6 and at least one
      agentic-context observation round out a graduate-level response.
  - id: task-decomposition-500-ff-c
    tier: 500
    bloom: evaluate
    difficulty: 492
    type: free_form
    prompt: >-
      An agentic plan for a new authentication service contains 6 tasks: (1)
      design the JWT token schema, (2) implement the token-issuance endpoint,
      (3) implement the token-validation middleware, (4) write integration tests
      for issuance, (5) write integration tests for validation, (6) update API
      documentation. Identify all data and control dependencies, determine which
      tasks can be parallelized, propose an optimal schedule, and flag any
      parallelization that appears safe but is actually hazardous.
    rubric:
      criteria:
        - id: correct-dependencies
          text: >-
            Correctly identifies: task 1 is a prerequisite for all others; tasks
            2 and 3 each depend on task 1 but not on each other; task 4 depends
            on task 2; task 5 depends on task 3; task 6 depends on tasks 2 and 3
            (or can start from task 1's output with stubs).
        - id: parallelization-correctness
          text: >-
            Correctly concludes tasks 2 and 3 can run in parallel after task 1,
            and tasks 4, 5, and 6 can run in parallel after their respective
            prerequisites.
        - id: hazard-identification
          text: >-
            Identifies the shared-mutable-state hazard: tasks 4 and 5 appear
            independent but are unsafe to parallelize if they write to the same
            test database or share fixture state.
        - id: scheduling-phases
          text: >-
            Proposes a concrete phased schedule: Phase 1 (task 1 sequential),
            Phase 2 (tasks 2 and 3 parallel), Phase 3 (tasks 4, 5, and 6
            parallel subject to shared-state caveat).
        - id: file-ownership-hazard
          text: >-
            Notes that tasks 2 and 3, though logically independent, will
            conflict if both agents route endpoints through the same shared
            router or configuration file.
      referenceAnswer: >-
        Dependencies: Task 1 (JWT schema) is a prerequisite for all other
        tasks — its output defines the data contract every other task depends
        on. Tasks 2 and 3 each depend on task 1 but not on each other: issuance
        and validation are logically orthogonal functions of the same schema.
        Task 4 depends on task 2 (needs a running issuance endpoint to test);
        task 5 depends on task 3; task 6 depends on tasks 2 and 3 to document
        real behavior, though a draft could begin from task 1's schema output.

        Optimal schedule:
        Phase 1 (sequential): Task 1 — design JWT schema.
        Phase 2 (parallel): Tasks 2 and 3 — both can be implemented
        simultaneously since they consume the schema as read-only input and
        write to disjoint file paths.
        Phase 3 (parallel with caveat): Tasks 4, 5, and 6 can all start once
        Phase 2 completes. Tasks 4 and 5 are only safely parallel if they use
        isolated test databases or disjoint fixture namespaces; if both insert
        rows into a shared integration-test table they are resource-dependent
        and must be serialized.

        Agentic file-ownership hazard: tasks 2 and 3 are logically independent
        but will produce a merge conflict if both agents append to the same
        router or middleware registration file. The task file should explicitly
        assign disjoint file ownership: Agent 2 owns auth/issuance.py, Agent 3
        owns auth/validation.py, and both write to new files rather than
        appending to a shared module.
      passThreshold: 0.6
    guidance: >-
      The core evaluative skill here is distinguishing logical independence from
      resource independence. Two tasks can be logically orthogonal (they
      implement different features) yet resource-dependent (they both write to
      the same file or database table). A strong answer catches both the obvious
      fan-out opportunities and the less obvious shared-state hazards that make
      apparently safe parallelization unsafe in practice.
  - id: task-decomposition-500-ff-d
    tier: 500
    bloom: evaluate
    difficulty: 497
    type: free_form
    prompt: >-
      A team has an agentic Definition of Done with five gates: (1) all
      acceptance-criteria tests pass, (2) no regressions in the existing test
      suite, (3) linting and type checks pass, (4) the task file entry is
      checked off, (5) a commit exists with a descriptive message. An agent
      reports all five gates satisfied. A reviewer discovers a critical bug
      three tasks later that traces back to this task. Evaluate the DoD's
      adequacy and propose concrete, gate-level improvements.
    rubric:
      criteria:
        - id: self-certification-risk
          text: >-
            Identifies that gate 4 (checkbox) is self-reported by the
            implementing agent, creating confirmation bias with no independent
            verification signal.
        - id: dod-gaps
          text: >-
            Identifies at least two missing gates: a deployed-to-staging smoke
            check, integration tests covering the task's interaction points with
            other components, or a test-coverage delta gate.
        - id: regression-scope-critique
          text: >-
            Notes that "no regressions" is only as strong as the existing test
            suite's coverage of the integration path where the bug manifested.
        - id: concrete-improvements
          text: >-
            Proposes at least two specific, actionable DoD gate additions with
            enough detail to implement them (not just "add more tests").
        - id: propagation-analysis
          text: >-
            Addresses why the bug propagated silently for three tasks — the DoD
            lacks a gate that verifies integration correctness across task
            boundaries, allowing compound debt to accumulate.
      referenceAnswer: >-
        The existing DoD has a structural gap: every gate is self-certified by
        the implementing agent. Gate 4 (checkbox) is the weakest signal — it is
        an intent claim, not a verification artifact. Gate 1 (AC tests pass) is
        only as strong as the test coverage; if an acceptance criterion was
        omitted or a test was written against imagined rather than real behavior,
        the gate passes while the defect hides.

        Concrete improvements:
        (a) Add a deployed-to-staging smoke gate: the task is not done until the
        changed code has been deployed to a staging environment and at least one
        end-to-end smoke check passes. This catches environment-specific and
        integration failures that unit tests miss.
        (b) Add an integration-test gate scoped to the task's interaction
        points: identify which other components the changed code calls or is
        called by, and run their integration tests as part of this task's DoD,
        not just the task's own tests.
        (c) Add a test-coverage delta check: require that every new code path
        introduced by the task is covered by at least one test, preventing AC
        tests that pass without actually exercising the new logic.
        (d) Add a reviewer-agent spot-check at milestone boundaries: an
        independent agent reads the implementation against the task's acceptance
        criteria, providing a check against self-certification bias.

        The bug propagating for three tasks indicates the DoD has no gate
        verifying cross-task integration correctness. Each subsequent task built
        on a flawed assumption multiplied the correction cost. A staging
        deployment gate or integration-point test gate would have surfaced the
        defect at the source task before three layers of dependent work were
        built on top of it.
      passThreshold: 0.6
    guidance: >-
      The diagnostic insight is that all five existing gates are self-certified
      — there is no independent verification step. Strong answers identify this
      structural problem first, then propose gates with different verification
      mechanisms: deployment-based gates, coverage-based gates, and independent
      review gates. The propagation analysis (why three tasks passed before the
      bug surfaced) reveals whether the candidate understands how DoD gaps
      compound across a task sequence.
  - id: task-decomposition-500-ff-e
    tier: 500
    bloom: evaluate
    difficulty: 510
    type: free_form
    prompt: >-
      You have a single user story estimated at 34 points: "As a user, I can
      search for products by keyword, filter results by category and price
      range, sort by relevance or date, and save searches for later retrieval."
      Evaluate which SPIDR splitting patterns apply, produce a set of well-
      formed child stories, explicitly justify that each child story satisfies
      INVEST Valuable, and note any ordering constraints between children.
    rubric:
      criteria:
        - id: spidr-pattern-identification
          text: >-
            Correctly identifies Path (four distinct workflow paths) and Rules
            (sort-by-relevance vs. sort-by-date as distinct business rules) as
            the primary applicable SPIDR patterns, with optional Data or
            Interface patterns if justified.
        - id: child-story-count-and-quality
          text: >-
            Produces at least 5 child stories, each written as a user-facing
            behavior statement (not a technical task), independently usable, and
            estimated smaller than the original.
        - id: invest-valuable-justification
          text: >-
            Explicitly argues that each child story delivers standalone value to
            a user — not merely that it is a sub-task — and explains what that
            value is.
        - id: no-horizontal-splits
          text: >-
            Produces no horizontal-slice children such as "build the search
            index," "create the filter API," or "add the saved-searches table."
        - id: ordering-constraints
          text: >-
            Correctly notes that basic keyword search (story 1) is a logical
            prerequisite for the other stories, but that filtering, sorting, and
            saving can proceed in any order once basic search exists.
      referenceAnswer: >-
        Applicable SPIDR patterns: Path — the original story contains four
        distinct user workflow paths (basic search, filtered results, sorted
        results, saved searches), each delivering independent value. Rules —
        sorting by relevance and by date are distinct business rules that can be
        implemented sequentially without losing value from either.

        Child stories:
        1. "As a user, I can enter a keyword and see a paginated list of
        matching products." (basic search; ~5 pts) Value: a user can find
        products by name without any other feature.
        2. "As a user, I can filter search results by product category." (filter
        by category; ~5 pts) Value: a user browsing a category gets a scoped
        result set without needing price filtering.
        3. "As a user, I can filter search results by price range." (filter by
        price; ~5 pts) Value: a budget-conscious user can narrow results
        independently of category.
        4. "As a user, I can sort search results by most recent listing date."
        (sort by date; ~4 pts) Value: a user looking for new arrivals gets
        recency without relevance scoring.
        5. "As a user, I can sort search results by relevance to my search
        term." (sort by relevance; ~7 pts) Value: a user with a vague query
        gets the most pertinent results first.
        6. "As a user, I can save a search and retrieve it from my profile
        page." (saved searches; ~8 pts) Value: a returning user resumes prior
        searches without retyping.

        Ordering constraints: Story 1 is a soft prerequisite for stories 2-6
        — it makes sense to have something to filter, sort, or save before
        adding those capabilities. Stories 2-5 can proceed in any order once
        story 1 exists. Story 6 depends on story 1 but not on stories 2-5.
        Story 5 benefits from sharing sort infrastructure with story 4 and
        ideally follows it to reuse that code.
      passThreshold: 0.6
    guidance: >-
      The evaluative challenge is applying SPIDR not mechanically but with
      judgment: identifying which patterns genuinely apply to this story and
      resisting the temptation to produce horizontal slices. Strong answers
      justify Valuable for each child explicitly, not by assertion ("this is
      valuable") but by naming the user and what they can do with the story
      alone. Ordering constraint analysis separates candidates who understand
      dependency structure from those who treat all splits as fully independent.
  - id: task-decomposition-500-ff-f
    tier: 500
    bloom: evaluate
    difficulty: 518
    type: free_form
    prompt: >-
      A parallel agentic plan is running behind schedule. The orchestrator
      proposes adding 4 more subagents to accelerate the remaining 8 tasks.
      Apply Brooks' Law and Amdahl's Law to evaluate whether this intervention
      will help, hurt, or have no effect, and identify the conditions under
      which each outcome is possible. Then propose a concrete alternative
      decision process.
    rubric:
      criteria:
        - id: brooks-law-application
          text: >-
            Correctly applies Brooks' Law: new agents require orientation,
            increasing inter-agent communication paths as O(N squared) and potentially
            costing more in coordination overhead than is gained in parallel
            capacity.
        - id: amdahls-law-application
          text: >-
            Correctly invokes Amdahl's Law: if the bottleneck is the sequential
            fraction (critical path chain), additional agents provide no
            wall-clock speedup regardless of how many are added.
        - id: conditions-analysis
          text: >-
            Identifies conditions for each outcome — helps (remaining tasks are
            genuinely independent and agents can be oriented cheaply), neutral
            (tasks are off the critical path), hurts (tasks share state or have
            dependencies, or orientation cost exceeds parallel benefit).
        - id: critical-path-distinction
          text: >-
            Distinguishes between adding agents to off-critical-path tasks
            (wasteful but harmless) versus adding agents to critical-path tasks
            (only useful if those tasks are parallelizable and orientation cost
            is low).
        - id: concrete-alternative
          text: >-
            Proposes a concrete alternative: map the remaining dependency graph,
            identify the critical path and genuinely independent leaf tasks, and
            estimate orientation cost vs. time saved before spawning additional
            agents.
      referenceAnswer: >-
        Brooks' Law: adding agents mid-task requires orientation — each new
        agent must read prior task outputs, understand codebase state, and
        internalize earlier decisions. This cost is paid upfront, reducing net
        time available for work. Communication paths grow as O(N squared): 4 agents
        have 6 paths; 8 agents have 28 paths; each additional path is a
        potential coordination failure (merge conflict, inconsistent assumption,
        duplicated work). If orientation cost per agent exceeds the time that
        agent will save, adding it makes the schedule worse.

        Amdahl's Law: if the remaining 8 tasks include a sequential chain
        (A must precede B must precede C), no number of additional agents
        reduces that chain's duration. The maximum speedup from adding agents is
        bounded by the parallelizable fraction of the remaining work. If 50% of
        remaining work is sequential, the ceiling is 2x regardless of agent
        count.

        Conditions:
        Helps — remaining tasks are genuinely independent (disjoint file scope,
        no ordering constraints), task files are self-contained so orientation
        is cheap, and the added parallelism shortens the critical path.
        Neutral — remaining tasks are off the critical path; completing them
        faster does not change the project completion date.
        Hurts — remaining tasks share mutable state or form a dependency chain;
        orientation cost per agent exceeds time saved; adding agents increases
        merge-conflict resolution work.

        Concrete alternative: before spawning new agents, draw the remaining
        dependency graph, identify the critical path, and enumerate genuinely
        independent leaf tasks. Assign new agents only to those leaf tasks, and
        only if the expected orientation cost is less than half the estimated
        time saved. If the critical path is the bottleneck and it is not
        parallelizable, fix the bottleneck — split a sequential task, run a
        spike to resolve a blocking unknown, or resequence — rather than
        adding agents to tasks that cannot benefit from parallelism.
      passThreshold: 0.6
    guidance: >-
      The key evaluative move is applying both laws together, not just one. A
      response that cites only Brooks' Law misses the hard ceiling on speedup
      that Amdahl's Law provides; one that cites only Amdahl's Law misses the
      coordination overhead that makes naive fan-out costly. The conditions
      analysis separates mechanical law-recitation from genuine judgment about
      when the tradeoff favors adding agents.
  - id: task-decomposition-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 535
    type: free_form
    prompt: >-
      You are designing task boundaries for a multi-agent inventory management
      service. Three decomposition strategies are proposed. Strategy A:
      decompose by execution phase — Agent 1 handles data ingestion, Agent 2
      handles business logic processing, Agent 3 handles output and reporting.
      Strategy B: decompose by likely design change — Agent 1 owns the storage
      backend (hiding the database choice), Agent 2 owns the inventory rules
      engine (hiding pricing and allocation algorithms), Agent 3 owns supplier
      API integration (hiding each supplier's protocol). Strategy C: decompose
      by team topology — Agent 1 owns everything the frontend team needs (API
      layer), Agent 2 owns everything the data team needs (persistence and
      reporting), Agent 3 owns everything the platform team needs (infra and
      config). Apply Parnas's information hiding principle to evaluate all three
      strategies and recommend the strongest, explaining how your choice bounds
      the blast radius of the three most likely changes.
    rubric:
      criteria:
        - id: parnas-principle
          text: >-
            Correctly articulates that Parnas decomposition hides one design
            decision per module and that modules expose only a stable interface,
            not internal implementation. Notes that Parnas explicitly rejected
            decomposition by execution steps.
        - id: strategy-evaluation
          text: >-
            Correctly identifies Strategy A as execution-step decomposition
            (the anti-pattern Parnas named), Strategy C as Conway's Law team-
            topology decomposition (org-aligned but not change-axis-aligned),
            and Strategy B as closest to information hiding.
        - id: blast-radius-analysis
          text: >-
            Explains specifically why Strategy B minimizes blast radius for the
            three most plausible changes: swapping the database (only Agent 1),
            changing pricing rules (only Agent 2), adding a new supplier (only
            Agent 3).
        - id: interface-contract
          text: >-
            Notes that information hiding requires each agent to expose a stable
            interface contract (typed API, schema, repository interface) that
            other agents depend on instead of the agent's internal
            implementation.
        - id: agentic-specificity
          text: >-
            Applies the principle to agentic practice: each subagent task file
            should specify the one design decision the agent owns, the interface
            contract it must produce, and what it must not expose in its output.
      referenceAnswer: >-
        Parnas's principle (1972): modules should be designed around design
        decisions that are likely to change. Each module hides one such
        decision; other modules depend on its interface, not its internals.
        Parnas explicitly rejected decomposition by execution steps because it
        exposes internal state transitions across module boundaries — a change
        to how step 1 works forces changes in step 2 because the interface
        encodes execution sequence rather than a stable contract.

        Strategy A (execution phases) is the anti-pattern Parnas named. Agent 1
        produces an intermediate data structure that Agent 2 consumes in a
        specific format; Agent 2 produces an intermediate that Agent 3 consumes.
        A change to the ingestion format (e.g., switching from batch to
        streaming) ripples into Agent 2's processing logic because the interface
        between them encodes the execution flow, not a stable domain contract.

        Strategy C (team topology) follows Conway's Law — boundaries mirror the
        org chart — which may reduce human coordination friction but does not
        minimize change blast radius. A database swap would require touching
        Agent 2 (which has persistence) because the boundary was drawn by team
        ownership, not by the database-choice design decision. Two agents share
        the persistence concern.

        Strategy B is correct. Each agent boundary corresponds to one design
        decision that is likely to change independently:
        Agent 1 hides the database technology. Swapping PostgreSQL for a NoSQL
        store means only Agent 1's internal code changes; its interface — a
        typed repository API — remains stable. Agents 2 and 3 never know what
        database is in use.
        Agent 2 hides the pricing and allocation rules. Changing the pricing
        algorithm means only Agent 2's logic changes; its interface — a price-
        quote request/response schema — remains stable.
        Agent 3 hides each supplier's protocol. Adding a new supplier with a
        different REST API means only Agent 3's integration code changes; its
        interface — a normalized supplier-item record — remains stable.

        In agentic practice, each subagent task file should specify: (a) the
        one design decision this agent owns, (b) the interface contract it must
        produce (a typed schema or function signature), and (c) what it must not
        expose in its output — for example, Agent 1 must not leak raw SQL or
        connection strings into the shared domain model, because that would
        couple Agent 2 to the database choice Agent 1 is supposed to hide.
      passThreshold: 0.6
    guidance: >-
      This item tests whether candidates can distinguish three superficially
      reasonable decomposition strategies using a principled framework. The
      discriminating moves are: recognizing Strategy A as the specific
      anti-pattern Parnas rejected (not just "it's execution-step ordering"),
      recognizing Strategy C's org-alignment as a different valid goal that does
      not serve change-blast-radius minimization, and applying the principle
      concretely to agentic task files rather than leaving it abstract.
