  - id: kch-500-ff-c
    tier: 500
    bloom: evaluate
    difficulty: 522
    type: free_form
    prompt: |
      Assess the anti-pattern of encoding durable project rules (e.g. "always use
      tabs, never push to main") as hooks instead of steering files. When is a hook the
      right tool and when is steering better? Justify with how each mechanism works.
    guidance: |
      Steering files inject persistent guidance/context into the agent's reasoning;
      hooks fire actions on events. Durable conventions belong in steering (product/tech/
      structure or scoped inclusion) so the agent internalizes them everywhere. Hooks fit
      enforcement/automation that must happen mechanically on an event (run formatter on
      save, block a tool, scaffold on create). A rule like "use tabs" is steering; a
      mechanical formatter enforcing it on save is a hook. Using hooks alone to convey
      intent is brittle and event-bound.
    rubric:
      criteria:
        - id: c1
          text: >-
            Distinguishes steering (persistent guidance in reasoning) from hooks (event-triggered
            actions).
        - id: c2
          text: >-
            Says durable conventions/intent belong in steering; mechanical event-time enforcement
            belongs in hooks.
        - id: c3
          text: >-
            Gives a justified example mapping (e.g. "use tabs" = steering; formatter-on-save =
            hook).
      referenceAnswer: |
        Steering files persistently shape the agent's reasoning by injecting guidance,
        while hooks fire concrete actions on discrete events. Durable conventions and
        intent ("prefer tabs", "never push to main") belong in steering so the agent
        applies them across all interactions. Hooks are right when enforcement must
        happen mechanically at an event — run the formatter on save, block a risky tool,
        scaffold on create. Encoding intent solely as hooks is brittle: it only acts at
        trigger time and the agent never internalizes the rule. The best design pairs a
        steering rule ("use tabs") with a hook that enforces it (formatter on PostFileSave).
      passThreshold: 0.6
  - id: kch-500-mc-e
    tier: 500
    bloom: evaluate
    difficulty: 528
    type: multiple_choice
    prompt: |
      A proposal adds a SessionStart agent hook that runs a long repository-wide audit
      every time anyone opens Kiro. Evaluate this design.
    choices:
      - id: a
        text: |
          Ideal: auditing on every session start is the safest possible policy with no downside.
      - id: b
        text: |
          Poor default: it taxes every session with latency/cost regardless of intent;
          an on-demand command or a narrower trigger (e.g. PreTaskExec for risky tasks)
          gives the value without penalizing routine sessions.
      - id: c
        text: |
          Invalid: SessionStart cannot run agent actions, only commands.
      - id: d
        text: |
          Harmless: SessionStart hooks run asynchronously and never affect the session.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      A heavy SessionStart audit penalizes every session; prefer on-demand or scoped triggers.
  - id: kch-500-mc-f
    tier: 500
    bloom: evaluate
    difficulty: 534
    type: multiple_choice
    prompt: |
      Two designs gate dangerous writes: (A) a PreToolUse command hook that exits
      nonzero to block, (B) a PreToolUse agent hook that "asks the model to decide" if
      the write is safe. Which critique is most defensible?
    choices:
      - id: a
        text: |
          A is more reliable for a hard gate because it is deterministic and auditable;
          B introduces model nondeterminism and possible tool recursion, making it unfit
          as the sole safety control though useful as advisory triage.
      - id: b
        text: |
          B is strictly better because the model is always correct about safety.
      - id: c
        text: |
          They are equivalent because both run before the tool.
      - id: d
        text: |
          A is invalid because command actions cannot block tool execution at all.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      A deterministic command gate is auditable and reliable; a model-judgment gate is
      nondeterministic and can recurse.
  - id: kch-500-ff-d
    tier: 500
    bloom: evaluate
    difficulty: 540
    type: free_form
    prompt: |
      A team's .kiro/hooks/ has grown to a dozen overlapping hooks added ad hoc. Propose
      governance criteria for what belongs in a hook, how to keep matchers maintainable,
      and how to prevent the loop and cost pitfalls — judged as a maintainability policy.
    guidance: |
      Criteria: hooks should automate deterministic, event-time actions; durable intent
      goes to steering. Keep matchers anchored, scoped, and documented; one trigger per
      hook with a descriptive name. Prevent loops by avoiding agent actions that re-save
      files matched by their own trigger (or scope them out); prefer per-turn/per-task
      triggers (Stop/PostTaskExec) over per-save for expensive reviews. Control cost by
      favoring command actions for routine work and reserving agent actions for genuine
      judgment, with explicit timeouts. Review hook diffs as security-relevant code,
      periodically audit for redundancy/overlap, and remove dead hooks.
    rubric:
      criteria:
        - id: c1
          text: >-
            Defines what belongs in a hook (deterministic event-time automation) vs steering
            (durable intent).
        - id: c2
          text: >-
            Gives matcher hygiene (anchored, scoped, one trigger per hook, descriptive names) and
            loop prevention.
        - id: c3
          text: >-
            Addresses cost (command vs agent actions, timeouts) and review/audit governance
            (security review, prune overlap).
      referenceAnswer: |
        Policy: a hook should automate a deterministic, event-time action; durable rules
        and intent belong in steering, not hooks. Require anchored, scoped matchers, one
        trigger per hook, and descriptive names so behavior is predictable. Prevent loops
        by forbidding agent actions that re-save files matched by their own trigger (or
        explicitly excluding those paths) and by moving expensive reviews to per-turn/per-
        task triggers (Stop/PostTaskExec) instead of per-save. Control cost by defaulting
        to command actions and reserving agent actions for genuine judgment, always with
        explicit timeouts. Treat every hook diff as security-relevant code review, audit
        periodically for overlapping or dead hooks, and prune them. This keeps the hook
        set small, predictable, safe, and affordable.
      passThreshold: 0.6
  - id: kch-500-ff-e
    tier: 500
    bloom: evaluate
    difficulty: 530
    type: free_form
    prompt: |
      Critique relying on hook firing order for correctness: e.g. a team assumes their
      "format" PostFileSave hook always runs before their "lint" PostFileSave hook.
      Judge this assumption and recommend a robust design.
    guidance: |
      Kiro's docs do not guarantee a deterministic ordering among hooks on the same
      trigger, so depending on order is fragile. Robust design: combine the dependent
      steps into a single hook's action (e.g. one command that formats then lints), or
      make each step order-independent/idempotent. Do not encode ordering across separate
      hook entries.
    rubric:
      criteria:
        - id: c1
          text: States hook firing order across entries is not a guaranteed contract.
        - id: c2
          text: Concludes the assumption is fragile/incorrect to rely on.
        - id: c3
          text: >-
            Recommends a robust fix (one combined ordered command, or idempotent/order-independent
            steps).
      referenceAnswer: |
        Relying on format-before-lint ordering is fragile because Kiro does not document
        a guaranteed firing order among hooks sharing a trigger. Instead of two ordered
        hooks, put the dependent sequence in a single hook's command action (format then
        lint in one script), or make each step order-independent and idempotent so the
        outcome does not depend on which fires first.
      passThreshold: 0.6
  - id: kch-500-mc-g
    tier: 500
    bloom: evaluate
    difficulty: 506
    type: multiple_choice
    prompt: |
      A reviewer wants a single mega-hook with matcher ".*" on PostFileSave that runs a
      shell script containing format, lint, test, and deploy steps. Evaluate this versus
      separate scoped hooks.
    choices:
      - id: a
        text: |
          The mega-hook couples unrelated concerns and runs heavy steps (test/deploy) on
          every save; scoped hooks (or moving slow steps to Stop/PostTaskExec) give
          clearer intent, cheaper saves, and easier disabling of one concern.
      - id: b
        text: |
          The mega-hook is superior because one hook is always simpler than several.
      - id: c
        text: |
          Separate hooks are invalid; a trigger may appear in only one hook per file.
      - id: d
        text: |
          Deploy-on-every-save is the recommended default for fast iteration.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Bundling deploy/test into an on-every-save mega-hook is costly and coupled; scope and stage by
      trigger.
  - id: kch-500-mc-h
    tier: 500
    bloom: evaluate
    difficulty: 524
    type: multiple_choice
    prompt: |
      A team uses an agent-type PostFileSave hook to auto-fix lint issues. Reviewers
      worry about nondeterministic edits. What is the most balanced judgment?
    choices:
      - id: a
        text: |
          Agent auto-fix is fine because the model never makes mistakes on lint.
      - id: b
        text: |
          For mechanical lint fixes a deterministic command (the linter's --fix) is
          preferable for reproducibility and loop-safety; reserve agent actions for
          issues that genuinely need judgment, where nondeterminism is acceptable.
      - id: c
        text: |
          Command actions cannot fix lint, so an agent action is the only option.
      - id: d
        text: |
          Nondeterminism is irrelevant because hooks run identically on every machine.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      Mechanical fixes belong in a deterministic command; agent actions suit judgment, not
      reproducible fixes.
  - id: kch-300-mc-l
    tier: 300
    bloom: apply
    difficulty: 352
    type: multiple_choice
    prompt: |
      You want a hook that runs a validation script just before each spec task begins
      executing, so a failing precheck aborts the task early. Which trigger fits?
    choices:
      - id: a
        text: PostTaskExec
      - id: b
        text: PreTaskExec
      - id: c
        text: PreToolUse
      - id: d
        text: SessionStart
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      PreTaskExec fires before a spec task executes, the right point for a precheck.
  - id: kch-300-ff-h
    tier: 300
    bloom: apply
    difficulty: 376
    type: free_form
    prompt: |
      You maintain hooks in both .kiro/hooks/ (committed, team-shared) and
      ~/.kiro/hooks/ (your personal preferences). Give one concrete example of a hook
      that belongs in each location and explain the placement.
    guidance: |
      Workspace example: a lint/test-on-save hook the whole team must run, committed so
      everyone gets it. User example: a personal notification or editor-preference hook
      you want across all your projects but should not impose on teammates.
    rubric:
      criteria:
        - id: c1
          text: Gives a workspace-level example (team-shared, committed) with reasoning.
        - id: c2
          text: Gives a user-level example (personal, cross-project) with reasoning.
      referenceAnswer: |
        Workspace .kiro/hooks/: a PostFileSave lint/test hook that all contributors must
        run; committing it guarantees consistent enforcement across the team. User
        ~/.kiro/hooks/: a personal hook (e.g. a desktop notification on Stop) you want in
        every project of yours but should not force on teammates, so it lives in your
        user directory.
      passThreshold: 0.6
  - id: kch-400-ff-g
    tier: 400
    bloom: analyze
    difficulty: 436
    type: free_form
    prompt: |
      A workspace hook references a tool with a command like "./scripts/check.sh" and
      it works on the author's machine but fails for a teammate with "file not found."
      Identify the most likely portability issues and how to make the hook robust.
    guidance: |
      Likely causes: relative path/working-directory assumptions, missing execute bit
      not committed, a tool not installed on the teammate's machine, or shell/OS
      differences. Robust hooks should not assume an absolute environment: use repo-root
      relative invocation that works from the hook's working dir, ensure the script is
      committed and executable, document/declare tool prerequisites, and avoid
      machine-specific paths.
    rubric:
      criteria:
        - id: c1
          text: >-
            Identifies a portability cause (relative/working-dir path, missing exec bit, uninstalled
            tool, OS/shell diff).
        - id: c2
          text: Notes the hook assumed the author's environment.
        - id: c3
          text: >-
            Proposes robustness (repo-relative path, committed+executable script, documented
            prerequisites).
      referenceAnswer: |
        The command assumes the author's environment: the relative path depends on the
        working directory, the script may lack a committed execute bit, the referenced
        tool may not be installed, or the shell/OS differs. Make it robust by invoking
        via a repo-root-relative path that works from the hook's working directory,
        committing the script with its execute bit, declaring tool prerequisites in the
        README/steering, and avoiding machine-specific absolute paths.
      passThreshold: 0.6
  - id: kch-400-mc-l
    tier: 400
    bloom: analyze
    difficulty: 442
    type: multiple_choice
    prompt: |
      A PostFileSave command hook with matcher "\\.md$" runs a doc generator that
      writes a .md index file. Sometimes it loops, sometimes not. What best explains
      the intermittency?
    choices:
      - id: a
        text: |
          When the generated output is itself a .md file that the matcher matches, its
          save re-fires the hook; if the generator skips writing (no change) the loop
          does not occur — hence intermittent.
      - id: b
        text: |
          Command actions randomly switch to agent actions, causing sporadic loops.
      - id: c
        text: |
          The matcher is evaluated nondeterministically, so it matches only sometimes.
      - id: d
        text: |
          PostFileSave fires on a random subset of saves by design.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      The loop happens only when the generator actually writes a matching .md file; exclude
      generated output.
  - id: kch-400-mc-m
    tier: 400
    bloom: analyze
    difficulty: 466
    type: multiple_choice
    prompt: |
      A team migrated hook config into .kiro/settings/ alongside mcp.json and now no
      hooks fire. What is the root cause?
    choices:
      - id: a
        text: |
          Hooks are not loaded from .kiro/settings/; they must live in .kiro/hooks/
          (or ~/.kiro/hooks/). Only MCP config belongs in .kiro/settings/.
      - id: b
        text: |
          The mcp.json schema overrode the hooks schema, disabling them.
      - id: c
        text: |
          Hooks in settings need a different version field, "v2".
      - id: d
        text: |
          Settings-dir hooks only run when MCP servers are connected.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Hooks load from .kiro/hooks/; .kiro/settings/ is for mcp.json. The move broke discovery.
  - id: kch-500-ff-f
    tier: 500
    bloom: evaluate
    difficulty: 488
    type: free_form
    prompt: |
      Evaluate whether a PostToolUse hook that auto-runs the full test suite after
      every tool call is a good CI/headless default. Consider feedback value, cost,
      and time, and recommend a better trigger choice.
    guidance: |
      Per-tool-call test runs are wasteful: a single turn invokes many tools, so the
      suite runs repeatedly with little added signal, inflating time and cost. Better to
      run the suite once per turn (Stop) or per spec task (PostTaskExec), or gate it to
      write tools only. Reserve broad PostToolUse for cheap, tool-specific reactions.
    rubric:
      criteria:
        - id: c1
          text: Notes many tool calls per turn make per-call full-suite runs redundant/costly.
        - id: c2
          text: Weighs feedback value against time/cost.
        - id: c3
          text: Recommends a better trigger (Stop or PostTaskExec, or scope PostToolUse to write tools).
      referenceAnswer: |
        It is a poor default: a turn calls many tools, so running the full suite after
        each one repeats the same work, multiplying time and cost for little extra
        signal. Run the suite once per turn (Stop) or per spec task (PostTaskExec), or
        scope a PostToolUse hook to the write tool only so it reacts to meaningful
        changes rather than every read or search.
      passThreshold: 0.6
  - id: kch-500-mc-i
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: multiple_choice
    prompt: |
      A proposal hardcodes the same hook into every developer's ~/.kiro/hooks/ via an
      onboarding script, instead of committing it to .kiro/hooks/. Judge this approach.
    choices:
      - id: a
        text: |
          It is fragile and drift-prone: copies diverge, updates require re-running the
          script everywhere, and the hook is invisible in the repo. Committing to
          .kiro/hooks/ versions and shares it in one place.
      - id: b
        text: |
          It is superior because user-level hooks are higher priority than workspace ones.
      - id: c
        text: |
          It is required because workspace hooks cannot run command actions.
      - id: d
        text: |
          It makes no difference; the two locations are loaded identically per repo.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Distributing copies to user dirs invites drift; committing to .kiro/hooks/ is the single
      source of truth.
  - id: kch-500-mc-j
    tier: 500
    bloom: evaluate
    difficulty: 518
    type: multiple_choice
    prompt: |
      A UserPromptSubmit agent hook injects a 2,000-word coding-standards document into
      context on every single prompt. Evaluate this against using steering.
    choices:
      - id: a
        text: |
          It is wasteful: it re-injects a large payload every prompt, burning tokens,
          when an always-included steering file (or fileMatch-scoped steering) delivers
          the same standing context more efficiently and idiomatically.
      - id: b
        text: |
          It is ideal because hooks are the only way to supply standing context.
      - id: c
        text: |
          It is fine because UserPromptSubmit hooks are free of token cost.
      - id: d
        text: |
          Steering cannot hold coding standards, so the hook is mandatory.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Standing context belongs in steering (always/fileMatch); a per-prompt injection hook wastes
      tokens.
  - id: kch-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 520
    type: free_form
    prompt: |
      Your reviewer insists every hook must use timeout:0 "for reliability." Construct
      a balanced policy for choosing timeout values for command actions across fast vs
      long-running tasks, explain how the timeout interacts with agent actions, and
      name the failure modes you are guarding against.
    guidance: |
      Timeout governs command actions and is ignored for agent actions, so the policy
      is really about command actions. Keep the 60s default for routine fast commands
      (formatters, quick lints) so a hang is caught. Raise the timeout for known-slow
      but bounded work (full test suites, builds) to a generous-but-finite ceiling.
      Reserve timeout:0 only for command tasks that legitimately need unbounded time and
      are trusted to terminate. Failure modes: too-short timeouts kill legitimate work;
      timeout:0 everywhere lets a wedged command block the workflow indefinitely. Note
      that because agent actions ignore timeout, a wedged agent action is never bounded
      by this setting at all.
    rubric:
      criteria:
        - id: c1
          text: >-
            Default/short timeout for fast routine command hooks; raise for slow-but-bounded command
            work.
        - id: c2
          text: Notes timeout is ignored for agent actions (so the policy concerns command actions).
        - id: c3
          text: >-
            Names both failure modes (too-short kills good work; 0 risks indefinite hang for
            commands).
      referenceAnswer: |
        Timeout applies to command actions and is ignored for agent actions, so this
        policy concerns command actions. Keep the 60s default for fast routine commands
        (formatters, quick lints) so hangs are caught quickly. For known-slow but bounded
        command work like full test suites or builds, raise the timeout to a generous yet
        finite ceiling above the expected duration. Reserve timeout:0 only for command
        tasks that genuinely need unbounded time and are trusted to terminate. This guards
        against two failures: a too-short timeout that kills legitimate work mid-run, and
        blanket timeout:0 that lets a wedged command block the workflow forever. Because
        agent actions ignore timeout entirely, this setting never bounds an agent action.
      passThreshold: 0.6
  - id: kch-500-mc-k
    tier: 500
    bloom: evaluate
    difficulty: 526
    type: multiple_choice
    prompt: |
      Two teams gate "no direct pushes to main." Team A writes a Stop agent hook that
      asks the model to "remind the user not to push to main." Team B uses a git
      pre-push hook plus a steering rule. Which assessment is most defensible?
    choices:
      - id: a
        text: |
          Team B is sounder: a deterministic git pre-push hook actually enforces the
          rule and steering conveys intent, whereas Team A's model reminder is advisory,
          nondeterministic, and fires at the wrong moment to block a push.
      - id: b
        text: |
          Team A is sounder because agent reminders are guaranteed to stop pushes.
      - id: c
        text: |
          They are equivalent because both involve a hook.
      - id: d
        text: |
          Neither can work; pushing to main cannot be controlled by any hook.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Enforcement needs a deterministic gate (git pre-push); a Kiro Stop reminder is advisory and
      mistimed.
  - id: kch-500-ff-h
    tier: 500
    bloom: evaluate
    difficulty: 536
    type: free_form
    prompt: |
      Critique a hook design that mixes responsibilities: a single PostFileSave agent
      hook whose prompt says "format the file, write tests for it, update the changelog,
      and review for security." Judge it on reliability, debuggability, cost, and loop
      risk, and propose a decomposition.
    guidance: |
      One agent prompt doing four unrelated jobs is unreliable (the model may skip or
      botch steps), hard to debug (no clear failure boundary), expensive (heavy model
      call on every save), and loop-prone (its own edits re-fire PostFileSave). Decompose:
      deterministic formatter via command on save; test-writing and security review as
      scoped, intentional agent actions on a coarser trigger (Stop/PostTaskExec) or
      on-demand; changelog update as its own step. Each hook then has one clear concern.
    rubric:
      criteria:
        - id: c1
          text: >-
            Flags reliability/debuggability problems of one prompt doing many jobs (no failure
            boundary).
        - id: c2
          text: Flags cost (heavy per-save model call) and loop risk (agent edits re-fire PostFileSave).
        - id: c3
          text: >-
            Proposes decomposition (command formatter on save; review/tests on coarser/on-demand
            triggers; single-concern hooks).
      referenceAnswer: |
        Bundling format, test-writing, changelog, and security review into one
        PostFileSave agent prompt is fragile: the model may skip or mishandle steps,
        failures have no clear boundary to debug, every save triggers an expensive model
        call, and the agent's own edits re-fire PostFileSave (loop risk). Decompose into
        single-concern hooks: a deterministic formatter command on save; security review
        and test generation as scoped agent actions on a coarser trigger such as Stop or
        PostTaskExec (or invoked on demand); and changelog updates as their own step.
        Each hook then does one thing, is cheap on routine saves, and is easy to reason about.
      passThreshold: 0.6
  - id: kch-500-mc-l
    tier: 500
    bloom: evaluate
    difficulty: 500
    type: multiple_choice
    prompt: |
      A team wants one canonical "quality" automation. They debate: (A) a workspace
      PostFileSave command hook running formatter+linter, (B) a manual steering rule
      asking the agent to "remember to lint," (C) nothing, relying on CI only. Which
      judgment best balances immediacy, determinism, and team consistency?
    choices:
      - id: a
        text: |
          B is best because steering guidance is always obeyed exactly.
      - id: b
        text: |
          C is best because CI is the only trustworthy gate and local hooks add risk.
      - id: c
        text: |
          A and B are interchangeable since both target code quality.
      - id: d
        text: |
          A gives immediate, deterministic, team-shared enforcement on save; CI should
          remain as an independent backstop, and steering can document intent — but the
          committed hook is what reliably acts at edit time.
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >
      A committed command hook enforces deterministically at save; CI backstops and steering
      documents intent.
