# Topic: kiro-cli-hooks (kiro-cli)
# Smart hooks (pre/post command) in the Kiro CLI.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: kiro-cli-hooks
class:
  kind: tool
  tool: kiro-cli
title: Kiro CLI Hooks
summary: Smart hooks (pre/post command) in the Kiro CLI.
triggerSignals: []
items:
  - id: kch-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 125
    type: free_form
    prompt: |
      In which directory are Kiro CLI agent hooks stored at the workspace level?
    guidance: |
      Workspace-level hooks live in the .kiro/hooks/ directory of the repository.
    rubric:
      criteria:
        - id: c1
          text: Names .kiro/hooks/ (or .kiro/hooks) as the workspace directory.
        - id: c2
          text: Does not place hooks under ~/.aws/, ~/.config/, or the repo root directly.
      referenceAnswer: |
        Workspace agent hooks are stored in the .kiro/hooks/ directory inside the
        project (the user-level equivalent is ~/.kiro/hooks/).
      passThreshold: 0.6
  - id: kch-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 130
    type: multiple_choice
    prompt: |
      What file format does Kiro CLI use for agent hook definitions?
    choices:
      - id: a
        text: YAML
      - id: b
        text: JSON
      - id: c
        text: TOML
      - id: d
        text: INI
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Kiro agent hooks are defined as JSON files in .kiro/hooks/.
  - id: kch-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 135
    type: multiple_choice
    prompt: |
      Which trigger fires after a file is saved in Kiro CLI?
    choices:
      - id: a
        text: OnSaveFile
      - id: b
        text: FileSaved
      - id: c
        text: PostFileSave
      - id: d
        text: AfterWrite
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      PostFileSave is the documented trigger event name for file-save hooks.
  - id: kch-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 140
    type: multiple_choice
    prompt: |
      What is the default timeout value for a Kiro CLI hook when none is specified?
    choices:
      - id: a
        text: 10 seconds
      - id: b
        text: 30 seconds
      - id: c
        text: No timeout by default
      - id: d
        text: 60 seconds
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      The default hook timeout is 60 seconds; setting it to 0 disables enforcement.
  - id: kch-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 145
    type: multiple_choice
    prompt: |
      Which top-level key in a Kiro hook file holds the array of hook definitions?
    choices:
      - id: a
        text: triggers
      - id: b
        text: hooks
      - id: c
        text: agents
      - id: d
        text: events
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      The file has a version field and a hooks array; each element is one hook.
  - id: kch-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 148
    type: free_form
    prompt: |
      List the three ways a Kiro CLI agent hook can be created.
    guidance: |
      Natural-language request to Kiro, the manual UI form, or direct JSON editing.
    rubric:
      criteria:
        - id: c1
          text: Mentions natural-language / Ask Kiro creation.
        - id: c2
          text: Mentions the manual UI form.
        - id: c3
          text: Mentions editing the JSON file directly.
      referenceAnswer: |
        Hooks can be created by asking Kiro in natural language, by filling in the
        manual UI form, or by editing the hook JSON file directly.
      passThreshold: 0.6
  - id: kch-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 152
    type: multiple_choice
    prompt: |
      Which field in a hook definition is the regex used to filter which files or
      tools the hook applies to?
    choices:
      - id: a
        text: filter
      - id: b
        text: pattern
      - id: c
        text: matcher
      - id: d
        text: scope
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      matcher is a regex string; it filters by file path or tool name depending on trigger.
  - id: kch-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 156
    type: multiple_choice
    prompt: |
      What is the user-level (global) directory for Kiro CLI hooks?
    choices:
      - id: a
        text: ~/.kiro/hooks/
      - id: b
        text: ~/.aws/kiro/hooks/
      - id: c
        text: ~/.config/kiro/hooks/
      - id: d
        text: ~/.kiro/settings/hooks/
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      User-level hooks live in ~/.kiro/hooks/; workspace ones in .kiro/hooks/.
  - id: kch-100-ff-c
    tier: 100
    bloom: remember
    difficulty: 160
    type: free_form
    prompt: |
      Name the two valid values for a hook action's "type" field.
    guidance: |
      The action type is either "command" (shell command) or "agent" (agent prompt).
    rubric:
      criteria:
        - id: c1
          text: Names command (shell command action).
        - id: c2
          text: Names agent (agent prompt action).
      referenceAnswer: |
        A hook action has type "command" for a shell command or type "agent" for an
        agent prompt.
      passThreshold: 0.6
  - id: kch-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 162
    type: multiple_choice
    prompt: |
      Which trigger fires when a user submits a prompt in a Kiro CLI session?
    choices:
      - id: a
        text: OnPrompt
      - id: b
        text: UserPromptSubmit
      - id: c
        text: PreChat
      - id: d
        text: PromptSent
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      UserPromptSubmit fires when the user submits a prompt.
  - id: kch-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 165
    type: multiple_choice
    prompt: |
      Which field is required and serves as the hook's identifier (used for telemetry)?
    choices:
      - id: a
        text: id
      - id: b
        text: label
      - id: c
        text: title
      - id: d
        text: name
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      name is the required identifier field referenced in telemetry.
  - id: kch-100-ff-d
    tier: 100
    bloom: remember
    difficulty: 168
    type: free_form
    prompt: |
      What boolean field turns a hook on or off, and what is its default value?
    guidance: |
      The enabled field; it defaults to true.
    rubric:
      criteria:
        - id: c1
          text: Names the enabled field.
        - id: c2
          text: States the default is true.
      referenceAnswer: |
        The enabled field toggles the hook; it defaults to true.
      passThreshold: 0.6
  - id: kch-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 170
    type: multiple_choice
    prompt: |
      The CLI command that starts an interactive Kiro chat session is:
    choices:
      - id: a
        text: kiro-cli
      - id: b
        text: kiro
      - id: c
        text: q chat
      - id: d
        text: kiro chat-start
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      The binary/command is kiro-cli; running it with no args starts interactive chat.
  - id: kch-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 172
    type: multiple_choice
    prompt: |
      Which trigger fires when the agent completes its turn?
    choices:
      - id: a
        text: TurnEnd
      - id: b
        text: AgentDone
      - id: c
        text: Stop
      - id: d
        text: PostTurn
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Stop fires when the agent completes its turn.
  - id: kch-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 174
    type: multiple_choice
    prompt: |
      Which two triggers wrap a tool invocation (before and after)?
    choices:
      - id: a
        text: PreToolUse and PostToolUse
      - id: b
        text: BeforeTool and AfterTool
      - id: c
        text: ToolStart and ToolEnd
      - id: d
        text: PreInvoke and PostInvoke
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      PreToolUse and PostToolUse fire before and after a tool invocation.
  - id: kch-100-ff-e
    tier: 100
    bloom: remember
    difficulty: 176
    type: free_form
    prompt: |
      Name the two spec-task lifecycle triggers in Kiro CLI hooks.
    guidance: |
      PreTaskExec (before a spec task runs) and PostTaskExec (after a spec task finishes).
    rubric:
      criteria:
        - id: c1
          text: Names PreTaskExec (before a spec task).
        - id: c2
          text: Names PostTaskExec (after a spec task).
      referenceAnswer: |
        PreTaskExec fires before a spec task executes and PostTaskExec fires after a
        spec task finishes.
      passThreshold: 0.6
  - id: kch-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 178
    type: multiple_choice
    prompt: |
      What version string appears in the documented Kiro hook file example?
    choices:
      - id: a
        text: '"1.0.0"'
      - id: b
        text: '"v1"'
      - id: c
        text: '"2"'
      - id: d
        text: '"latest"'
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      The example uses "version": "v1".
  - id: kch-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 155
    type: multiple_choice
    prompt: |
      Which trigger fires when a Kiro CLI session begins?
    choices:
      - id: a
        text: OnStart
      - id: b
        text: Init
      - id: c
        text: ChatBegin
      - id: d
        text: SessionStart
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      SessionStart fires at the start of a session.
  - id: kch-100-ff-f
    tier: 100
    bloom: remember
    difficulty: 150
    type: free_form
    prompt: |
      Which trigger fires immediately after a new file is created?
    guidance: |
      PostFileCreate.
    rubric:
      criteria:
        - id: c1
          text: Names PostFileCreate.
      referenceAnswer: |
        PostFileCreate fires after a new file is created.
      passThreshold: 0.6
  - id: kch-100-ff-g
    tier: 100
    bloom: remember
    difficulty: 158
    type: free_form
    prompt: |
      In a command-type hook action, which field holds the shell command string to run?
    guidance: |
      The command field, e.g. { "type": "command", "command": "npm run lint" }.
    rubric:
      criteria:
        - id: c1
          text: Names the command field inside the action object.
      referenceAnswer: |
        The command field carries the shell command, e.g. "command": "npm run lint".
      passThreshold: 0.6
  - id: kch-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 225
    type: multiple_choice
    prompt: |
      Why does the matcher field mean different things for a PostFileSave hook versus
      a PreToolUse hook?
    choices:
      - id: a
        text: |
          For file-event triggers the matcher is a regex tested against the file path,
          but for tool-event triggers it is a regex tested against the tool name.
      - id: b
        text: |
          For file events the matcher is a glob and for tool events it is a literal
          string; the syntax differs but both target file paths.
      - id: c
        text: |
          The matcher only applies to tool events; for file events it is ignored
          entirely.
      - id: d
        text: |
          For file events the matcher targets the file's contents, while for tool
          events it targets the tool's output.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Matcher applicability depends on trigger type: file path regex for file events,
      tool name regex for PreToolUse/PostToolUse.
  - id: kch-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 232
    type: multiple_choice
    prompt: |
      How does a "command" action differ in behavior from an "agent" action?
    choices:
      - id: a
        text: |
          A command action sends a prompt to the model; an agent action runs a shell
          script.
      - id: b
        text: |
          A command action runs a shell command deterministically; an agent action
          sends a prompt to the model so the agent decides what to do.
      - id: c
        text: |
          Both run shell commands, but agent actions run with elevated privileges.
      - id: d
        text: |
          A command action is synchronous and an agent action cannot be triggered by
          file events.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      type:command executes a shell command; type:agent gives the agent a prompt to act on.
  - id: kch-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 238
    type: free_form
    prompt: |
      Explain why Kiro agent hooks are not the same thing as git hooks, even though
      both fire on events.
    guidance: |
      Git hooks fire on git lifecycle events (commit, push) and run shell scripts.
      Kiro agent hooks fire on agent/editor events (file save/create/delete, prompt
      submit, tool pre/post, spec task pre/post) and their action may be an agent
      prompt, not only a shell command.
    rubric:
      criteria:
        - id: c1
          text: Notes Kiro hooks fire on agent/editor events, not git lifecycle events.
        - id: c2
          text: Notes a Kiro hook action can be an agent prompt, not only a shell command.
      referenceAnswer: |
        Git hooks are tied to git operations (pre-commit, pre-push) and run shell
        scripts. Kiro agent hooks fire on agent and editor events such as file save,
        prompt submission, tool calls, and spec-task execution, and an action can be
        a model prompt as well as a shell command.
      passThreshold: 0.6
  - id: kch-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 244
    type: multiple_choice
    prompt: |
      What does setting a hook's timeout to 0 accomplish?
    choices:
      - id: a
        text: It makes the action fail immediately because 0 seconds elapses at once.
      - id: b
        text: It resets the timeout to the 60-second default.
      - id: c
        text: It disables timeout enforcement so the action can run without a time limit.
      - id: d
        text: It disables the hook entirely, equivalent to enabled:false.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      timeout:0 disables enforcement; it is distinct from enabled:false, which turns the hook off.
  - id: kch-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 250
    type: multiple_choice
    prompt: |
      If both ~/.kiro/hooks/ and .kiro/hooks/ define behavior, what is the practical
      reason to put a hook at workspace level rather than user level?
    choices:
      - id: a
        text: |
          Workspace hooks run faster because they are loaded first.
      - id: b
        text: |
          Workspace hooks are committed with the repo so the whole team shares them,
          whereas user-level hooks apply only to that developer across all projects.
      - id: c
        text: |
          User-level hooks cannot use the command action type.
      - id: d
        text: |
          Workspace hooks are encrypted while user-level hooks are plaintext.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >
      Workspace .kiro/hooks/ travels with the repo (team-shared); ~/.kiro/hooks/ is per-user,
      all-projects.
  - id: kch-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 256
    type: free_form
    prompt: |
      Explain the difference between the Stop trigger and the PostTaskExec trigger.
    guidance: |
      Stop fires when the agent finishes its turn (any conversational turn).
      PostTaskExec fires specifically after a spec task finishes executing.
    rubric:
      criteria:
        - id: c1
          text: Stop fires when the agent completes a (conversational) turn.
        - id: c2
          text: PostTaskExec fires specifically after a spec task finishes.
        - id: c3
          text: Conveys they are different event contexts (turn vs spec-task lifecycle).
      referenceAnswer: |
        Stop fires whenever the agent completes its turn, regardless of context.
        PostTaskExec fires only in the spec workflow, after a spec task finishes
        executing. They cover different lifecycles.
      passThreshold: 0.6
  - id: kch-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 262
    type: multiple_choice
    prompt: |
      Why is each hook limited to a single trigger value rather than a list of events?
    choices:
      - id: a
        text: |
          The schema gives each hook one trigger; to react to multiple events you
          define multiple hook entries in the hooks array.
      - id: b
        text: |
          Because triggers are mutually exclusive at runtime and cannot coexist in
          the same file.
      - id: c
        text: |
          Because a hook with multiple triggers would always loop infinitely.
      - id: d
        text: |
          Because only the first listed trigger would ever fire anyway.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Each hook has exactly one trigger; multiple hook entries cover multiple events.
  - id: kch-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 268
    type: multiple_choice
    prompt: |
      A teammate says "hooks live next to the MCP config in .kiro/settings/." Why is
      that wrong?
    choices:
      - id: a
        text: |
          Hooks live in .kiro/settings/hooks.json, so the teammate is only half right.
      - id: b
        text: |
          Both hooks and MCP config live in .kiro/steering/, not settings.
      - id: c
        text: |
          Hooks live at the repo root, not anywhere under .kiro/.
      - id: d
        text: |
          Hooks live in .kiro/hooks/; only the MCP server config (mcp.json) lives in
          .kiro/settings/.
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Hooks are in .kiro/hooks/; .kiro/settings/ holds mcp.json. They are distinct subtrees.
  - id: kch-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 272
    type: free_form
    prompt: |
      Describe how a PostFileSave hook with matcher "\\.ts$" and a command action
      "npm run lint" behaves when you save a TypeScript file versus a Markdown file.
    guidance: |
      On saving a .ts file the matcher matches, so the hook runs npm run lint. On
      saving a .md file the matcher does not match, so the hook does not fire.
    rubric:
      criteria:
        - id: c1
          text: Saving a .ts file matches the regex, so npm run lint runs.
        - id: c2
          text: Saving a .md file does not match, so the hook does not fire.
      referenceAnswer: |
        The matcher "\\.ts$" is tested against the saved file path. A TypeScript file
        matches and triggers the command npm run lint; a Markdown file does not match,
        so the hook stays inert.
      passThreshold: 0.6
  - id: kch-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 228
    type: multiple_choice
    prompt: |
      What is the purpose of the version field at the top of a hook file?
    choices:
      - id: a
        text: |
          It declares the hook schema version (e.g. "v1") so the format can evolve
          without breaking existing files.
      - id: b
        text: |
          It pins the Kiro CLI binary version required to run the hooks.
      - id: c
        text: |
          It is the semantic version of the project being hooked.
      - id: d
        text: |
          It records the git commit that last edited the hooks.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      version (e.g. "v1") declares the hook file schema version.
  - id: kch-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 240
    type: multiple_choice
    prompt: |
      Why might you choose an agent-type action over a command-type action for a
      PostFileSave hook?
    choices:
      - id: a
        text: |
          Because command actions cannot be attached to file events.
      - id: b
        text: |
          When the response should be judgment-based (e.g. "review this change for
          issues") rather than a fixed deterministic command.
      - id: c
        text: |
          Because agent actions always run faster than shell commands.
      - id: d
        text: |
          Because only agent actions can use a matcher.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Agent actions suit open-ended, reasoning tasks; command actions suit fixed scripts.
  - id: kch-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: |
      How do hooks relate to the broader Kiro feature set of specs, steering, and MCP?
    choices:
      - id: a
        text: |
          Hooks replace steering files by injecting context on every save.
      - id: b
        text: |
          Hooks are only usable when MCP servers are connected.
      - id: c
        text: |
          Hooks are event-driven automation; they can fire around spec task execution
          and tool/MCP invocations, complementing (not replacing) those features.
      - id: d
        text: |
          Hooks and specs are mutually exclusive; enabling one disables the other.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Hooks automate around events including spec tasks (Pre/PostTaskExec) and tool calls.
  - id: kch-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 276
    type: free_form
    prompt: |
      Explain why PreTaskExec and PostTaskExec are only meaningful in the context of
      Kiro specs.
    guidance: |
      These triggers wrap the execution of a spec task (from tasks.md). Without a spec
      workflow producing executable tasks, there is no task lifecycle to hook into.
    rubric:
      criteria:
        - id: c1
          text: Ties Pre/PostTaskExec to spec task execution (tasks.md / spec workflow).
        - id: c2
          text: Notes there is no task lifecycle to hook without a spec.
      referenceAnswer: |
        PreTaskExec and PostTaskExec wrap the execution of a discrete spec task defined
        in a spec's tasks.md. They have no meaning outside the spec workflow because
        there is no executable task lifecycle to surround.
      passThreshold: 0.6
  - id: kch-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 254
    type: multiple_choice
    prompt: |
      What does it mean that the matcher field is optional?
    choices:
      - id: a
        text: |
          If you omit matcher, the hook fires on every occurrence of its trigger
          rather than being filtered to specific files or tools.
      - id: b
        text: |
          If you omit matcher, the hook never fires.
      - id: c
        text: |
          If you omit matcher, the hook defaults to matching only Markdown files.
      - id: d
        text: |
          Omitting matcher is invalid and the file will fail to load.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      With no matcher, the hook fires for every event of its trigger type.
  - id: kch-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 266
    type: multiple_choice
    prompt: |
      A developer wants a hook that runs only when the Kiro session first opens, to
      print a reminder. Which trigger fits, and why not Stop?
    choices:
      - id: a
        text: |
          Stop fits because it fires at session begin; SessionStart fires on exit.
      - id: b
        text: |
          UserPromptSubmit fits; SessionStart does not exist.
      - id: c
        text: |
          SessionStart fits because it fires once at session begin; Stop fires at the
          end of each agent turn, which is the wrong moment.
      - id: d
        text: |
          Neither fits; session-level hooks are not supported.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      SessionStart fires at session begin; Stop fires per agent turn end.
  - id: kch-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 278
    type: free_form
    prompt: |
      Explain why putting secrets directly in a hook's command string is risky given
      where hook files live.
    guidance: |
      Workspace hooks in .kiro/hooks/ are JSON committed to version control. Secrets
      embedded in the command string would be exposed in the repo history to anyone
      with access; secrets should come from the environment instead.
    rubric:
      criteria:
        - id: c1
          text: Notes workspace hooks are committed to version control.
        - id: c2
          text: Concludes embedded secrets would leak via the repo; use env vars instead.
      referenceAnswer: |
        Workspace hooks in .kiro/hooks/ are committed to the repo, so any secret hard
        coded into a command string ends up in version history for all collaborators.
        Reference secrets through environment variables rather than inlining them.
      passThreshold: 0.6
  - id: kch-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 260
    type: multiple_choice
    prompt: |
      Why is "name" described as being used for telemetry?
    choices:
      - id: a
        text: |
          It is sent to AWS billing to meter hook execution cost per name.
      - id: b
        text: |
          It identifies the hook in logs/metrics so you can tell which hook ran or
          failed without inspecting its full definition.
      - id: c
        text: |
          It controls the order in which hooks execute.
      - id: d
        text: |
          It is the regex applied to the triggering event.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      name is the human-readable identifier surfaced in telemetry/logs.
  - id: kch-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 234
    type: multiple_choice
    prompt: |
      How does PostFileDelete differ from a PreToolUse hook matching a delete tool?
    choices:
      - id: a
        text: |
          PostFileDelete fires on the editor file-deletion event and matches on file
          path; a PreToolUse hook fires before a tool runs and matches on tool name.
      - id: b
        text: |
          They are identical aliases for the same event.
      - id: c
        text: |
          PostFileDelete fires before deletion; PreToolUse fires after the tool runs.
      - id: d
        text: |
          Neither can use a matcher.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      File events match on path and fire on file ops; tool events match on tool name and wrap tool
      calls.
  - id: kch-200-ff-f
    tier: 200
    bloom: understand
    difficulty: 230
    type: free_form
    prompt: |
      Explain why the same JSON hook definition produced by the UI form, by a
      natural-language request, and by hand-editing are interchangeable.
    guidance: |
      All three creation methods write to the same JSON schema in .kiro/hooks/ (or
      ~/.kiro/hooks/). The creation path is just a front end; the persisted artifact
      and its fields are identical, so any hook can be inspected or edited as JSON.
    rubric:
      criteria:
        - id: c1
          text: States all three methods produce the same JSON artifact in .kiro/hooks/.
        - id: c2
          text: Notes the creation path is just a front end over the same schema.
      referenceAnswer: |
        Regardless of how it is created, a hook is persisted as a JSON object with the
        same fields (name, trigger, matcher, action, timeout, enabled) under
        .kiro/hooks/ or ~/.kiro/hooks/. The UI form and natural-language paths are just
        conveniences that write that JSON, so any hook can later be read or hand-edited
        identically.
      passThreshold: 0.6
  - id: kch-200-mc-n
    tier: 200
    bloom: understand
    difficulty: 246
    type: multiple_choice
    prompt: |
      A PostToolUse hook is described as firing "after a tool runs." Why is that useful
      compared to PreToolUse?
    choices:
      - id: a
        text: |
          PostToolUse can react to a tool's result (e.g. re-run tests after a write),
          whereas PreToolUse runs before the tool has done anything.
      - id: b
        text: |
          PostToolUse can cancel the tool before it runs; PreToolUse cannot.
      - id: c
        text: |
          PostToolUse matches on file paths while PreToolUse matches on prompts.
      - id: d
        text: |
          There is no difference; both fire at the same moment.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      PostToolUse reacts to the outcome of a tool; PreToolUse runs before/around it.
  - id: kch-300-ff-a
    tier: 300
    bloom: apply
    difficulty: 325
    type: free_form
    prompt: |
      Write a complete Kiro hook JSON file (version v1) for a single hook named
      "format-python" that runs the shell command "black ." whenever a .py file is
      saved, with a 45-second timeout. Provide the JSON.
    guidance: |
      Use version "v1", a hooks array, trigger PostFileSave, matcher "\\.py$", action
      type command with command "black .", timeout 45, enabled true.
    rubric:
      criteria:
        - id: c1
          text: Uses version "v1" and a hooks array with one hook.
        - id: c2
          text: trigger is PostFileSave and matcher targets .py files (e.g. "\\.py$").
        - id: c3
          text: action is type command with command "black ." and timeout 45.
      referenceAnswer: |
        {
          "version": "v1",
          "hooks": [
            {
              "name": "format-python",
              "trigger": "PostFileSave",
              "matcher": "\\.py$",
              "action": { "type": "command", "command": "black ." },
              "timeout": 45,
              "enabled": true
            }
          ]
        }
      passThreshold: 0.6
  - id: kch-300-mc-a
