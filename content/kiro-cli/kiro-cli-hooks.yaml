  - id: kch-500-ff-a
    tier: 500
    bloom: evaluate
    difficulty: 485
    type: free_form
    prompt: |
      Critique this design: a single PostFileSave agent hook with matcher ".*" and
      prompt "Refactor and reformat this file." Judge it against correctness, cost,
      and safety, and recommend a better design.
    guidance: |
      Problems: matches every file (incl. non-code, generated, vendored), agent edits
      re-save and self-trigger an infinite loop, runs the model on every keystroke-save
      (cost), and "refactor" is open-ended/destructive. Better: narrow matcher to a
      code subset, use a deterministic formatter via command action, move semantic
      review to Stop/PostTaskExec (once per turn/task), keep agent prompts scoped and
      non-destructive, set a sane timeout.
    rubric:
      criteria:
        - id: c1
          text: >-
            Flags the loop risk (agent re-saves, re-firing PostFileSave) and the over-broad ".*"
            matcher.
        - id: c2
          text: Flags cost (model runs on every save) and the destructive/open-ended "refactor" prompt.
        - id: c3
          text: >-
            Recommends concrete fixes (narrow matcher, deterministic formatter via command, move
            review to Stop/PostTaskExec, scoped prompt, timeout).
      referenceAnswer: |
        The design is poor: matcher ".*" fires for every saved file including generated
        and vendored ones; an agent that refactors re-saves the file and re-fires
        PostFileSave, creating an infinite loop; it invokes the model on every save
        (expensive); and "refactor" is open-ended and risks unwanted destructive edits.
        Better: use a command action for deterministic formatting, narrow the matcher to
        the code you intend to touch, move any semantic review to a Stop or PostTaskExec
        hook so it runs once per turn/task, keep agent prompts scoped and non-destructive,
        and set an explicit timeout.
      passThreshold: 0.6
  - id: kch-500-mc-a
    tier: 500
    bloom: evaluate
    difficulty: 492
    type: multiple_choice
    prompt: |
      Which hook strategy best balances fast feedback, low cost, and loop safety for a
      TypeScript repo?
    choices:
      - id: a
        text: |
          A PostFileSave command hook (matcher "\\.ts$") running a deterministic
          formatter/linter, plus a single Stop agent hook that reviews the turn's
          changes for issues.
      - id: b
        text: |
          A PostFileSave agent hook (matcher ".*") that both formats and reviews on
          every save.
      - id: c
        text: |
          A PreToolUse agent hook (matcher ".*") that reviews before every tool call.
      - id: d
        text: |
          One hook per file in the repo, each hardcoding that file's path.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      Deterministic command on save + a single Stop review avoids loops, controls cost, gives fast
      feedback.
  - id: kch-500-mc-b
    tier: 500
    bloom: evaluate
    difficulty: 498
    type: multiple_choice
    prompt: |
      A team debates putting their mandatory pre-write security gate in (1) a workspace
      PreToolUse hook versus (2) relying on --trust-tools=read in CI. Which judgment is
