      - id: d
        text: |
          Set the version field to "ci" so CI skips it.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      enabled toggles a hook; guarding the command on a CI env var is the durable approach.
  - id: kch-300-mc-j
    tier: 300
