  - id: kch-300-ff-b
    tier: 300
    bloom: apply
    difficulty: 344
    type: free_form
    prompt: |
      A spec task runs tests that sometimes hang. You want a hook that, after each
      spec task finishes, runs a command that posts a summary, but you do NOT want
      that command to be killed if it takes a while. Describe the trigger, action
      type, and timeout setting you would use.
    guidance: |
      Use PostTaskExec with a command action and set timeout to 0 to disable
      enforcement so a slow command is not killed. (Note: timeout applies to command
      actions; it is ignored for agent actions, so for an agent action there would be
      no time limit to disable in the first place.)
    rubric:
      criteria:
        - id: c1
          text: Uses PostTaskExec as the trigger.
        - id: c2
          text: Uses a command action to post the summary.
        - id: c3
          text: Sets timeout to 0 to disable enforcement so the command is not killed.
      referenceAnswer: |
        Use trigger PostTaskExec so it fires after each spec task, with a command
        action that posts the summary, and set timeout to 0 to disable the time limit
        so the slow command is not terminated. (Timeout governs command actions; it is
        ignored for agent actions, so the command action is the right choice when the
        timeout setting is the lever you need.)
      passThreshold: 0.6
  - id: kch-300-mc-c
    tier: 300
    bloom: apply
    difficulty: 350
    type: multiple_choice
    prompt: |
