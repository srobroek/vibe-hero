    rubric:
      criteria:
        - id: c1
          text: States the hook is a JSON file under .kiro/hooks/ (or ~/.kiro/hooks/).
        - id: c2
          text: Notes it can be hand-edited as JSON regardless of creation method.
      referenceAnswer: |
        The UI form, natural-language, and direct-editing methods all produce the same
        artifact: a JSON hook definition in .kiro/hooks/ (workspace) or ~/.kiro/hooks/
        (user). You can open and hand-edit that JSON directly.
      passThreshold: 0.6
  - id: kch-300-mc-k
    tier: 300
    bloom: apply
    difficulty: 366
