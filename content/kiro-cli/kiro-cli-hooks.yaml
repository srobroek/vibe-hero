  - id: kch-500-ff-b
    tier: 500
    bloom: evaluate
    difficulty: 504
    type: free_form
    prompt: |
      Evaluate the claim: "Storing hooks at user level (~/.kiro/hooks/) is better than
      workspace level because it keeps the repo clean." Argue both sides and give a
      recommendation grounded in how hooks are shared and reviewed.
    guidance: |
      Pro user-level: repo stays free of tooling config; each dev customizes locally.
      Con: hooks are not shared, so team-wide automation/standards are inconsistent and
      invisible; a fresh clone lacks them. Because workspace hooks are committed, they
      are reviewable, versioned, and shared. Recommendation: put team-mandated hooks at
      workspace level (reviewed like code) and reserve ~/.kiro/hooks/ for personal,
      cross-project preferences.
    rubric:
      criteria:
        - id: c1
          text: Gives the user-level upside (repo cleanliness, personal customization).
        - id: c2
          text: Gives the workspace upside (shared, versioned, reviewable, present in clones).
        - id: c3
          text: >-
            Recommends workspace for team-mandated hooks, user-level for personal/cross-project
            ones.
      referenceAnswer: |
        User-level hooks keep the repo uncluttered and let each developer tailor their
        own automation, but they are invisible to teammates, inconsistent across the
        team, and absent from a fresh clone. Workspace hooks are committed, so they are
        versioned, code-reviewed, and shared by everyone. The sound recommendation is to
        keep team-mandated automation at workspace level (reviewed like any code change)
        and reserve ~/.kiro/hooks/ for personal preferences that should span all projects.
      passThreshold: 0.6
  - id: kch-500-mc-c
    tier: 500
    bloom: evaluate
    difficulty: 510
    type: multiple_choice
    prompt: |
      A reviewer proposes setting timeout:0 on all hooks "so nothing ever gets cut off."
      What is the best critique?
    choices:
      - id: a
        text: |
          It is ideal because hooks should never be interrupted under any circumstance.
      - id: b
        text: |
          Blanket timeout:0 removes the safety net for command actions: a hung command
          can then block the workflow indefinitely; command timeouts should be tuned per
          hook, reserving 0 only for commands known to need unbounded time.
      - id: c
        text: |
          timeout:0 actually means a 1-second timeout, so it is harmless.
      - id: d
        text: |
          timeout has no effect on any action, so the change does nothing.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      timeout:0 disables enforcement for command actions (it is ignored for agent
      actions); applying it everywhere removes protection against command hangs.
  - id: kch-500-mc-d
    tier: 500
    bloom: evaluate
    difficulty: 516
    type: multiple_choice
    prompt: |
      Which is the strongest argument for implementing a code-quality gate as a Kiro
