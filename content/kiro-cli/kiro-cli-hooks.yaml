      referenceAnswer: |
        {
          "name": "commit-reminder",
          "trigger": "UserPromptSubmit",
          "action": { "type": "agent", "prompt": "Follow the repo's commit conventions" }
        }
        No matcher is required: UserPromptSubmit has no file path or tool name to filter,
