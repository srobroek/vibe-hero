    guidance: |
      For PostToolUse the matcher is interpreted as a tool-name regex, not a file path,
      so a file-path pattern will not match tool names. To format on file save, use the
      PostFileSave trigger (whose matcher is a file-path regex) instead.
    rubric:
      criteria:
        - id: c1
          text: Identifies that PostToolUse matches on tool name, not file path.
        - id: c2
          text: Explains the file-path regex therefore fails to match any tool name.
        - id: c3
          text: Corrects it to PostFileSave (file-path matcher) for format-on-save.
      referenceAnswer: |
        PostToolUse interprets matcher as a tool-name regex, so a file-path pattern will
        never match a tool name and the hook stays inert. Format-on-save is a file event:
        switch the trigger to PostFileSave, whose matcher is a file-path regex, and the
        hook will fire on saves.
      passThreshold: 0.6
  - id: kch-400-mc-k
    tier: 400
