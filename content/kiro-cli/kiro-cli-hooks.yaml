      - id: b
        text: |
          Agent actions on PreToolUse are silently converted to command actions.
      - id: c
        text: |
          PreToolUse agent actions always block the underlying tool permanently.
      - id: d
        text: |
          Agent actions cannot read the tool name, so the matcher is ignored.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >
      An agent action that calls tools can re-enter PreToolUse; scope the matcher to avoid
      recursion.
  - id: kch-400-ff-d
    tier: 400
    bloom: analyze
    difficulty: 478
    type: free_form
    prompt: |
      Compare using a Stop-trigger agent hook versus a PostFileSave-trigger agent hook
      for "review my changes." Under what conditions does each cause redundant work,
      and which is generally safer for an agent that edits many files per turn?
    guidance: |
      PostFileSave fires once per saved file; during a multi-file turn the agent edits
      many files, so a per-save review runs many times (redundant, possibly looping).
      Stop fires once when the turn ends, so a single review covers all changes — safer
      for multi-file edits. PostFileSave can be preferable for human-driven single saves.
    rubric:
      criteria:
        - id: c1
          text: >-
            PostFileSave fires per file, so a multi-file agent turn triggers it many times
            (redundant).
        - id: c2
          text: Stop fires once at turn end, batching the review over all changes.
        - id: c3
          text: Concludes Stop is generally safer for an agent editing many files per turn.
      referenceAnswer: |
        PostFileSave fires once for each saved file, so when an agent edits many files
        in one turn the review runs repeatedly and can even feed a self-trigger loop.
        Stop fires once when the turn ends, letting a single review cover all changes.
        For an agent that edits many files per turn, Stop is safer; PostFileSave suits
        occasional human-driven single-file saves.
      passThreshold: 0.6
  - id: kch-400-mc-g
