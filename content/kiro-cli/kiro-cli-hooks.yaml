  - id: kch-300-ff-g
    tier: 300
    bloom: apply
    difficulty: 340
    type: free_form
    prompt: |
      You want a PostToolUse hook that re-runs the test suite after the agent uses the
      file-write tool, but only for writes (not reads or searches). Describe the
      trigger, matcher target, and action you would configure.
    guidance: |
      Trigger PostToolUse; matcher is a regex on the tool name targeting the write tool;
      action is a command running the test suite (e.g. npm test). The matcher scopes it
      to writes so reads/searches do not trigger it.
    rubric:
      criteria:
        - id: c1
          text: Uses trigger PostToolUse.
        - id: c2
          text: Matcher is a tool-name regex scoped to the write tool (excludes read/search).
        - id: c3
          text: Action is a command that runs the test suite.
      referenceAnswer: |
        Use trigger PostToolUse with a matcher that is a regex on the write tool's name
        so it fires only after writes (not reads or searches). The action is a command
        such as { "type": "command", "command": "npm test" } that re-runs the suite.
      passThreshold: 0.6
  - id: kch-400-ff-a
    tier: 400
    bloom: analyze
    difficulty: 425
    type: free_form
    prompt: |
      A developer writes a PostFileSave hook whose agent action says "Fix any lint
      issues in this file." After enabling it, saving a file triggers an endless
      cycle. Diagnose the root cause and propose a fix.
    guidance: |
      The agent action edits/saves the file, which re-fires PostFileSave, which runs
      the agent again — a self-trigger loop. Kiro's docs give no built-in loop guard.
      Fix options: use a deterministic command action instead of an agent that re-saves,
      narrow the matcher to exclude the agent's own writes, disable the hook during
      agent-initiated saves, or move the review to Stop/PostTaskExec so it does not
      fire on every intermediate save.
    rubric:
      criteria:
        - id: c1
          text: Identifies the loop as the agent action re-saving the file, re-firing PostFileSave.
        - id: c2
          text: Notes there is no built-in self-trigger guard documented.
        - id: c3
          text: >-
            Proposes a concrete fix (deterministic command, narrower matcher, or different trigger
            like Stop).
      referenceAnswer: |
        The agent action edits and saves the file, which triggers PostFileSave again,
        re-invoking the agent indefinitely. Kiro documents no automatic loop protection,
        so the design must avoid the feedback path: switch to a deterministic command
        action that does not re-trigger, scope the matcher to exclude agent-written
        paths, or move the review to Stop/PostTaskExec so it runs once per turn/task
        instead of on every intermediate save.
      passThreshold: 0.6
  - id: kch-400-mc-a
    tier: 400
    bloom: analyze
    difficulty: 432
    type: multiple_choice
    prompt: |
      A PreToolUse hook is meant to block dangerous shell commands but it also fires
      for read-only file searches, slowing everything down. The matcher is ".*".
      What is the precise diagnosis?
    choices:
      - id: a
        text: |
          The matcher ".*" matches every tool name, so the hook fires for all tools;
          it should be narrowed to the write/execute tool name(s).
      - id: b
        text: |
          PreToolUse cannot use a matcher, so it always fires; only PostToolUse can.
      - id: c
        text: |
          The matcher matches file contents, not tool names, so read searches leak through.
      - id: d
        text: |
          The hook is in the wrong directory; PreToolUse hooks must be user-level.
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      For tool triggers the matcher is a tool-name regex; ".*" matches all tools. Narrow it.
  - id: kch-400-mc-b
    tier: 400
    bloom: analyze
    difficulty: 438
    type: multiple_choice
    prompt: |
      Two hooks both target PostFileSave on ".ts" files: one workspace
      (.kiro/hooks/) and one user (~/.kiro/hooks/). The team expects only the
      workspace behavior. Which statement best frames the real concern?
    choices:
      - id: a
        text: |
          Only the user hook ever fires; workspace hooks are ignored when a user hook exists.
      - id: b
        text: |
          Both files are loaded from their respective scopes, so both hooks can fire;
          the per-user hook is not overridden away and may produce unexpected extra
          behavior on that developer's machine.
      - id: c
        text: |
          The workspace hook silently overwrites the user file on disk.
      - id: d
        text: |
          Hooks with identical triggers are rejected and neither loads.
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Workspace and user hooks coexist; the per-user hook still fires, causing surprise behavior.
  - id: kch-400-ff-b
    tier: 400
    bloom: analyze
    difficulty: 444
    type: free_form
    prompt: |
      A hook's command action takes 90 seconds but the hook has no explicit timeout.
      The command is being killed at 60 seconds, breaking the workflow. Explain what
      is happening and the two ways to resolve it, with the tradeoff of each.
    guidance: |
      The default timeout is 60s, so the 90s command is terminated. Resolve by raising
      timeout (e.g. 120) — bounded but must guess a ceiling — or by setting timeout 0
      to disable enforcement — never killed, but a hung command can block indefinitely.
    rubric:
      criteria:
        - id: c1
          text: Identifies the 60-second default timeout as the killer.
        - id: c2
          text: Option 1 raise timeout (bounded; must pick a safe ceiling).
        - id: c3
          text: Option 2 set timeout 0 to disable (never killed; risk of indefinite hang).
      referenceAnswer: |
        With no timeout set, the default 60s applies and kills the 90s command. Either
        raise timeout to a value above 90 (bounded protection but you must guess a safe
        ceiling) or set timeout to 0 to disable enforcement (the command is never killed
        but a genuinely hung command can block indefinitely). Choose based on how much
        you trust the command to terminate.
      passThreshold: 0.6
  - id: kch-400-mc-c
    tier: 400
    bloom: analyze
    difficulty: 450
    type: multiple_choice
    prompt: |
      A reviewer claims a single hook can "watch for both file saves and tool calls"
      by listing two triggers. Why does this design not work in Kiro?
    choices:
      - id: a
        text: |
          It works, but only if both triggers share the same matcher.
      - id: b
        text: |
          It works only at user level, not workspace level.
      - id: c
        text: |
          Each hook has exactly one trigger value; covering both events requires two
          separate hook entries in the hooks array.
      - id: d
        text: |
          Tool-call events cannot be hooked at all, so the second trigger is invalid.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      The schema is one trigger per hook; multiple events need multiple entries.
  - id: kch-400-mc-d
    tier: 400
    bloom: analyze
    difficulty: 456
