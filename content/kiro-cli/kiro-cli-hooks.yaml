    choices:
      - id: a
        text: |
          PostFileSave with a matcher of ".*" so it runs on the first save.
      - id: b
        text: |
          PreTaskExec with a matcher on the task name.
      - id: c
        text: |
          SessionStart; no matcher applies because there is no file path or tool name
          to filter at session start.
      - id: d
        text: |
          UserPromptSubmit with a matcher of "^setup".
    answerKey:
      kind: choice
      correctChoiceId: c
