    choices:
      - id: a
        text: |
          Trust flags alone are sufficient; hooks add no value for security.
      - id: b
        text: |
          The hook alone is sufficient; trust flags are irrelevant once a hook exists.
      - id: c
        text: |
          Use both as defense in depth: --trust-tools restricts which categories run
          without approval, while the PreToolUse hook enforces project-specific checks
          the trust model cannot express; neither alone is sufficient.
      - id: d
        text: |
          Neither matters because headless CI ignores both.
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >
      Trust flags and hooks are complementary layers; combine coarse trust limits with hook-specific
