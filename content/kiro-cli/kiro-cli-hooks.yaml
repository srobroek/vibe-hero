  - id: kch-400-ff-e
    tier: 400
    bloom: analyze
    difficulty: 470
    type: free_form
    prompt: |
      You inherit a repo where .kiro/hooks/ has five hooks, several with overlapping
      PostFileSave matchers. Saves feel slow and order seems nondeterministic to you.
      Lay out an investigation plan to find which hooks fire on a given save and why
      it is slow.
    guidance: |
      Enumerate each hook's trigger/matcher; for a sample saved path, compute which
      matchers match (multiple may). Identify expensive actions (agent prompts, long
      commands) and their timeouts. Reduce overlap by tightening/anchoring matchers,
      merging redundant hooks, switching per-save agent reviews to Stop, and disabling
      or removing dead hooks. Confirm the docs do not promise a firing order, so do not
      rely on ordering for correctness.
    rubric:
      criteria:
        - id: c1
          text: >-
            Enumerates hooks and computes which matchers match a sample saved path (overlap can fire
            several).
        - id: c2
          text: Identifies expensive actions/timeouts as the slowness source.
        - id: c3
          text: >-
            Proposes remediation (tighten/anchor matchers, merge, move per-save reviews to Stop,
            disable dead hooks).
      referenceAnswer: |
        List every hook's trigger and matcher, then for a representative saved file
        path determine which matchers match — overlapping unanchored regexes can fire
        several hooks per save. Flag the costly actions (agent reviews, long shell
        commands) and their timeouts as the slowdown. Remediate by anchoring/narrowing
        matchers, merging redundant hooks, moving per-save agent reviews to a single
        Stop hook, and disabling dead hooks. Do not assume a deterministic firing order
        since it is not guaranteed.
      passThreshold: 0.6
  - id: kch-400-mc-i
    tier: 400
    bloom: analyze
