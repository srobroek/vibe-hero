    guidance: |
      Use PreToolUse with a tool-name matcher targeting the write tool, a command
      action invoking the scanner, and supply the key via an environment variable
      (e.g. KIRO_API_KEY or a scanner-specific env var) rather than inlining it.
    rubric:
      criteria:
        - id: c1
          text: Uses PreToolUse with a matcher on the write/execute tool name.
        - id: c2
          text: Runs a command action invoking the scanner.
        - id: c3
          text: Supplies the key via environment variable, not hardcoded in the command.
      referenceAnswer: |
        Use trigger PreToolUse with a matcher on the write tool's name so it fires
        before writes. The action is a command that runs the scanner, reading the key
        from an environment variable (the command references $API_KEY rather than the
        literal value), keeping the secret out of the committed hook file.
      passThreshold: 0.6
  - id: kch-300-mc-i
    tier: 300
    bloom: apply
    difficulty: 354
    type: multiple_choice
    prompt: |
