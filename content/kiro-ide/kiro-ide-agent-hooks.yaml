    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Shared automation belongs in the committed .kiro/hooks/; personal automation belongs in
      ~/.kiro/hooks/. User-level hooks do not sync via the repo, and hooks do not live in
