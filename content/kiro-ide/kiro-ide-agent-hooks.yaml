# Topic: kiro-ide-agent-hooks (kiro-ide)
# Agent hooks in the Kiro IDE — event-triggered automation.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: kiro-ide-agent-hooks
class:
  kind: tool
  tool: kiro-ide
title: Kiro IDE Agent Hooks
summary: Agent hooks in the Kiro IDE — event-triggered automation.
triggerSignals: []
items:
  - id: kah-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 122
    type: multiple_choice
    prompt: What are Kiro IDE Agent Hooks?
    choices:
      - id: a
        text: Event-driven automations that detect an IDE event and then run an action automatically
      - id: b
        text: Keyboard shortcuts that insert reusable code snippets into the editor
      - id: c
        text: A panel that lists every Claude model available to your account
      - id: d
        text: Markdown files that store persistent project knowledge for the agent
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Agent hooks follow a two-step detect-then-act model: Kiro detects an IDE event and then runs
      an action automatically. Markdown project knowledge describes steering, not hooks, and the
      model list and snippets are unrelated features.
  - id: kah-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 128
    type: multiple_choice
    prompt: In what file format are Kiro agent hooks stored?
    choices:
      - id: a
        text: YAML files
      - id: b
        text: JSON files
      - id: c
        text: Markdown files
      - id: d
        text: TOML files
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Hooks are stored as JSON files. Markdown is used for specs and steering, not for hook
      definitions. YAML front matter appears in steering files, but hooks themselves are JSON.
  - id: kah-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 134
    type: multiple_choice
    prompt: In which workspace directory are Kiro agent hooks stored?
    choices:
      - id: a
        text: .kiro/specs/
      - id: b
        text: .kiro/steering/
      - id: c
        text: .kiro/hooks/
      - id: d
        text: .kiro/settings/
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      Workspace hooks live in .kiro/hooks/. The .kiro/specs/ folder holds spec artifacts,
      .kiro/steering/ holds steering docs, and .kiro/settings/ holds settings such as mcp.json.
  - id: kah-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 140
    type: multiple_choice
    prompt: Where are user-level (global) Kiro hooks stored, as opposed to workspace hooks?
    choices:
      - id: a
        text: /etc/kiro/hooks/
      - id: b
        text: .kiro/global/hooks/
      - id: c
        text: ~/.config/kiro/hooks.json
      - id: d
        text: ~/.kiro/hooks/
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      User-level hooks live in ~/.kiro/hooks/ in the home directory, mirroring the workspace
      .kiro/hooks/ location. The other paths are invented.
  - id: kah-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 145
    type: free_form
    prompt: Name three IDE events that can trigger a Kiro agent hook.
    rubric:
      criteria:
        - id: c1
          text: Names a file event such as file save (PostFileSave)
        - id: c2
          text: >-
            Names a second valid trigger (file create, file delete, manual/on-demand, tool use, or
            agent stop)
        - id: c3
          text: Names a third valid distinct trigger
      referenceAnswer: >-
        Valid triggers include file save (PostFileSave), file create (PostFileCreate), file delete
        (PostFileDelete), and manual/on-demand triggers. Broader events include UserPromptSubmit,
        Stop (agent turn completion), PreToolUse/PostToolUse, and PreTaskExec/PostTaskExec.
      passThreshold: 0.6
    guidance: >-
      The durable core set is file save, file create, file delete, and manual triggers. Kiro also
      exposes UserPromptSubmit, Stop, tool pre/post, and spec task pre/post events. Any three
      distinct valid triggers earn full credit.
  - id: kah-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 150
    type: multiple_choice
    prompt: A Kiro hook action can be one of two kinds. Which pair is correct?
    choices:
      - id: a
        text: An agent prompt (run an AI task) or a shell command
      - id: b
        text: A git commit or a git push
      - id: c
        text: A REST webhook or a database query
      - id: d
        text: A keyboard macro or a clipboard paste
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      A hook action is either an agent action (type "agent" with a prompt) or a shell command (type
      "command" with a command). The other pairs are not how hook actions are defined.
  - id: kah-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 155
    type: multiple_choice
    prompt: Which company developed the Kiro IDE that provides agent hooks?
    choices:
      - id: a
        text: Microsoft
      - id: b
        text: AWS (Amazon)
      - id: c
        text: Google
      - id: d
        text: JetBrains
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Kiro is an agentic IDE developed by AWS (Amazon). It is built on Code OSS, the open-source
      base of VS Code, but it is an AWS product, not Microsoft's.
  - id: kah-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 160
    type: free_form
    prompt: List two ways a user can create an agent hook in Kiro besides editing the JSON file directly.
    rubric:
      criteria:
        - id: c1
          text: Mentions natural-language creation (describe the behavior and Kiro generates the config)
        - id: c2
          text: Mentions the form-based / UI creation method in the IDE
      referenceAnswer: >-
        You can create a hook by describing the desired behavior in natural language so Kiro
        generates the configuration, or by filling out a form-based hook UI in the IDE (accessible
        via the Kiro panel or Command Palette).
      passThreshold: 0.6
    guidance: >-
      The two assisted methods are natural-language description and the form-based UI. Direct JSON
      editing is the third method but is excluded by the prompt.
  - id: kah-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 165
    type: multiple_choice
    prompt: Which field in a hook JSON definition specifies the event that triggers the hook?
    choices:
      - id: a
        text: matcher
      - id: b
        text: action
      - id: c
        text: trigger
      - id: d
        text: timeout
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      The trigger field names the event type (for example PostFileSave). matcher filters which
      files/tools apply, action defines what runs, and timeout bounds execution time.
  - id: kah-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 168
    type: multiple_choice
    prompt: >-
      A canonical example use case for a Kiro agent hook is to do what when a component file is
      saved?
    choices:
      - id: a
        text: Push the file to the remote git branch
      - id: b
        text: Open the file in a browser preview
      - id: c
        text: Delete the previous version of the file
      - id: d
        text: Automatically update or generate the matching test file
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      A signature example is keeping tests in sync: on save of a component, the hook generates or
      updates the corresponding test file. The other options are not the documented canonical use.
  - id: kah-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 172
    type: multiple_choice
    prompt: Which boolean field lets you turn a hook off without deleting its JSON file?
    choices:
      - id: a
        text: enabled
      - id: b
        text: active
      - id: c
        text: visible
      - id: d
        text: paused
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The enabled field toggles a hook on or off while keeping the definition on disk. The other
      field names are not part of the hook schema.
  - id: kah-100-ff-c
    tier: 100
    bloom: remember
    difficulty: 176
    type: free_form
    prompt: What is the purpose of the matcher field in a hook definition?
    rubric:
      criteria:
        - id: c1
          text: States that matcher filters which files or tools the hook applies to
        - id: c2
          text: >-
            Mentions it is a regular-expression (regex) pattern matched against the file path or
            tool name
      referenceAnswer: >-
        The matcher is an optional regular expression that filters which events actually fire the
        hook by matching against the file path (for file triggers) or the tool name (for tool
        triggers), so the hook only runs for the files or tools you care about.
      passThreshold: 0.6
    guidance: >-
      matcher is the scoping filter: a regex such as "\\.ts$" for file-path triggers, or a tool-name
      regex for PreToolUse/PostToolUse. It is optional; without it the trigger always matches.
  - id: kah-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 178
    type: multiple_choice
    prompt: Kiro's three signature differentiating features are Specs, Steering, and which third feature?
    choices:
      - id: a
        text: Live Share
      - id: b
        text: Agent Hooks
      - id: c
        text: IntelliSense
      - id: d
        text: Remote Containers
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The three signature features are Specs, Steering, and Agent Hooks, alongside agentic chat and
      MCP integration. The other options are general IDE features not unique to Kiro.
  - id: kah-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 130
    type: multiple_choice
    prompt: What does the Stop trigger correspond to in Kiro?
    choices:
      - id: a
        text: The user pressing the editor stop button to kill the IDE
      - id: b
        text: A file being deleted from the workspace
      - id: c
        text: Agent turn completion (the agent finishes responding)
      - id: d
        text: The MCP server disconnecting
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      The Stop trigger fires on agent turn completion, which is why a secret-scan hook on Stop can
      review work before a commit. It is not tied to deleting files or stopping the IDE.
  - id: kah-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 148
    type: multiple_choice
    prompt: Which trigger fires when a brand-new file is added to the workspace?
    choices:
      - id: a
        text: PostFileSave
      - id: b
        text: PostFileDelete
      - id: c
        text: SessionStart
      - id: d
        text: PostFileCreate
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      PostFileCreate fires on file creation. PostFileSave fires on save of an existing file,
      PostFileDelete on deletion, and SessionStart at the start of a session.
  - id: kah-100-ff-d
    tier: 100
    bloom: remember
    difficulty: 158
    type: free_form
    prompt: >-
      Besides name and trigger, name the one other field every individual hook object must include
      to be valid, and separately name the top-level field that wraps the hooks array and declares
      the format version.
    rubric:
      criteria:
        - id: c1
          text: Names the action field as the third required per-hook field (what the hook runs)
        - id: c2
          text: Names the top-level version field (e.g. "v1") that wraps the hooks array
      referenceAnswer: >-
        Each individual hook object requires name, trigger, and action (the object describing the
        agent prompt or shell command to run). The version field (such as "v1") is not part of each
        hook object; it sits at the top level alongside the hooks array and declares the file format
        version.
      passThreshold: 0.6
    guidance: >-
      Per-hook required fields are name, trigger, and action; matcher, timeout, and enabled are
      optional. version is a top-level wrapper for the whole hooks array, not a field inside each
      hook. The prompt asks for action (per-hook) and version (top-level).
  - id: kah-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 162
    type: multiple_choice
    prompt: Another canonical agent-hook use case scans for what kind of risk before a commit?
    choices:
      - id: a
        text: Leaked credentials or secrets
      - id: b
        text: Spelling mistakes in comments
      - id: c
        text: Unused CSS classes
      - id: d
        text: Outdated copyright years
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      A documented use case is scanning for leaked credentials/secrets (API keys, tokens, private
      keys) before a commit proceeds. The other checks are not the canonical security example.
  - id: kah-100-mc-n
    tier: 100
    bloom: remember
    difficulty: 170
    type: multiple_choice
    prompt: Kiro is built on which open-source codebase?
    choices:
      - id: a
        text: Eclipse Theia built from scratch
      - id: b
        text: Code OSS (the open-source base of VS Code)
      - id: c
        text: The Atom editor core
      - id: d
        text: A proprietary engine with no VS Code lineage
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Kiro is built on Code OSS, so it can import VS Code settings, themes, and Open VSX-compatible
      plugins. It is a VS Code-lineage fork, not a from-scratch editor.
  - id: kah-100-ff-e
    tier: 100
    bloom: remember
    difficulty: 175
    type: free_form
    prompt: >-
      What is the default timeout (in seconds) for a Kiro hook if the timeout field is not
      specified?
    rubric:
      criteria:
        - id: c1
          text: States the default timeout is 60 seconds
      referenceAnswer: If the timeout field is omitted, the default hook timeout is 60 seconds.
      passThreshold: 0.6
    guidance: >-
      The timeout field is optional and defaults to 60 seconds. It bounds how long the hook action
      may run before Kiro stops it.
  - id: kah-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 224
    type: multiple_choice
    prompt: >-
      Why do agent hooks give more reliable automation than simply asking the agent in chat to
      "remember to run tests after editing"?
    choices:
      - id: a
        text: >-
          Hooks fire deterministically on a defined IDE event, so the action is not left to the
          model's discretion
      - id: b
        text: Hooks run on a faster model than chat does
      - id: c
        text: Hooks bypass the approval system entirely
      - id: d
        text: Hooks store their output in the steering files automatically
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      The value of the detect-then-act model is determinism: when the configured event occurs, the
      action runs every time, instead of relying on the model remembering an in-chat instruction.
      Hooks do not change the model or auto-write steering.
  - id: kah-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 232
    type: multiple_choice
    prompt: How does a hook with action type "agent" differ from one with type "command"?
    choices:
      - id: a
        text: An agent action runs synchronously; a command action always runs in the background
      - id: b
        text: An agent action runs an AI task from a prompt; a command action runs a shell command
      - id: c
        text: An agent action requires no matcher; a command action always requires one
      - id: d
        text: An agent action is workspace-scoped; a command action is always user-scoped
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      type "agent" runs an AI task defined by a prompt; type "command" runs a shell command. Scope
      is determined by directory (.kiro vs ~/.kiro), not by action type, and matcher is optional for
      both.
  - id: kah-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 240
    type: free_form
    prompt: >-
      Explain the difference between a Kiro agent hook and a steering file, in terms of what each
      one does for the agent.
    rubric:
      criteria:
        - id: c1
          text: States hooks are event-driven automations that run an action when an IDE event occurs
        - id: c2
          text: States steering files supply persistent project knowledge/context to the agent
        - id: c3
          text: Makes clear they are distinct mechanisms (active automation vs passive context)
      referenceAnswer: >-
        An agent hook is an active, event-driven automation: when an IDE event such as a file save
        occurs, Kiro runs an action (an AI prompt or shell command). A steering file is passive
        persistent context: markdown that gives the agent durable project knowledge so you do not
        have to re-explain conventions each conversation. Hooks act; steering informs.
      passThreshold: 0.6
    guidance: >-
      Key contrast: hooks fire on events and do something; steering files are
      always-or-conditionally loaded context that shapes how the agent responds. They live in
      different folders (.kiro/hooks vs .kiro/steering) and serve different roles.
  - id: kah-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 246
    type: multiple_choice
    prompt: >-
      The matcher for a PreToolUse hook and the matcher for a PostFileSave hook are both regular
      expressions. What actually differs between them?
    choices:
      - id: a
        text: PreToolUse matchers must be JSON arrays, while file matchers must be plain strings
      - id: b
        text: PreToolUse cannot use a matcher at all, so the field is ignored
      - id: c
        text: >-
          They use the same regex syntax, but a PreToolUse matcher is matched against the tool name
          while a file-trigger matcher is matched against the file path
      - id: d
        text: File matchers run case-sensitively while tool matchers ignore case
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      The matcher is always a regular expression; what changes with the trigger is the string it is
      tested against -- the tool name for tool events, the file path for file events. The other
      distinctions are fabricated.
  - id: kah-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 252
    type: multiple_choice
    prompt: >-
      A team puts a hook in .kiro/hooks/ and commits it. What does this achieve compared to placing
      it in ~/.kiro/hooks/?
    choices:
      - id: a
        text: The workspace hook runs faster because it is local
      - id: b
        text: The user hook is shared and the workspace hook is private
      - id: c
        text: There is no difference; both locations are per-machine only
      - id: d
        text: >-
          The workspace hook is shared with everyone who checks out the repo; the user hook applies
          only to that one user across their projects
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      Hooks in .kiro/hooks/ are part of the repository, so committing them shares the automation
      with the whole team. Hooks in ~/.kiro/hooks/ are personal and follow the individual user
      across all their workspaces.
  - id: kah-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 258
    type: free_form
    prompt: >-
      Describe why creating a hook in natural language still results in a deterministic automation,
      even though the description was written in plain English.
    rubric:
      criteria:
        - id: c1
          text: Explains natural language is used only at authoring time to generate the JSON config
        - id: c2
          text: >-
            States the resulting JSON hook fires deterministically on its event, independent of the
            original prose
      referenceAnswer: >-
        The natural-language step happens only once, at authoring time: Kiro converts the
        description into a concrete JSON hook definition (trigger, matcher, action). After that, the
        hook fires deterministically whenever its trigger event occurs. The prose is not
        re-interpreted at runtime, so behavior is repeatable.
      passThreshold: 0.6
    guidance: >-
      The separation of authoring from execution is the key idea: NL drives config generation, then
      the stored JSON is what runs. This is why NL-authored hooks are still deterministic event
      automations.
  - id: kah-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 264
    type: multiple_choice
    prompt: >-
      Why is a Stop-triggered secret-scan hook a sensible design for catching leaked credentials
      before a commit?
    choices:
      - id: a
        text: >-
          Stop fires at agent turn completion, so the scan runs after the agent has finished making
          edits but before the human commits
      - id: b
        text: Stop fires only when the repository is pushed, which is the last safe moment
      - id: c
        text: Stop disables all other hooks so the scan has exclusive access
      - id: d
        text: Stop guarantees the scan runs inside the git pre-commit hook chain
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Because Stop fires when the agent finishes its turn, it is a natural checkpoint to review the
      just-completed work for secrets before the developer commits. It is not the same as a git
      pre-commit hook and does not disable other hooks.
  - id: kah-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 230
    type: multiple_choice
    prompt: How should you think about the relationship between a hook's trigger and its matcher?
    choices:
      - id: a
        text: The matcher selects the event class; the trigger narrows it to specific files
      - id: b
        text: The trigger selects the event class; the matcher narrows it to specific files or tools
      - id: c
        text: They are interchangeable aliases for the same filter
      - id: d
        text: The matcher overrides the trigger when both are present
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      The trigger answers "which event," and the optional matcher answers "which files or tools
      within that event." They compose; neither overrides the other, and they are not
      interchangeable.
  - id: kah-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 238
    type: free_form
    prompt: >-
      Explain why a hook is described as following a two-step "detect then act" model, and what each
      step corresponds to in the JSON definition.
    rubric:
      criteria:
        - id: c1
          text: Maps "detect" to the trigger (and optional matcher) recognizing an IDE event
        - id: c2
          text: Maps "act" to the action object (agent prompt or shell command) that runs
      referenceAnswer: >-
        Detect corresponds to the trigger (plus optional matcher): Kiro watches for the configured
        IDE event and checks whether the matcher applies. Act corresponds to the action object: once
        the event is detected, Kiro runs the agent prompt or shell command. The two-step model
        separates what to watch for from what to do.
      passThreshold: 0.6
    guidance: >-
      Detect = trigger/matcher; act = action. This framing maps directly onto the JSON fields and
      explains why hooks behave like "an experienced developer catching things you miss."
  - id: kah-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: >-
      A hook is set up but you do not want it to run for now, and you may re-enable it next sprint.
      What is the cleanest approach?
    choices:
      - id: a
        text: Delete the JSON file and recreate it later from memory
      - id: b
        text: Set the timeout to 0 so it instantly fails
      - id: c
        text: Set enabled to false in its JSON so the definition is preserved but inactive
      - id: d
        text: Move it to .kiro/specs/ so Kiro ignores it
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      enabled: false toggles the hook off while keeping it on disk, which is exactly the
      preserve-but-deactivate case. Deleting loses the definition, timeout 0 is a misuse, and moving
      it to specs is not a supported disable mechanism.
  - id: kah-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 256
    type: multiple_choice
    prompt: >-
      Why might you prefer a command-type hook action over an agent-type action for a fixed,
      well-defined check?
    choices:
      - id: a
        text: A command action can read steering files but an agent action cannot
      - id: b
        text: A command action ignores the timeout field
      - id: c
        text: An agent action cannot be triggered on file save
      - id: d
        text: >-
          A shell command is deterministic and cheaper, with no model variability, for a check that
          does not need reasoning
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: >-
      For a deterministic, well-specified task (run a linter, run a test command), a shell command
      is exact and avoids model cost and variability. Agent actions shine when the task needs
      reasoning or code understanding. Both honor timeout and both can fire on file save.
  - id: kah-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 268
    type: multiple_choice
    prompt: >-
      Kiro can also store an AGENTS.md file for context. How do hooks differ from AGENTS.md in how
      they engage the agent?
    choices:
      - id: a
        text: >-
          Hooks actively run an action on an event; AGENTS.md is passive context loaded into the
          conversation
      - id: b
        text: Hooks and AGENTS.md are both event-triggered and interchangeable
      - id: c
        text: AGENTS.md fires on file save while hooks only run manually
      - id: d
        text: Hooks are markdown while AGENTS.md is JSON
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: >-
      Hooks are active automations driven by events; AGENTS.md (and steering generally) is passive
      context that informs responses. AGENTS.md does not fire on events, and hooks are JSON while
      AGENTS.md is markdown.
  - id: kah-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 274
    type: free_form
    prompt: >-
      A developer says "agent hooks are just git pre-commit hooks under a new name." Explain why
      this is a misconception.
    rubric:
      criteria:
        - id: c1
          text: >-
            States agent hooks are IDE-event-driven (save/create/delete/manual/turn events), not
            limited to git commit time
        - id: c2
          text: States their action can be an AI agent prompt, not only a shell script
      referenceAnswer: >-
        Git pre-commit hooks run only at commit time and execute shell scripts. Kiro agent hooks
        fire on a wide range of IDE events (file save, create, delete, manual trigger, agent turn
        completion, tool use, task execution) and their action can be an AI agent prompt that
        reasons about code, not just a shell command. They overlap in spirit but are a broader,
        IDE-integrated, AI-capable mechanism.
      passThreshold: 0.6
    guidance: >-
      Two distinguishing points: the breadth of triggers (far beyond commit time) and the ability to
      run an agent prompt rather than only a script. Mentioning either the trigger breadth or the
      agent action capability, plus the contrast with commit-only scripts, earns credit.
  - id: kah-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 278
    type: multiple_choice
    prompt: >-
      Why does Kiro store hooks as discrete JSON files rather than embedding them all in one
      settings blob?
    choices:
      - id: a
        text: JSON files load faster than a single settings object
      - id: b
        text: >-
          Per-file definitions are individually version-controllable, shareable, and toggleable
          without touching unrelated hooks
      - id: c
        text: It is required by the Code OSS plugin system
      - id: d
        text: It prevents hooks from being committed to git
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: >-
      Discrete files in .kiro/hooks/ let each hook be reviewed, diffed, shared, enabled, or disabled
      independently. The other reasons are not the rationale and are partly false (the files are
      designed to be committed).
  - id: kah-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 226
    type: multiple_choice
    prompt: What does it mean that some hook triggers are "blocking"?
    choices:
      - id: a
        text: A blocking trigger prevents any other hook from firing during the session
      - id: b
        text: A blocking trigger forces the agent to wait for user input forever
      - id: c
        text: >-
          On a blocking trigger, an exit code of 2 from the action can stop the gated operation from
          proceeding
      - id: d
        text: A blocking trigger disables the timeout
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: >-
      For blocking trigger types, an exit code of 2 signals that the gated action should be stopped
      (for example, blocking a tool call). Exit code 0 means success. Blocking does not freeze other
      hooks or remove the timeout.
  - id: kah-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 270
    type: free_form
    prompt: >-
      Compare a PreToolUse hook and a PostToolUse hook: when does each fire and what is each
      typically good for?
    rubric:
      criteria:
        - id: c1
          text: States PreToolUse fires before a tool invocation (and can gate/block it)
        - id: c2
          text: States PostToolUse fires after a tool invocation (good for follow-up actions)
      referenceAnswer: >-
        PreToolUse fires before a tool is invoked, so it is good for guardrails such as validating
        or blocking a risky tool call before it runs. PostToolUse fires after the tool completes, so
        it is good for follow-up work like formatting or logging the result of the tool's effect.
      passThreshold: 0.6
    guidance: >-
      Pre = before (gate/validate, can block); Post = after (react/clean up). Mentioning the timing
      of each and a sensible use earns credit.
  - id: kah-300-mc-a
    tier: 300
    bloom: apply
    difficulty: 324
    type: multiple_choice
    prompt: >-
