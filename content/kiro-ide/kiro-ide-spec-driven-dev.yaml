          text: Notes Code OSS is the VS Code open-source base.
        - id: c2
          text: Explains settings/themes/Open VSX plugins and familiarity carry over.
      referenceAnswer: |
        Because Kiro is built on Code OSS (the open-source base of VS Code),
        migrating users can import their VS Code settings and themes, keep
        Open VSX-compatible plugins, and work in a familiar interface, lowering
        the switching cost rather than learning a brand-new editor.
      passThreshold: 0.6
