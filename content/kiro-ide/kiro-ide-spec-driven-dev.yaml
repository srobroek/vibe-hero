        text: The hook must be moved to .kiro/specs/
      - id: d
        text: Save triggers can never modify files
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      A save-triggered action that writes the same matched file can re-trigger
      itself; scope the matcher or target a different file to break the loop.
  - id: kiro-400-mc-f
    tier: 400
    bloom: analyze
    difficulty: 475
    type: multiple_choice
    prompt: |
      Someone proposes putting all project knowledge into one giant Always-mode
      steering file. What is the main downside compared to scoped steering?
    choices:
      - id: a
        text: Always mode is not supported for large files
      - id: b
        text: It would automatically convert into a spec
      - id: c
        text: Always mode disables the MCP panel
      - id: d
        text: |
          It loads irrelevant context every interaction, wasting tokens and
          diluting focus; fileMatch/Manual scope context to when it matters
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Always-mode loads in every interaction; cramming everything in wastes
      context. fileMatch/Manual keep niche guidance scoped.
  - id: kiro-400-mc-g
    tier: 400
    bloom: analyze
    difficulty: 428
    type: multiple_choice
    prompt: |
      A team chose Quick Plan for a high-risk, ambiguous feature and was
      surprised by misaligned design. Why did the workflow choice contribute?
    choices:
      - id: a
        text: |
          Quick Plan auto-generates all artifacts without per-phase approval, so
          ambiguous intent was never reviewed before design
      - id: b
        text: Quick Plan omits design.md entirely
      - id: c
        text: Quick Plan only works for bugfixes
      - id: d
        text: Quick Plan forces EARS off
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Quick Plan trades the approval gates for speed; for ambiguous/high-risk
      work, the gated Requirements-First flow is safer.
  - id: kiro-400-mc-h
    tier: 400
    bloom: analyze
    difficulty: 448
    type: multiple_choice
    prompt: |
      A developer treats Kiro agent hooks as equivalent to git pre-commit hooks
      and is confused that one fires on file save during editing. What
      misconception explains this?
    choices:
      - id: a
        text: Agent hooks only run inside CI pipelines
      - id: b
        text: Agent hooks can only fire on git events
      - id: c
        text: |
          Agent hooks are IDE-event automations (save/create/delete/manual etc.),
          not just VCS commit-time hooks
      - id: d
        text: Agent hooks are identical to MCP servers
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Kiro hooks respond to a broad set of IDE events, not only commit-time VCS
      events.
  - id: kiro-400-mc-i
    tier: 400
    bloom: analyze
    difficulty: 458
    type: multiple_choice
    prompt: |
      A command-action hook should block an operation when a check fails. Which
      exit code should the command return to block in Kiro?
    choices:
      - id: a
        text: Exit code 0
      - id: b
        text: Exit code 1 always blocks
      - id: c
        text: Any nonzero code silently blocks
      - id: d
        text: Exit code 2
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Command actions return 0 for success, 2 to block; other nonzero codes
      produce warnings rather than a block.
  - id: kiro-400-mc-j
    tier: 400
    bloom: analyze
    difficulty: 468
    type: multiple_choice
    prompt: |
      A spec's tasks.md runs slower than expected even though many tasks are
      independent. Inspection shows artificial dependencies linking unrelated
      tasks. How does that hurt execution?
    choices:
      - id: a
        text: |
          False dependencies prevent tasks from grouping into the same
          concurrent wave, forcing them into more sequential waves
      - id: b
        text: Dependencies have no effect on execution order
      - id: c
        text: Tasks always run fully sequentially regardless of dependencies
      - id: d
        text: Dependencies only affect design.md, not tasks
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Kiro parallelizes independent tasks into waves; spurious dependencies
      serialize work that could have run concurrently.
  - id: kiro-400-mc-k
    tier: 400
    bloom: analyze
    difficulty: 478
    type: multiple_choice
    prompt: |
      A team copies a config file's contents into a steering doc, then the config
      changes and the agent acts on stale rules. What was the better design?
    choices:
      - id: a
        text: Paste the contents into tasks.md instead
      - id: b
        text: Set the steering file to Manual mode
      - id: c
        text: |
          Use a #[[file:...]] live reference so steering always reflects the
          current file
      - id: d
        text: Add the file path to autoApprove
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Live #[[file:...]] references prevent the stale-copy problem by linking the
      current file contents.
  - id: kiro-400-mc-l
    tier: 400
    bloom: analyze
    difficulty: 432
    type: multiple_choice
    prompt: |
      Two engineers debate whether an AGENTS.md at the repo root can be set to
      fileMatch so it only loads for certain files. Who is correct?
    choices:
      - id: a
        text: It supports all inclusion modes like any steering file
      - id: b
        text: |
          Neither can scope it: AGENTS.md loads automatically and does not support
          inclusion modes
      - id: c
        text: It supports only Manual mode
      - id: d
        text: It must be converted to mcp.json first
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      AGENTS.md is auto-loaded and has no inclusion-mode support; to scope
      loading, use a regular steering file with front matter.
  - id: kiro-400-mc-m
    tier: 400
    bloom: analyze
    difficulty: 462
    type: multiple_choice
    prompt: |
      A reviewer skips the requirements approval gate and approves only the
      design, then implementation diverges from stakeholder intent. What does
      this reveal about the gate's role?
    choices:
      - id: a
        text: |
          The requirements gate is where intent is validated; skipping it lets
          unvalidated assumptions flow into design and code
      - id: b
        text: Gates are decorative and do not affect outcomes
      - id: c
        text: The design gate alone fully validates intent
      - id: d
        text: Skipping a gate deletes the corresponding artifact
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Each gate validates a different layer; the requirements gate guards intent,
      which design review cannot recover if intent was wrong.
  - id: kiro-400-ff-a
    tier: 400
    bloom: analyze
    difficulty: 440
    type: free_form
    prompt: |
      A team reports that their carefully written conditional (fileMatch)
      steering "never loads." Diagnose the most likely causes and how to confirm
      each.
    guidance: |
      Looking for: glob doesn't match the active files; wrong inclusion mode/front
      matter; file not in .kiro/steering/. Confirm by checking the pattern vs open
      files and the front matter.
    rubric:
      criteria:
        - id: c1
          text: Considers the fileMatch glob not matching the files being edited.
        - id: c2
          text: Considers misconfigured front matter / wrong inclusion mode.
        - id: c3
          text: Suggests verifying placement in .kiro/steering/ and the active files.
      referenceAnswer: |
        The most common cause is the fileMatch glob not matching the files
        actually open/edited, so the conditional file never activates; check the
        pattern against the real paths. Also verify the YAML front matter actually
        sets fileMatch (not Manual) and a valid pattern, and that the file lives
        in .kiro/steering/. Confirm by opening a clearly matching file and seeing
        whether the guidance takes effect.
      passThreshold: 0.6
  - id: kiro-400-ff-b
    tier: 400
    bloom: analyze
    difficulty: 450
    type: free_form
    prompt: |
      Critique this hook design: "On every file save in the repo, run an
      agent-prompt that reviews the entire codebase and updates all docs." List
      the problems and propose a better-scoped design.
    guidance: |
      Looking for: too broad/expensive, fires constantly, slow, potential loops;
      propose narrower matcher, targeted action, maybe manual/turn-based trigger.
    rubric:
      criteria:
        - id: c1
          text: Identifies that an every-save full-codebase action is too broad/costly.
        - id: c2
          text: Notes risks like constant firing, latency, or feedback loops.
        - id: c3
          text: Proposes narrowing the matcher/action or changing the trigger.
      referenceAnswer: |
        Reviewing the whole codebase on every save is wasteful and slow, fires far
        too often, and risks feedback loops if the action writes files that
        re-trigger saves. A better design scopes the matcher to the relevant files
        (e.g., a docs or component glob), limits the action to the changed unit,
        and/or uses a more deliberate trigger (manual or agent-turn) instead of
        every save.
      passThreshold: 0.6
  - id: kiro-400-ff-c
    tier: 400
    bloom: analyze
    difficulty: 460
    type: free_form
    prompt: |
      Two engineers disagree: one wants all acceptance criteria as EARS, the
      other says EARS is pointless ceremony. Analyze when EARS adds value and when
      it might not.
    guidance: |
      Looking for: EARS shines for testable behavioral criteria/edge cases; less
      useful for non-behavioral notes; value is unambiguous, verifiable criteria.
    rubric:
      criteria:
        - id: c1
          text: Argues EARS adds value by making behavioral criteria testable/unambiguous.
        - id: c2
          text: Acknowledges limits (non-behavioral or trivially obvious items).
      referenceAnswer: |
        EARS adds the most value for behavioral, conditional requirements and
        edge cases, where WHEN/THEN/SHALL forces a single, testable interpretation
        and exposes missing conditions. It adds less for purely descriptive notes
        or trivially obvious statements, where the structure is overhead. The
        pragmatic stance is to use EARS for verifiable behavior and not force it
        onto non-behavioral context.
      passThreshold: 0.6
  - id: kiro-400-ff-d
    tier: 400
    bloom: analyze
    difficulty: 470
    type: free_form
    prompt: |
      An MCP-connected tool intermittently fails and the agent "hallucinates"
      success. Walk through how you'd isolate whether the problem is config,
      connection, or approval.
    guidance: |
      Looking for: check MCP panel status, read Output-tab MCP logs, verify
      command/args or url/headers, check disabled/autoApprove/disabledTools.
    rubric:
      criteria:
        - id: c1
          text: Checks the MCP servers panel for connection status.
        - id: c2
          text: Reads MCP logs in the Output tab for errors.
        - id: c3
          text: Verifies config fields (command/args or url/headers) and approval flags.
      referenceAnswer: |
        Start at the MCP servers panel to see whether the server is connected.
        Read the MCP logs in the Output tab to distinguish connection errors,
        permission/approval prompts, and config problems. Verify the config:
        command/args (+env) for local or url/headers (+oauth) for remote, and
        check disabled, autoApprove, and disabledTools. That triage separates a
        config typo from a transport failure from a blocked/unapproved call.
      passThreshold: 0.6
  - id: kiro-400-ff-e
    tier: 400
    bloom: analyze
    difficulty: 430
    type: free_form
    prompt: |
      A team stuffs feature-specific implementation steps into a steering file and
      treats it as a backlog. Explain why this conflates steering with specs and
      what breaks.
    guidance: |
      Looking for: steering is persistent reusable guidance, not per-feature
      tasks; specs (tasks.md) track implementation; mixing pollutes context and
      loses tracking.
    rubric:
      criteria:
        - id: c1
          text: Explains steering is durable guidance, not per-feature task tracking.
        - id: c2
          text: Notes implementation steps belong in a spec's tasks.md.
        - id: c3
          text: Identifies a concrete harm (context pollution / lost tracking).
      referenceAnswer: |
        Steering is meant for persistent, reusable project guidance, while
        per-feature implementation steps belong in a spec's tasks.md with trackable
        status. Putting backlog items into steering means that transient,
        feature-specific content gets loaded as standing context (polluting every
        relevant interaction) while losing the spec's task tracking and approval
        structure.
      passThreshold: 0.6
  - id: kiro-400-ff-f
    tier: 400
    bloom: analyze
    difficulty: 480
    type: free_form
    prompt: |
      Analyze the trade-off of granting autoApprove to MCP tools: what do you
      gain, what do you risk, and how would you decide which tools qualify?
    guidance: |
      Looking for: gain = less friction/faster; risk = unreviewed side effects;
      decide by read-only vs side-effecting and server trust level.
    rubric:
      criteria:
        - id: c1
          text: Notes the gain (less approval friction / faster flow).
        - id: c2
          text: Notes the risk (unreviewed, possibly side-effecting actions).
        - id: c3
          text: Proposes a criterion (e.g., auto-approve only safe/read-only trusted tools).
      referenceAnswer: |
        Auto-approving removes per-call confirmation friction and speeds up
        workflows, but it removes the human safety check, so a misbehaving or
        malicious tool can act with side effects unreviewed. A reasonable policy is
        to auto-approve only read-only, low-risk tools from trusted servers, and
        keep confirmation on anything that writes, deletes, spends, or comes from
        an untrusted source.
      passThreshold: 0.6
  - id: kiro-400-ff-g
    tier: 400
    bloom: analyze
    difficulty: 442
    type: free_form
    prompt: |
      A reviewer says approval gates "just slow us down" and proposes removing
      them for all specs. Break down what is lost and where gates matter most.
    guidance: |
      Looking for: gates catch errors cheaply; most valuable for ambiguous/high-
      risk work; Quick Plan suits low-risk; blanket removal risks downstream rework.
    rubric:
      criteria:
        - id: c1
          text: Explains gates catch errors early/cheaply (human-in-the-loop).
        - id: c2
          text: Notes gates matter most for ambiguous or high-risk features.
        - id: c3
          text: Allows that low-risk work can use Quick Plan, but blanket removal is risky.
      referenceAnswer: |
        Removing all gates loses the cheap, early correction of misunderstood
        intent and architecture; errors then surface as expensive rework in code.
        Gates matter most for ambiguous or high-risk features where intent is
        uncertain. For genuinely small, low-risk changes, the faster gate-free
        Quick Plan is reasonable, but removing gates everywhere trades safety for
        speed indiscriminately.
      passThreshold: 0.6
  - id: kiro-500-mc-a
    tier: 500
    bloom: evaluate
    difficulty: 485
    type: multiple_choice
    prompt: |
      A startup wants to ship a tiny, well-understood copy change. Which Kiro
      workflow is the most defensible choice, and why?
    choices:
      - id: a
        text: A full Requirements-First spec, because every change needs three gates
      - id: b
        text: A bugfix spec, because all changes are bugs
      - id: c
        text: |
          Quick Plan, because the gated phase-by-phase flow adds little value when
          intent is already clear and risk is low
      - id: d
        text: An agent hook, because copy changes should fire on save
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Matching process weight to risk: Quick Plan fits low-risk, well-understood
      work; full gating is overhead there.
  - id: kiro-500-mc-b
    tier: 500
    bloom: evaluate
    difficulty: 495
    type: multiple_choice
    prompt: |
      Which steering strategy best balances consistency and context economy for a
      large codebase?
    choices:
      - id: a
        text: Put everything in one Always file so nothing is ever missed
      - id: b
        text: |
          Keep cross-cutting rules in Always foundation files and push
          stack/area-specific detail into fileMatch and Manual files
      - id: c
        text: Make every steering file Manual so the agent stays lean
      - id: d
        text: Store steering in .kiro/specs/ to version it with features
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      The strongest design loads universal rules always and scopes niche guidance
      with fileMatch/Manual to conserve context.
  - id: kiro-500-mc-c
    tier: 500
    bloom: evaluate
    difficulty: 505
    type: multiple_choice
    prompt: |
      A team wants to judge whether to automate a routine with an agent hook or
      leave it manual. Which criterion is the soundest basis for the decision?
    choices:
      - id: a
        text: Always automate everything to maximize hooks
      - id: b
        text: Never automate; hooks are inherently unsafe
      - id: c
        text: Automate only tasks that touch the most files
      - id: d
        text: |
          Automate it when the trigger is well-defined and the action is safe and
          repeatable; keep it manual when judgment or risky side effects dominate
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Good automation candidates have clear triggers and safe, repeatable
      actions; ambiguous or risky tasks deserve a human.
  - id: kiro-500-mc-d
    tier: 500
    bloom: evaluate
    difficulty: 515
    type: multiple_choice
    prompt: |
      Evaluate this claim: "Because Kiro generates the spec for you, you can
      approve every phase without reading it." What is the best critique?
    choices:
      - id: a
        text: |
          It defeats the purpose of the approval gates; unread approvals let
          generated misunderstandings propagate into code
      - id: b
        text: It is fine because Kiro never makes mistakes
      - id: c
        text: It is fine because tasks.md will catch all errors later
      - id: d
        text: It is correct; gates exist only for billing
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      The gates are only valuable if a human actually reviews; rubber-stamping
      removes the safety they provide.
  - id: kiro-500-mc-e
    tier: 500
    bloom: evaluate
    difficulty: 525
    type: multiple_choice
    prompt: |
      A security team must decide an MCP approval policy for agents acting on
      production systems. Which policy is most defensible?
    choices:
      - id: a
        text: Set autoApprove "*" everywhere to reduce friction
      - id: b
        text: |
          Default to prompting; auto-approve only vetted read-only tools, and
          keep write/destructive tools gated or disabled
      - id: c
        text: Disable all MCP so no tools are ever used
      - id: d
        text: Auto-approve all tools but log them after the fact
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Least-privilege: prompt by default, auto-approve only safe read-only tools,
      gate or disable anything that can mutate production.
  - id: kiro-500-mc-f
    tier: 500
    bloom: evaluate
    difficulty: 488
    type: multiple_choice
    prompt: |
      Two teams compare placing project conventions in steering vs. re-stating
      them in each spec's requirements. Which judgment is best?
    choices:
      - id: a
        text: Conventions belong in every requirements.md for redundancy
      - id: b
        text: Conventions should live only in tasks.md
      - id: c
        text: Conventions should be auto-approved MCP tools
      - id: d
        text: |
          Conventions belong in steering (reused across specs); duplicating them
          per spec causes drift and maintenance burden
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Reusable conventions are exactly what steering is for; per-spec duplication
      invites inconsistency.
  - id: kiro-500-mc-g
    tier: 500
    bloom: evaluate
    difficulty: 498
    type: multiple_choice
    prompt: |
      A lead argues "specs are pointless because the agent could just code from a
      chat prompt." What is the strongest counter on a complex feature?
    choices:
      - id: a
        text: |
          Specs create reviewable, versioned artifacts and gated alignment on
          intent and design before code, reducing costly rework
      - id: b
        text: Specs are faster to type than a chat prompt
      - id: c
        text: Chat prompts cannot produce code at all
      - id: d
        text: Specs are required to launch the IDE
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      The value of specs on complex work is durable, reviewable alignment and
      traceability, not speed of typing.
  - id: kiro-500-mc-h
    tier: 500
    bloom: evaluate
    difficulty: 508
    type: multiple_choice
    prompt: |
      Evaluate using a save-triggered hook to auto-format AND auto-commit code on
      every keystroke-save. What is the most valid concern?
    choices:
      - id: a
        text: Hooks cannot run formatters
      - id: b
        text: Save triggers are not allowed to run shell commands
      - id: c
        text: |
          Auto-committing on every save couples a noisy, high-frequency editor
          event to an irreversible VCS action, producing messy history and risk
      - id: d
        text: Formatting must be a spec, not a hook
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Auto-format on save is reasonable; auto-commit on save couples a frequent
      event to a consequential VCS action and is a poor design.
  - id: kiro-500-mc-i
    tier: 500
    bloom: evaluate
    difficulty: 518
    type: multiple_choice
    prompt: |
      A team must decide whether to express a non-functional constraint
      ("p95 latency < 200ms") as an EARS criterion or as design.md content.
      Which judgment is soundest?
    choices:
      - id: a
        text: Put it only in design.md; requirements cannot hold numbers
      - id: b
        text: Put it only in tasks.md as a checklist item
      - id: c
        text: Omit it; performance is not specifiable
      - id: d
        text: |
          Capture the measurable target as a testable acceptance criterion in
          requirements, and detail how to meet it in design.md
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      The verifiable target belongs in requirements (it is testable); the
      approach to achieving it belongs in design.
  - id: kiro-500-mc-j
    tier: 500
    bloom: evaluate
    difficulty: 528
    type: multiple_choice
    prompt: |
      Critique this setup: a single AGENTS.md at the repo root holds all
      conventions for a polyglot monorepo. What is the strongest limitation?
    choices:
      - id: a
        text: |
          AGENTS.md cannot use inclusion modes, so it always loads everything and
          cannot scope per-language guidance; fileMatch steering would be better
      - id: b
        text: AGENTS.md is never loaded by Kiro
      - id: c
        text: AGENTS.md can only hold MCP config
      - id: d
        text: AGENTS.md overrides the approval gates
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      AGENTS.md auto-loads with no inclusion modes; for per-language scoping you
      want fileMatch steering files.
  - id: kiro-500-mc-k
    tier: 500
    bloom: evaluate
    difficulty: 482
    type: multiple_choice
    prompt: |
      When is it most defensible to choose a Bugfix Spec over a Feature Spec?
    choices:
      - id: a
        text: Whenever any code is written, since all changes are bugs
      - id: b
        text: Only when adding a brand-new capability
      - id: c
        text: |
          When fixing a defect in existing behavior where systematic diagnosis and
          regression prevention matter more than greenfield design
      - id: d
        text: Only when no tests exist
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Bugfix specs are tailored to diagnosing existing defects and preventing
      regressions, distinct from greenfield feature design.
  - id: kiro-500-mc-l
    tier: 500
    bloom: evaluate
    difficulty: 535
    type: multiple_choice
    prompt: |
      A platform team weighs adopting Kiro partly because it is built on Code OSS.
      Which is the most balanced assessment of that fact?
    choices:
      - id: a
        text: The Code OSS base alone is the reason to adopt Kiro
      - id: b
        text: |
          It lowers migration cost via VS Code settings/themes/Open VSX plugins,
          but the differentiating value is in Specs/Steering/Hooks, not the editor base
      - id: c
        text: Being on Code OSS means no plugins work
      - id: d
        text: The editor base makes Specs and Steering unnecessary
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Code OSS lineage eases adoption, but Kiro's real differentiation is its
      agentic spec/steering/hook layer.
  - id: kiro-500-mc-m
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: multiple_choice
    prompt: |
      A team is deciding whether to encode their git pre-commit secret scan as an
      agent hook or keep it as a traditional git hook. What is the best framing?
    choices:
      - id: a
        text: |
          They solve overlapping goals differently; an agent hook can run an
          intelligent scan inside the IDE workflow, while a git hook enforces at
          the VCS boundary for all clients - choose based on where enforcement must live
      - id: b
        text: Agent hooks fully replace git hooks in every case
      - id: c
        text: Git hooks and agent hooks are identical and interchangeable
      - id: d
        text: Neither can scan for secrets
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      They are not the same enforcement point; a git hook gates the VCS boundary
      universally, an agent hook adds intelligent IDE-time automation.
  - id: kiro-500-ff-a
    tier: 500
    bloom: evaluate
    difficulty: 490
    type: free_form
    prompt: |
      Recommend, with justification, when a team should use Kiro's gated
      Requirements-First spec versus Quick Plan. Give the decision criteria.
    guidance: |
      Looking for: gate when ambiguity/risk/stakeholder alignment is high; Quick
      Plan when well-understood/low-risk; match process weight to risk.
    rubric:
      criteria:
        - id: c1
          text: Recommends gated flow for ambiguous/high-risk/alignment-heavy work.
        - id: c2
          text: Recommends Quick Plan for well-understood, low-risk work.
        - id: c3
          text: Frames it as matching process weight to risk/uncertainty.
      referenceAnswer: |
        Use the gated Requirements-First flow when intent is ambiguous, risk is
        high, or stakeholders must align, because the per-phase approvals catch
        misunderstandings cheaply. Use Quick Plan for small, well-understood,
        low-risk changes where gates add overhead without much protection. The
        governing principle is matching process weight to the uncertainty and
        risk of the work.
      passThreshold: 0.6
  - id: kiro-500-ff-b
    tier: 500
    bloom: evaluate
    difficulty: 500
    type: free_form
    prompt: |
      Critique the anti-pattern of putting every steering file in Always mode.
      Propose a healthier steering architecture and justify it.
    guidance: |
      Looking for: Always-everything wastes context/dilutes focus; use Always for
      universal rules, fileMatch for area-specific, Manual for on-demand; justify
      by context economy and relevance.
    rubric:
      criteria:
        - id: c1
          text: Identifies that Always-everything wastes context and dilutes relevance.
        - id: c2
          text: Proposes Always for universal, fileMatch for scoped, Manual for on-demand.
        - id: c3
          text: Justifies via context economy / loading only relevant guidance.
      referenceAnswer: |
        Putting everything in Always loads irrelevant guidance into every
        interaction, wasting context budget and diluting the agent's focus. A
        healthier architecture reserves Always for genuinely universal rules
        (foundation files), uses fileMatch for area- or stack-specific guidance
        that should load only when relevant files are active, and uses Manual for
        occasional references pulled in by # mention. This keeps each interaction's
        context relevant and economical.
      passThreshold: 0.6
  - id: kiro-500-ff-c
    tier: 500
    bloom: evaluate
    difficulty: 510
    type: free_form
    prompt: |
      Assess the risks and merits of granting an agent broad autoApprove on MCP
      tools when those tools can modify infrastructure. Recommend a policy.
    guidance: |
      Looking for: merit = speed/less friction; risk = unreviewed destructive
      actions; recommend least-privilege (prompt by default, auto-approve only
      safe read-only).
    rubric:
      criteria:
        - id: c1
          text: Names the merit (reduced friction/speed).
        - id: c2
          text: Names the risk (unreviewed destructive/infra-modifying actions).
        - id: c3
          text: Recommends a least-privilege policy (prompt by default, scope auto-approve).
      referenceAnswer: |
        Broad autoApprove speeds the workflow by removing confirmation prompts,
        but for infrastructure-modifying tools it removes the only human check
        before potentially destructive, hard-to-reverse actions. The defensible
        policy is least-privilege: prompt by default, restrict autoApprove to
        vetted read-only tools, and keep any write/destructive tool gated or
        disabled, especially against production.
      passThreshold: 0.6
  - id: kiro-500-ff-d
    tier: 500
    bloom: evaluate
    difficulty: 520
    type: free_form
    prompt: |
      A team treats Kiro's spec artifacts as throwaway scaffolding deleted after
      coding. Evaluate this practice against keeping them as living documents.
    guidance: |
      Looking for: specs as living docs give traceability, onboarding, change
      history; throwaway loses rationale/intent; recommend keeping them updated.
    rubric:
      criteria:
        - id: c1
          text: Argues specs as living docs preserve intent/traceability/onboarding value.
        - id: c2
          text: Notes deleting them loses rationale and the requirements-to-code link.
        - id: c3
          text: Gives a balanced recommendation (keep and maintain, with caveats).
      referenceAnswer: |
        Keeping spec artifacts as living documents preserves the intent,
        acceptance criteria, and design rationale, aiding onboarding, audits, and
        future change. Deleting them after coding discards the requirements-to-code
        traceability and the reasoning behind decisions, so later changes start
        blind. The balanced recommendation is to keep and update the specs as the
        feature evolves, accepting some maintenance cost for the durable value;
        truly trivial throwaway experiments are the only reasonable exception.
      passThreshold: 0.6
  - id: kiro-500-ff-e
    tier: 500
    bloom: evaluate
    difficulty: 484
    type: free_form
    prompt: |
      A skeptic says "EARS, steering, and hooks are just ceremony that Kiro could
      do without." Make the strongest case for why these structures earn their
      keep on a real team, and concede where the skeptic has a point.
    guidance: |
      Looking for: EARS=testable intent, steering=consistency without repetition,
      hooks=automated guardrails; concede overhead on trivial/solo/low-risk work.
    rubric:
      criteria:
        - id: c1
          text: Defends at least two of EARS/steering/hooks with concrete value.
        - id: c2
          text: Ties the value to team-scale benefits (consistency, testability, automation).
        - id: c3
          text: Concedes a legitimate limit (overhead on trivial/solo/low-risk work).
      referenceAnswer: |
        On a real team these structures pay off: EARS turns intent into testable,
        unambiguous criteria; steering keeps conventions consistent across people
        and sessions without re-explaining; hooks automate guardrails like test
        sync and secret scanning. Together they reduce miscommunication and
        rework at scale. The skeptic is right that for a solo developer on a
        trivial, low-risk change the ceremony can exceed its benefit, which is why
        Kiro also offers lighter paths like Quick Plan and optional steering modes.
      passThreshold: 0.6
  - id: kiro-500-ff-f
    tier: 500
    bloom: evaluate
    difficulty: 530
    type: free_form
    prompt: |
      Evaluate where in a Kiro project a measurable security requirement, its
      implementation approach, and its automated enforcement should each live.
      Justify the placement of each.
    guidance: |
      Looking for: requirement (EARS) in requirements.md; approach in design.md;
      enforcement as an agent hook (and/or MCP/tooling); each placed per its role.
    rubric:
      criteria:
        - id: c1
          text: Places the measurable requirement as an EARS criterion in requirements.md.
        - id: c2
          text: Places the implementation approach in design.md.
        - id: c3
          text: Places automated enforcement in an agent hook (and justifies each role).
      referenceAnswer: |
        The measurable security requirement (e.g., "secrets SHALL never be
        committed") belongs as an EARS acceptance criterion in requirements.md,
        because it is testable intent. The approach for meeting it (scanning
        strategy, libraries, threat model) belongs in design.md. The automated
        enforcement belongs in an agent hook (for example, a pre-commit secret
        scan), because that is the executable guardrail. Each artifact holds the
        content matching its role: intent, approach, and automation respectively.
      passThreshold: 0.6
  - id: kiro-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 492
    type: free_form
    prompt: |
      A team wants to standardize how they decide between a global
      (~/.kiro/steering/) and a workspace (.kiro/steering/) steering file. Propose
      a decision rule and justify it using Kiro's precedence behavior.
    guidance: |
      Looking for: global for personal/cross-project preferences; workspace for
      project-specific/shared rules; workspace wins on conflict; consider sharing
      via VCS.
    rubric:
      criteria:
        - id: c1
          text: Puts personal/cross-project preferences in global (~/.kiro/steering/).
        - id: c2
          text: Puts project-specific/team-shared rules in workspace (.kiro/steering/).
        - id: c3
          text: Justifies using workspace-wins precedence (and/or VCS sharing).
      referenceAnswer: |
        The rule: put personal, cross-project preferences in global steering
        (~/.kiro/steering/) so they follow you everywhere, and put project-specific,
        team-shared conventions in workspace steering (.kiro/steering/) committed to
        VCS so the whole team gets them. This works because workspace steering takes
        precedence on conflict, letting a repo deliberately override a personal
        default, and committing workspace files ensures consistency across the team
        while global files stay individual.
      passThreshold: 0.6
