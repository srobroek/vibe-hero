# Topic: kiro-ide-spec-driven-dev (kiro-ide)
# Kiro IDE's spec-driven workflow — requirements → design → tasks, and how specs drive implementation.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: kiro-ide-spec-driven-dev
class:
  kind: tool
  tool: kiro-ide
title: Kiro IDE Spec-Driven Development
summary: >-
  Kiro IDE's spec-driven workflow — requirements → design → tasks, and how specs drive
  implementation.
triggerSignals: []
items:
  - id: kiro-100-mc-a
    tier: 100
    bloom: remember
    difficulty: 125
    type: multiple_choice
    prompt: |
      In Kiro's spec-driven development, what are the three sequential phases
      of the spec workflow?
    choices:
      - id: a
        text: Design -> Requirements -> Review
      - id: b
        text: Plan -> Build -> Deploy
      - id: c
        text: Requirements -> Design -> Tasks
      - id: d
        text: Tasks -> Tests -> Release
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      The Kiro spec workflow proceeds Requirements -> Design -> Tasks, each
      producing a markdown artifact reviewed before the next phase.
  - id: kiro-100-mc-b
    tier: 100
    bloom: remember
    difficulty: 130
    type: multiple_choice
    prompt: |
      Which three markdown files does a Kiro feature spec generate?
    choices:
      - id: a
        text: spec.md, plan.md, todo.md
      - id: b
        text: requirements.md, design.md, tasks.md
      - id: c
        text: product.md, tech.md, structure.md
      - id: d
        text: readme.md, architecture.md, backlog.md
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      A spec produces requirements.md, design.md, and tasks.md. The
      product/tech/structure trio belongs to steering, not specs.
  - id: kiro-100-mc-c
    tier: 100
    bloom: remember
    difficulty: 140
    type: multiple_choice
    prompt: |
      What does the acronym EARS stand for in Kiro's requirements?
    choices:
      - id: a
        text: Event-Action Requirement Specification
      - id: b
        text: Enterprise Agile Requirements Standard
      - id: c
        text: Estimated Acceptance Review Stage
      - id: d
        text: Easy Approach to Requirements Syntax
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      EARS = Easy Approach to Requirements Syntax, the notation Kiro uses for
      acceptance criteria in requirements.md.
  - id: kiro-100-mc-d
    tier: 100
    bloom: remember
    difficulty: 150
    type: multiple_choice
    prompt: |
      Where do Kiro specs live in a workspace?
    choices:
      - id: a
        text: .kiro/specs/<feature-name>/
      - id: b
        text: .kiro/steering/
      - id: c
        text: .specify/specs/
      - id: d
        text: docs/specs/
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Each spec is stored under .kiro/specs/<feature-name>/ as a folder of
      markdown artifacts.
  - id: kiro-100-mc-e
    tier: 100
    bloom: remember
    difficulty: 135
    type: multiple_choice
    prompt: |
      Kiro is built on which open-source editor base?
    choices:
      - id: a
        text: Atom
      - id: b
        text: Code OSS (the open-source base of VS Code)
      - id: c
        text: Eclipse Theia from scratch
      - id: d
        text: A fully proprietary editor with no shared lineage
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Kiro is built on Code OSS, so it can import VS Code settings, themes, and
      Open VSX-compatible plugins.
  - id: kiro-100-mc-f
    tier: 100
    bloom: remember
    difficulty: 145
    type: multiple_choice
    prompt: |
      What are Kiro's three signature differentiators beyond agentic chat and MCP?
    choices:
      - id: a
        text: Branches, Commits, and Pull Requests
      - id: b
        text: Linting, Formatting, and Debugging
      - id: c
        text: Snippets, Macros, and Extensions
      - id: d
        text: Specs, Steering, and Agent Hooks
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Specs, Steering, and Agent Hooks are Kiro's signature features alongside
      agentic chat and MCP integration.
  - id: kiro-100-mc-g
    tier: 100
    bloom: remember
    difficulty: 155
    type: multiple_choice
    prompt: |
      Which directory holds Kiro's three default foundation steering files?
    choices:
      - id: a
        text: .kiro/steering/
      - id: b
        text: .kiro/specs/
      - id: c
        text: .kiro/hooks/
      - id: d
        text: .kiro/settings/
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Workspace steering files, including product.md/tech.md/structure.md, live
      under .kiro/steering/.
  - id: kiro-100-mc-h
    tier: 100
    bloom: remember
    difficulty: 160
    type: multiple_choice
    prompt: |
      Which file stores a Kiro MCP server configuration at workspace scope?
    choices:
      - id: a
        text: .kiro/mcp/servers.yaml
      - id: b
        text: .vscode/mcp.json
      - id: c
        text: .kiro/settings/mcp.json
      - id: d
        text: .kiro/specs/mcp.json
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Workspace MCP config is .kiro/settings/mcp.json; user-scope config is
      ~/.kiro/settings/mcp.json.
  - id: kiro-100-mc-i
    tier: 100
    bloom: remember
    difficulty: 165
    type: multiple_choice
    prompt: |
      In Kiro MCP config, what is the top-level object that contains server
      definitions?
    choices:
      - id: a
        text: servers
      - id: b
        text: providers
      - id: c
        text: connections
      - id: d
        text: mcpServers
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      MCP configuration is rooted in an mcpServers object keyed by server name.
  - id: kiro-100-mc-j
    tier: 100
    bloom: remember
    difficulty: 170
    type: multiple_choice
    prompt: |
      Which set of trigger events is part of Kiro's agent hooks?
    choices:
      - id: a
        text: File create, file save, file delete, and manual triggers
      - id: b
        text: Only scheduled cron timers
      - id: c
        text: Only git pre-commit and pre-push events
      - id: d
        text: Only mouse-click and keypress events
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Hooks fire on IDE events such as file create/save/delete and on manual
      triggers (plus broader agent/tool events in current docs).
  - id: kiro-100-mc-k
    tier: 100
    bloom: remember
    difficulty: 120
    type: multiple_choice
    prompt: |
      Which company develops the Kiro agentic IDE?
    choices:
      - id: a
        text: Microsoft
      - id: b
        text: JetBrains
      - id: c
        text: AWS (Amazon)
      - id: d
        text: GitHub
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Kiro is developed by AWS (Amazon) and integrates AWS/IAM authentication.
  - id: kiro-100-mc-l
    tier: 100
    bloom: remember
    difficulty: 175
    type: multiple_choice
    prompt: |
      What is the syntax for embedding a live file reference inside a Kiro
      steering file?
    choices:
      - id: a
        text: '@import(relative/path)'
      - id: b
        text: '#[[file:relative/path]]'
      - id: c
        text: '{{ file: relative/path }}'
      - id: d
        text: <<file relative/path>>
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Steering files embed live references with #[[file:relative/path]], e.g.
      #[[file:api/openapi.yaml]].
  - id: kiro-100-mc-m
    tier: 100
    bloom: remember
    difficulty: 158
    type: multiple_choice
    prompt: |
      Which two action types can a Kiro agent hook run?
    choices:
      - id: a
        text: An agent prompt (AI task) or a shell command
      - id: b
        text: Only a shell command
      - id: c
        text: Only a webhook HTTP POST
      - id: d
        text: A database migration or a container build
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      A hook action is either an agent prompt (run an AI task) or a shell command.
  - id: kiro-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 128
    type: free_form
    prompt: |
      Name the three default foundation steering files in Kiro and state, in a
      few words, what each one captures.
    guidance: |
      Looking for product.md (purpose/users/business goals), tech.md
      (frameworks/libraries/tools/constraints), and structure.md
      (file organization/naming/architecture).
    rubric:
      criteria:
        - id: c1
          text: Names product.md as purpose/users/business goals.
        - id: c2
          text: Names tech.md as frameworks/libraries/tools/constraints.
        - id: c3
          text: Names structure.md as file organization/naming/architecture.
      referenceAnswer: |
        The three foundation files are product.md (product purpose, target users,
        and business goals), tech.md (frameworks, libraries, tools, and technical
        constraints), and structure.md (file organization, naming conventions,
        and architecture).
      passThreshold: 0.6
  - id: kiro-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 138
    type: free_form
    prompt: |
      State the basic EARS acceptance-criteria pattern used in a Kiro
      requirements.md file.
    guidance: |
      Looking for the WHEN [condition] THEN the system SHALL [behavior] pattern.
    rubric:
      criteria:
        - id: c1
          text: Includes a WHEN [condition] clause.
        - id: c2
          text: Includes a THEN the system SHALL [behavior] clause.
      referenceAnswer: |
        EARS acceptance criteria follow the pattern "WHEN [condition] THEN the
        system SHALL [behavior]", with a "SHALL CONTINUE TO" variant for
        unchanged/regression behavior.
      passThreshold: 0.6
  - id: kiro-100-ff-c
    tier: 100
    bloom: remember
    difficulty: 148
    type: free_form
    prompt: |
      List the three subdirectories under .kiro/ that hold, respectively, specs,
      steering, and hooks, and name the file that holds MCP config.
    guidance: |
      Looking for .kiro/specs/, .kiro/steering/, .kiro/hooks/, and
      .kiro/settings/mcp.json.
    rubric:
      criteria:
        - id: c1
          text: Identifies .kiro/specs/ for specs.
        - id: c2
          text: Identifies .kiro/steering/ for steering and .kiro/hooks/ for hooks.
        - id: c3
          text: Identifies .kiro/settings/mcp.json for MCP config.
      referenceAnswer: |
        Specs live in .kiro/specs/, steering in .kiro/steering/, and hooks in
        .kiro/hooks/; MCP servers are configured in .kiro/settings/mcp.json.
      passThreshold: 0.6
  - id: kiro-100-ff-d
    tier: 100
    bloom: remember
    difficulty: 162
    type: free_form
    prompt: |
      What is the purpose of Kiro steering files in one or two sentences?
    guidance: |
      Looking for: persistent project knowledge (patterns/libraries/standards)
      so the user does not re-explain context every conversation.
    rubric:
      criteria:
        - id: c1
          text: States steering gives Kiro persistent project knowledge/context.
        - id: c2
          text: Notes it avoids re-explaining context each conversation.
      referenceAnswer: |
        Steering files are markdown docs that give Kiro persistent project
        knowledge (patterns, libraries, standards) so you do not have to
        re-explain the same context in every conversation.
      passThreshold: 0.6
  - id: kiro-100-ff-e
    tier: 100
    bloom: remember
    difficulty: 172
    type: free_form
    prompt: |
      Name the steering inclusion modes Kiro supports that control when a
      steering file is loaded, and state in a few words what each controls.
    guidance: |
      Looking for Always (every interaction), fileMatch/Conditional (glob-matched),
      Manual (on-demand # mention), and Auto (loaded when a request matches the
      file's description).
    rubric:
      criteria:
        - id: c1
          text: Names Always (every interaction).
        - id: c2
          text: Names fileMatch/Conditional (glob-matched).
        - id: c3
          text: Names Manual (referenced on demand) and Auto (description-matched).
      referenceAnswer: |
        Kiro supports four inclusion modes: Always (loaded every interaction),
        fileMatch / Conditional (loaded when working on files matching a glob),
        Manual (referenced on demand via a # mention), and Auto (loaded when a
        request matches the file's declared description).
      passThreshold: 0.6
  - id: kiro-100-ff-f
    tier: 100
    bloom: remember
    difficulty: 168
    type: free_form
    prompt: |
      Where can a Kiro MCP server be configured for ALL workspaces (user/global
      scope), and what is the workspace-scope path?
    guidance: |
      Looking for ~/.kiro/settings/mcp.json (global) and .kiro/settings/mcp.json
      (workspace).
    rubric:
      criteria:
        - id: c1
          text: Gives ~/.kiro/settings/mcp.json for user/global scope.
        - id: c2
          text: Gives .kiro/settings/mcp.json for workspace scope.
      referenceAnswer: |
        User/global MCP config is ~/.kiro/settings/mcp.json; workspace-scope
        config is .kiro/settings/mcp.json.
      passThreshold: 0.6
  - id: kiro-100-ff-g
    tier: 100
    bloom: remember
    difficulty: 178
    type: free_form
    prompt: |
      In what month and year did Kiro publicly launch in preview, and what
      company released it?
    guidance: |
      Looking for July 2025 (July 14, 2025) and AWS/Amazon.
    rubric:
      criteria:
        - id: c1
          text: States July 2025 (or July 14, 2025).
        - id: c2
          text: Attributes it to AWS/Amazon.
      referenceAnswer: |
        Kiro launched in preview in July 2025 (July 14, 2025), released by AWS
        (Amazon).
      passThreshold: 0.6
  - id: kiro-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 225
    type: multiple_choice
    prompt: |
      Why does Kiro separate a spec into requirements.md, design.md, and tasks.md
      rather than one document?
    choices:
      - id: a
        text: Markdown files cannot exceed a few kilobytes each
      - id: b
        text: The three files must each be edited by a different team member
      - id: c
        text: |
          Each phase produces a reviewable artifact and an approval gate, so
          intent is agreed before design and design before code
      - id: d
        text: Splitting files is required to enable syntax highlighting
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Phased artifacts enable human-in-the-loop approval gates: requirements are
      agreed before design, and design before tasks/implementation.
  - id: kiro-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 235
    type: multiple_choice
    prompt: |
      How does steering differ from a spec in Kiro?
    choices:
      - id: a
        text: Steering is per-feature; a spec is project-wide and permanent
      - id: b
        text: |
          Steering is persistent, cross-feature project guidance; a spec is a
          per-feature planning artifact
      - id: c
        text: They are the same thing under two names
      - id: d
        text: Steering runs shell commands while specs only store text
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Steering (.kiro/steering/) provides reusable always/conditional project
      context; specs (.kiro/specs/) plan one feature at a time.
  - id: kiro-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 245
    type: multiple_choice
    prompt: |
      Why use EARS notation instead of free-form prose for acceptance criteria?
    choices:
      - id: a
        text: It renders as a table automatically in the IDE
      - id: b
        text: It is the only format Kiro can store in markdown
      - id: c
        text: It compiles directly into executable unit tests
      - id: d
        text: |
          Its WHEN/THEN/SHALL structure makes each criterion testable and
          unambiguous
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      EARS forces a structured condition/behavior form, reducing ambiguity and
      making each criterion verifiable.
  - id: kiro-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 255
    type: multiple_choice
    prompt: |
      A steering file uses fileMatch mode with pattern "components/**/*.tsx".
      What does this accomplish?
    choices:
      - id: a
        text: |
          The file is loaded into context only when the user works on files
          matching that glob
      - id: b
        text: The file is loaded in every interaction regardless of files
      - id: c
        text: The file is deleted unless a matching file exists
      - id: d
        text: It restricts which files Kiro is allowed to edit
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      fileMatch (conditional) mode loads the steering only when active files
      match the glob, keeping unrelated context out.
  - id: kiro-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 265
    type: multiple_choice
    prompt: |
      What is the value of the #[[file:...]] reference syntax in a steering file
      versus pasting the file's contents?
    choices:
      - id: a
        text: It encrypts the referenced file before loading
      - id: b
        text: |
          It links the live file so the guidance stays in sync as that file
          changes, avoiding stale copies
      - id: c
        text: It prevents the referenced file from being edited
      - id: d
        text: It is purely cosmetic and behaves like a comment
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      A live reference pulls in the current file contents, so steering does not
      drift from the actual artifact (e.g., an OpenAPI spec).
  - id: kiro-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 275
    type: multiple_choice
    prompt: |
      Why are Kiro agent hooks described as detect-then-act rather than just
      "scripts you run"?
    choices:
      - id: a
        text: Hooks can only ever run after a build finishes
      - id: b
        text: Hooks must be compiled before they can detect anything
      - id: c
        text: Hooks only detect events but can never take an action
      - id: d
        text: |
          Kiro monitors an IDE event and then automatically runs an action, so
          the automation is triggered by events rather than invoked manually
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      A hook is a two-step model: detect a configured event, then act
      (agent prompt or shell command) automatically.
  - id: kiro-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 228
    type: multiple_choice
    prompt: |
      Why does Kiro require approval at the end of the requirements phase before
      generating design?
    choices:
      - id: a
        text: |
          To keep a human in the loop so misunderstood intent is caught before
          it propagates into design and code
      - id: b
        text: Because design.md cannot be created until requirements.md is deleted
      - id: c
        text: To bill the user for the next phase
      - id: d
        text: Because the model cannot read two files at once
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Approval gates are human-in-the-loop checkpoints; correcting requirements
      is far cheaper than fixing downstream design and code.
  - id: kiro-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: |
      What does listing a tool name under autoApprove in an MCP server config do?
    choices:
      - id: a
        text: It permanently disables the tool
      - id: b
        text: It forces the tool to require two approvals
      - id: c
        text: |
          It lets that tool run without per-call confirmation; otherwise Kiro
          prompts before invoking it
      - id: d
        text: It hides the tool from the MCP panel
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      autoApprove names tools allowed to run without prompting ("*" for all);
      everything else needs user approval.
  - id: kiro-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 258
    type: multiple_choice
    prompt: |
      When both ~/.kiro/settings/mcp.json and .kiro/settings/mcp.json define a
      server, how does Kiro resolve it?
    choices:
      - id: a
        text: Only the global file is ever read
      - id: b
        text: Kiro errors and refuses to start any MCP server
      - id: c
        text: The newest file by timestamp wins regardless of scope
      - id: d
        text: The two configs are merged, with workspace taking precedence
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      User and workspace MCP configs are merged; on conflict the workspace
      config wins.
  - id: kiro-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 268
    type: multiple_choice
    prompt: |
      How does Kiro distinguish a local MCP server from a remote one in config?
    choices:
      - id: a
        text: |
          Local servers use command + args (a launched process); remote servers
          use a url
      - id: b
        text: Local servers use url; remote servers use command + args
      - id: c
        text: Both must use command + args; remote is not supported
      - id: d
        text: The difference is set only by the disabled flag
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Local servers are launched via command/args (+ optional env); remote
      servers are reached via url (+ headers/oauth).
  - id: kiro-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 278
    type: multiple_choice
    prompt: |
      How does an AGENTS.md file behave differently from a normal Kiro steering
      file?
    choices:
      - id: a
        text: AGENTS.md must declare an inclusion mode or it is ignored
      - id: b
        text: AGENTS.md can only contain shell commands
      - id: c
        text: |
          AGENTS.md is auto-detected and loaded but does not support inclusion
          modes
      - id: d
        text: AGENTS.md overrides all spec files automatically
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      AGENTS.md (in .kiro/steering/ or workspace root) loads automatically but
      has no inclusion-mode front matter.
  - id: kiro-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 232
    type: multiple_choice
    prompt: |
      What does the "Quick Plan" feature-spec variant change about the normal
      workflow?
    choices:
      - id: a
        text: It skips tasks.md and only writes requirements and design
      - id: b
        text: |
          It generates all three artifacts at once instead of gating on
          per-phase approval
      - id: c
        text: It converts a feature spec into a bugfix spec
      - id: d
        text: It removes EARS notation from requirements
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Quick Plan auto-generates requirements, design, and tasks immediately,
      bypassing the per-phase approval gates of Requirements-First/Design-First.
  - id: kiro-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 252
    type: multiple_choice
    prompt: |
      Why can a Kiro hook action be an "agent prompt" rather than only a shell
      command?
    choices:
      - id: a
        text: |
          So the automation can perform an intelligent AI task (e.g., generate
          tests) that fixed scripts cannot
      - id: b
        text: Because shell commands are not allowed in any hook
      - id: c
        text: Because agent prompts run faster than shell commands always
      - id: d
        text: Because prompts are the only way to set a timeout
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      An agent-prompt action lets the hook do reasoning-based work (like writing
      tests on save) that a static shell command cannot.
  - id: kiro-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 240
    type: free_form
    prompt: |
      Explain how steering and specs play complementary roles in a Kiro project.
    guidance: |
      Looking for: steering = persistent, reusable, cross-feature project
      context; specs = per-feature planning artifacts (requirements/design/tasks).
    rubric:
      criteria:
        - id: c1
          text: Describes steering as persistent cross-feature project context.
        - id: c2
          text: Describes specs as per-feature planning artifacts.
        - id: c3
          text: Notes they are stored separately (.kiro/steering vs .kiro/specs).
      referenceAnswer: |
        Steering supplies durable project-wide guidance (patterns, stack,
        conventions) that applies across all work, stored in .kiro/steering/.
        Specs plan a single feature through requirements/design/tasks artifacts
        in .kiro/specs/<feature>/. Steering sets the standing context; specs
        apply that context to one feature at a time.
      passThreshold: 0.6
  - id: kiro-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 250
    type: free_form
    prompt: |
      Explain why Kiro's per-phase approval checkpoints exist and what they
      protect against.
    guidance: |
      Looking for: human-in-the-loop gating; catching misunderstandings early;
      cheaper to fix requirements than design/code.
    rubric:
      criteria:
        - id: c1
          text: Identifies the gates as human-in-the-loop review.
        - id: c2
          text: Explains they catch errors before they propagate downstream.
      referenceAnswer: |
        The approval checkpoints keep a human in the loop between phases. By
        reviewing requirements before design and design before tasks, a
        misunderstanding is caught while it is still cheap to fix, instead of
        surfacing later as wrong code.
      passThreshold: 0.6
  - id: kiro-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 260
    type: free_form
    prompt: |
      Compare the steering inclusion modes Always, fileMatch, Manual, and Auto in
      terms of when each loads.
    guidance: |
      Looking for: Always = every interaction; fileMatch = when active files
      match a glob; Manual = only when # mentioned; Auto = when a request matches
      the file's description.
    rubric:
      criteria:
        - id: c1
          text: Always loads in every interaction.
        - id: c2
          text: fileMatch loads conditionally on glob-matching files.
        - id: c3
          text: |-
            Manual loads only when referenced with a # mention; Auto loads when a
            request matches the file's description.
      referenceAnswer: |
        Always-mode steering loads in every interaction. fileMatch (conditional)
        steering loads only when the files being worked on match its glob.
        Manual-mode steering loads only when the user explicitly references it
        with a # mention. Auto-mode steering loads when the user's request matches
        the description declared in the file's front matter.
      passThreshold: 0.6
  - id: kiro-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 270
    type: free_form
    prompt: |
      Explain the difference between a feature spec and a bugfix spec in Kiro.
    guidance: |
      Looking for: feature spec = new capability via requirements/design/tasks;
      bugfix spec = systematic diagnosis + regression prevention/surgical fix.
    rubric:
      criteria:
        - id: c1
          text: Feature spec addresses new capabilities (requirements-first/design-first/quick plan).
        - id: c2
          text: Bugfix spec focuses on diagnosis and regression prevention.
      referenceAnswer: |
        A feature spec plans a new capability through requirements, design, and
        tasks (Requirements-First, Design-First, or Quick Plan). A bugfix spec
        instead drives a systematic diagnosis of an existing defect and a
        surgical fix with regression prevention.
      passThreshold: 0.6
  - id: kiro-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 230
    type: free_form
    prompt: |
      Why does the #[[file:...]] reference keep steering accurate over time?
      Explain the mechanism.
    guidance: |
      Looking for: it links the live file rather than copying contents, so
      updates to that file are reflected and steering does not go stale.
    rubric:
      criteria:
        - id: c1
          text: Explains it references the live file rather than a static copy.
        - id: c2
          text: Notes that changes to the file are reflected, avoiding drift.
      referenceAnswer: |
        #[[file:...]] embeds a live reference to the workspace file. Because Kiro
        pulls the current contents at load time rather than a frozen copy, edits
        to the referenced file (e.g., an OpenAPI spec) are reflected
        automatically, so the steering never drifts from reality.
      passThreshold: 0.6
  - id: kiro-200-ff-f
    tier: 200
    bloom: understand
    difficulty: 272
    type: free_form
    prompt: |
      Explain why MCP tool calls in Kiro require approval by default and how
      autoApprove changes that.
    guidance: |
      Looking for: tools can take real actions, so Kiro prompts before each call;
      autoApprove whitelists named tools (or "*") to skip the prompt.
    rubric:
      criteria:
        - id: c1
          text: States tools require user approval by default for safety.
        - id: c2
          text: Explains autoApprove lets named tools (or all via "*") run without prompting.
      referenceAnswer: |
        MCP tools can perform real, possibly side-effecting actions, so by default
        Kiro prompts the user to approve each invocation. Listing tool names in
        autoApprove (or "*" for all) lets those specific tools run without a
        per-call confirmation.
      passThreshold: 0.6
  - id: kiro-200-ff-g
    tier: 200
    bloom: understand
    difficulty: 238
    type: free_form
    prompt: |
