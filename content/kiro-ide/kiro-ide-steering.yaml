  - id: kis-100-ff-b
    tier: 100
    bloom: remember
    difficulty: 145
    type: free_form
    prompt: |
      What is the purpose of steering files in Kiro, in one sentence?
    guidance: |
      Looks for the idea of persistent project context/knowledge across conversations.
    rubric:
      criteria:
        - id: c1
          text: States steering gives Kiro persistent project knowledge/context.
        - id: c2
          text: Notes it avoids re-explaining context each conversation, or are markdown docs.
      referenceAnswer: |
        Steering files are markdown documents that give Kiro persistent knowledge
        about a project (patterns, libraries, standards) so the developer does not
        have to re-explain context in every conversation.
      passThreshold: 0.6
