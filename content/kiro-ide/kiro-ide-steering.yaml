    guidance: |
      Looks for Conditional/fileMatch mode + glob deciding which files trigger loading.
    rubric:
      criteria:
        - id: c1
          text: Identifies the Conditional / fileMatch mode.
        - id: c2
          text: Explains the glob selects which files trigger loading the steering doc.
      referenceAnswer: |
        Conditional (fileMatch) inclusion uses a fileMatchPattern glob; the steering
        file is loaded only when the developer is working on files matching that glob.
      passThreshold: 0.6
  - id: kis-200-mc-a
    tier: 200
    bloom: understand
    difficulty: 230
    type: multiple_choice
    prompt: |
      Why do teams use Always-mode steering for coding standards but
      Conditional (fileMatch) steering for framework-specific rules?
    choices:
      - id: a
        text: Always mode is faster to parse than fileMatch mode
      - id: b
        text: fileMatch mode cannot reference markdown, only JSON
      - id: c
        text: >-
          Standards apply everywhere so they should always load, while framework rules are only
          relevant to matching files and would waste context if always loaded
      - id: d
        text: Always mode is required for any file containing globs
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Understand the context-economy rationale behind the modes.
  - id: kis-200-mc-b
    tier: 200
    bloom: understand
    difficulty: 240
    type: multiple_choice
    prompt: |
      How does steering differ from a spec in Kiro?
    choices:
      - id: a
        text: Steering plans a single feature; a spec stores global coding standards
      - id: b
        text: They are identical; "steering" is just the old name for "spec"
      - id: c
        text: Steering runs shell commands; specs only store markdown
      - id: d
        text: >-
          Steering is persistent, reusable project guidance; a spec is a per-feature planning
          artifact
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Understand the steering-vs-spec distinction.
  - id: kis-200-ff-a
    tier: 200
    bloom: understand
    difficulty: 250
    type: free_form
    prompt: |
      Explain why the foundation files (product.md, tech.md, structure.md) being
      included by default reduces friction in day-to-day Kiro use.
    guidance: |
      Looks for the idea that baseline project context loads without re-explaining each time.
    rubric:
      criteria:
        - id: c1
          text: Explains these load automatically/by default in every interaction.
        - id: c2
          text: Connects this to not re-stating product/tech/structure context each prompt.
      referenceAnswer: |
        Because product.md, tech.md, and structure.md are included by default, Kiro
        always starts with baseline knowledge of what the product is, what stack it
        uses, and how it is organized, so the developer never has to re-state that
        context in each conversation, producing more consistent, on-pattern output.
      passThreshold: 0.6
  - id: kis-200-mc-c
    tier: 200
    bloom: understand
    difficulty: 235
    type: multiple_choice
    prompt: |
      What problem does the #[[file:...]] reference syntax solve compared with
