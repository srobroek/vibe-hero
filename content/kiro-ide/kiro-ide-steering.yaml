    choices:
      - id: a
        text: >-
          It keeps a live link so the steering doc stays in sync with the referenced file instead of
          going stale
      - id: b
        text: It encrypts the referenced file's contents
      - id: c
        text: It converts the file to JSON automatically
      - id: d
        text: It makes the steering file load only on save events
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Understand live references vs. stale copy-paste.
  - id: kis-200-mc-d
    tier: 200
    bloom: understand
    difficulty: 260
    type: multiple_choice
    prompt: |
