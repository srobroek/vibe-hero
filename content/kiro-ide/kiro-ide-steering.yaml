  - id: kis-500-ff-g
    tier: 500
    bloom: evaluate
    difficulty: 512
    type: free_form
    prompt: |
      A team is deciding whether to consolidate all guidance into a single large
      AGENTS.md at the repo root, or to use Kiro's mode-tagged steering files in
      .kiro/steering/. Evaluate the trade-offs and recommend an approach.
    guidance: >
      Looks for judging AGENTS.md (auto-load, no modes, portable) vs steering (mode control,
      scoping) and a justified recommendation.
    rubric:
      criteria:
        - id: c1
          text: >-
            Notes AGENTS.md auto-loads and is portable across tools but supports no inclusion modes
            (always full-weight).
        - id: c2
          text: Notes steering files support Always/Conditional/Manual/Auto scoping for context economy.
        - id: c3
          text: >-
            Gives a justified recommendation (e.g. small portable baseline in AGENTS.md, scoped
            detail in steering).
      referenceAnswer: |
        A single AGENTS.md is portable and auto-loaded, but it has no inclusion modes,
        so everything in it always enters context at full weight, which bloats prompts
        as it grows. Mode-tagged steering files let you scope guidance (Always for
        universals, fileMatch for area rules, Manual for rare playbooks), giving far
        better context economy at the cost of being Kiro-specific. Recommendation: keep
        a small, portable baseline in AGENTS.md and push the bulk of detailed,
        scope-specific guidance into mode-tagged steering files.
