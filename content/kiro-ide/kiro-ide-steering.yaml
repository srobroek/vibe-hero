    choices:
      - id: a
        text: No steering ever loads automatically; everything is manual
      - id: b
        text: >-
          Only foundation files and Always-mode files load every time; Conditional loads on matching
          files and Manual must be
      - id: c
        text: Only Manual-mode files load automatically
      - id: d
        text: Steering only loads when MCP servers are connected
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Understand which modes are automatic vs conditional vs manual.
  - id: kis-200-mc-e
    tier: 200
    bloom: understand
    difficulty: 270
    type: multiple_choice
    prompt: |
      Why might a team prefer Manual-mode steering for a rarely-needed but large
      "legacy migration playbook" document?
    choices:
      - id: a
        text: Manual mode compresses the file so it never costs tokens
      - id: b
        text: Manual mode is the only mode that supports markdown headings
      - id: c
        text: It avoids consuming context on every prompt and is pulled in only when explicitly
      - id: d
        text: Manual mode automatically loads when any file is saved
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Understand the on-demand value of Manual mode.
  - id: kis-200-ff-b
    tier: 200
    bloom: understand
    difficulty: 245
    type: free_form
    prompt: |
      Explain how workspace steering and global (user) steering relate, including
      what happens on conflict.
    guidance: |
      Looks for both layers existing and workspace taking precedence.
    rubric:
      criteria:
        - id: c1
          text: Describes workspace (.kiro/steering/) and global (~/.kiro/steering/) layers.
        - id: c2
          text: States workspace takes precedence on conflict.
      referenceAnswer: |
        Kiro supports both project-scoped steering in .kiro/steering/ and personal,
        cross-project steering in ~/.kiro/steering/. Both layers apply, but when they
        conflict the workspace file wins, so project rules override personal defaults.
      passThreshold: 0.6
  - id: kis-200-mc-f
    tier: 200
    bloom: understand
    difficulty: 255
    type: multiple_choice
    prompt: |
      How does AGENTS.md differ from a normal Kiro steering file in terms of
      inclusion behavior?
    choices:
      - id: a
        text: AGENTS.md must always be set to Manual mode
      - id: b
        text: AGENTS.md only works inside .kiro/specs/
      - id: c
        text: AGENTS.md cannot contain markdown
      - id: d
        text: >-
          AGENTS.md is auto-included but does not support inclusion modes, while normal steering
          files can use Always/Conditional/Manual/Auto
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Understand AGENTS.md auto-load without modes.
  - id: kis-200-mc-g
    tier: 200
    bloom: understand
    difficulty: 265
    type: multiple_choice
    prompt: |
      Compared with re-explaining conventions in chat each time, what is the main
      benefit of encoding them in steering?
    choices:
      - id: a
        text: Consistency and reuse across every session and teammate without re-typing context
      - id: b
        text: It disables the need for code review
      - id: c
        text: It guarantees Kiro never asks clarifying questions
      - id: d
        text: It permanently locks the model version used
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Understand reuse/consistency benefit.
  - id: kis-200-ff-c
    tier: 200
    bloom: understand
    difficulty: 275
    type: free_form
    prompt: |
      Explain how Auto (description-matched) inclusion differs from Conditional
      (fileMatch) inclusion.
    guidance: |
      Looks for Auto matching the request/description vs fileMatch matching file paths.
    rubric:
      criteria:
        - id: c1
          text: Explains fileMatch loads based on the files being worked on (glob match).
        - id: c2
          text: Explains Auto loads based on the request matching the file's description/name.
      referenceAnswer: |
        Conditional (fileMatch) loads a steering file when the developer is working
        on files matching a glob pattern. Auto inclusion instead loads the file when
        the user's request semantically matches the steering file's name/description,
        regardless of which files are open.
      passThreshold: 0.6
  - id: kis-200-mc-h
    tier: 200
    bloom: understand
    difficulty: 248
    type: multiple_choice
    prompt: |
      Why is it useful that steering files are plain markdown checked into the
      repo under .kiro/steering/?
    choices:
      - id: a
        text: Markdown is the only format Kiro can parse at all
      - id: b
        text: They are versioned, reviewable, and shared with the whole team like any other source file
      - id: c
        text: It prevents the files from ever loading into context
      - id: d
        text: It makes them invisible to git so they stay private
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Understand version-control / shareability benefit.
  - id: kis-200-mc-i
    tier: 200
    bloom: understand
    difficulty: 258
    type: multiple_choice
    prompt: |
      A teammate complains Kiro keeps suggesting the wrong test framework. Which
      foundation steering file is the most natural place to fix this?
    choices:
      - id: a
        text: product.md, by listing target users
      - id: b
        text: structure.md, by renaming folders
      - id: c
        text: tech.md, by stating the approved test framework and constraints
      - id: d
        text: A hook JSON file in .kiro/hooks/
    answerKey:
      kind: choice
      correctChoiceId: c
    guidance: |
      Understand which foundation file owns tooling constraints.
  - id: kis-200-ff-d
    tier: 200
    bloom: understand
    difficulty: 268
    type: free_form
    prompt: |
      Explain the relationship between the # manual mention and Manual-mode
      steering, and why a file set to Manual would otherwise be silent.
    guidance: |
      Looks for Manual files not auto-loading and # mention being the activation path.
    rubric:
      criteria:
        - id: c1
          text: States Manual-mode files do not load automatically.
        - id: c2
          text: 'States the #steering-file-name mention is what pulls a Manual file into context.'
      referenceAnswer: |
        A Manual-mode steering file is deliberately excluded from automatic loading,
        so it contributes nothing until invoked. The developer activates it on demand
        by typing a # mention of the file (e.g. #legacy-playbook), which injects its
        content into the current context.
      passThreshold: 0.6
  - id: kis-200-mc-j
    tier: 200
    bloom: understand
    difficulty: 238
    type: multiple_choice
    prompt: |
      Why does Kiro being built on Code OSS matter for steering adoption?
    choices:
      - id: a
        text: It means steering files must be written in C++
      - id: b
        text: It forces all steering to live in the user home directory only
      - id: c
        text: It removes support for markdown steering files
      - id: d
        text: >-
          Teams keep familiar VS Code settings, themes, and Open VSX plugins while gaining steering,
          lowering switching cost
    answerKey:
      kind: choice
      correctChoiceId: d
    guidance: |
      Understand Code OSS lineage lowering adoption friction.
  - id: kis-200-mc-k
    tier: 200
    bloom: understand
    difficulty: 252
    type: multiple_choice
    prompt: |
      How does encoding architecture rules in structure.md help an agent that
      creates new files?
    choices:
      - id: a
        text: >-
          The agent follows the documented naming and folder conventions so new files land in the
          right place
      - id: b
        text: It blocks the agent from creating any new files
      - id: c
        text: It automatically renames every existing file
      - id: d
        text: It converts the project to a monorepo
    answerKey:
      kind: choice
      correctChoiceId: a
    guidance: |
      Understand structure.md guiding file placement.
  - id: kis-200-ff-e
    tier: 200
    bloom: understand
    difficulty: 278
    type: free_form
    prompt: |
      Explain why splitting one giant steering file into several mode-tagged files
      can improve both relevance and context budget.
    guidance: |
      Looks for targeted loading reducing noise and token cost.
    rubric:
      criteria:
        - id: c1
          text: Notes targeted (Conditional/Manual) files load only when relevant.
        - id: c2
          text: Connects this to less context noise and lower token/context cost.
      referenceAnswer: |
        Splitting steering into focused, mode-tagged files lets each file load only
        when relevant (fileMatch globs or Manual mentions), so Kiro sees the right
        guidance at the right time, avoids irrelevant rules cluttering its context,
        and spends fewer tokens on guidance that does not apply to the current task.
      passThreshold: 0.6
  - id: kis-200-mc-l
    tier: 200
    bloom: understand
    difficulty: 272
    type: multiple_choice
    prompt: |
      What is the conceptual relationship between steering files and the .kiro/
      directory as a whole?
    choices:
      - id: a
        text: Steering replaces the .kiro/ directory entirely
      - id: b
        text: >-
          Steering is the persistent-guidance part of a broader .kiro/ project-memory layout that
          also holds specs, hooks, and settings
      - id: c
        text: Steering files must live outside .kiro/ to work
      - id: d
        text: .kiro/ is only for MCP and never for steering
    answerKey:
      kind: choice
      correctChoiceId: b
    guidance: |
      Understand steering's place in the .kiro/ memory layout.
  - id: kis-200-mc-m
    tier: 200
    bloom: understand
    difficulty: 242
    type: multiple_choice
    prompt: |
      Why would a global ~/.kiro/steering/ file for personal style be risky as a
