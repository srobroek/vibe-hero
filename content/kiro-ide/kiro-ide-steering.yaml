    bloom: evaluate
    difficulty: 535
    type: free_form
    prompt: |
      Critique using fileMatch globs as a security boundary -- e.g., relying on a
      glob so that "secret-handling rules only load near sensitive files." Judge
      whether inclusion modes are an appropriate control here.
    guidance: |
      Looks for judging inclusion modes as context-relevance, not enforcement/security controls.
    rubric:
      criteria:
        - id: c1
          text: Argues inclusion modes control context relevance, not enforcement or access.
        - id: c2
          text: >-
            Notes a glob does not prevent unsafe code elsewhere; the model may still act outside the
            matched files.
        - id: c3
          text: >-
            Recommends real controls (hooks/CI/secret scanning) for security, using steering only to
            advise.
      referenceAnswer: |
        Inclusion modes are a relevance mechanism, not a security control. A fileMatch
        glob only decides when advisory guidance enters context; it does not stop
        Kiro from generating unsafe code in unmatched files, nor does it enforce
        anything. Treating it as a boundary gives false assurance. For real security,
        use enforcement: Agent Hooks/CI that scan for secrets, plus repo policies;
        keep steering as the advisory layer that explains the rules.
      passThreshold: 0.6
