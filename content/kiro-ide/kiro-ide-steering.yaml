    guidance: |
      Looks for Auto needing a description to match requests; Always loads unconditionally.
    rubric:
      criteria:
        - id: c1
          text: States Auto loads based on matching the user's request to the file's description.
        - id: c2
          text: Explains Always loads unconditionally so it needs no matching metadata.
      referenceAnswer: |
        Auto mode decides whether to load a file by comparing the user's request to
        the file's name/description, so it must supply that description to match
        against. Always mode loads on every interaction unconditionally, so there is
        nothing to match and no description is needed.
