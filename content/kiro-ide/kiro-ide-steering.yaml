# Topic: kiro-ide-steering (kiro-ide)
# Steering documents in the Kiro IDE — persistent project guidance for the agent.
# 100 items, 20/tier (100-500). Authored + adversarially reviewed for correctness, recency, calibration, dedup.

id: kiro-ide-steering
class:
  kind: tool
  tool: kiro-ide
title: Kiro IDE Steering
summary: Steering documents in the Kiro IDE — persistent project guidance for the agent.
triggerSignals: []
items:
  - id: kis-100-ff-a
    tier: 100
    bloom: remember
    difficulty: 130
    type: free_form
    prompt: |
      In Kiro, what is the directory path where workspace-level steering files live?
    guidance: |
      Looks for the literal path .kiro/steering/ at the workspace root.
    rubric:
      criteria:
        - id: c1
          text: Names the directory .kiro/steering/ (or .kiro/steering).
        - id: c2
          text: Identifies it as workspace/project-level (not user/global).
      referenceAnswer: |
        Workspace steering files live in the .kiro/steering/ directory at the
        root of the project workspace.
      passThreshold: 0.6
