name: vibe-hero
version: 0.16.0  # x-release-please-version
description: >-
  vibe-hero adaptive-learning plugin: MCP server + skills + organic observation intake.
  Bundles four skills (setup, quiz, status, learn), a UserPromptSubmit surfacing hook
  that checks the spool of recorded work observations, a PostToolUse hook that records
  observations into the spool, and an MCP server launched via npx from the published
  @vibe-hero/server package.
author: Sjors Robroek
license: Apache-2.0
type: hybrid
target: claude
category: learning
tags:
  - learning
  - quiz
  - mcp
  - skill
includes: auto
dependencies:
  mcp:
    - name: vibe-hero
      registry: false
      transport: stdio
      command: npx
      args:
        - '-y'
        - '@vibe-hero/server@0.16.0' # x-release-please-version
